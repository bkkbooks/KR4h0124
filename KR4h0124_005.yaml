body:
  text: 宋文紀卷五明梅鼎祚編孝懿蕭皇后諱文夀蘭陵人孝皇繼室纍遵為太皇太后遺令髙祖母孝穆趙皇后以産疾殂事繼母蕭太后甚謹少帝即位加崇太皇太后景平元年殂初髙祖貧微孝皇葬禮多闕遺命太后不必祔葬故至是託后遺令孝皇背世五十餘年古不祔葬且漢世帝后陵皆異處今可於塋域之內别為一壙孝皇陵墳本用素門之禮與王者制度奢儉不同婦人禮有所從可一遵往式皇太后張氏不知何郡縣人義熙初得幸武帝生少帝初封夫人尊為皇太后廢少帝立宜都王令少帝即位二年多過失司空徐羡之等謀廢立稱太后令少帝廢拜營陽王太妃王室不造天禍未悔先帝創業弗永棄世登遐義符長嗣屬當天位不謂窮凶極悖一至於此大行在殯宇內哀惶幸災肆于悖詞喜容表于在戚至乃徴召樂府鳩集伶官優倡管絃靡不備奏珍羞甘膳有加平日採擇媵御産子就宫靦然無怍醜聲四達及懿后崩背重加天罰親與左右執紼歌呼推排梓宫抃掌笑謔殿省備聞加復日夜媟狎羣小慢戲興造千計費用萬端帑藏空虛人力殫盡刑罰苛虐幽囚日增居帝王之位好皂隸之役處萬乘之尊悅厮養之事親執鞭撲毆擊無辜以為笑樂穿池築觀朝成暮毁徴發工匠疲極兆民逺近歎嗟人神怨怒社稷將墜豈可復嗣守洪業君臨萬邦令廢為營陽王一依漢昌邑晉海西故事奉迎鎮西將軍宜都王義隆入纂皇統太皇太后路氏諱惠男丹陽建康人為文帝淑媛生孝武帝前廢帝即位尊為太皇太后立湘東王彧令前廢帝凶悖明帝時為湘東王謀廢帝使壽寂之等殞帝華林園稱太皇太后令奉湘東即位司徒領護軍八座子業雖曰嫡長少稟凶毒不仁不孝著自髫齓孝武棄世屬當辰歷自梓宫在殯喜容靦然天罰重罹歡恣滋甚逼以內外維持忍虐未露而凶慘難抑一旦肆禍遂縱戮上宰殄害輔臣子鸞兄弟先帝鍾愛含怨既往枉加屠酷昶茂親作扞橫相徴討新蔡公主逼離夫族幽置深宫詭云薨殞襄事甫爾喪禮頓釋昏酣長夜庶事傾遺朝賢舊勳棄若遺土管絃不輟珍羞備膳詈辱祖考以為戲謔行遊莫止淫縱無度肆宴園陵規圖發掘誅剪無辜籍略婦女建樹偽豎莫知誰息拜嬪立后慶過恆典宗室密戚遇若婢僕鞭捶陵曳無復尊卑南平一門特鍾其酷反天滅理顯暴萬端苛罰酷令終無紀極夏桀殷辛未足以譬闔朝業業人不自保百姓遑遑手足靡厝行穢禽獸罪盈三千髙祖之業將泯七廟之享幾絶吾老疾沉篤每規禍鴆憂煎漏刻氣命無幾開闢以降所未嘗聞逺近思奮十室而九衛將軍湘東王體自太祖天縱英聖文皇鍾愛寵冠列藩吾早識神睿特兼常禮潛運宏規義士投袂獨夫既殞懸首白旗社稷再興宗祀永固人鬼屬心大命允集且勳德髙邈大業攸歸宜遵漢晉纂承皇極主者詳舊典以時奉行未亡人餘年不幸嬰此百艱永尋情事雖存若殞當復奈何當復奈何賜豫章王子尚山隂公主楚玉死令太宗殞廢帝稱太后令子尚楚玉並孝武帝王皇后生子尚頑凶極悖行乖天理楚玉淫亂縱慝義絶人經並可于第賜盡皇太后王氏諱貞風琅邪臨沂人為明帝后後廢帝即位尊為皇太后齊建元元年薨廢立令明帝子昱立為後廢帝狂慝失德蕭道成弒之稱太后令迎立安成王是為順帝禪位道成衛將軍領軍中書監八座昱以冢嫡嗣登皇統庶其體識日𢎞社稷有寄豈意窮凶極悖自幼而長善無細而不違惡有大而必蹈前後引誘常加隱蔽險戾難移日月滋甚棄冠毁冕長襲戎衣犬馬是狎鷹隼是愛皂櫪軒殿之中韝緤宸扆之側至乃單騎逺郊獨宿深野手揮矛鋋躬行刳斫白刃為弄器斬害為恆務捨交戟之衛委天畢之儀趨步闤闠酣歌罏肆宵遊忘返宴寢營舍奪人子女掠人財物方策所不書振古所未聞沈勃儒士孫超功臣幼文兄弟並豫勳效四人無罪一朝同戮飛鏃鼓劒孩稚無遺屠裂肝腸以為戲謔投骸江流以為歡笑又淫費無度帑藏空竭橫賦關河專充别蓄黔庶嗷嗷厝生無所吾與其所生每厲以義方遂謀鴆毒將騁凶忿沈憂假日慮不終朝自昔辛癸爰及幽厲方之於此未譬萬分民怨既深神怒已積七廟阽危四海褫氣廢昏立明前代令範况乃滅義反道天人所棄舋深牧野理絶桐宫故密令蕭領軍潛運明略幽顯協規普天同泰驃騎大將軍安成王體自太宗天挺淹睿風神凝逺德映在田地隆親茂皇歷攸歸億兆係心含生屬望宜光奉祖宗臨享萬國便依舊典以時奉行未亡人追往傷懷永言感絶追封後廢帝令昱窮凶極暴自取灰滅雖曰罪招能無傷悼棄同品庶顧所不忍可特追封蒼梧郡王謝昭容請東平王子嗣還本屬表子嗣孝武帝第二十七子繼東平沖王休倩休倩母嚴酷子嗣所生母景寧園昭容謝上表太宗許之故東平沖王休倩託荄璿極岐嶷夙表降年弗永遺胤莫傳孝武皇帝敕妾子臣子嗣出繼為後既承國祀方奉蒸薦庶覃遐慶式延于逺而妾顔訓養非恩撫導乖理情闕引進義違負螟昔世祖平日詭申慈愛崩背未幾真性便發猶逼畏崇憲少欲藏奄自兹以後專縱嚴酷實顯布宗戚宣灼宫闈用傷人倫爰惻行路妾天屬冥至感切實深伏願乾渥廣臨曲垂照賜復改命還依本屬則妾母子雖隕之辰猶生之願有司奏上蕭太后尊號髙祖繼母為宋王加太妃之號及踐阼有司奏尊為皇太后奏以下並有司后號附臣聞道積者慶流德洽者禮備故祗敬表於崇髙嘉號彰於盛典伏惟太妃母儀之德化穆不言保翼之訓光被洪業雖幽明同慶而稱謂未窮稽之前代禮有恆準宜式遵舊章允副羣望有司上張太后尊號奏少帝母有司奏為皇太后及少帝廢為營陽王拜太妃臣聞嚴親敬始所因者本充孝之道由中被外伏惟夫人德並坤元徽音光劭發祥兆慶誕啓聖明宜崇極徽號允備盛則從春秋母以子貴之義遵漢晉推慶之典謹上尊號為皇太后宫曰永樂有司追尊胡太后奏后諱道女淮南人髙祖納之生文帝後被譴死宋初贈婕妤太祖即位有司奏尊為章皇太后臣聞德厚者禮尊慶深者位極故閟宫既構咏歌先妣園陵崇衛聿追來孝伏惟先婕妤柔明塞淵光被六列德昭川範訓洽母儀用能啓祚聖明奄宅四海嚴親莫逮天祿永違臣等逺準春秋近稽漢晉謹上尊號曰章皇太后陵曰熙寧有司奉尊路太后奏文帝路淑媛生孝武帝及入討元凶即位有司奏尊為皇太后臣聞厯集周邦徽音充嗣氣淳漢國沙麓發祥昔在上代業隆祚逺未有不敷隂教以闡洪基膺淑慶以載聖哲者也伏惟淑媛柔明內昭徽儀外範合靈初迪則庶姬仰耀引訓蕃閫則家邦被德民應惟和神屬惟祉故能誕鍾睿躬用集大命固靈根于既殞融盛烈乎中興載厚化深聲詠允緝宜式諧舊典恭享極號奉尊號曰皇太后宫曰崇憲有司追尊沈太后奏文帝沈婕妤生明帝元嘉三十年卒贈湘東國太妃明帝即位有司奏追尊為皇太后諡曰宣昔豳都追逺正已纒哀緬慕德義敬奉園陵先太妃德履端華徽景明峻風光宸掖訓流國闈鞠聖誕靈蚤捐鴻祚臣等逺模漢册近儀晉典謹上尊號為皇太后有司尊陳太妃奏妃諱妙登丹陽建康人明帝納之生後廢帝拜貴妃及後廢帝踐阼有司奏尊為皇太妃因改諸王國太妃曰大妃妃音怡臣聞河龍啓聖理浹民神郊電基皇慶爍天地故資敬之道粹古銘風沿貴之誼眇代凝則伏惟貴妃含和日晷表淑星樞徽音峻古柔光照世聲華帝掖軌秀天嬪景發皇明祚昌睿命而偹物之章未換彛䇿逺酌前王允陟鴻典臣等參議謹上尊號曰皇太妃長沙王義欣父道憐髙祖中弟嗣位歷豫州刺史進號鎮軍將軍薨于任陳長吏奏義興為豫州刺史隨宜經理遂稱強鎮時淮西江北長吏悉敘勞人武夫多無政術義欣陳之江淮左右土塉民疏頃年以來荐飢相襲百城雕弊於今為甚綏牧之宜必俟良吏勞人武士不經政術統內官長多非才授東南殷實猶或簡能况賔接荒垂而可輯粲頓闕願敕選部必使任得其人庶得不勞而治舉郡守申季歷表元嘉九年義欣為豫州刺史上言進號寧朔將軍所統威逺將軍北譙梁二郡太守關中侯申季歷自奉職邦畿于兹五年信惠並宣威化兼著外清姦暴內輯民黎役賦均平閭井齊肅綏穆初附招携荒逺郊境之外仰澤懷風爵賞之授績能自顯宣升階秩以崇奬勸告司兗二州太祖踐阼有志北略元嘉七年三月詔遣右將軍劉彥之等分兵進取河南後將軍長沙王義欣出鎮彭城總統羣帥告司兖二州魏主燾悉斂河南一城歸河北魏大衆南渡河洛陽滑臺虎牢諸城並為魏沒夫王者之兵以義德相濟非徒疆理土地恢廣經略將以大庇蒼生保全黎庶是以蒙踐霜雪踰歷險難匡國寧民肅清四表昔我髙祖武皇帝誕膺明命爰造區夏內夷篡逆外寧冦亂靈武紛紜雷動風舉響軼龍堆聲浮雲朔陵天振地拔山蕩海於是華域肅清謳歌允集王綱帝典煥哉惟文太和絪緼流澤洋溢中葉諒暗委政冢宰魏人乘釁侵侮上國遂令司兖良民復蹈非所周鄭遺黎重隔王化聖皇踐祚重光開朗明哲柔逺以隆中興遐夷慕義雲騰波湧方將蹈德履信被藝襲文增修業統作規於後勤施洽於三方惠和雍於北狄夫養魚者除其猵獺育禽者去其豺狼故智士研其慮勇夫厲其節嘉謀動蒼天精氣貫辰緯莫府忝任稟承廟算翦爪明衣誓不顧命提吳楚之徑卒總八州之鋭士紅旗降天素甲奪日虎步中原龍超河渚興雲散雨慰大旱之思弔民伐罪積後已之情師以順動何征而不克况乎遵養耆昧綏復境土而已哉昔淮泗初開狡徒縱逸王旅入關羣竪飊扇襄邑之戰素旗授首平城之役伏尸蔽野支解體分羽翼摧挫加以構難西邊結怨黃龍控弦熸滅首尾逼畏蜂屯蟻聚假息旦夕豈復能超蹈長河以當堂堂之陳哉夫順從貴速歸德惡晚賞褒先附威加後服是以秦趙羇旅披榛委誠施紱乘軒剖符州郡慕容姚泓恃強作禍提挈萬里卒嬰鈇鉞皆目前之誠驗往世之所知也聖上明發愛恤以道懷二州士民若能審決安危翻然革面率其支黨歸投軍門者當表言天臺隨才敘用如其迷心不悛竄首巢穴長圍既周臨衝四至雖欲壺漿厥篚其可得乎幸加三思詳擇利害臨川王義慶本長沙王道憐第二子繼襲臨川王道規歷都督南兖州刺史開府儀同三司為宗室之表祖避孫讎議義慶元嘉初遷丹陽尹時有民黃讎初妻趙殺子婦趙遇赦應徙避孫義慶議案周禮父母之讎避之海外雖遇市朝鬬不及兵蓋以莫大之寃理不可奪含戚枕戈義許必報若至於親戚為戮骨肉相殘故道乖常憲記無定準求之法外裁以人情且禮有過失之宥律無讎祖之文况趙之縱暴本由于酒論心即實事盡荒耄豈得以荒耄之王母等行路之深讎臣謂此孫忍愧銜悲不違子義共天同域無虧孝道上舉士表元嘉十二年普使內外羣官舉士義慶上表詔書疇咨羣司延及連牧旌賢仄陋拔善幽遐伏惟陛下惠哲光宣經緯明逺皇階藻曜風猷日升而猶詢衢室之令典遵明臺之睿訓降流慮於管庫紆聖思乎版築故以道邈往載德髙前王臣敢竭虛暗祗承明旨伏見前臨沮令新野庾實秉真履約愛敬淳深昔在母憂毁瘠過禮今罹父疚泣血有聞行成閨庭孝著鄰黨足以敦化率民齊教軌俗前徴奉朝請武陵龔祈恬和平昔貞純潔素潛居研志耽情墳典亦足鎮息頽競奬勗浮勤處士南郡師覺才學明敏操介清修業均井泄志固氷霜臣往年辟為州祭酒未汙其慮若朝命逺暨玉帛遐臻異人間出何逺之有謝賜如意啓事恩旨賜臣犀鏤竹節如意目所未睹北堂書鈔彭城王義康小字車子武帝第四子歷位大將軍領司徒以范曄等謀立徙安成郡賜死上文帝遜位表義康為司徒録尚書事又領揚州刺史專總朝權事決自已太子詹事劉湛素經情欵與其族左長史劉斌等互為傾反初太祖疾嘗危湛意在奉義康及疾豫亦微聞之而羣小結為朋黨構造愆釁元嘉十七年乃收湛付廷尉伏誅遣人宣旨于義康因上表遜位改授江州刺史出鎮豫章其後范曄等謀逆坐誅臣幼荷國靈爵遇踰等陛下推恩睦親以隆棠棣愛忘其鄙寵授遂崇任總內外位兼台輔不能正身率下以肅庶僚昵近失所漸不自覺致令毁譽違實賞罰謬加由臣才弱任重以及傾撓今雖罪人即戮王猷載靜養釁貽垢實由於臣鞠躬栗栗若墮溪壑有何心顔而安斯寵輒解所職待罪私第歲飢平糶議元嘉中三吳水潦穀貴人飢彭城王義康議東土災荒人凋穀踊富商蓄米日成其價宜班下所在隱其虛實令積蓄之家聽留一年儲餘皆敕使糶貨為制平價此所謂常道行於百代權宜用於一時也又緣淮嵗豐邑地沃壤麥既已登黍粟行就可折其估賦成就交市三吳飢人即以貸給使強壯轉運以贍老弱通典江夏王義恭武帝第五子歷中書監太尉録尚書事為前廢帝所害舉才表義恭元嘉九年徴為南兗州刺史鎮廣陵時詔內外百官舉才義恭舉南陽宗炳等臣聞雲和備樂則繁會克諧驊騮驂服則致逺斯效陛下順簡夤化文明在躬玉衡既正泰階載一而猶發慮英髦人情仄陋幽谷空同顯著揚歷是以潛虬聳鱗佇利見之期翔鳯弭翼應來儀之感竊見南陽宗炳操履間逺思業貞純砥節丘園息賔盛世貧約而苦內無改情軒冕屢招確爾不拔若以蒲帛之聘感以大倫之美庶投竿釋褐翻然來儀必能毗燮九官宣贊百揆尚書金部郎臣徐森之臣府中直兵參軍事臣王天寶並局力允濟忠諒欵誠往年逆臣叛逸華陽失守森之全境寧民績章危棘前者經略伊瀍元戎喪旅天寶北勤河朔東據營丘勳勇既昭心事兼竭雖蒙奬敘未盡才宜並可授以邉藩展其志力交址遼邈纍喪藩將政刑每闕撫蒞惟艱南中敻逺風謠迥隔蠻獠狡竊邉氓荼炭實須練實以綏其難謂森之可交州刺史天寶可寧州刺史庶足威懷荒表肅清遐服昔魏戊之賢功存薦士趙武之明事彰管庫臣識愧前良理謝先哲率舉所知仰酬採訪退懼瞽言無足甄奬上嘉禾頌表元嘉二十四年七月嘉禾旅生華林園及景陽山園丞梅道念以聞其中甘露降京師太尉江夏王義恭上表獻頌臣聞居髙聽卑上帝之功天且弗違聖王之德故能影響二儀甄陶萬有鑒觀今古採驗圖緯未有道缺化虧而禎物著明者也自皇運受終辰曜交和是以卉木表靈山淵效寶伏惟陛下體乾統極休符襲逮若乃鳯儀西郊龍見東邑海酋獻改緇之羽河祗開俟清之源三代象德不能過也有幽必闡無逺弗屆重譯嵗至休瑞月臻前者躬籍南畝嘉穀乃植神明之應在斯尤盛四海既穆五民樂業思述汾陽經始靈囿蘭林甫樹嘉露頻流板築初就祥穟如積太平之符於是乎在臣以寡立承乏槐鉉沐浴芳津預覩冥慶不勝抃舞之情謹上嘉禾甘露頌一篇不足稱揚美烈追用悚汗其頌曰二象攸分三靈樂主齊應合從在今猶古天道誰親唯仁斯輔皇功帝績理冠區宇四民均極我后體兹惟機惟神敬昭文思九族既睦萬邦允釐德以位敘道致雍熙於穆不已顯允東儲生知夙睿嶽茂淵虛因心則哲令問𢎞敷繼徽下武儷景辰居軒制合宫漢興未央矧伊聖朝九有已康率由舊典思燭前王乃造凌霄遂作景陽有藹景陽天淵之涘清暑爽立雲堂特起植類斯育動類斯止極望江波遍對嶽峙化德惟達休瑞惟懋誕降嘉種呈祥初構甘露春凝禎穟秋秀于今匪烈嗣嵗仍富昔在放勳厯莢數朝降及重華倚扇清庖鑠矣皇慶比物競昭倫彼典策被此風謡資臣六蔽任兼兩司既恧仲袞又慙鄭緇豈忘衡泌樂道明時敢述休祉愧闕令辭請徙彭城王義康奏義康初以罪出鎮豫章元嘉二十四年豫章胡誕等聚衆據郡復欲奉戴義康録尚書義恭等奏徙廣州奏可越四年賜死投畀之言義著雅篇流殛之教事在書典庶人義康負釁深重罪不容戮聖仁不忍屢加遲回宥其大辟賜遷近甸斯乃至愛發天超邈終古曾不遇愆甘引而讒言同衆佷悖僥幸每形辭色內宣家人外動民聽不逞之族因以生心胡誕世假竊名號構成凶逆杜漸除微古今所務况禍機驟發庸可忽乎臣等參議宜徙廣州逺郡放之邉表庶有防絶勸孝武帝即位表元凶劭弒立義恭進位太保疑有異志使住尚書下省世祖入討前鋒至新亭劭挾義恭出戰使於東堂簡將因單馬奔世祖於新林浦上表勸進於新亭即位臣聞治亂無兆倚伏相因乾靈降禍二凶極逆深酷巨痛終古未有陛下忠孝自天赫然電發投袂泣血四海順軌是以諸侯雲赴數均八百義奮之旅其會如林神祚明德有所底止而沖居或躍未登天祚非所以嚴重宗社紹延七百昔張武抗辭代王順請耿純陳欵光武正位况今罪逆無親惡盈釁滿阻兵安忍戮善崇姦履地戴天畢命俄頃宜早定尊號以固社稷景平之季實惟樂推王室之亂天命有在故抱拜兆於壓璧赤龍表於霄徴伏維大明無私逺存家國七廟之靈近哀黔首荼炭之切時陟帝祚永慰羣心臣負釁嬰罰偷生人壤幸及寬政待罪有司敢以漏刻視息披露肝膽臧質宜藏首武庫奏孝武帝孝建元年質為江州刺史挾南郡王義宣反兵敗逃武昌南湖為戍主斬首傳京師録尚書江夏王臣義恭左僕射臣宏等奏詔可詳見義宣及質臧質底棄下才而藉遇深重窮愚悖常構扇凶逆變至滔天志圖泯夏違恩叛德罪過恆科梟首之憲有國通典懲戾思永去惡宜深臣等參議須辜日限意使依漢王莽事例漆其頭首藏于武庫庶為鑑戒昭示將來上孝武帝請封禪表大明元年十一月太宰江夏王義恭上表請封禪詔報有司再奏不許惟皇天崇稱大夏始行揖讓迄于有晉雖聿修前緒而迹淪言廢蔑寄於竹素者焉可單書紹乾維建徽號流風聲被絲管自無懷以來可傳而不朽者七十有四君罔仁厚而道滅鮮義澆而德宣鍾律之先曠世綿絶難得而聞丘索著明者尚有遺炳故易稱先天弗違後天奉時蓋陶唐姚姒商姬之主莫不由斯道也是以風化大洽光煕於後炎漢二帝亦踵曩則因百姓之心聽輿人之頌龍駕帝服鏤玉梁甫昌言明稱告成上靈况大宋表祥唐虞受終素德山龍啓符金玉顯瑞異采騰於軫墟紫煙藹於邦甸錫冕兆九五之徴文豹赴天厯之會誠二祖之幽慶聖后之冥休道冠軒堯惠深亭毒而猶執沖約未言封禪之事四海竊以恧焉臣聞惟皇配極惟帝祀天故能上稽乾式照臨黔首協和穹昊膺兹多福髙祖武皇帝明並日月光振八樞拯已溺之晉濟橫流之世撥亂寧民應天受命鴻徽洽于海表威稜震乎沙外太祖文皇帝體聖履仁述業興禮正樂頌作象厯明達通于神祇玄澤被乎上下仁孝命世睿武英挺遭運屯否三才湮滅乃龍飛五洲鳯翔九江身先八百之期斷出人鬼之表慶煙應髙牙之建風耀符發迹之辰親剪凶逆躬清昏壒天地革始夫婦更造豈與彼承業繼緒拓復禹迹車一其軌書罔異文者同年而議哉今龍麟已至鳯凰已儀比李已實靈茅已茂雕氣降氛于宫榭珍露呈味于禁林嘉禾積穟于殿甍連理合幹于園籞皆耀質離宫植根蘭囿至夫霜毫玄文素翮赬羽泉河山嶽之瑞草木金石之祥方畿憬塗之謁抗驛絶祖之奏彪炳雜沓粵不可勝言太平之應兹焉富矣宜其從天人之誠遵先王之則備萬乘整法駕修封泰山瘞玉岱趾延喬松於東序詔韓岐於西廂麾天閽使啓關謁紫宫朝太乙奏鈞天詠雲門贊揚幽奧超聲前古豈不盛哉伏願時命宗伯具兹典庶初學記謝莊江夏王義恭表云江淮鄗上之使結軌于璧門西鶼北采之譯相望于道路案此則表為莊代撰也孝武帝詔報太宰表如此昔之盛王永保鴻名常為稱首由斯道矣朕遭家多難入纂絶孝德薄勳淺鑒昧崩愧頃麟鳯表禎茅禾兼瑞雖符祥顯見恧乎猶深庶仰述矢志拓清中宇禮祇謁神朕將試哉有司再奏臣聞崇號建極必觀俗以樹教正位居體必採世以立言是以重代列聖咸由厥道玄勳上列融章未分鳴光委緒歇而罔臧若其顯諡略騰軌則系綴聲采徵略聞聽爰洎姬漢風流尚存遺芬餘榮綿映紀緯雖年絶世祀代革精華可得騰金綵奏玉潤鏤迹以燻今鐫德以麗逺而四望埋禋歌之禮日觀弛修封之容豈非神明之業難崇功基之迹易泯自兹以降訖於季末莫不欲英𢎞徽位詳固洪聲豈徒深默修文淵幽馭世而已諒以縢非虛奏書匪罔埋擊雨恕神淳蔭復樹安得紫壇肅祗竹宫載佇散火投郊流星奔座寶緯初基厭靈命厯德振弛維功濟淪象玄浸紛流華掖幽潤規存永馭思祥樹逺太祖文皇帝以啓遘泰運景望震凝采樂調風集禮宣度祖宗相映軌迹重暉聖上韞籙蕃河佇翔衡漢金波掩照華耀停明運動時來躍飛風舉澄氛海岱開景中區歇神還靈頽天重耀儲正凝位於兼明衮嶽蕃華於元列故以祥映昌基繫發篆素重以班朝侍典飾令詳儀纂綜淪蕪搜騰委逸奏玉郊宫禋圭玄畤景集天廟脈壤祥農節至昕陽川丘夙禮網威巡􅀈表綏中甸史流其詠民挹其風於是涵迹視隂振聲威響歷代之渠沈一望內安侯之長賢王入侍殊生詭氣奉俗還鄉羽族卉儀懷音革狀邉帛絶書權光弛燭天岱發靈宗河開寶崇丘淪鼎振采泗淵雲皇王嶽摛藻一漢并角即音栖翔禁籞衮甲霜咮翾舞川肆榮泉流鏡後昭河源故以波沸外關雲蒸內澤若其雪趾青毳玄文朱綵日月郊甸擇木弄音重以榮露騰軒蕭雲掩閣鎬穎孳萌移華淵禁山輿佇衡雲鶼竦翼海鰈泳流江茅吐蔭校書之列仰筆以飾辭濟代之蕃獻邑以待禮豈非神協氣昌物瑞雲照蒱軒龜軫闕泉淳芳太宰江夏王臣義恭咀道遵英拪竒麗古該潤圖史施詳閟載表以功懋往初德耀炎昊升文中岱登牒天關耀冠榮名摛振聲號而道謙稱首禮以虛挹將使玄祗缺觀幽瑞乖期梁甫無盛德之容介丘靡升聞之響加窮泉之野獻八代之駟交木之鄉奠絶金之楛肅靈重表珍符兼貺伏惟陛下謨詳淵載衍屬休章依徴聖靈潤色聲業諏辰稽古肅齊警列儒僚展采禮官相儀懸蕤動音洪鐘竦節陽路整衛正途清禁於是績環珮端玉藻鳴鳯佇律騰駕流文間采比象之容昭明紀數之服徽焯天陳容藻神行翠蓋懷隂羽華列照乃詔聨事掌祭賔客贊儀金支宿縣鏞石潤響命五神以相列闢九關以集靈警衛兵而開雲先雨祇以灑路霞凝生闕煙起成宫臺冠丹光壇浮素靄爾乃臨中壇備盛禮天降祥錫壽固皇根谷動神音山傳稱響然後問年稱老陳詩觀俗歸薦告神奉遺清廟光美之盛彰乎萬古淵祥之烈溢乎無窮豈不盛歟臣等生接昌辰肅懋明世束教管聞未足言道且章志湮微代往淪絶拘採遺文辨明訓誥希志黃虞簉訪鄒魯草縢書堙玉之禮具竦石繩金之儀和芝潤瑛鐫璽乾封懼弗軌屬上徽燀當王則謹奉儀注以聞詔報天生神物昔王稱愧况在寡德敢當鴻貺今文軌未一可停此奏諫孝武帝親征表大明三年竟陵王誕有罪貶爵遂據廣陵反上使劉勔等討之值雨攻城不克上怒使太史擇日將自濟江義恭表諫已而克之誕誅誕素無才略畜養又寡自拒王命士庶離散城內乏糧器械不足徒賴免兵蒼頭三四百人造次相附恩怨夙結臣始短慮謂一旬可殄而假息流遷七十餘日上將受律羣蕃兵峙鋭卒精旅動以萬計大威所震未有成功臣雖凡怯猶懷憤踊陛下入翦封豕出討長蛇兵不血刃再興七百而蕞爾小醜遂延晷漏致皇赫斯怒將動乘輿此實臣下素食駑鈍之責行留百司莫不仰慚俯愧今盛暑被甲日費千金天威一麾孰不幸甚臣伏尋晉文王征淮南淹師出二百日方能致冦今誕糇糧垂竭背逆者多慶之等轉悟遲重之非漸見乘機之利且成旨頻降必應旦夕夷殄愚又以廣陵塗近人信易達雖為江水約示不難且覩理者寡暗塞者多忽見雲旗移次京都既當秪悚四方之志必有未達臣愚伏重思計今寧不當計小醜省生命以安遐邇之情又以長江險闊風波難期王者尚不乘危况乃泛不測之水昔魏文濟江遂有遺州之名今雖先天不違動干休慶龍舟所幸理必利涉然居安慮危不可不懼私誠欵欵冒啓赤心追用悚汗不自宣盡省録尚書表世祖以義宣逆亂由於強盛至是欲削弱王侯義恭希旨乃上表又與竟陵王誕奏定諸王侯儀制詔付有司詳奏詔可臣聞天地設位三極同序皇王化則九官咸事時亮之績昭於虞典論道之風宣於周載台輔之設坐調隂陽元凱之置起釐百揆所以欒針矢言侵官是誡陳平抗辭匪職罔答漢承秦後庶僚稍改爵因時變任與世移總録之制本非舊體列代相沿兹仍未革今皇家中造事遵前文宜憲章先代證文古則停省條録以依昔典使物競思存人懷勤一則名實靡愆庸節必紀臣謬典國重虛荷崇位興替宜知敢不輸盡陳蕃戚儀制九事奏臣聞佾懸有數等級異儀佩笏有制卑髙殊序斯蓋上哲之洪摹範世之明訓而時至彌流物無不弊僣侈由俗軌度非古晉代東徙舊法淪落侯牧典章稍與事廣名實一差難以卒變章服崇濫多歷年所今樞機更造皇風載新耗弊未充百用思約宜備品式之律以定損厭之條臣等地居枝昵位參台輔遵正之首請以爵先致貶之端宜從戚始輒因暇日共參愚懷應加省易謹陳九事雖懼匪𠂻庶竭微欵伏願陛下聽覽之餘薄垂昭納則上下相安表裏和穆矣有司附益二十四條奏車服以庸虞書茂典名器慎假春秋明誡是以尚方所制漢有嚴律諸侯竊服雖親必罪降于頃世下僣滋極器服裝飾樂舞音容通於王公達於衆庶上下無辨民志靡一義恭所陳實允禮度九條之格猶有未盡謹共附益二十四條聽事不得南向坐施帳并藩國官正冬不得跣登國殿及夾侍國師傅令及油戟公主王妃傳令不得朱服輿不得重棡鄣扇不得雉尾劒不得鹿盧形槊旄不得孔雀白氅夾轂隊不得絳襖平乘誕馬不得過二匹從騎不得綵衣舞伎正冬著袵衣不得裝回冬會不得鐸舞柸柈舞長蹻透狹舒劒博山緣大橦升五案自非正冬會奏舞曲不得舞諸妃主不得著緄帶信幡非臺省官悉用絳郡縣內史相及封內官長於其封君既非在三罷官則不復追敬不合稱臣宜止下官而已諸鎮常行車前後不得過六隊白直夾轂不在其限刀不得過銀銅為飾諸王女封縣主諸王子孫襲封之王妃及封侯者夫人行並不得鹵簿諸王子繼體為王者婚葬吉凶悉依諸國公侯之禮不得同皇弟皇子車非軺車不得油幢平乘船皆下兩頭作露平形不得擬象龍舟悉不得朱油帳􅟈不得作五花及竪筍形又條制諸王府鎮表義恭徴為揚州刺史以避世祖寵子西陽王子尚解揚州進位太宰領司徒常慮為上所疑及海陵王休茂於襄陽為亂乃表上條制古先哲王莫不廣植周親以屛帝宇諸侯受爵亦願永固邦家至有管蔡梁燕致禍周漢上乖顯授之恩下亡血食之業夫善積慶深宜享長久而歷代侯王甚乎匹庶豈異姓皆賢宗室悉不賢由生於深宫不覩稼穡左右近習未值田蘇富貴驕奢自往而至聚毛折軸遂乃危禍漢之諸王並置傅相猶不得禁逆七國連謀實由強盛晉氏列封正足成永嘉之禍尾大不掉終古同疾不有更張則其源莫救日者庶人恃親殆傾王業去嵗西冦藉寵幾敗皇基不圖襄楚復生今釁良以地勝兵勇奬成凶惡前事之不忘後事之明兆陛下大明紹祚垂法萬葉臣年衰意塞無所知解忝皇族耆長慙慨內深思表管見禆崇萬一竊謂諸王貴重不應居邉至于華州優地時可暫出既以有州不須置府若位登三事止乎長史掾屬若宜鎮御别差扞城大將若情樂沖虛不宜逼以戎事若捨文好武尤宜禁塞僚佐文學足充話言遊梁之徒一皆勿許文武從鎮以時休止妻子室纍不煩自隨百僚修詣宜遵晉令悉須宣令齊到備列賔主之則衡泌之士亦無煩干候貴王器甲於私為用蓋寡自金銀裝刀劒戰具之服皆應輸送還本曲突徙薪防之有素庶善者無懼惡者止姦山隂縣民墾起湖田議奏孔靈符會稽山隂人大明中為丹陽尹山隂民多田少靈符表徙無資之家於餘姚鄞鄮三縣界墾起湖田世祖使公卿博議義恭等議上從其徙民並成良業夫訓農修本有國所同土著之民習玩日久如京師無田不聞徙居他縣尋山隂豪族富室頃畝不少貧者肆力非為無處耕起室荒無救災歉又緣湖居民魚鴨為業及有居肆理無樂徙杜氏通典議魚鴨為業下云小人習始既難勸之未易逺廢之疇方翦荆棘率課窮乏其事彌難資徒粗立徐行無晚尚書令栁元景右僕射劉秀之尚書王瓉之顧凱之顔師伯嗣湘東王諱議富户溫房無假遷業窮身寒室必應徙居葺宇疏臯産粒無待資公則公未易充課私則私卒難具生計既完畬功自息宜募亡叛通恤及與樂田者其往經創須粗修立然後徙居侍中沈懷文王景文黃門侍郎劉敳郤顒議百姓雖不親農不無資生之路若驅以就田則坐相違奪且鄞等三縣去治並逺既安之民忽徙他邑新垣未立舊居已毁去留兩困無以自資謂宜適任民情徙其所樂開宥逋亡且令就業若審成腴壤然後議遷太常王玄謨議小民貧匱逺就荒疇去舊即新糧種俱闕習之既難勸之未易謂宜微加資給使得肆勤明力田之賞申怠惰之罰光祿勳王升之議逺廢之疇方剪荆棘率課窮乏其事彌難資徒粗立徐行無晚請還彭城王義康屬籍表義康被殺六子惟長子永初封泉陵侯元凶殺之前廢帝永光元年太宰江夏王義恭上表詔許臣聞忝祖逺之猶或慮親降霍省序義重令戚故嚴道疾終嗣啓方字阜陵愆屛身遌晚恩竊惟故庶人劉義康昔昧姧回自貽非命沈魂漏籍垂誡來典運革三朝嵗盈三紀天地改朔日月再升陶形賦氣咸蒙更始義康妻息漂沒早違盛化衆女孤弱永淪黔首即情原舋本非已招感事哀焭俯增傷咽敢緣陛下聖化融泰春澤覃被慈宥羣生仁被泉草實希洗宥還齒帝宗則施及陳荄榮施汚壤臣特慿國私冒以誠表塵觸靈威伏紙悲悸前廢帝詔報太宰表如此公緣情追逺覽以增慨昔淮楚推恩胙流支胤抑法𢎞親古今成凖使以公表付外依旨奉行故泉陵侯允橫罹凶虐可特為置後劾蔡興宗求益州表興宗為民部尚書轉掌吏部前廢帝即位義恭録尚書事受遺輔政引身避事政歸近習而興宗針規得忤出興宗吳郡太守固辭又轉為東海太守不拜苦求益州義恭大怒上表詔外詳議因復使尚書栁元景奏興宗及尚書袁愍孫免官除興宗新昌太守郡屬交州朝廷嗟駭臣聞慎節言語大易有規銓序九流無取裁缺若乃結黨連羣譏訴互起街談巷議罔顧聽聞乃撤實憲制所宜禁經之巨蠧侍中祕書監臣彧自表父疾必求侍養聖旨矜體特順所陳改授臣府元僚兼帶軍郡雖臣駑劣府任非輕準之前人不為屈後京郡本以為祿不計户之多少遇缺便用無關髙下撫軍長史莊滯府纍朝每陳危苦內職外守稱未堪依唯王球昔比賜以優養恩慈之厚不近於薄前新除吳郡太守興宗前居選曹多不平允鴻渥含宥恕其不間改任大都寵均阿輔仍苦請益州雅違成命伏尋揚州刺史子尚吳興太守休若並國之茂戚魯衛攸在猶牧守東山竭誠撫蒞而辭擇適情起自庶族逮佐北藩尤無欣荷御史中丞永昔嵗餘愆從恩今授光祿勳淹雖曰代臣纍經降黜後效未申以何取進司徒左長史孔覬前除右衛尋徙今職回換之宜不為乃少竊外談謂彧等咸為失分又聞興宗躬自怨懟與尚書右僕射師伯疏辭旨甚苦臣雖不見所聞不虛臣以凡才不應機務謬自幸會受任三朝進無古人舉賢之美退無在下獻替之績致兹紛紜伏增慙悚然此源不塞此風不變將虧正道塵穢盛猷伏願聖聽賜垂覽察前廢帝詔報太宰表如此省以憮然朕恭承洪緒思𢎞盛烈而在朝凌競驅扇成風將何以式揚先德克隆至化公體國情深保釐攸託便可付外詳議尚書栁元景奏臣義恭表詔書如右攝曹辨核尚書袁愍孫牒此月十七日詣僕射顔師伯語次因及尚書蔡興宗有書固辭今授仍出疏見公乃者數紙不意悉何所道緣此因及朝士當今聖世不可使人以為少今牒數之朝廷處之實得所臣等亦自謂得分常多在門袁愍孫無或措多而愚意欲啓更量出內之宜芻蕘管見願在聞徹選令史宣傳密事故因附上聞亦外人言此今辭慶先列今月十八日往尚書袁愍孫論選事愍孫云昨詣顔僕射出蔡尚書疏見示言辭甚苦又云所得亦少主上踐阼始爾朝士有此人不多物議謂慶美用乃更恨少使咨事便啓録公又謝莊當時未老其疾以轉差今居此任復為非宜謂宜中書令才望為允又孔覬南士之美所歷已多近頻授即復回改於理為曲門下無人此是名選又張求人地可論其去嵗愆戾非為深罪依其望復門下一人張淹替忝南下預因休戚雖屢經愆黜事亦已久謂應祕書監帶授興宗手迹數紙文翰炳然事證明白不假核辨愍孫任居官人職掌銓裁若有未久則宜顯言而私加許與自相選署託云物論終成虛詭隱末出端還為矛楯臣聞九官成讓虞風垂則誹主怨時漢罪夙斷况義為身發言謗朝序亂辟害政混穢大猷紛紜彰謬上延詔旨不有霜準軌憲斯淪請解興宗新附官須事御收付廷尉法獄治罪免愍孫所居官前廢帝詔報興宗首亂朝典允當明憲以其昔經近侍未忍盡法可令思愆逺封愍孫竊評自已委咎物議可以子領職啓太祖沈邵為鍾離太守有惠政義恭啓太祖徙盱眙不許盱眙太守劉顯真求自解説邵往蒞任有政績彰於民聽若重授盱眙足為良二千石詔答其願遷經年方復作此流遷必當大罔罔也宋文帝中詔謝賜金梁鞍啓賜臣供御金梁橋鞍制作精巧宜副龍駟聖慈下逮猥垂光錫初學記謝賜笏等啓聖恩優重猥賜華纓玉笏珍冠首飾琛板耀握非臣朽薄所宜服受也相手版經注此非出相手版經蓋初學記引誤接義恭此啓耳謝賜針縷等啓聖恩賜金銀針七色縷并格一犀棟刷匣副綿布兆珍服寶玩以協嘉辰北堂書鈔又謝袍啓賜臣金獸袍珍製巧飾太平御覽載啓事垂賜金虎魄茱茰囊紺裏副之七寶校裝玉眼明囊詔又啓事洪恩覃被賜臣息伯倫柳屋二間又啓事旨以赦日所制綾紋錦布袍放生古具袍垂重賜謝賜檳榔啓奉賜交州所獻檳榔味殊常品塗逺蒟醬謝賜柿啓敕旨垂賜華林園柿出自神苑滋味殊絶並太平御覽藝文類聚義恭謝啓手敕賜華林櫻桃其下云為樹則多隂為果則先熟故種之于廳事之前有蟬鳴焉顧命黏取以弄乃傅咸黏蟬賦序也誤併為啓答太祖書雷次宗隱退徴辟不就太祖為築招賢館鍾山及卒太祖與義恭書道次宗亡義恭答書雷次宗不救所疾甚可痛念其幽棲窮藪自賔聖朝克已復禮始終若一伏惟天慈𢎞被亦垂矜愍宋書與王玄謨書王玄謨為寧朔將軍任北征前鋒圍滑臺積旬不克後敗守碻磝義恭為征討都督召令還為魏軍所追大破之流矢中臂還至歷城義恭與玄謨書聞因敗為成臂上金創得非金印之徴也宋書金南史將非印之徴耶華林四瑞桐樹甘露頌初學記逺延鳯翮遙集鸞步惠潤何廣霑我明庶衡陽王義季武帝子歷徐州刺史與江夏王義恭書宗炳卒義季與義恭書炳字少文南陽涅陽人纍辟不就宗居士不救所病其清履肥素終始可嘉為之惻愴不能巳已宋書啓文帝劉道産纍遷雍州刺史襄陽太守在雍政績尤著及卒義季為荆州刺史啓上故輔國將軍劉道産患背癰疾遂不救道産自鎮漢南境接凶冦政績既著威懷兼舉年時猶可方宣其用奄至殞沒傷怨特深伏惟聖懷愍惜兼至宋書南郡王義宣武帝第缺子起兵上孝武帝表元凶弒立義宣起兵傳檄逺近會世祖入討又率衆助為前部事平進中書監改封南郡王纍授荆襄二州刺史初臧質隂有異志以義宣凡弱欲假手為亂每密説義宣以有大才負大功宜在人前早有處分而世祖閨庭無禮與義宣諸女淫亂義宣怨憤報豫州刺史魯爽等克孝建元年秋冬舉事爽狂酒失旨其年正月便反義宣狼狽起兵因上表世祖詔答太傅江夏王義恭又與義宣書兵敗誅臣聞博陸毗漢獲疑宣后昌國翼燕見猜惠王常謂異姓震主嫌隟易構葭莩淳戚昭亮可期臣雖庸懦少希忠謹值巨逆滔天忘家殉國雖歷算有歸微績不樹竭誠盡愚貫之幽顯而微疑莫監積毁日聞投杼之聲紛紜溢聽諒緣姧臣交亂成是貝錦夫澆俗之季少貞節之臣氷霜競至靡後雕之木並寢處凶世甘榮偽朝皆纓冕之所棄投畀之所取至乃位超昔寵任參大政惡直醜勳妄生邪説疑惑明主誣罔視聽又南從羣僚勞不足紀橫叨天功以為巳力同弊相扇圖傾宗社臧質去嵗忠節勳高古賢魯爽協同大義志契金石此等猜毁必欲禍陷昔汲黯尚存劉安寢志孔父既逝華督縱逆臣雖不武績著艱難復肆讒狡規見誘召宗社之危綴旒非所臣託體皇基連暉日月王室顛墜咎在微躬敢忘抵鼠之忌甘受犯墉之責輒徴召甲卒分命衆藩使忠勤申憤義夫效力戳此凶醜謝愆闕庭則進不負七廟之靈退無愧二朝之遇臨表感愧辭不自宣孝武帝詔答南郡王義宣皇帝敬問朕以不天招罹屯難家國阽危剪焉將及所以身先八百雪清寃恥逺慿高笇共濟囏難遂登寡暗嗣奉洪祀尊戚酬勳實表心事粃政闕職所願匡拯而嘉言蔑聞末德先著勤王之績未終毁冕之圖已及臧質嶮躁無行見棄人倫以此不識志在問鼎凶意將逞先借附從扇誘欺熾成此亂階如使羣逆並濟衆邪競逐將恐瞻烏之命未識所止構怨連禍孰知其極公明有不照背本崇姦迷眤讒醜還謀社稷雖履霜有日誼議糾紛朕以至道無私杜遏疑議信理推誠暴于遐邇不慮物變難籌醜言遂驗是用悼心失圖忽忘寢食今便親御六師廣命羣牧告靈誓衆直造柴桑梟轘元惡以謝天下然後警蹕清江鳴鑾郢路投戈襲袞面稟規勗有宋不造家禍仍纒昔嵗事寧方承逺訓冀以虛薄永弭厥艱豈謂曾未期稔復覩斯舋二祖之業將墜于淵仰瞻鴻基但深感慟宋書江夏王義恭與義宣書以下附類頃聞之道路云二魯背叛致之有由謂不然之言絶於智者之耳忽見來表將興晉陽之甲警愕駭惋未譬所由若主幼臣強政移冢宰或時昏下縱在上畏逼然後賢藩忠構覩難赴機未聞聖王御世百辟順軌稱兵於言興之初扶危於既安之日以此取濟竊為大弟憂之昔嵗二凶構逆四海同奮弟協宣忠孝奉戴明主元功盛德既巳昭著皇朝欽嘉又亦優渥丞相位極人臣江左罕授一門兩王舉世希有表信推誠彰于見事出納之宜惟意所欲褱升進益方省後命一旦棄之可謂運也吾等荷先帝慈育得及人羣思報厚恩昊天罔極竭力盡誠猶懼無補奈何妄聽邪説輕造禍難國靡流言遽歸愆於二叔世無鼂錯仍襲轍於七藩棄漢蒼之令範遵齊冏之敗迹往時仲堪假兵靈寶旋害其族孝伯授之劉牢忠誠逝踵皆曩代之成事當今之殷鑒也臧質少無美行弟所具悉慿恃末戚並有微勤承乏推遷遂超倫伍藉西楚強力圖濟其私凶謀若果恐非復池中物魯宗父子世為國寃太祖方𢎞遐略故爽等均雍齒之封令據有五州虎兕出于柙是須為劉淵耳徐遺寶是垣護之婦弟前因護之歸于吾苦求北出不樂逺西近磐桓湖陸示遣劉雍其意可見雍是徐沖舅適有密信誓倒戈自敵侵境以來公私雕弊安以撫之庶可寧靜弟復隨而擾亂吾恐邉鄙皆為禾黍宜逺尋髙祖創業艱難近念家國比者禍舋時息兵戈共安社稷責躬謝過誅除險佞追保前勳傳美竹帛昔梁孝悔罪景帝垂恩阜質改過肅宗降澤忠焉之誨聊希往言禍福之機明者是察主上神武英斷羣風如林忠臣發憤虎士投袂雄騎布野舳艫蓋川吾以不才忝權節鉞總督羣帥首戒戎先指晨電舉式清南服所以積行緩期冀弟不逺而悟如其遂溺姦説者天實為之臨書慨悶不識次第宋書句二魯者爽及弟秀旋害通鑑作尋害孝伯二作孝伯推誠牢之旋踵而敗密信疑是適有信密誓又書臧質始聞國禍便有異圖以義宣凡暗欲外相推奉以成其志質女為義宣子採妻謂質無復異同且義宣腹心將佐勸奬義宣舉兵義恭與義宣書由此與質相疑昔桓玄借兵於仲堪有似今日沈慶之與義宣書慶之字𢎞先武康人歷太尉廢帝賜死義宣至尋陽與臧質西下至鵲頭聞所遣徐遺寶敗魯爽於小峴授首相視失色世祖使鎮北大將軍沈慶之送爽首示義宣并與書僕荷任一方而釁生所統近聊率輕師指往翦撲軍鋒裁交賊爽授首公情契異常或欲相見及其可識指送相呈答義宣書謝莊為沈慶之答義宣書皇綱絶而復紐區宇墜而更維選注王玄謨報義宣書玄謨事彥德太原祁人歷南豫州刺史上遣豫州刺史王玄謨舟師頓梁山洲內東西兩岸為却月城營柵甚固義宣屢與玄謨書要令降玄謨書報之頻奉二誨伏對戰駭先在彭泗聞諸將皆云必有今日之事以鄙意量謂無此理去年九月故遣參軍先僧瑗修書表心并密陳入相之計欲使周旦之美復見于今豈意理數難推果至於此昔因幸會蒙國士之顧思報厚德甘起泉壤豈謂一旦事與願違公崇長姦回自放西服信邪細之説忘大節之重溺流狡之志滅君親之恩狎玩極寵越希非覬祖宗世祀自圖顛覆瞑目行事未有如斯之甚者也乃復枉覃書檄逺示見招此則丹心微欵未亮於高鑑赤誠幽志虛感於平日環念周回始悟知已之為難也公但念提職在昔不思善教有本徒見徐魯去就未知仗義有人豈不惜哉有臣則欲其忠誘人而導諸逆君子忠恕其如是乎茍不忠恕則擇木之翰有所不集矣夫挑妾者愛其易求妻則敬其難若承命如響將焉用之原轂存輿無禮必及竊恐荆郢之士已當潛二其懷非皇都陋臣秉義不徙公雖心迷迹往猶願勉建良圖栁撫軍忠壯慷慨亮誠有素新亭之勳莫與為等而妄信姦虛坐相貶謗不亦惑哉幸承人乏夙誡前驅精甲已次近路鎮軍駱驛繼發太傅驃騎嗣董元戎乘輿親御六師威靈遐振人百其氣慕義如林舟騎雲回赫奕千里輒屬鞬秉鋭與執事周旋授命當仁理無所讓夫君道既盡民禮亦絶執筆裁答感慨交懷撫軍栁元景據姑孰為大統太傅驃騎即江夏王義恭江夏王義恭諸王公八座與荆州刺史朱修之書修之字恭祖義興平氏人義宣之起時為雍州刺史歸順孝武以為荆州刺史加都督義宣敗逃夜還向城入南郡空廨竺超民遣故達車一乘載送刺姦義恭等與修之事書書未修之至江陵已於獄盡焉義宣反道叛恩自陷極逆大義滅親古今同準無將之誅猶或囚殺况醜文悖志宣灼遐邇鋒指絳闕兵纒近郊舋逼憂深臣主旰食賴朝略震明祖宗靈慶罪人斯得七廟弗隳司刑定罰典辟攸在而皇慈逮下愍其愚迷抑法申情屢奏不省人神悚遑省心震惕義宣自絶于天理無容受社稷之慮臣子責深便宜專行大戮以紓國難但加諸斧鉞有傷聖仁示以𢎞恩使自為所上全天德下一洪憲臨書悲慨不復多云宋文紀卷五
