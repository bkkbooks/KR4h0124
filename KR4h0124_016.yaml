body:
  text: 宋文紀卷十六眀梅鼎祚編蘇瑋生平賊告郊社太廟奏孝武帝孝建元年六月平劉義宣臧質八座奏唯告廟社不告二郊太學博士徐宏孫勃陸澄議禮無不報始既遍告今賊已禽不應不同國子助教蘇瑋生參議詔可八座奏劉義宣臧質干時犯順滔天作戾連結淮岱謀危宗社質反之始戒嚴之日二郊廟社皆已遍陳其義宣為逆未經同告輿駕將發醜徒冰消質既梟懸義宣禽獲二寇俱殄並宜昭告檢元嘉三年討謝晦之始並告二郊太廟賊既平蕩唯告太廟太社不告二郊禮官博議蘇瑋生議案王制天子巡狩歸假於祖禰又曽子問諸侯適天子告於祖奠于禰命祝史告于社稷宗廟山川告用牲幣反亦如之諸侯相見反必告于祖禰乃命祝史告至于前所告者又云天子諸侯將出必以幣帛皮圭告于祖禰反必告至天子諸侯雖事有小大其禮略鈞告出告至理不得殊鄭云出入禮同其義甚眀天子出征類于上帝推前所告者歸必告至則宜告郊不復容疑元嘉三年唯告廟社未詳其義或當以禮記唯云歸假祖禰而無告廟之辭果立此義彌所未達夫禮記殘缺之書本無備體折簡敗字多所闕略正應推例求意不可動必徴文天子反行告社亦無成記何故告郊獨當致嫌但出入必告蓋孝敬之心既以告歸為義本非獻捷之禮今輿駕竟未出宫無容有告至之文若陳告不行之禮則為未有前準愚謂祝史致辭以昭誠信苟其義舛於禮自可從實而闕臣等參議以應告為允並宜用牲告南北二郊太廟太社依舊公卿行事而闕下當有缺誤或闕字為小字注缺遂誤作大字徐宏東平沖王祔廟議奏孝建元年七月有司奏下禮官議太學博士徐宏議有司奏東平沖王年稚無後唯殤服五月雖不殤君應有主祭而國是追贈又無其臣未詳毁靈立廟為當它祔與不輒下禮官詳議徐宏議詔可王既無後追贈無臣殤服既竟靈便合毁記曰殤與無後者從祖祔食又曰士大夫不得祔於諸侯祔於祖之為士大夫者按諸侯不得祔于天子沖王則宜祔諸祖之廟為王者應祔長沙景王廟朱膺之章皇太后廟殷祭議大明二年二月庚寅有司奏皇代殷祭無事于章后廟高堂隆議魏文思后依周薑嫄廟禘祫及徐邈答晉宣太后殷薦舊事使禮官議正朱膺之同王燮之孫緬議宜殷薦詔從之博士孫武議案禮記祭法設廟祧壇墠而祭之乃為親踈多少之數是故王立七廟逺廟為祧鄭云天子遷廟之主昭穆合藏於祧中祫乃祭之王制曰祫禘鄭云祫合也合先君之主於祖廟而祭之謂之祫三年而夏禘五年而秋祫謂之五年再殷祭又禘大祭也春秋文公二年大事于太廟傳曰毁廟之主陳于太祖未毁廟之主皆升合食太廟傳曰合族以食序以昭穆祭統曰有事於太廟則羣昭羣穆咸在不失其倫今殷祠是合食太祖而序昭穆章太后既屈於上不列正廟若迎主入太廟既不敢配列於正序未聞於昭穆之外别立為位若徐邈議今殷祠就别廟奉薦則乖禘祫大祭合食序昭穆之義邈云隂室四殤不同祫就祭此亦其義也喪服小記殤與無後從祖祔食祭法王下祭殤鄭玄云祭適殤于廟之奧謂之隂厭既從祖食於廟奧是殤有位於奧非就祭别宫之謂今章太后廟四時饗薦雖不於孫止若太廟禘祫獨祭别宫與四時蒸嘗不異則非禘大祭之義又無取于祫合食之文謂不宜與太廟同殷祭之禮髙堂隆答魏文思后依薑嫄廟禘祫又不辨祫之義而改祫大饗蓋有由而然耳守文淺學懼乖禮𠂻博士王燮之議通典王奭之按禘小祫大禮無正文求之情例如有推尋祫之為名雖在合食而祭典之重於此為大夫以孝饗親尊愛同極因殷薦太祖亦致盛祀于小廟譬有事於尊者可以及卑故髙堂隆所謂獨以祫故而祭之也是以魏之文思晉之宣后雖並不序于太廟而猶均禘於薑嫄其意如此又徐邈所引四殤不祫就而祭之以為别饗之例斯其證矣愚謂章皇太后廟亦宜殷薦太常丞孫緬議祫祭之名義在合食守經據古孫武為詳竊尋小廟之禮肇自近魏晉之所行足為前準髙堂隆以祫而祭有附情敬徐邈引就祭四殤以證别饗孫武據殤祔於祖謂廟有殤位尋事雖同廟而祭非合食且七廟同宫始自後漢禮之祭殤各祔厥祖既豫祫則必異廟而祭愚謂章廟殷薦推此可知祠部郎朱膺之議閟宫之祀髙堂隆趙怡並云周人祫嵗俱祫祭之魏晉二代取則奉薦名儒達禮無相譏非不愆不忘率由舊章愚意同王燮之孫緬議孝武帝詔章皇太后追尊極號禮同七廟豈容獨闕殷薦隔茲盛祠閟宫遙祫既行有周魏晉從饗式範無替宜述附前典以宣情敬王偃喪禫服議大明二年正月有司奏領曹郎朱膺之議有司奏故右光祿大夫王偃喪依格皇后服期心喪三年應再周來二月晦檢元嘉十九年舊事武康公主出適二十五月心制終盡從禮即吉昔國哀再周孝建二年二月其月末諸公主心制終則應從吉於時猶心禫素衣二十七月乃除二事不同朱膺之議詳尋禮文心喪不應有禫皇代考驗已為定制元嘉季年禍難深酷聖心天至喪紀過哀是以出適公主還同左室即情變禮非革舊章今皇后二月晦宜依元嘉十九年制釋素即吉以文帝元嘉十五年皇太子妃祖父右光祿大夫殷和喪變除之禮儀同皇后議南郊廟祠儀奏孝建二年正月南郊有司奏下禮官詳正太學博士王祀之太常丞朱膺之並議通關並同建平王宏謂膺之議為允詔可有司奏今月十五日南郊尋舊儀廟祠至尊親奉以太尉亞獻南郊親奉以太常亞獻又廟祠行事之始以酒灌地送神則不灌而郊初灌同之於廟送神又灌議儀不同于事有疑輒下禮官詳正王祀之議案周禮大宗伯佐王保國以吉禮事鬼神祗禋祀昊天則今太常是也以郊天太常亞獻又周禮外宗云王后不與則贊宗伯鄭玄云后不與祭宗伯攝其事又説云君執圭瓉祼尸大宗伯執璋瓉亞獻中代以來后不廟祭則應依禮大宗伯攝亞獻也而今以太尉亞獻鄭注禮月令云三王右司馬無太尉太尉秦官也蓋世代彌久宗廟崇敬攝后事重故以上公亞獻又議履時之思情深於霜露室戶之感有懷于容聲不知神之所在求之不以一處鄭注儀禮有司云天子諸侯祭於祊而繹繹又祭也今廟祠闕送神之祼將移祭于祊繹眀在於留神未得而殺禮郊廟祭殊故灌送有異朱膺之議案周禮大宗伯使掌典禮以事神為上職總祭祀而昊天為首今太常即宗伯也又袁山松漢百官志云郊祀之事太尉掌亞獻光祿掌三獻太常每祭祀先奏其禮儀及行事掌贊天子無掌獻事如儀志漢亞獻之事専由上可不由秩宗貴官也今宗廟太尉亞獻光祿三獻則漢儀也又賀循制太尉由東南道升壇眀此官必預郊祭古禮雖由宗伯然世有因革上司亞獻漢儀所行愚謂郊祀禮重宜同宗廟且太常既掌贊天子事不容兼又尋灌事禮記曰祭求諸隂陽之義也殷人先求諸陽樂三闋然後迎牲則殷人後灌也周人先求諸隂灌用鬯達於淵泉既灌然後迎牲則周人先灌也此謂廟祭非謂郊祠案周禮天官凡祭祀贊王祼將之事鄭注云祼者灌也唯人道宗廟有灌天地大神至尊不灌而郊未始有灌于禮未詳淵儒注義炳然眀審謂今之有灌相承為失則宜無灌周景逺殷祭議孝建元年十二月有司奏依舊今元年十月是殷祠之月領曺郎范泰參議依永初三年例須再周之外殷祭尋祭再周來二年三月若以四月殷則猶在禫內下禮官議正國子助教蘇瑋生太學博士徐宏太常丞朱膺之並議郎中周景逺參議以宏膺之議為允詔可蘇瑋生議案禮三年喪畢然後祫于太祖又云三年不祭唯天地社稷越紼行事且不禫即祭見譏春秋求之古禮喪服未終固無祼享之義自漢文以來一從權制宗廟朝聘莫不皆吉雖祥禫空存無綅縞之變蒸嘗薦祀不異平日殷祠禮既弗殊豈獨以心憂為礙徐宏議三年之喪雖從權制再祥周變猶服縞素未為純吉無容以祭謂來四月未宜便殷十月則允朱膺之議虞禮云中月而禫是月也吉祭猶未配謂二十七月既禫祭當四時之祭日則未以其妃配哀未忘也推此而言未禫不得祭也又春秋閔公二年吉禘於莊公鄭玄云閔公心懼于難務自尊成以厭其禍凡二十二月而除喪又不禫云又不禫眀禫內不得禘也案王肅等言於魏朝云今權宜存古禮俟畢三年舊説三年喪畢遇禘則禘遇夾則祫鄭玄云禘以孟夏祫以孟秋今相承用十月如宏所上公羊之文如為有疑亦以魯閔設服因言喪之紀制爾何必全許素冠可吉禘縱公羊異説官以禮為正亦求量宜周景逺參議永初三年九月十日奏傅亮議權制即吉御世宜爾宗廟大禮宜依古典則是皇宋開代成準謂博士徐宏太常丞朱膺之議用來年十月殷祠為允殷祭用孟秋議宋殷祭皆即吉乃行大眀七年有司奏四月應殷祠若事中未得為得用孟秋與不領軍長史周景逺議參議據禮有證謂用孟秋為允詔可案禮記云天子祫禘祫嘗祫蒸依如禮文則夏秋冬三時皆殷不唯用冬夏也晉義熙初僕射孔安國啓議自泰和四年相承殷祭皆用冬夏安國又啓永和十年至今五十餘年用三十月輒殷祠博士徐乾據禮難安國乾又引晉咸康六年七月殷祠是不専用冬夏于時晉朝雖不從乾議然乾據禮及咸康故事安國何以奪之今若來四月未得殷祠遷用孟秋于禮無違徐爰字長玉南琅邪開陽人本名瑗初為晉琅邪王大司馬府中典軍入宋厯除太中大夫徙交州還為南濟隂太守中𣪚大夫禦敵議爰孝建初補尚書水部郎轉殿中郎兼右丞三年魏人寇邊議詔旨敵犯邊塞水陸遼逺孤城危棘復不可置臣以戎狄猖狂狡焉滋廣列卒擬候伺覘間隙不勞大舉終莫永寧然連于千里費固巨萬而中興造創資儲未積是以齊斧徘徊朔氣稽掃今皇運洪休靈威遐懾蠢爾遺燼懼在誅剪思肆蜂蠆以表有餘雖不敢深入濟沛或能草竊邊塞羽林鞭長太倉遙阻救援之日勢不相及且當使緣邊諸戍練卒嚴城凡諸督統聚糧蓄田籌計資力足相抗擬小鎮告警大督電赴塢壁邀斷州郡犄角儻有自送可使匹馬不反詔旨胡騎倐忽抄暴無漸出耕見虜野粒資寇比及少年軍實無擬江東根本不可俱竭宜立何方可以相贍臣以為方鎮所資實宜且田且守若使堅壁而春墾輟耕清野而秋登莫擬私無生業公成虛罄逺引根本二三非宜救之之術唯在盡力防衛來必拒戰去則邀躡據險保隘易為首尾胡馬既退則民豐廩實比及三載可以長驅詔旨賊之所向本無前謀兵之所進亦無定所比嵗戎戍倉庫多虛先事聚衆則消費糧粟敵至倉卒又無以相應臣以為推鋒前討大須資力據本應末不俟多衆今寇無傾國豕突列城勢足唇齒養卒得勇所任得才臨事而懼應機無失豈煩空聚兵衆以待未然詔旨戎狄貪婪唯利是規不挫凶圖姦志嵗結臣以為不擊則必侵掠不已則民失農桑農桑不收則王戍不立為立之方擊之為要詔旨若令邊地嵗驚公私失業經費困於遙輸逺圖決無遂事寢弊贊略逆應有方臣以為威虜之方在于積粟塞下若使邊民失業列鎮寡儲非唯無以逺圖亦不能制其侵抄今當使小戍制其始寇大鎮赴其入境一被毒手便自吹韲鳥逝矣皇子出後告廟議孝建三年五月詔以第四皇子出紹江夏王太子睿為後有司奏皇子出後檢未有告廟先例輒勒二學禮官議正應告與不告者為告幾室太學博士傅休太常丞庾亮之祠部朱膺之兼右丞殿中郎徐爰並議參議以爰為允詔可傅休議禮無皇子出後告廟眀文晉太康四年封北海王實紹廣漢殤王後告於太廟漢初帝各異廟故告不必同自漢眀帝以來乃共堂各室魏晉依之今既共堂若獨告一室而闕諸室則于情未妥庾亮之議案禮大事則告祖禰小事則特告禰今皇子出嗣宜告禰廟祠部朱膺之議有事告廟蓋國之常典今皇子出紹事非常均愚以為宜告賀循云古禮異廟唯謁一室是也既皆共廟而闕於諸帝于情未安謂循言為允宜在皆告徐爰議國之大事必告祖禰皇子出嗣不得謂小昔第五皇子承統廬陵備告七廟繼體告廟臨軒議大眀元年詔以前太子步兵校尉祗男歆紹南豐王朗有司奏朗先嗣營陽告廟臨軒檢繼體為舊不告廟臨軒下禮官議正太學博士王燮之祠部郎朱膺之殿中郎徐爰並議爰同燮之參詳爰議為允詔可王燮之議王燮之議南豐昔别開土宇以紹營陽義同始封故有臨軒告廟之禮今歆奉詔出嗣則成繼體先爵猶存事是傳襲不應告廟臨軒朱膺之議南豐王嗣爵封已絶聖恩垂矜特詔繼茅土復申義同始封為之告廟臨軒徐爰議營陽繼體皇基身亡封絶恩詔追封錫以一城既始啓建茅土故宜臨軒告廟今歆繼後南豐彼此俱為列國長沙南豐自應各告其祖豈關太廟事非始封不合臨軒立南郊位議大眀三年尚書右丞徐爰奏乃立郊兆于秣陵牛頭山西正在宫之午地郊祀之位逺古蔑聞禮記燔柴於太壇祭天也兆于南郊就陽位也漢初甘泉河東禋埋易位終亦徙于長安南北光武紹祚定二郊洛陽南北晉氏過江悉在北及郊兆之議紛然不一又南出道狹未議開闢遂于東南已地創立丘壇皇宋受命因而弗改且居民之中非邑外之謂今聖圖重造舊章畢新南驛開途陽路修逺謂宜移郊正午以定天位曹虔季立世子議大眀四年有司奏陳留國王曹虔季長兄虔嗣早卒季襲封之後生子銑以繼虔嗣今依例應拜世子未詳應以銑為世子為應立次子鍇太學博士王溫之江長議並應以銑為正嗣太常陸澄議立鍇右丞徐爰議銑宜還為虔季世子詔如爰議禮後大宗以其不可乏祀諸侯世及春秋成義虔嗣承家傳爵身為國王雖薨沒無子猶列昭穆立後之日便應即纂國統于時既無承繼虔季以次襲紹虔嗣既列廟饗故自與出數而遷豈容蒸嘗無闕橫取他子為嗣為人胤嗣又應恭祀先父案禮文公子不得禰諸侯虔嗣無緣降廟既寢銑本長息宜還為虔季世子安陸夫人廟祭議大眀四年有司奏安陸國士雖建而奠酹之所未及營立四時薦饗故祔江夏之廟宣王所生夫人當應祠不太學博士傅郁議應廢祭右丞徐爰議合列祀二議不同參議以爰議為允詔可按禮慈母妾母不代祭鄭玄注以其非正故傳曰子祭孫止又云為慈母後者為祖庶母可也注稱緣為慈母後之義父妾無子亦可命已庶子為之後也考尋斯義父母妾之祭不必唯子江夏宣王太子體自元宰道戚之胤遭時不幸聖上矜悼降出皇愛嗣承徽緒光啓大蕃屬國為祖始王夫人載育眀懿則一國之正上無所厭哀敬得申既未獲祔享江夏又不從祭安陸即事求情愚以為宜依祖母有為後之義謂合列祀于廟宣貴妃廟祭議大眀七年三月有司奏太學博士虞和左丞徐爰並議大體不異詔可有司奏新安王服宣貴妃齊衰期十一月練十三月縞十五月祥心喪三年未詳宣貴妃祔廟應在何時入廟之日當先有祔但入新廟而已若在大祥及禫中入廟者遇四時便祭不新安王在心制中得親奉祭不虞和議春秋傳云祔而作主蒸嘗禘於廟嘗為吉祭之名大祥及禫未得入廟應在禫除之後也新安王心喪之內若遇時節便應吉祭于廟親奉亦在無嫌祔之為言以後亡者祔于先廟也小記云諸侯不得祔于天子今貴妃爵視諸侯居然不得祔于先后又别考新宫無所宜祔且卒哭之後益無祔理徐爰議禮有損益古今異儀雖云卒哭而祔祔而作主時之諸侯皆禫終入廟且麻衣縓緣革服於元嘉苫絰變除申情於皇宋况宣貴妃誕育睿蕃葬加殊禮靈筵廬位皆主之哲王考宫創祀不得關之朝廷謂禫除之後宜親執奠爵之禮若有故三卿行事貴妃上厭皇姑下絶列國無所應祔同前杜氏通典云大明七年詔立宣貴妃廟其祀禮王親執奠爵有故三卿行事有司又奏左丞徐爰議詔可有司奏同前禮有損益古今異儀春秋傳雖云卒哭而祔祔而作主代之諸侯皆禫終入廟且麻衣縓緣革服於元嘉苫絰變除申行諸皇宋况宣貴妃誕育獻蕃葬加殊禮靈筵廬位皆主之哲聖考宫創祀不復問之朝廷謂禫除之後宜親執奠爵若有故三卿行事晉陵孝王祭議奏大眀七年十一月有司奏晉陵國刺孝王廟依廬陵平王等國例一嵗五祭二國以王三卿生祭應同有服之例與不博士顔僧道太常丞庾蔚之兼左丞徐爰並議參議以爰為允詔可顔僧道議禮記云所祭者亡服則不祭今晉陵王于衡陽小功宜依二國同廢庾蔚之議緦不祭者據主為言也晉陵雖未有嗣宜依有嗣致服依闕祭之限衡陽為族伯緦麻則應祭三月徐爰議嗣王未立將來承胤未知疏近豈宜空計服屬以虧祭敬齊敬王子羽廟祭議大眀八年正月有司奏故齊敬王子羽將來立後未詳便應作主立廟為須有後之日未立廟者為于何處祭祀遊擊將軍徐爰議通關博議以爰議為允令復立廟廟成作主依晉陵王近例先暫祔盧陵考獻王廟祭竟神主即還新廟未立後之前常使國上卿主祭國無後於制除罷始封之君實存承嗣皇子追贈則為始祖臣不殤君事著前準豈容虛闕蒸嘗以俟有後謂立廟作主三卿主祭依舊修宋史表先是元嘉中使著作郎何承天草創國史世祖初使奉朝請山謙之南臺御史蘇寶生踵成之孝建六年又以爰領著作郎終其業爰雖因前作専為一家之書上請付外詳議于是江夏王義恭三十六人同爰議以義熙為斷巴陵王休若尚書金部郎檀道鸞謂宜以元興三年為始太學博士虞和謂宜以開國為宋公元年世祖詔報臣聞虞史炳圖原光被之美夏載昭䇿先隨山之勤天飛雖王德所至終陟固有資田躍神宗始于俾乂上日兆於納揆其在殷頌長發玄王受命作周實唯雍伯考行之盛則振古之𢎞軌降逮二漢亦同茲義基帝創乎豐郊紹祚本於昆邑魏以武命國志晉以宣啓陽秋眀黃初非更姓之本太始為造物之末又近代之令準式逺之鴻規典謨緬邈紀傳成準善惡具書成敗畢記然餘分紫色滔天泯夏親所芟夷而不序於始傳涉聖卓紹煙起雲騰非所誅滅而顯冠乎首述豈不以事先歸之前録功偕著之後撰伏惟皇宋承金行之澆季鍾經綸之屯極􅗙玄光以鳯翔秉神符而龍舉劋定鯨鯢天人佇屬晉祿數終上帝臨宋便應奄膺紘宇對越神工而恭服勤于三分讓德邁于不嗣其為巍巍蕩蕩赫赫眀眀厯觀逖聞莫或斯等宜依銜書改文登舟變號起元義熙為王業之始載序宣力為功臣之斷其偽玄篡竊同于新莾雖靈武克殄自詳之晉録及犯命干紀受戮霸朝雖揖禪之前皆著之宋策國典體大方垂不朽請外詳議伏須遵承孝武帝詔報項籍聖公編録二漢前史已有成例桓玄傳宜在宋典餘如爰議食針北堂書鈔民之初生有生有食資生順性甘是黍稷炎皇俶載后棄茂植一日三飽聖賢通執五榖既翳五味亦宜潔㸑豐盛滋芬美腴奉君養親靡不加精安體潤氣調神暢情又針衣服稱誠飲食日歡擊鐘而舉無使日旰庾蔚之鄱陽哀王祥除議大眀元年二月有司又奏太常鄱陽哀王去年閏三月十八日薨今為何月末祥除下禮官議正博士傅休太常丞庾蔚之並議通閏並同蔚之三月末祥博士傅休議通典作孫休尋正禮喪遇閏月數者數閏嵗數者沒閏閏在期內故也鄱陽哀王去年閏三月薨月次節物則定是四月之分應以今年四月末為祥晉元眀二帝並以閏二月崩以閏後月祥先代成準則是今比太常丞庾蔚之議禮正月存親故有忌日之感四時既已變人情亦已衰故有二祥之殺是以祥忌皆以同月為義而閏亡者眀年必無其月不可以無其月而不祥忌故必宜用閏所附之月閏月附正公羊眀議故班固以閏九月為後九月月名既不殊天時亦不異若用閏之後月則春夏永革節候亦舛設有人以閏臘月亡者若用閏後月為祥忌則祥忌應在後年正月祥涉三載既失周期之議冬亡而春忌又乖致感之本譬人年末三十日亡眀年末月小若以去年二十九日親尚存則應用後年正朝為忌此必不然則閏亡可知也通閏並用閏附于正而正不假閏得周便祥何待於閏且祥忌異月亦非禮意通閏並用以下通典補國子母除太夫人議孝武帝孝建三年有司奏雲杜國解稱國子檀和之所生親王求除太夫人檢無國子除太夫人例法又無科下禮官議博士孫豁之太常丞庾蔚之祠部郎中朱膺之議上參議以蔚之為允詔可博士孫豁之議春秋母以子貴王雖為妾是和之所生案五等之例鄭伯許男同號夫人國子體例王合如國所生庾蔚之議母以子貴雖春秋眀義古今異制因革不同自頃代以來所生蒙榮唯有諸王既是王者之嬪御故宜見尊於蕃國若功髙勳重列為公侯亦有拜太夫人之禮凡此皆朝恩曲降非國之所求子男妾母未有前比朱膺之議子不得爵父母而春秋有母以子貴當為傳國君母本先公嬪媵所因藉有由故也始封之身所不得同若殊績重勳恩所特錫時或有之不由司存所議太子獻妃服廢蒸祠議大眀五年十月有司奏今月八日蒸祠二廟公卿行事有皇太子獻妃服前太常丞庾蔚之博士司馬興之領軍長史周景逺右丞徐爰並議尋蔚之等議指歸不殊闕蒸為允過卒哭祔一依常典詔可庾蔚之議禮所以有喪廢祭由祭必有樂皇太子以元嫡之重故主上服妃不以尊降既正服大功愚謂不應祭有故三公行事是得祭之辰非今之比卿卒猶不繹况於太子妃乎司馬興之議夫緦則不祭禮之大經卿卒不繹春秋眀義又尋魏代平原公主薨髙堂隆議不應三月廢祠而猶云殯葬之間權廢事改吉芬馥享祠尋此語意非使有司此無服之喪尚以未葬為廢况皇太子妃及大功未祔者邪上尋禮文下準前代不得蒸祠周景逺議案禮緦不祭大功廢祠理不俟言今皇太子故妃既未山塋未從權制則應依禮廢蒸嘗至尊以大功之服于禮不得親奉非有故之謂亦不使公卿行事徐爰議禮緦不祭蓋惟通議大夫以尊貴降絶及其有服不容復異祭統云君有故使人可者謂于禮應祭君不得齊祭不可闕故使臣下攝奉不謂君不應祭有司行事也晉咸寧四年景獻皇后崩晉武帝伯母宗廟廢一時之祀雖名號尊崇粗可依準今太子妃至尊正服大功非有故之比既未山塋謂蒸祠宜廢晉陵王子雲臨祭議大眀六年十月有司奏故晉陵孝王子雲未有嗣安廟後三日國臣從權制除朔望周忌應還臨與不祭之日誰為主太常丞庾蔚之議左丞徐爰參議蔚之為允詔可既葬三日國臣從權制除而釋靈筵猶存朔望及期忌諸臣宜還臨哭變服衣巾夾使上卿主祭王既未有後又無三年服者期親服除之而國尚存便宜立廟為國之始祖服除之日神主暫祔食祖廟諸王不得祖天子宜祔從祖國廟還居新廟之室未有嗣之前四時饗薦常使上卿主之校獵薦二廟議大明七年二月有司奏鑾輿巡搜江左講武校獵獲肉先薦太廟章太后廟并設醢酒公卿行事及獻妃隂室室長行事太學博士虞和議薦廟未有先準兼太常丞庾蔚之議薦廟為允參議大同蔚之詔可虞和議檢周禮四時講武獻牲各有所施振旅春搜則以祭社苃舍夏苗則以享礿治兵秋獮則以祀方大閲冬狩則以享蒸案漢祭祀志唯立秋之日白郊事畢始揚威武名曰􅓔劉乘輿入囿躬執弩以射牲以鹿麑太宰令謁者各一人載獲車馳送陵廟然則春田薦廟未有先準庾蔚之議和所言是搜狩不失其時此禮久廢今時和表晏講武教人又虔供乾豆先薦二廟禮情俱允社主土神司空土官故祭社使司空行事太廟宜使上公參議搜狩之禮四時異議禮有損益時代不同今既無復四方之祭三殺之儀曠廢未久禽獲牲物面傷翦毛未成禽不獻太宰令謁者擇上殺奉送先薦廟社二廟依舊以太尉行事四孤議魏時田瓊王朗等並有四孤論至宋庾蔚之議四孤之父母是事硋不得存養其子其不欲子之活推父母之情豈不欲與人為後而茍使其子不存耶如此則與父命後人亦何異既為人後何不戴其姓神不歆非類蓋捨已族而取他族為後若已族無所取後而養他子者生得養已之老死得奉其先祀神有靈化豈不加其功乎唯所養之父自有後而本絶嗣者便當應還本其宗祀服所養父母依繼父齊衰周若二家俱無後則宜停所養家依為人後服其本親例降一等有子以後其父未有後之間别立室以祭祀是也王燮之皇太后出行副車議大眀元年有司奏皇太后出行副車未有定數下禮官議正博士王燮之議應十二乘通關為允詔可周禮后六服五路之數悉與王同則副車之制不應獨異又記云古者后立六宫三夫人九嬪二十七世婦八十一御妻以聽天下之內治天子立六官三公九卿二十七大夫八十一元士以聽天下之外治鄭注云后象王立六宫而居之亦正寢一燕寢五推所立每與王同禮無降亦眀矣皇太后既禮均至極彌不應殊謂並應同十二乘陳皇太妃哀服議泰豫元年後廢帝崇所生母陳貴妃為皇太妃位亞尊極未詳國親舉哀格當一同皇太后為有降異又于本親期以下當猶服與不前曹郎王燮之兼太常丞司馬燮之議參議以燮之議為允太妃於國親無服故宜緣情為諸王公主于至尊是期服者及其太妃王妃三夫人九嬪各舉哀案喪服傳妾服君之黨得與女君同如此皇太妃服宗與太后無異但太后既以尊降無服太妃儀不應殊故悉不服也計本情舉哀其禮不異又禮諸侯絶期皇太后雖云不居尊極又容輕于諸侯謂本親期以下一無所服有慘自宜舉哀親踈二儀準之太后司馬燮之議禮妾服君之庶子及女君之黨皆謂大夫士耳妾名雖總而班有貴賤三夫人九嬪位視公卿大夫猶有貴妾而况天子諸侯之妾為他妾之子無服既不服他妾之子豈容服君及女君餘親况皇太后妃貴亞相極禮絶羣后崇輝盛典有踰東儲尚不服期太妃豈容有異若本親有慘舉哀之儀宜仰則太后王昊之與琅琊太守許誠言書貴郡臨沂縣其沙村逆鱗魚可調藥物孫武侯伯子男次息為世子議大眀二年有司奏凡侯伯子男世子喪無嗣求進次息為世子檢無其例下禮官議博士孫武傅郁曹郎諸葛雅之並議參議為允詔可案晉濟北侯荀勗長子連卒以次子輯拜世子先代成準宜今為例傅郁議禮記微子立衍商禮斯行仲子舍孫姬典攸貶厯代遵循靡替於舊今胙土之君在而世子卒厥嗣未育非孫之謂愚以為次子有子自宜紹為世孫若其未也無容逺搜輕屬承綱繼體傳之有由父在子立允稱情典諸葛雅之議案春秋傳云世子死有母弟則弟無則立長年均擇賢義均則卜古之制也今長子早卒無嗣進立次息以為世子取諸左氏理義無違又孫武所據晉濟北侯荀勗長子卒立次子亦近代成例依文採比竊所允安謂宜開許以為永制傅郁太子親祠與宫中有故不舉祭議奏大眀三年六月有司奏下禮官議正太學博士司馬興之博士傅郁二義不同尚書參議郁議為允詔可有司奏來七月十五日當祠太廟章皇太后廟輿駕親奉而乘輿辭廟親戎太子合親祠與不且今月二十四日第八皇女夭案禮宫中有故三月不舉祭皇太子入住上宫于事有疑下禮官詳正司馬興之議竊惟國之大事在祀與戎皇太子有撫軍之道而無専御之義戎既如之祀亦宜然案祭統夫祭之道孫為王父尸又云祭有昭穆所以别父子太子監國雖不攝至於宗廟則昭穆實存謂事不可亂又云有故則使人準此二三太子無奉祀之道又皇女夭札則實同宫一體之哀禮不得異設今得祀令猶無親奉之義傅郁議案春秋太子奉社稷之粢盛長子主器出可守宗廟以為祭主易傳眀文監國之重居然親祭皇女夭札時既同宫三月廢祭於禮宜停荀萬秋籍田儀注奏大眀四年正月尚書左丞荀萬秋奏籍田儀注皇帝冠通天冠朱紘青介幘衣青紗袌侍中陪乘奉車郎秉轡按漢輿服志曰通天冠乘輿常服也若斯豈可以常服降千畝邪禮記曰昔者天子為籍千畝冕而朱紘躬秉耜耒鄭玄注周官司服異服同冕尊故也時服雖變冕制不改又潘嶽籍田賦云常伯陪乘太僕秉轡推此輿駕籍田宜冠冕璪十二瑬朱紘黑介幘衣青紗袌常伯陪乘太僕秉轡宜改儀注一遵二禮以為定儀永陽侯傍親殤服議大眀五年有司奏永陽縣侯劉叔子夭喪年始四嵗傍親服制有疑太學博士虞和領軍長史周景逺司馬朱膺之前太常丞庾蔚之等議並云宜同成人之服東平沖王服殤實由追贈異于已受茅土博士司馬興之議應同東平殤服左丞茍萬秋等參議詔景逺議為允南面君國繼體成家雖則佩觽未關成人得君父名也不容服殤故云臣不殤君子不殤父推此則知傍親故依殤制東平沖王已經前議若外仕朝列則為大成故鄱陽哀王追贈太常親戚不降愚謂下殤以上身居封爵宜同成人年在無服之殤以登官為斷今永陽國臣自應全服至於旁親宜從殤禮司馬興之皇太子妃服作鼓樂議大眀五年閏月有司奏皇太子妃薨至尊皇后並服大功九月皇太后小功五月未詳二御何當得作鼓吹及樂博士司馬興之議徐爰參議皇太子期服內不合作鼓吹及樂案禮齊衰大功之喪三月不從政今臨軒拜授則人君之大典今古既異賖促不同愚謂皇太子妃祔廟之後便可臨軒作樂及鼓吹右丞徐爰議皇太子妃雖未山塋臨軒拜官舊不為礙樟棺在殯應縣而不作祔後三御樂宜使學官擬禮上興之又議案禮大功至則辟琴瑟誠無自奏之理但王者體大理絶凡庶故漢文既葬悉皆復吉唯縣而不樂以此表哀今準其輕重侔其隆殺則下流大功不容撤樂終服夫金石賔饗之禮簫管警塗之衛實人君之盛典當陽之威飾固亦不可久廢於朝又禮無天王服嫡婦之文直後學推貴嫡之義耳既已制服成月虛懸終窆亦足以甄崇冡正標眀禮歸矣眀堂饗祀牛數議大眀五年九月有司奏南郊祭用三牛廟四時祠六室用二牛眀堂肇建祠五帝太祖文皇帝配未詳用幾牛太學博士司馬興之虞和祠部郎顔奐並議案鄭玄注禮記大傳稱孝經郊祀后稷以配天配靈威仰也宗祀文王于眀堂以配上帝配五帝也夫五帝司方位殊功一牲牢之用理無差降太祖文皇帝躬成天地則道兼覆載左右羣生則化洽四氣祖宗之稱不足彰無窮之美金石之音未能播勳烈之盛故眀堂聿修聖心所以昭玄極泛配宗廟先儒所以得禮情愚管所見謂宜用六牛虞和議祀帝之名雖五而所生之實常一五德之帝迭有休王各有所司故有五室宗祀所主要隨其王而饗焉主一配一合用二牛顔奐議祀之為義並五帝以為言帝雖云五牲牢之用謂不應過郊祭廟祀宜用二牛國子母除太夫人議大眀十二年有司奏興平國解稱國子袁愍孫母王氏應除太夫人檢無國母稱太夫人例下禮官議正太學博士司馬興之議程彥參議以興之為允詔可案禮下國卿大夫之妻皆命天子以斯而推則子男之母不容獨異程彥議五等雖差而承家事等公侯之母崇號得從子男于親尊秩宜顯故春秋之義母以子貴固知從子尊於國均也彥參議以興之議為允除王氏為興平縣開國子太夫人丘景先祭霍山議大眀七年有司奏奠祭霍山未審應奉使何官用何牲饌進奠之日又用何器殿中郎丘景先議詔可修祀川嶽道光列代差秩圭璋義昭聨册但業曠中葉儀漏典文尋姬典事繼宗伯漢載持節侍祠血祭霾沈經垂眀範酒脯牢具悉有詳例又名山著圭幣之異大冡有嘗禾之加山海祠霍山以太牢告玉此準酌記傳其可言者也今皇風緬畼輝祀通嶽愚謂宜使以太常持節牲以太牢之具羞用酒脯時榖禮以赤璋纁幣又鬯人之職凡山川四方用脤則盛酒當以蠡杯其餘器用無所取説按郊望山瀆以質表誠器用陶匏籍以茅席近可依準山川以兆宜為壇域參議景先議為允令以兼太常持節奉使牲用太牢加以璋幣器用陶匏時不復用脤宜同郊祀以爵獻凡有饌種數一依社祭為允虞和會稽餘姚人位中書郎廷尉入齊杜氏通典和音蘇宣貴妃立廟議大眀七年三月有司奏故宣貴妃加殊禮未詳應立廟與不太學博士虞和左丞徐爰並議參詳為允詔可曲禮云天子有后有夫人檀弓云舜葬蒼梧三妃未之從昏議云后立六宫有三夫人然則三妃即三夫人也后之有三妃猶天子之有三公也按周禮三公八命諸侯七命三公既尊于列國諸侯三妃亦貴於庶邦夫人據春秋傳仲子非魯惠公之元嫡尚得考彼别宫今貴妃蓋天秩之崇班禮應創立新廟尚書左丞徐爰議宣貴妃既加殊命禮絶五宫考之古典顯有成據廟堂克構宜選將作大匠卿昭太后祔廟議泰始二年正月孝武昭太后崩有司奏制義服祔廟下禮官詳議博士王略太常丞虞願議時太宗宣太后已祔章太后廟長兼儀曹郎虞和復議參詳和議為允詔可有司奏晉太元中始正太后尊號徐邈議廟制自是以來著為通典今昭皇太后於至尊無親正特制義服祔廟之禮宜下禮官詳議王略虞願議正名存義有國之徽典臣子一例史傳之眀文今昭皇太后正位母儀尊號允著祔廟之禮宜備彛則母以子貴事炳聖文孝武之祀既百代不毁則昭后之祔無緣有虧愚謂神主應入章后廟又宜依晉元皇帝之于愍帝安帝之於永安后祭祀之日不親執觴爵使有司行事虞和議春秋之義庶母雖名同崇號而實異正嫡是以猶考别宫而公子主其事今昭皇太后既非所生益無親奉之理周禮宗伯職云若王不與祭則攝位然則宜使有司行其禮事又婦人無常秩各以夫氏為定夫亡以子為次昭皇太后即正位在前宣太后追尊在後以從序而言宜躋新禰于上太子納昏禮議泰始五年十一月有司奏下禮官裴昭眀孫詵虞和並議參詳和議為允詔可有司奏按晉江左以來太子昏納徴禮用玉一虎皮二未詳何所準况或者虎取其威猛有彬炳玉以象德而有潤栗圭璋既玉之美者豹皮義兼炳蔚熊羆亦昏禮吉徴以類取象亦宜並用未詳何以遺文晉代江左禮物多闕後代因襲未遑研考今法章徽儀方將大備宜憲範經籍稽諸舊典今皇太子昏納徴禮合用圭璋豹皮熊羆皮與不下禮官詳依經記更正若應用者為各用一為應用兩博士裴昭眀議按周禮納徴玄纁束帛儷皮鄭玄注云束帛以儀注以虎皮二太元中公主納徴以虎豹皮各一具豈謂婚禮不辨王公之序故取虎豹皮以尊革其事乎虎豹雖文而徴禮所不用熊羆吉祥而婚典所不及圭璋雖美或為用各異今帝道𢎞眀徽則光闡儲皇聘納宜準經誥凡諸僻謬並合詳裁雖禮代不同文質或異而鄭為儒宗既有眀説守文淺見蓋有惟疑兼太常丞孫詵議聘幣之典損益為義厯代行事取制士婚若圭璋之用實均璧品采豹之彰義齊虎文熊羆表祥繁衍攸寄今儲后崇聘禮先訓逺皮玉之美宜盡暉備禮稱束帛儷皮則圭璋數合同璧熊羆文豹各應用二長兼國子博士虞和議案儀禮納徴直云玄纁束帛雜皮而已禮記郊特牲云虎豹皮與玉璧非虛作也則虎豹之皮居然用兩圭璧宜仍舊各一也虞願字士恭會稽餘姚人厯遷廷尉車駕嘗祠及皇后拜廟議泰始二年六月有司奏下禮官議正太學博士劉緄太常丞虞願議參議願議為允詔可有司奏來七月嘗祀二廟依舊車駕親奉孝武皇帝至尊親進觴爵及拜伏又昭皇太后室應拜及祝文稱皇帝諱又皇后今月二十五日虔見于禰拜孝武皇帝昭皇太后並無眀文下禮官議正劉緄奏尋晉元北面稱臣於愍帝蒸嘗奉薦亦使有司行事且兄弟不相為後著於魯史以此而推孝武之室至尊無容親進觴爵拜伏其日親進章皇太后廟經昭皇太后室過前議既使有司行事謂不應進拜昭皇太后正號久定登列廟祀詳尋祝文宜稱皇帝諱案禮婦無見兄之典昭后位居傍尊致虔之儀理不容備孝武昭后二室牲薦宜闕虞願議夫蒸嘗之禮事存繼嗣故傍尊雖近弟姪弗祀君道雖髙臣無祭典按晉景帝之于武帝屬居伯父武帝至祭之日猶進觴爵今上既纂嗣文皇于孝武室謂宜進拜而已觴爵使有司行事按禮過墓則式過祀則下凡在神祇尚或致恭况昭太后母臨四海至尊親曽北面兄母有敬謂宜進拜祝文宜稱皇帝諱尋皇后廟見之禮本修虔為義今於孝武論其嫂叔則無通問之典語其尊卑亦無相見之義又皇后登御之初昭后猶正位在宫敬謁之道久已前備愚謂孝武昭太后二室並不復薦告丘仲起皇太子著衮冕議泰始六年正月有司奏被敕皇太子正朝駕合著衮冕九章衣不儀曹郎丘仲起兼左丞陸澄議參議以仲起為允案周禮公自衮冕以下鄭注衮冕以至卿大夫之玄冕皆其朝聘天子之服也伏尋古之上公尚得服衮以朝皇太子以儲副之尊率土瞻仰愚謂宜式遵盛典服衮冕九旒以朝賀陸澄議服冕以朝實著經典秦除六冕之制至漢眀帝始與諸儒還備古章自魏晉以來宗廟行禮之外不欲令臣下服衮冕故位公者每加侍官今皇太子承乾作副禮絶羣后宜遵聖王之盛典革近代之陋制參議臣等參議依禮皇太子元正朝賀應服衮冕九章衣以仲起議為允撰載儀注王延秀祀眀堂應告太廟議泰始七年十月有司奏來年正月十八日祠眀堂尋舊南郊與眀堂同日並告太廟未審今祀眀堂復告與不祠部郎王延秀議以應告守尚書令袁粲等同延秀議案鄭玄云郊者祭天之名上帝者天之别名也神無二主故眀堂異處以避后稷謹尋郊宗二祀既名殊實同至于應告不容有異宋文紀卷十六
