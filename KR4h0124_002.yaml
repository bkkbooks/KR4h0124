body:
  text: 宋文紀卷二明梅鼎祚編文帝名義隆小字車兒武帝第三子初封宜都王少帝廢徐羡之等迎立在位三十年為太子劭所弒廟號太祖江左之治稱元嘉焉答羣臣勸進令文帝初封宜都王為湘州刺史景平二年七月少帝廢奉迎入奉皇統行臺至江陵侍中臣琇等上表勸進王令答八月即位皇運艱弊數鍾屯夷仰惟崇基感尋國故永慕厥躬悲慨交集賴七百祚永股肱忠賢故能休否以泰天人式序猥以不德謬降大命顧巳兢悸何以克堪輒當暫歸朝廷展哀陵寢并與賢彥申寫所懷望體其心勿為辭費侍中臣琇散騎常侍臣嶷之中書監尚書令護軍將軍建城縣公臣亮左衛將軍臣景仁給事中游擊將軍龍鄉縣侯臣隆越騎校尉都亭侯臣綱給事黃門侍郎臣孔璩之散騎侍郎臣劉思考員外散騎侍郎臣潘盛中書侍郎臣何尚之羽林監封陽縣開國侯臣蕭思話長兼尚書左丞德陽縣侯臣孫康吏部郎中騎都尉臣張茂度儀曹郎中臣徐長琳倉部郎中臣庾俊之都官郎中臣袁洵等勸進表臣聞否泰相革數窮則變天道所以不諂卜世所以靈長乃者運距陵夷王室艱晦九服之命靡所適歸髙祖之業將墜于地賴基厚德深人神同奬社稷以寧有生獲乂伏惟陛下君德自然聖明在御孝悌著於家邦風猷宣於蕃牧是以徴祥雜沓符瑞㸌輝宗廟神靈乃眷西顧萬邦黎獻望景託生臣等忝荷朝列豫充將命復集休明之運再覩太平之業行臺至止瞻望城闕不勝喜悅鳬藻之情謹詣門拜表以聞訊刑詔太祖即阼有司奏車駕依舊臨華林園聽詔曰政刑多所末悉可如先二公推訊大使巡行四方詔元嘉三年二月夫哲王宰世廣達四聰猶巡嶽省方採風觀政所以情僞必審幽遐罔滯王澤無擁九臯有聞者也朕以寡薄猥纘洪緒雖永念治道志存昧旦願言傅巖發想宵寐而丘園之秀藏器未臻物情民隱尚隔視聽乃眷區域輟寢忘飱今氛祲驅蕩宇內寧晏旌賢𢎞化於是乎始可遣大使巡行四方其宰守稱職之良閨蓽一介之善詳悉列奏勿或有遺若刑獄不恤政治乖謬傷民害教者具以事聞其髙年鰥寡幼孤六疾不能自存者可與郡縣優量賑給博採輿誦廣納嘉謀務盡銜命之㫖俾若朕親覽焉同前裴松之傳云元嘉三年誅司徒徐羡之等分遣大使巡行天下松之為國子博士及袁渝等十餘人並兼散騎常侍班宣詔書昔王者巡功羣后述職不然則有存省之禮聘俯之規所以觀民立政命事考績上下偕通遐邇咸被故能功昭長世道歷逺年朕以寡暗屬承洪業寅畏在位昧于治道夕惕惟憂如臨淵谷懼國俗陵頽民風凋僞眚厲違和水旱傷業雖勤躬庶事思𢎞攸宜而機務惟殷顧循多闕政刑乖謬未獲具聞豈誠素弗孚使羣心莫盡納隍之愧在豫一人以嵗時多難王道未一卜征之禮廢而未修眷彼氓庶無忘欽恤今使兼散騎常侍渝等申令四方周行郡邑親見刺史二千石官長申述至誠廣詢治要觀察吏政訪求民隱旌舉操行存問所疾禮俗得失一依周典每各為書還具條奏俾朕昭然若親覽焉大夫君子其各悉心敬事無惰乃力其有咨謀逺圗謹言中誠陳之使者無或隱遺方將敬納良規以補其闕勉哉勗之稱朕意焉丹徒蠲租詔四年二月行幸丹徒謁京陵三月詔丹徒桑梓綢繆大業攸始踐境永懷觸念罔極昔漢章南巡加恩元氏况情義二三有兼曩日思播遺澤酬慰士民其蠲此縣今年租布五嵗刑以下皆悉原遣登城三戰及大將家隨宜隱恤災戒求言詔五年正月朕恭承洪業臨饗四海風化未𢎞治道多昧求之人事鑒寐惟憂加頃隂陽違序旱疫成患仰惟災戒責深在豫思所以側身剋念議獄詳刑上答天譴下恤民瘼羣后百司其各獻讜言指陳得失勿有所諱經理河南詔太祖踐阼便有志北略元嘉七年三月下詔遣使告魏主燾河南舊是宋土今當修復不關河北長沙王義欣出鎮彭城總統羣帥河南中國多故湮沒非所遺黎荼炭每用矜懷今民和年豐方隅無事宜時經理以固疆埸可簡甲卒五萬給右將軍到彥之統安北將軍王仲德兖州刺史竺靈秀舟師入河驍騎將軍段宏精騎八千直指虎牢豫州刺史劉德武徑勇一萬以相掎角後將軍長沙王義欣可權假節率見力三萬監征討諸軍事便速備辦月內悉發申務節儉詔八年三月自頃軍役殷興國用增廣資儲不給百度尚繁宜存簡約以應事實內外可通共詳思務令節儉勸農詔八年閏六月自頃農桑惰業遊食者衆荒萊不闢督課無聞一時水旱便有罄匱不深存務本豐給靡因郡守賦政方畿縣宰親民之主宜思奬訓導以良規咸使肆力地無遺利耕蠶樹藝各盡其力若有力田殊衆嵗竟條名列上遣使益梁交廣詔九年六月益梁交廣境域幽遐治宜物情或多偏擁可更遣大使巡求民瘼內外薦舉詔十二年四月周宗以寧實由多士漢室之隆亦資得人朕寤寐樂賢為日巳久而俊哲難階明揚莫效用令遺才在野管庫虛朝永懷前載慚德深矣夫舉爾所知宣尼之篤訓貢士任官先代之成准便可宣敕內外各有薦舉當依方銓引以觀厥用優減租役詔十七年十一月前所給揚南徐二州百姓田糧種子兖兩豫青徐諸州比年所寬租穀應督入者悉除半今半有不收處都原之凡諸逋債優量申減又州郡估稅所在市調多有煩刻山澤之利猶或禁斷役召之品遂及稚弱諸如此類傷治害民自今咸依法令務盡優允如有不便即依事别言不得茍趣一時以乖隱恤之㫖主者明加宣下稱朕意焉建學詔十九年正月夫所因者本聖哲之逺教本立化成斆學之為貴故詔以三德崇以四術用能納諸義方致之軌度盛王祖世咸必由之永初受命憲章𢎞逺將陶鈞庶品混一殊風有詔典司大啓庠序而頻遘屯夷未及修建永瞻前猷思敷鴻烈今方隅乂寧戎夏慕嚮廣訓胄子實惟時務便可式遵成規闡揚景業崇奉孔聖詔十九年十二月胄子始集學業方興自微言泯絶逝將千祀感事思人意有慨然奉聖之𦙍可速議繼襲於先廟地特為營造依舊給祠直令四時饗祀闕里往經冦亂黌校殘毁并下魯郡修復學舍採召生徒昔之賢哲及一介之善猶或衛其丘壟禁其芻牧况尼父德表生民功被百代而墳塋荒蕪荆棘弗剪可蠲墓側數戶以掌灑掃魯郡上民孔景等五戶居近孔子墓側蠲其課役供給灑掃并種松柏六百株籍田詔二十年十二月國以民為本民以食為天故一夫輟稼飢者必及倉廪既實禮節以興自頃在所貧罄家無宿積賦役暫偏則人懷愁墊嵗或不稔而病乏比室誠由政德弗孚以臻斯弊抑亦耕桑未廣地利多遺宰守微化導之方萌庶忘勤分之義永言𢎞濟明發載懷雖制令亟下終莫懲勸而坐望滋殖庸可致乎有司其班宣舊條務盡敦課遊食之徒咸令附業考核勤惰行其誅賞觀察能殿嚴加黜陟古者躬耕帝籍敬供粢盛仰瞻前王思遵令典便可量處千畝考卜元辰朕當親率百辟致禮郊甸庶幾誠素將被斯民霖雨周給詔二十一年六月霖雨彌日水潦為患百姓積儉易致乏匱二縣官長及營署部司各隨統檢實給其柴米必使周悉督種麥詔二十一年七月比年穀稼傷損淫亢成災亦由播殖之宜尚有未盡南徐兖豫及揚州浙江西屬郡自今悉督種麥以助闕乏速運彭城下邳郡見種委刺史貸給徐豫土多稻田而民間専務陸作可符二鎮履行舊陂相率修立并課墾闢使及來年凡諸州郡皆令盡勤地利勸導播殖蠶桑麻紵各盡其方不得但奉行公文而巳策試賜帛詔二十三年九月車駕幸國子學策試諸生十月下詔庠序興立纍載胄子肄業有成近親策試覩濟濟之美緬想洙泗永懷在昔諸生答問多可採覽教授之官並宜沾賚賜帛各有差詔羣臣二十三年魏冦兖青徐三州遂及清河殺掠甚衆太祖思𢎞經略詔羣臣吾少覽篇籍頗愛文義游𤣥玩采未能息卷自纓紼世務情兼家國徒存日昃終有慙德而區宇未一師饉代有永言斯瘼彌于其慮加疲疾稍增志隨時往屬思之功與事而廢殘虐游魂齊民塗炭乃眷北顧無忘𢎞拯思總羣謀掃清逋逆感慨之來遂成短韻卿等體國情深亦當義篤其懷也詩曰季父鑒禍先辛生識機始崇替非無徴興廢要有以自昔淪中畿倏焉盈百祀不覩南雲隂但見北風起亂極治必形塗泰由積否方欲滌遺氛矧乃穢邊鄙眷言悼斯民納隍良在巳逝將振宏羅一麾同文軌時乎豈再來河清難久俟駘駟安扄步騏驥志千里梁傅畜義心伊相抱深恥賞契將誰寄要之二三子無令齊晉朝取愧鄒魯士賜京邑二縣詔二十五年正月比者氷雪經旬薪粒貴踊貧弊之室多有窘罄可檢行京邑二縣及營署賜以柴米講武詔二十五年二月安不忘危經世之所同治兵教戰有國之恆典故服訓明恥然後少長知禁頃戎政雖修而號令未審今宣武場始成便可尅日大習衆軍當因校獵肄武講事謁京陵大赦普加贍恤詔二十六年二月幸丹徒謁京陵三月五月並下詔朕違北京二十餘載雖云密邇瞻塗莫從今因四表無塵時和嵗稔復獲拜奉舊塋展罔極之思饗宴故老申追逺之懷固以義兼於桑梓情加於過沛永言慷慨感慰實深宜聿宣仁惠覃被率土其大赦天下復丹徒縣僑舊今嵗租布之半行所經縣蠲田租之半二千石官長並勤勞王務宜有沾錫登城三戰及大將戰亡墜沒之家老病單弱者普加贍恤募移京口詔二十六年三月京口肇祥自古著符近代襟帶江山表裏華甸經塗四達利盡淮海城邑髙明土風淳一苞總形勝實唯名都故能光宅靈心克昌帝業頃年嶽牧遷回軍民徙散廛里廬宇不逮往日皇基舊鄉地兼藩重宜令殷阜式崇形望可募諸州樂移者數千家給以田宅并蠲復丹徒存恤故舊詔二十六年五月吾生於此城及盧循肆亂害流兹境先帝以桑梓根本實同休戚復以䝉稚猥同艱難情義繾綣夷險兼備舊物遺蹤猶存心目嵗月不居逝踰三紀時人故老與運零落眷惟既往倍深感嘆可搜訪于時士庶文武今尚存者具以名聞人身巳亡而子孫見在優量賜賚之零太平御覽作遷亂後撫民詔二十七年七月寧朔將軍王元謨北伐攻滑臺不克為魏所敗諸將多被殺明年二月自盱眙退還下詔玁狁孔熾難及數州眷言念之寤寐興悼凶羯痍挫迸跡逺奔雕傷之民宜時振理凡遭冦賊郡縣令還復居業封尸掩骼賑贍飢流東作方始務盡勸課貸給之宜事從優厚其流寓江淮者並聽即屬并蠲復租調大舉北討詔元嘉二十七年魏主燾率衆冦汝南攻圍懸瓠虜掠甚多其年大舉北討敵近雖摧挫獸心靡革驅逼遺氓復規竊暴比得河朔秦雍華戎表疏歸􅀈困棘跂望綏拯潛相糾結以候王師并陳芮芮此春因其來掠掩襲巢窟種落畜牧所亡大半連嵗相持于今未解又猜虐互發親黨誅殘根本危敝自相殘殄芮芮間使適至所說並符逺輸誠款誓為掎角遐邇注情既宜赴奬且水雨豐澍舟楫流通經略之㑹實在兹日可遣寧朔將軍王元謨率太子步兵校尉沈慶之鎮軍咨議參軍申坦等戈船一萬前驅入河使持節督青冀幽三州徐州之東安東莞二郡諸軍事輔國將軍青冀二州刺史霄城侯蕭斌推三齊之鋒為之統帥持節都督徐兖青冀幽五州豫州之梁郡諸軍事鎮軍將軍徐兗二州刺史武陵王駿總四州之衆水陸並驅太子左衛率始興縣五等侯臧質勒東宫禁兵統驍騎將軍安復縣開國侯王方回建武將軍安蠻司馬新康縣開國男劉康祖右軍參軍事梁坦步騎十萬徑造許洛使持節督豫司雍秦并五州諸軍事右將軍豫州刺史領安蠻校尉南平王鑠悉荆河之師方軌繼進東西齊舉宜有董一使持節侍中都督揚南徐二州諸軍事太尉領司徒録尚書太子太傅國子祭酒江夏王義恭德望兼崇風略遐被即可三府文武并被以中儀精卒出次徐方為衆軍節度别府司空府使所督諸鎮各遣虎旅數道爭先督梁南北秦三州諸將事綏逺將軍西戎校尉梁南北秦三州刺史秀之統輔國將軍楊文德宣武將軍巴西梓潼二郡太守劉宗宏連旗深入震蕩汧隴護軍將軍封陽縣開國侯蕭思話部龍驤將軍支坦寧逺將軍竟陵太守南陵縣開國侯劉德願籍荆雍之徑攬羣師之鋭宜由武關稜威震􅹥指授之宜委司空義宣議量優恤六州詔二十九年正月經冦六州居業未能仍值災潦飢困荐臻可速符諸鎮優量救恤今農事行興務盡地利若須田種隨宜給之酬奬河朔歸義詔二十九年五月惡稔身滅戎醜常數敵人窮凶著于自昔未勞資斧巳伏天誅子孫相殘親黨離二關洛僞帥並懷內款河朔遺民注誠請效拯溺蕩穢今其㑹也可符驃騎司空二府各部分所統東西應接歸義建績者隨勞酬奬長沙王道憐等配饗太廟詔道憐髙祖中弟從戰有功元嘉九年詔古者明王經國司勳有典平章以馭德刑班瑞以疇功烈銘徽庸于鼎彞配祫祀于清廟是以從饗先王義存商誥祭于大蒸禮著周典自漢迄晉世崇其文王猷既昭幽顯咸秩先王經緯天地撥亂受終駿命爰集光宅區宇雖聖明淵運三靈允協抑亦股肱翼亮之勤祈父宣力之效故使持節侍中都督南徐兖二州揚州之晉陵京口諸軍事太傅南徐兗二州刺史長沙景王故侍中大司馬臨川烈武王故司徒南康文宣公穆之侍中衛將軍開府儀同三司録尚書事揚州刺史華容縣開國公宏使持節散騎常侍都督江州豫州西陽新蔡晉熙四郡軍事征南大將軍開府儀同三司江州刺史永修縣開國公道濟故將軍青州刺史龍陽縣開國侯鎮惡或履道廣流秉德冲邈或雅量髙劭風鑒明逺或識唯知正才略開邁或文德以熙帝載武功以隆景業固以侔蹤姬旦方軌伊召者矣朕以寡德纘戎鴻緒每惟道勳思遵令典而太常未銘從祀尚闕鑒寐欽屬永言深懷便宜敬是前式憲兹嘉禮勒功天府配祭廟庭俾示徽章垂美長世茂績逺猷永傳不朽長沙景王等配享廟庭詔元嘉九年二月南史故太傅長沙景王故大司馬臨川烈武王故司徒南康文宣公穆之衛將軍華容公宏征南大將軍永修公道濟故左將軍龍陽侯鎮惡或履道廣深執德冲邈或雅量髙劭風鑒明逺或識凖𢎞正才略開邁咸文德以𢎞帝載武功以隆景業而太常未銘從祀闕享寤寐屬慮永言興懷便宜配祭廟庭勒功天府追崇臨川王道規詔道規髙祖少弟征荆廣有功太祖下詔追崇褒崇道勳經國之盛典尊親追逺因心之所隆故侍中大司馬臨川烈武王體道欽明至德淵邈睿哲自天孝友光備爰始協規則翼贊景業陵威致討則克剪梟鯨逮妖逆交侵方難孔棘勢踰纍棊人無固志王神謨獨運靈武宏發輯寧內外誅覆羣凶固巳化被江漢勳髙微管逺猷侔于二南英雄邁于兩獻者矣朕幼䝉殊愛德廕特隆豐恩慈訓義深情戚永惟仁範感慕纒懷今當擁移寢祐初祀西夏思崇嘉禮式備徽章庶以昭宣風度允副幽顯其追崇丞相加殊禮鸞輅九旒籌屋左纛給節鉞前後部羽葆鼓吹虎賁班劒百人侍中如故追復廬陵王義真封詔元嘉元年前廬陵王靈柩在逺國封墮替感惟拱慟情若貫割王體自至極地戚屬尊豈可令情禮永淪終始無寄可追復先封特遣奉迎并孫修華謝妃一時俱還言增摧哽追崇廬陵王義真詔元嘉三年誅徐羡之等下詔故廬陵王含章履正英哲自然道心內昭徽風遐被遭時多難志匡權逼天未悰禍運鍾屯險羣凶肆醜専竊國柄禍心潜構釁生不圖朕每永念讎恥含痛內結尊養姦慝情理未申今王道既亨政刑始判宣昭國體於是乎在可追崇侍中大將軍王如故為慰寃魂少申悲憤追贈張約之詔初以疏諫廢廬陵王見誅詳後乃者權臣陵縱兆亂基禍故吉陽令張約之抗疏矢言至誠慷慨遂事屈羣醜殞命遐疆志節不申感焉兼至昔關老奏書見紀漢策閻纂獻規荷榮晉代考其忠槩參迹前蹤宜加旌顯式揚義烈可贈以一郡賜錢十萬布百匹與彭城王義康書義康小字車子武帝子領司徒謝述字景先陳郡陽夏人為義康驃騎長史領南郡太守先是述從兄曜為義康長史喪官述代之太祖與義康書義康入相述又為司徒左長史今以謝述代曜其才應詳練著于歷職故以佐汝汝始親庶務而任重事殷宜寄懷羣賢以盡弼諧之美想自得之不俟吾言也詔録尚書彭城王義康沈邵字道輝林子之子襲駙馬都尉㑹彊弩將軍缺上詔義康沈邵人身不惡吾與林子周旋異常可以補選文帝中詔與義康詔顔延之轉太子中庶子領步兵校尉辭意激揚每犯權要出為永嘉太守甚怨憤乃作五君詠以述竹林七賢山濤王戎以貴顯被黜詠嵇康云鸞翮有時鎩龍性誰能馴詠阮籍云物故不可論途窮能無慟詠阮咸云屢薦不入官一麾乃出守詠劉伶云韜精日沈飲誰知非荒宴蓋自序也劉湛及義康以其辭㫖不遜大怒欲黜為逺郡文帝與義康詔乃以光祿勳車仲逺代之於是延之屛居不豫人間者七載降延之為小邦不政有謂其在都邑豈動物情罪過彰著亦士庶共悉直欲選代令思愆里閭猶復不悛當驅往東土乃志難恕自可隨事録治殷劉意咸無異也殷景仁劉湛史令一作今南史作宜令乃志作乃至録治作録之賜義康書義康既専總朝權事決自巳太祖疾嘗危殆使義康具顧命以告劉湛及殷景仁湛曰天下艱難詎是幼主所御義康景仁並不答而主簿孔𦙍秀等輒就尚書議曹索晉咸康末立康帝舊事義康不知也及疾豫微聞之收劉湛等義康上表遜位㑹稽長公主就宴集載拜稽首請其生命因慟哭上亦流涕即封所飲酒賜義康并賜書後坐范曄謀立賜死會稽姊飲宴憶弟所餘酒今封送並宋書所所餘酒南史作飲餘與江夏王義恭書義恭見後義恭涉獵文義驕奢不節元嘉六年為荆州既出鎮太祖與書誡之汝以弱冠便親方任天下艱難家國事重雖曰守成實亦未易隆替安危在吾曹耳豈可不感尋王業大懼負荷今既分張言集未日無由復得動相規誨宜深自砥礪思而後行開布誠心厝懷平當親禮國士友接佳流識别賢愚鑒察邪正然後能盡君子之心收小人之力汝神意爽悟有日新之美而進德修業未有可稱吾所以恨之而不能巳巳者也汝性褊急袁太妃亦說如此性之所滯其欲必行意所不在從物回改此最弊事宜應慨然立志念自裁抑何至丈夫方欲贊世成名而無斷者哉今粗疏十數事汝别時可省也逺大者豈可具言細碎復非筆可盡禮賢下士聖人垂訓驕侈矜尚先哲所去豁達大度漢祖之德猜忌褊急魏武之纍漢書稱衛青云大將軍遇士大夫以禮與小人有恩西門安于矯性同美關羽張飛任偏同弊行巳舉事深宜鑒此若事異今日嗣子幼䝉司徒便當周公之事汝不可不盡祗順之理茍有所懷密自書陳若形迹之間深宜慎護至于爾時安危天下決汝二人耳勿忘吾言今既進袁太妃供給計足充諸用此外一不須復有求取近亦具白此意惟脫應大餉致而當時遇有所乏汝自可少多供奉耳汝一月日自用不可過三十萬若能省此益美西楚殷曠常宜早起接對賔侣勿使留滯判急務訖然後可入問訊既睹顔色審起居便應即出不須久停以廢庶事也下日及夜自有餘閒府舍住止園池堂觀略所諳究計當無須改作司徒亦云爾若脫於左右之宜須小小回易當以始至一治為限不煩紛紜日求新異凡訊獄多決當時難可逆慮此實為難汝復不習殊當未有次第訊前一二日取訊簿密與劉湛輩共詳大不同也至訊日虛懷博盡慎無以喜怒加人能擇善者而從之美自歸巳不可専意自決以矜獨斷之明也萬一如此必有大吝非唯訊獄君子用心自不應爾刑獄不可擁滯一月可再訊凡事皆應慎密亦宜豫敕左右人有至誠所陳不可漏泄以負忠信之款也古人言君不密則失臣臣不密則失身或相讒構勿輕信受每有此事當善察之名器深宜慎惜不可妄以假人昵近爵賜尤應裁量吾於左右雖為少恩如聞外論不以為非也以貴陵物物不服以威加人人不厭此易達事耳聲樂嬉游不宜令過摴蒱漁獵一切勿為供用奉身皆有節度竒服異器不宜興長汝嬪侍左右巳有數人既始至西未可匆匆復有所納又誡南史共前一篇宜數引見佐史非唯臣主自應相見相見不數則彼我不親不親則無因得盡人人不盡復何由知其衆事廣引視聽既益開博於言事者又差有地也又答義恭鎮江陵以劉湛為南蠻校尉領府軍長史行府州事湛次子琰於江陵病卒湛求自送喪還都義恭亦為之陳請太祖答之康湛字宏仁栁子歷丹陽尹以黨彭城王義賜死吾亦得湛啓事為之酸懷乃不欲茍違所請但汝弱年新涉庶務八州殷曠専斷事重疇咨委杖不可不得其人量算二三未獲便相順許今答湛啓權停彼葬頃朝臣零落相係寄懷轉寡湛實國器吾乃欲引其令還直以西夏任重要且停此事耳汝慶賞黜罰豫關失得者必宜悉相委寄又義恭性甚狷隘年又漸長欲專政事每為湛所裁主佐之間嫌隙遂構太祖密遣使詰讓并使深加諧緝義恭具陳湛無居下之禮雖奉詔㫖頗有怨言上友于素篤欲加柔順乃詔之事至於此甚為可歎當今乏才委授巳爾宜盡相彌縫取其可取棄其可棄汝疏云泯然無際如此甚佳彼多猜不可令萬一覺也汝年巳長漸更事物且羣情矚望不以幼昧相期何由故如十嵗時動止咨問但當今所専必是小事耳亦恐量此輕重未必盡得彼之疑怨兼或由此耶又書敵南渡河滑臺虎牢諸城竝為所沒司州刺史尹冲戍虎牢及滎陽太守崔模抗節不降投塹死太祖與義恭書冲字子順天水冀人先為姚興吏部郎南歸尹冲誠節志槩繼蹤古烈以為傷惋不能巳巳又詔何尚之歷尚書令太子詹事致仕於方山著退居賦以明所守詔書敦勸太祖又與義恭詔義恭具答尚之復攝職今朝賢無多且羊孟尚不得告謝尚之任遇有殊便未宜申許耶羊孟謂羊元元保孟顗義恭答奏尚之清忠貞固歷事惟允雖年在縣車而體獨克壯未相申許下情所同賜南郡王義宣中詔義宣武帝子自江陵舉兵敗誅初武帝以荆州上流形勝遺詔諸子次第居之及文帝時次當義宣以其人才素短用衡陽王義季而以義宣為南徐州㑹稽公主為言乃移荆州先賜中詔勤自課厲政事修理師護以在西久比表求還出內左右自是經國常理亦何必其應於一往今欲聽許以汝代之護雖無殊績潔巳節用通懷期物不恣羣下此信未易非唯聲著西土朝野以為美談在彼巳有次第為士庶所安論者乃謂未議遷之今之回換更在欲為汝耳汝與護年時一輩各有其美物議亦互有少劣若今向事脫一減之者既於西夏交有巨礙遷代之譏非歸責於吾矣復當為護怨非但一誚而巳也如此則公私俱損為不可不先共善詳此事亦易勉耳無為使人動生乖論師護義季小字互一作各乖一作評又義宣鎮荆州魏南侵義宣慮冦至欲奔上明及虜退太祖詔之善修民務不須營潛逃計也詔報衡陽王義季義季見後義季素嗜酒自彭城王義康廢後遂為長夜之飲略少醒日太祖纍加詰責義季引愆陳謝上詔報之誰能無過改之為貴耳此非唯傷事業亦自損性命世中比比皆汝所諳近長沙兄弟皆緣此致故將軍蘇徽耽酒成疾旦夕待盡吾試禁斷并給藥膳至今能立此自是可節之物但嗜者不能立志裁割耳晉元帝人主尚能感王導之諫終身不復飲酒汝既有美尚加以吾意殷勤何至不能慨然深自勉厲乃復須嚴相割裁坐諸紜紜然後少止者幸可不至此一門無此酣酒汝於何得之臨書歎塞徽南史作徴又詔義季雖奉此㫖酣縱如初遂以成疾上又詔之汝飲積食少而素羸多風常慮至此今果委頓縱不能以家國為懷近不復顧性命之重可歎可恨豈復一條本望能以理自厲未欲相苦耳今遣孫道𦙍就楊佛等令晨夕視汝并進止湯食可開懷虛受慎勿隱避吾飽嘗見人斷酒無他慊吸蓋是當時甘嗜罔巳之意耳今者憂怛政在性命未暇及美業復何為吾煎毒至此耶又詔義季遷徐州刺史魏人侵逼北境擾動義季懲義康禍難不欲以功勤自業無他經略惟飲酒而巳太祖又詔之後二年病薨杜驥申恬倉卒之際尚以弱甲瑣卒徼冦作援彼為元統士馬桓桓既不懷奮發連被意㫖猶復逡巡豈惟大乖應赴之宜實孤百姓之望且胸奴輕漢將自此而始賊初起逸未知指趨故且裝束兼存觀察耳少日勢漸可見便應大有經略何合安然遂不敢動遣軍政欲乘際㑹拯危急以申威援本無驅馳平原方幅爭鋒理又山路易馮何以畏首尾回弱若謂事理政應如此者進大鎮聚甲兵徒為煩耳又書殷景仁陳郡長平人初為太尉行參軍事纍遷僕射及病卒義季時為荆州刺史上與書殷僕射疾患少日奄忽不救其識具經逺奉國竭誠周游繾綣情兼常痛民望國器遇之為難惋歎之深不能巳巳汝亦同不往矣如何並宋書答衡陽王義季沈邵為義季右軍中兵參軍始興王濬初開後軍府以邵為中兵義季在江陵安西府中兵久闕啓太祖求人上答之其事不果稱意才難得沈邵雖未經軍事既是腹心作鍾離郡及在後軍府房中甚修理或欲遣之文帝中詔與都督長沙王義欣手書義欣道憐長子蕭承之字嗣伯蘭陵人齊髙帝父也元嘉初為濟南太守魏人破青部諸郡國到濟南引去文帝以承之有全城之功手書與義欣承之與檀道濟無素故事遂寢承之理民直亦不在武幹後今擬為兗州刺史檀征南詳之南齊書詔譬臨川王義慶義慶本長沙王道憐子襲道規後歷南兗州刺史義慶為丹陽尹加尚書左僕射元嘉八年太白星犯右執法義慶懼有災禍乞求外鎮太祖詔譬之義慶固求解僕射乃許𤣥象茫昧既難可了且史家諸占各有異同兵星王時有所干犯乃主當誅以此言之益無懼也鄭僕射亡後左執法嘗有變王光祿至今平安日蝕三朝天下之至忌晉孝武初有此異彼庸主耳猶竟無他天道輔仁福善謂不足橫生憂懼兄與後軍各受內外之任彼以維城表裏經之盛衰此懷實有由來之事設若天必降災寧可千里逃避耶既非逺者之事又不知吉凶定所若在都則有不測去此必保利貞者豈敢茍違天耶宋書與始興王濬詔濬見後沈璞除秣陵令以疾去職濬出為南徐州太祖謂璞曰濬既出蕃卿故當卧而護之與濬詔乃為正佐沈璞纍年主簿又經國卿雖未嘗為行佐今故當正參軍耶若爾正當署餘曹兼房任不爾便宜行佐正署中兵恐于選體如不多耳文帝中詔追崇外祖母蘇夫人詔太祖所生章太后早亡奉太后所生母蘇氏甚謹元嘉六年蘇氏卒駕往臨哭下詔殷景仁議從之朕夙罹偏罰情事兼常每思有以光隆懿戚少伸罔極之懷而禮文遺逸取正所無監之前代用否又殊故惟疑纍年在心未遂蘇夫人奄至傾殂情禮莫寄追思逺恨與事而深日月有期將卜窀穸便欲粗依春秋以貴之義式遵二漢推恩之典但動藉史筆傳之後昆稱心而行或容未允可時共詳論以求其中執筆永懷益增感塞中領軍殷景仁議至德之感靈啓厥祥文母俔天實熙皇祚主上聿遵先典號極徽崇以貴之義禮盡于此蘇夫人階緣戚屬情以事深寒泉之思實感聖懷明詔爰發詢求厥中謹尋漢氏推恩加爵于時承秦之弊儒術蔑如自君作故罔或前典懼非盛明所宜軌蹈晉監二代朝政之所因君舉必書哲王之所慎體至公者懸爵賞於無私奉天統者每屈情以申制所以作孚萬國貽則後昆臣豫䝉博逮謹露庸短祭劉穆之墓詔元嘉二十五年行幸江寧經穆之墓下詔故侍中司徒南康文宣公穆之秉德佐命翼亮景業謀猷經逺元勳克茂功銘鼎彞義章典策故巳嗣徽前哲宣風後代者矣近因遊踐瞻其塋域九原之想情深悼歎可致祭墓所以申永懷誅徐羡之傅亮謝晦詔羡之等初謀廢立先廢廬陵王義真為庶人因廢少帝為營陽王遷吳門尋遣使弒帝殺義真於新安而立羡之亮輔政晦出為荆州刺史元嘉三年正月下詔民生於三事之如一愛敬同極豈惟名教况乃施侔造物義在加隆者乎徐羡之傅亮謝晦皆因緣之才荷恩在昔擢自無聞超居要重卵翼而長未足以譬永初之季天禍橫流大明傾曜四海遏密實受顧託任同負圖而不能竭其股肱盡其心力送往無復言之節事居闕忠貞之效將順靡記匡救蔑聞懷寵取容順成失德誰未因懼禍以建大策而逞其悖心不畏不義播遷之始謀肆鴆毒至止未幾顯行怨殺窮凶極虐荼酷備加顛沛皂𨽻之手告盡逆旅之館都鄙哀愕行路飲涕故廬陵王英秀明逺徽風夙播魯衛之寄朝野屬情羡之等暴蔑求専忌賢畏逼造構貝錦成此無端罔主䝉上橫加流屛矯誣朝㫖致兹禍害寄以國命而剪為仇讎旬月之間再肆鴆毒痛感三靈怨結人鬼自書契以來棄常安忍反易天明未有如斯之甚者也昔子家從弒鄭人致討宋肥無辜蕩澤為戮况逆亂倍於往釁情痛深於國家此而可容孰不可忍即宜誅殛告謝存亡而于時大事甫爾異同紛結匡國之勳實著莫大之罪未彰是以逺酌民心近聽輿誦雖欲討亂慮或難圖故忍戚含哀懷恥纍載每念人生實難情事未展何嘗不顧影慟心伏枕泣血今逆臣之釁彰暴遐邇君子悲情義徒思奮家讎國恥可得而雪便命司冦肅明典刑晦據有上流或不即罪朕當親率六師為其遏防可遣中領軍到彥之即日電發征北將軍檀道濟絡驛繼路符衛軍府州以時收剪巳命征虜將軍劉粹斷其走伏罪止元凶餘無所問感惟永往心情崩絶氛霧既袪庶幾治道爾誅檀道濟詔道濟為南兗州刺史與徐羡之等共謀廢立且建功前朝威名甚重諸子又有才氣朝廷疑畏之太祖屢年寢疾元嘉十三年春道濟以江州刺史入朝收付廷尉并其八子伏誅檀道濟階緣時幸荷恩在昔寵靈優渥莫與為比曽不感佩殊遇思答萬分乃空懷疑二履霜日久元嘉以來猜阻滋結不義不昵之心附下罔上之事固巳暴之民聽彰于遐邇謝靈運志凶辭醜不臣顯著納受邪說每相容隱又潜散金貨招誘剽猾逋逃必至實繁彌廣日夜伺隙希兾非望鎮軍將軍仲德往年入朝屢陳此迹朕以其位居台鉉豫班河嶽彌縫容飬庶或能革而長惡不悛凶慝遂遘因朕寢疾規肆禍心前南蠻行參軍龎延祖具悉奸狀密以啓聞夫君親無將刑兹罔赦况罪釁深重若斯之甚便可收付廷尉肅正刑書事止元惡餘無所問贈楊萬夀等詔往年氐豎楊難當造為叛亂俯首者衆其長史楊萬夀建節將軍姚憲情不違順屢進矢言及凶醜宵遁闔境崩擾建忠將軍吕訓衛倉儲以候王師寧朔將軍姜檀果烈懇到志在宣力濁水之捷厥庸顯然近者協贊義奮乃心無替洛陽符昭誠係本朝亦同斯舉俘擒僞將獨克武興推鋒致效隕命冦手並事著屯險感于豫懷宜䝉旌叙榮慰存亡可贈萬夀龍驤將軍昭武都太守憲補員外散騎侍郎訓駙馬都尉奉朝請檀征西大將軍司馬仇池太守宜並內徙可符雍梁二州厚加贍恤贈姜道盛詔故晉夀太守姜道盛前討仇池志輸誠力即戎著效臨財能清近先登濁水殞身鋒鏑誠節俱亮矜悼于懷可贈給事中賜錢千萬贈劉康祖詔元嘉二十七年太祖將北伐康祖以左軍將軍率豫州軍出許洛及于尉武與敵遇中流矢卒明年詔贈康祖班師尉武戎律靡忒對衆以寡殱殄大半猛氣雲騰志申力屈沒世狥節良可嘉悼宜加甄寵以旌忠烈可贈益州刺史諡曰壯沈演之范曄拜官詔總司戎政翼贊東朝惟允之舉匪賢莫授侍中領右衛將軍演之清業貞審器思沈濟右衛將軍曄才應通敏理懷清要並美彰出內誠亮在公能克懋厥猷樹績所蒞演之可中領軍曄可太子詹事劉道錫申坦進官詔道錫為巴西梓潼二郡元嘉十八年為氐羌所攻保城退敵太祖嘉之下詔前者兵冦攻逼邊情波駭廣威將軍巴西梓潼二郡太守劉道錫將率文武盡心固守保全之績厥效可書可冠軍咨議參軍前建威將軍晉夀太守申坦孤城弱衆厲志致果死傷參半壯氣不衰雖力屈陷沒在誠宜甄可建威將軍巴西梓潼二郡太守徙謝靈運廣州詔靈運為臨川內史在郡放縱為有司所糾司徒遣收遂興兵叛逸禽送廷尉奏正斬刑上終愛其才詔徙廣州詳靈運下靈運罪釁纍仍誠合盡法但謝元勳參微管宜宥及後嗣可降死一等徙付廣州誅丹陽尹劉湛詔元嘉中彭城王義康専秉朝權湛為丹陽尹互相黨援以致主相乖疑釁難將作十七年冬下詔收湛於獄賜死義康亦廢湛為晉左光祿大夫栁之子劉湛階藉門䕃少叨榮位往佐歷陽姧詖夙著謝晦之難潜使密告求心即事久宜誅屏朕所以棄罪略瑕庶收後效寵秩優忝踰越倫匹而凶忍忌克剛愎靡厭無君之心觸遇斯發遂乃合黨連羣構扇同異附下蔽上専弄威權薦子樹親互為表裏邪附者榮曜九族秉理者推陷必至旋觀姧慝為日巳久猶欲𢎞納遵飬兾或悛革自邇以來凌縱滋甚悖言懟容罔所顧忌隂謀潜計䁹睨兩宫豈唯彰暴國都固亦達於四海比年七曜違度震蝕表災侵陽之徴事符幽顯搢紳含憤義夫興歎昔齊魯不綱禍傾邦國昭宣電斷漢祚方延便收付廷尉肅明刑典答糾令僕詔徐湛之轉尚書僕射時尚書令何尚之以湛之國戚任隆欲以朝政推之湛之亦以令無不總又以事歸尚之御史中丞並奏免官詔與尚之並受辭令僕治務所寄不共求體當而互相推委糾之是也然故事殘舛所以致兹疑執特無所問時詳正之賜始興太守徐豁詔始興太守豁潔巳退食恪居在官政事修理惠澤沾被近嶺南荒弊郡境尤甚拯恤有方濟厥饑饉雖古之良守蔑以尚焉宜䝉褒賞以旌清績可賜絹二百匹穀千斛賜徐豁營葬詔豁廉清勤恪著稱所司故擢授南服申其才志不幸喪殞朕甚悼之可賜錢十萬布百匹以營葬事贈廣州刺史陸徽詔徽厲志廉潔歷任恪勤奉公盡誠克巳無倦褒榮未申不幸夙殞言念在懷以為傷恨可贈輔國將軍本官如故賜錢十萬米二百斛賜晉夀太守郭啓元家穀詔故綏逺將軍晉夀太守郭啓元往銜命北庭秉意不屈受任白水盡勤靡懈公奉私餼纎毫弗納布衣蔬食飭躬惟儉故超授顯邦以甄廉績而介誠苦節終始匪二身死之日妻子凍餒志操殊俗良可哀悼可賜其家穀五百斛徴戴顒宗炳詔並不就新除通直散騎侍郎戴顒太子舍人宗炳並志託丘園自求衡蓽恬靜之操久而不渝顒可國子博士炳可通直散騎侍郎擢陳憲詔南平王鑠鎮夀陽以憲行郡事固守懸瓠魏主攻城四十二日不拔右軍行參軍行汝南新蔡二郡軍事陳憲盡力捍禦全城摧冦忠敢之效宜加顯擢可龍驤將軍汝南新蔡二郡太守賜蕭思話手敇思話見後思話善彈琴能騎射為臨川王義慶平西長史南蠻校尉太祖賜以弓琴手敕丈人頃何所作事務之暇故以琴書為娛耳所得不曰義邪眷想常不忘情想亦同之前得此琴云是舊物亦有名京邑今以相借因是戴顒意於彈撫響韻殊勝直爾嘉也并往桑弓一張材理乃快先所常用既久廢射又多病略不能制之便成老公令人歎息良材美器宜在盡用之地丈人真無所與讓也詔蕭思話張永為義恭太尉中兵參軍越騎校尉振武將軍太祖謂堪為將督王元謨申坦等經略河南攻碻磝城纍旬不能拔為敵所乘殺傷甚衆撫軍將軍蕭思話收永等繫歷城獄太祖以屢征無功諸將不可任責永等與思話詔又與義恭書敵既乘利方向盛冬若脫敢送死兄弟父子自共當之耳言及增憤可以示張永申坦又與江夏王義恭書早知諸將輩如此恨不以白刃驅之今者悔何所及又詔蕭思話沈演之歷轉吏部尚書領太子右衛率卒時思話為雍州刺史徴為吏部尚書文帝詔之沈尚書暴病不救其體業貞審立朝盡公年時尚可方相委任奄忽不永痛惋特深銓管要機通塞所寄丈人才用體國二三惟允沈亮授職詔亮由南陽太守遷南譙王司空中兵參軍詔曰陜西心膂須才故授卿此職别詔沈璞璞字道貞林子少子歷淮南太守太宗初被害璞為盱眙太守時王師北伐璞與臧質計拒魏魏主燾遁走太祖遣中使深相褒美别詔近者險急老弱殊當憂迫耶念卿爾時難為心想百姓流轉巳還此遣部運尋至委卿量所贍濟也答何承天承天見後承天素好奕棊頗用廢事太祖賜以局子承天表謝上答局子之賜何必非張武之金耶詔戒劉道濟道濟沛郡蕭人道濟為益州刺史費謙等並聚斂興利而道濟任之太祖與道濟詔聞卿在任未盡清省又頗為殖貨若萬一有此必宜改之比傳人情不政緝諧當以法御下深思自警以副本望蕭承之拜龍驤將軍詔承之元嘉中為漢中太守拒退氐帥楊難當梁州平下詔齊髙帝父也承之稟命先驅䝉險深入全軍屢尅奮其忠果可龍驤將軍隨府轉寧朔司馬太守如故南齊書與魏世祖拓跋燾求馬書燾遣員外散騎侍郎王老夀乘驛就太祖乞黃甘太祖餉甘十簿甘蔗千挺并就求馬老夀反命未出境魏兵深入自頃嵗成民阜朝野無虞春末當東巡吳㑹以盡游豫臨滄海探禹穴陟姑蘇之臺搜長洲之苑舟楫雖盛寡于良駟想能惠以逸足令及此行詔百濟王餘映元嘉二年太祖詔其後每嵗貢獻不絶皇帝問使持節督百濟諸軍事鎮東大將軍百濟王纍葉忠順越海效誠逺王纂戎聿修先業慕義既彰厥懷亦款浮桴驪水獻琛執贄故嗣位方任以藩東服勉勗所蒞無墜前蹤今遣兼謁者閭丘恩子兼副謁者丁敬子等宣㫖慰勞稱朕意並宋書吐谷渾慕璝除授詔少帝時璝兄阿豺表請除命未至豺死元嘉六年璝復上表明年詔授吐谷渾慕璝兄弟慕義至誠可嘉宜授策爵以甄忠款可督塞表諸軍事征西將軍沙州刺史隴西公訶羅單媻皇媻達三國除授詔訶羅單媻皇媻達三國頻越遐海款化納貢逺誠宜甄可並加除授策命惟爾慕義款化效誠荒遐恩之所洽殊逺必甄用敷典章顯兹策授爾其欽奉凝命永固厥職可不慎歟媻皇國王舍利媻羅跋摩策惟爾仰政邊城率貢來庭皇澤凱被無幽不洽宜班典策授兹嘉命爾其祗順禮度式保厥終可不慎歟媻達國王舍利不陵伽跋摩策命惟爾仰化懷誠馳慕聲教皇風遐暨荒服來款是用加兹顯策式甄義順爾其祗順憲典永終休福可不慎歟勞氐帥揚文德詔近者校尉仇池公表敵縱逸冦竊仇池將士挫傷民萌塗炭眷言西顧矜慨在懷揚文德世篤忠順誠感家國糾率義徒奄殄凶醜鋒旗所向殱潰無遺氛祲澄清蕃境寧一念功惟事良有欣嘉便可遣使慰勞宣示朝㫖并敇梁州刺史申坦隨宜應援又封武都王詔顯録勳效蓋惟國典施賞務速無或踰時楊文德志氣果到文武兼全乘機潜奮殊功仍集告捷歸誠獻俘萬里朝無暫土樹難自肅休烈昭著朕甚嘉焉楊氏世祖西勞方忠纍葉宜紹先緒膺受寵榮可使持節散騎常侍都督北秦雍二州諸軍事征西大將軍平羌校尉北秦州刺史封武都王封且渠無諱河西王詔無諱遣兵襲髙昌據之奉表獻方物太祖詔往年狡冦縱逸侵害凉土西河王茂䖍遂至不守淪陷冦逆纍世著誠以為矜悼次弟無諱克紹遺業保據方隅外結鄰國內輯民庶係心闕庭踐修貢職宜加朝命以褒篤勳可持節散騎常侍都督凉河沙三州諸軍事征西大將軍領護胸奴中郎將西夷校尉凉州刺史河西王且渠安周襲封河西王詔故征西大將軍河西王無諱弟安周才略沈到世篤忠款統承遺業民衆歸懷雖亡士喪師孤立異所而能招率殘寡攘冦自今宜加榮授垂軌先烈可使持節散騎常侍都督凉河沙三州諸軍事領西域戊巳校尉凉州刺史河西王修伐林邑功詔元嘉二十三年使交州刺史檀和之伐林邑國破之其主范陽邁父子奔逃多獲珍異上嘉將帥之功下詔林邑介恃遐險久稽王誅龍驤將軍交州刺史檀和之忠果到列思略經濟禀命致討萬里推鋒法命肅齊文武畢力潔己奉公以身率下故能立勳海外震服殊俗宜加褒飭參管近侍可黃門侍郎領越騎校尉行建武將軍龍驤司馬蕭景憲協贊軍首勤捷顯著總勒前驅尅殄巢穴必能威振荒夷撫懷民庶可持節督交州廣州之鬱林寧浦二郡諸軍事建威將軍交州刺史龍驤司馬童林之九真太守傅蔚祖戰死並贈給事中宋文紀卷二
