body:
  text: 宋文紀卷十三眀梅鼎祚編徐豁字萬同東莞姑蔑人晋太子左衛率邈子卒于始興陳三事表元嘉初為始興太守三年遣大使巡行并使郡縣各言損益豁表陳郡大田武吏年滿十六便課米六十斛十五以下至十三皆課米三十斛一户內隨丁多少悉皆輸米且十三嵗兒未堪田作或是單迥無相兼通年及應輸便自逃逸既遏接蠻俚去就益易或乃斷截支體産子不養戶口嵗减實此之由謂宜更量課限使得存立今若减其米課雖有交損考之將來理有深益郡領銀民三百餘戶鑿坑採砂皆二三丈功役既苦不顧崩壓一嵗之中每有死者官司檢切猶致逋違老少相隨永絶農業千有餘口皆資他食豈唯一夫不耕或受其飢而已所以嵗有不稔便致甚困尋臺邸用米不異于銀謂宜准銀課米即事為便中宿縣俚民課銀一子丁輸南稱半兩尋此縣自不出銀又俚民皆巢居鳥語不間貨易之宜每至買銀為損已甚又稱兩受入易生奸巧山俚愚怯不辨自申官所課甚輕民以所輸為劇今若聽計丁課米公私兼利徐道娛議讀秋令服幘表文帝元嘉六年六月駙馬都尉奉朝請徐道娛上表太學博士茍萬秋議宜仍舊有司復奏無讀土令之文謹案晋博士曹𢎞之議立秋御讀令不應著緗幘遂改用素相承至今臣淺學管見竊有惟疑伏尋禮記月令王者四時之服正見駕蒼龍載赤旗衣白衣服黑玉季夏則黃文極于此無白冠則某履某舄也且幘又非古服出自後代上附于冠下不屬衣冠固不革而幘豈容異色愚謂應恆與冠同色不宜隨節變綵土令在近謹以上聞如或可採乞付外詳議太學博士荀萬秋議伏尋幘非古者冠冕之服禮無其文案蔡雍獨斷云幘是古卑賤供事不冠人所服又董仲舒止雨書曰其執事皆赤幘知並不冠之服也漢元始用衆臣率從故司馬彪輿服志曰尚書幘名曰納言迎氣五郊各如其色從章服也自茲相承迄于有晋大宋受命禮制因循斯既厯代成準謂宜仍舊有司奏謹案道娛唘事以土令在近謂幘不宜變萬秋雖云幘宜仍舊而不眀無讀土令之文今書舊事於左魏臺雜訪曰前後但見讀春夏秋冬四時令至于服黃之時獨闕不讀今不解其故魏眀帝景初元年十二月二十一日散騎常侍領太史令髙堂隆上言曰黃于五行中央土也王四季各十八日土生于火故于火用事之末服黃三季則否其令則隨四時不以五行為分也是以服黃無令上太廟蒸嘗儀注議元嘉六年七月太學博士徐道娛上議有司奏下禮官詳判博士江邃賀道期荀萬秋等並議舊儀為是惟博士陳珉同道娛議參詳邃等尚皆依擬經禮今衆議不一宜遵舊體詔可伏見太廟蒸嘗儀注皇帝行事畢出便坐三公已上獻太祝送神於門然後至尊還拜百官贊拜乃退謹尋清廟之道所以肅安神也禮曰廟者貌也神靈所馮依也事亡如存若常在也既不應有送神之文自陳豆薦爼車駕至止並弗迎送夫不迎而送送而後辭暗短之情實用未達按時人私祠誠皆迎送由于無廟庶感降來格因心立意非王者之禮也儀禮雖太祝迎尸于門此乃延尸之儀豈是敬神之典恐於禮有疑謹以議上博士江邃議在始不迎眀在廟也卒事而送節孝思也若不送而辭是舍親也辭而後送是遣神也故孝子不忍違其親又不忍遣神是以祝史送神以成蒸嘗之義博士賀道期議樂以迎來哀以送往祭統迎牲而不迎尸詩云鐘鼓送尸鄭云尸神象也與今儀注不迎而後送若合符契博士荀萬秋議古之事尸與今之事神其義一也周禮尸出送于廟門拜尸不顧詩云鐘鼓送尸則送神之義其來久矣記曰迎牲而不迎尸别嫌也尸在門外則疑于臣入廟中則全于君君在門外則疑于君入廟則全于臣是故不出者眀君臣之義殷祠蒸祀議元嘉六年九月上不報祠部下十月三日殷祠十二日蒸祀謹按禘夾之禮三年一五年再公羊所謂五年再殷祭也在四時之間周禮所謂凡四時之間禮也蓋歷嵗節月無定天子諸侯先後弗同禮稱天子夾嘗諸侯蒸夾有田則祭無田則薦鄭注天子先夾然後時祭諸侯先時祭然後夾有田者既祭又薦新祭以首時薦以仲月然則大祭四時其月各異天子以孟月殷仲月蒸諸侯孟月嘗仲月夾也春秋僖公八年秋七月禘文公二年八月大事于太廟榖梁傳曰著夾嘗也昭公十五年二月有事於武宫左傳曰禮也又周禮仲冬享蒸月令季秋嘗稻晋春蒸曲沃齊十月嘗太公此並孟仲區别不共之眀文矣凡祭必先卜日用丁巳如不從進卜逺日卜未吉豈容二事推期而往理尤可知尋殷蒸祀重祭薦禮輕輕尚異月重寧反同且祭不欲數數則瀆今隔旬頻享恐于禮為煩自經緯墳誥都無一月兩獻先儒舊說皆云殊朔晋代相承未審其原國事之重莫大乎祀愚管膚淺竊以惟疑請詳告下徐閏議祠祀薦牲奏元嘉十年十二月太祝令徐閏刺勒太學詳據博士徐道娛太常丞司馬操等議參議從閏所稱粗有證據宜如所上署典宗廟社稷祠祀薦五牲牛羊豕雞並用雄其一種市買由來送雌竊聞周景王時賔起見雄雞自斷其尾曰雞憚犧不祥今何以用雌求下禮官詳正勒太學依禮詳據博士徐道娛議案禮孟春之月是月也犧牲無用牝如此是春月不用雌爾秋冬無禁雄雞斷尾自可是春月太常丞司馬操議尋月令孟春命祀山林川澤犧牲無用牝若如學議春祠三牲以下便應一時俱改以從月今何以偏在一雞重更勒太學議答徐道娛又議凡宗祀牲牝不一前惟月令不用牝者蓋眀在春必雄秋冬可雌非以山林同宗廟也四牡不改在雞偏異相承來久義或有由誠非末學所能詳䆒求詳議告報如所稱令孔默之魯國人厯廣州刺史王歆之舉良吏奏元嘉初默之王歆之等為大使巡行四方上言乃進號賜絹榖宣威將軍陳南頓二郡太守李元德清勤均平奸盜止息彭城內史魏恭子廉恪修慎在公忘私守約安儉久而彌固前宋縣令成浦治政寬濟遺詠在民前鮦陽令李熙國在事有方民思其政山桑令何道自少清廉白首彌厲應加褒賚以勸於後陸徽字休猷吳人終益州刺史薦士表徽元嘉中為廣州刺史有清名上表薦朱萬嗣臣聞陵雪褒頴貞柯必振尊風賞流清原斯挹是以衣囊揮譽於西京折轅延髙于東帝伏見廣州别駕從事史朱萬嗣年五十三字少豫理業冲夷秉操純白行稱私庭能著官政雖氏非世祿宦無通資而隨牒南服位極僚首九綜州綱三端府職頻掌蕃機屢績符守年暨知命廉尚愈髙冰心與貪流爭激霜情與晚節彌茂厯宰金山家無寶鏤之飾連組珠海室靡璫珥之珍確然守志不求聞達實足以澄革汚吏洗鏡貪氓臣謬忝司牧任専萬里雖情祗慎擢才闕豪露敢罄愚陋舉其所知如得提名禮闈抗迹朝省搏嶺表之清風負冰宇之潔望則恩融一臣而施光萬物敢緣天澤雲行時德雨施每甄外州榮加逺國是以獻其瞽言希垂聽覽陸徴舉龔頴表穎遂寧人益州刺史毛璩辟為勸學從事譙縱僣亂殺璩穎獨殯送以禮不就縱徴乃收付獄事平郡加辟引元嘉中年刺史陸徴上表臣聞運躔眀夷則艱貞之節顯時屬棟撓則獨立之操彰昔之元興皇綱弛紊譙縱乘釁肆虐巴庸害殺前益州刺史毛璩竊據蜀土涪岷士庶怵迫受職璩故吏龔頴獨秉身貞白抗志不撓殯送舊君哀敬盡禮全操九載不染僞朝縱雖殘凶猶重義槩遂延以旌命劫以兵威頴忠誠奮發辭色方壯雖桎梏在身踐危愈信其節白刃臨頸見死不更其守若王蠋之抗辭燕軍同周苛之肆詈楚王方之於頴蔑以加焉誠當今之忠壯振古之遺烈而名未登于王府爵猶齒於卿曹斯實邊氓逺土所為於邑臣過叨恩私宣風萬里志存砥礪有懷必聞故率愚慤舉其所知追懼紕妄伏增憔㮚鄧文子薦翟法賜表法賜尋陽柴桑人曽祖湯四世不仕至法賜逺避徵辟遁跡幽深尋陽太守鄧文子表奏乃止奉詔書徵郡民新除著作佐郎南陽翟法賜補員外𣪚騎侍郎法賜隱跡廬山于今四世棲身幽巖人罕見者如當逼以王憲束以嚴科馳山獵草以期禽獲慮致顛殞有傷盛化到彥之字道豫彭城武原人歷南豫州刺史北伐兵敗免官復起為護軍與友人蕭斌書王慧龍過江入魏仕滎陽太守彥之與檀道濟頻頓淮潁慧龍力戰屢摧其鋒彥之與斌書魏魯軌扶風郿人父宗之本晋雍州刺史奔軌仕魏寧南將軍司馬楚之本晋宗室宋武帝起誅司馬戚屬椘之亡于汝潁之間聚衆萬餘降魏封琅邪王魯軌頑鈍馬楚粗狂亡人之中惟王慧龍及韓延之可為深憚不意儒生懦夫乃令老子訝之魏書垣護之字彥宗略陽垣道人歷豫州刺史淮南太守諫到彥之書護之為殿中將軍隨彥之北伐彥之將回師護之書諫彥之不納𣪚敗而歸太祖聞而善之以補江夏王義恭征北行參軍北髙平太守外聞節下欲回師反斾竊所不同何者敵人畏威望風奔迸八載侵地不戰克復方當長驅朔漠窮掃遺醜况乃自送無假逺勞宣使竺靈秀速進滑臺助朱修之固守節下大軍進擬河北則牢洛遊魂自然奔退且昔人有連年攻戰失衆乏糧者猶張膽爭前莫肯輕退况今青州豐穰濟漕流通士馬飽逸威力無損若空棄滑臺坐喪成業豈是朝廷受任之㫖宋書勸王𤣥謨書護之遷鍾離太守隨𤣥謨入河為先鋒進據石濟石濟在滑臺西南百三十里及敵救至馳書勸𤣥謨急攻不從敗退昔武皇攻廣固死沒者亦衆况事殊曩日豈得計士衆傷疲願以屠城為急宋書迫通鑑况今事于曩日垣襲祖護之子與弟榮祖書榮祖護之弟子字華先孝建中為後軍參軍入齊厯兖州刺史襲祖為淮陽太守孝武以事徙之嶺南護之不食而死帝疾篤又使殺襲祖臨死與榮祖書弟嘗勸我危行言遜今果敗矣南史與南齊書作弟書王𤣥謨字彥德太原祁人厯左光祿大夫開府領護軍南豫州刺史請分道攻魏疏元嘉中𤣥謨領汝隂太守時魏攻陷滑臺執朱修之以歸𤣥謨上疏王途始開隨復淪塞非惟天時抑亦人事虎牢滑臺豈惟將之不良抑亦本之不固本之不固皆由民憚逺役臣請以西陽之魯陽襄陽之南鄉發甲卒分為兩道直趣淆澠征士無逺徭之思吏卒有屢休之歌若欲以東國之衆經營牢洛道塗既逺獨克實難論彭城表太平御覽引宋書彭城南届大淮左右清汴城隍峻整襟帶衛周又自淮以西襄陽以北經塗三千達于濟岱六州之民三十萬户實由此境申恬字公休魏郡魏人厯豫州刺史有清約稱遷換諸郡守表恬元嘉中為冀州刺史加濟南太守時又遷換諸郡守恬上表詔從之伏聞朝恩當加臣濟南太守仰惟優㫖荒心𣪚越臣殃咎之餘遭蒙踰忝寵私罔已復兼今授豈其愚迷所能上答臣近至止即履行所統究其形宜河濟之間應置戍扞其中四處急須修立瓮口故城又是要所宜移太原委以邊事緣山諸邏並得除省防衛綏懷利便非一吕綽誠效益著深同臣意百姓聞者咸皆附說急有同異二三未宜但房紹之蒞郡經年軍民粗狎改以帶臣有乖永事逺牽太原於民為苦而瓮口之計復成交互人情非樂容有不安疆埸威刑患不開廣若得依先處分公私允緝文帝詔有司恬所陳當是事宜近諸除授可悉停趙伯符字潤逺下邳僮人武穆皇后弟領軍倫之子厯護軍將軍丹陽尹以息倩犯罪乞解侍中護軍表倩尚文帝女海鹽公主以與始興王濬私通搏擊主離婚又殺主所生蔣美人伯符懼病􅌰藝文類聚臣職慚羊媪慮闕日磾致咎猖狂初不自悟形影相弔心情喪恧無宜復管司喉脣作統連率沈邵字道輝林子長子嗣爵厯南中郎參軍安成相追板王孚孝廉教邵為安成相郡民王孚有學業志行見稱州里邵歷任未幾而孚􅌰贈以孝廉板教曰前文學主簿王孚行潔業淳棄華息競志學修道老而彌篤方授右職不幸暴亡可假孝廉檄薦以特牲緬想延陵以遂本懷沈亮字道眀林子第二子出後田子厯隨王後軍中兵領義成太守救饑議亮轉西曹主簿時三吳水淹榖貴民飢刺史彭城王義康使立議以救民急亮議即便施行東土灾荒民凋榖踊富民蓄米日成其價宜班下所在隱其虛實令積蓄之家聽留一年儲餘皆勒使糶貨為制平價此所謂常道行於百世權宜用於一時也又緣淮嵗豐邑富地穰麥既已登黍粟行就可析其估賦仍就交市三吳饑民即以貸給使强壯轉運以贍老弱且酒有喉脣之利而非餐餌所資尤宜禁斷以息逰費發冢罪近村民議世祖初為武陵王出鎮厯陽亮行參征虜軍事民有盜發冢者罪所近村民與符伍遭劫不赴救同坐亮議尋發冢之情事止竊盜徒以侵亡犯死故同之嚴科夫穿掘之侣必銜枚以晦其迹劫掠之黨必歡呼以威其事故赴凶赫者易應潛密者難且山原為無人之鄉丘壟非恆途所踐至于防救不得比之村郭督實效名理與劫異則符伍之坐居宜降矣又結罰之科雖有同符伍之限而無逺近之斷夫冢無村界當以比近坐之若不域之以界則數步之內與十里之外便應同罹其責防民之禁不可頓去止非之憲宜當其律愚謂相去百步同赴告不時者一嵗刑自此以外差不及罰唘太祖亮轉西曺主簿唘太祖陳府事伏見西府兵士或年幾八十而猶伏𨽻或年始七嵗而已從役衰耗之體氣用湮微兒弱之軀肌膚未實而使伏勤昏稚騖苦傾晚於理既薄為益實輕書制休老以六十為限役少以十五為制若力不周務故當粗存優减詔答前已令卿兄改革尋值遷回竟是不施行邪今更敕西府也陳太祖時營創城府功課嚴促亮又陳之經始城宇莫非造創基築既廣夫課又嚴不計其勞茍務其速以嵗月之事求不日之成比見役人未眀上作閉鼓乃休呈課既多理有不逮至于息日拘備關限方涉暑雨多有死病頃日所承亦頗有逃逸竊惟此既內藩事殊外鎮撫蒞之宜無繫早晚若得少寬其工課稍均其優劇徒𨽻既苦易以恱加考其卒功廢闕無幾臣聞不居其職不謀其事庖割有主尸不越樽豈臣踈小所當豫議但臣泳恩嵗厚服義纍世茍是所懷忘其常體詔報唘之甚佳此亦由來常患比屢敕之猶復如此甚為無理近復令孟休宣㫖想當不同卿比可密觀其優劇也箋世祖元嘉二十二年世祖出為雍州刺史以亮為南陽太守郡界有古時石碣蕪廢嵗久亮籖世祖修治之施生興業首教農畝立民崇政訓本播穡故能殷邦康俗禮節用成頃北洛侵蕪南宛雕毁獫狁肆凶犬戎充彊逺肅烽驛近虞郊閈遂使沃衍弗井巨防莫修窘力輟耕闕於分地凶荒無待流冗及今禮化孚內威禁清外斯實去盜修畎昭農緒稼之時𢎞圖廣務拓土祈年之日殿下降心育物振民復古且方提封榛棘綏入殊荒竊見郡境有舊石堨區野腴潤實為神皋而蕪决稍積久廢其利凡管所見謂宜創立昔文翁守官起沃成産偉連撫民開奧增業惠昭二邦庸列兩漢雖效政圖功不見所絶聨事惟忝憂同職同後缺書並宋徐耕晋陵延陵人自令史除平原令詣縣陳辭元嘉二十一年大旱民饑耕詣縣陳辭縣為言上當時以比漢卜式今年亢旱禾稼不登氓黎饑餒採掇存命聖上哀矜已幸存拯但饉罄來久困殆者衆米榖轉貴糴索無所方涉春夏日月悠長不有微救永無濟理不惟凡璅敢憂自外鹿鳴之求思同野草氣類之感能不傷心民糴得少米資供朝夕志欲自竭義存分餐今以千斛助官賑貸比境連年不熟今嵗尤甚晋陵境特為偏枯此郡雖弊猶有富室承陂之家處處而是並皆保熟所失蓋微陳積之榖皆有巨萬旱之所弊實鍾貧民溫富之家各有財寶謂此等並宜助官得過儉月所損至輕所濟甚重今敢自勵為勸造之端實願掘水揚塵崇益山海無任懇欵宋書羊𤣥保太山南城人歷光祿大夫𣪚騎常侍特進陳吏民亡叛制非宜奏𤣥保為黃門侍郎善奕棊太祖與賭郡戲勝補宣城太守先是劉式之為宣城立吏民亡叛制一人不禽符五里吏送州作部若獲者賞位二階𤣥保以為非宜陳奏由是得停臣伏尋亡叛之由皆出于窮逼未有足以推存而樂為此者也今立殊制于事為苦臣聞苦節不可貞懼致流弊昔龔遂譬民於亂繩緩之然後可理黃霸以寬和為用不以嚴刻為先愚以為單身逃役便為盡尸今一人不測坐者甚多既殫重負各為身計牽挽逃竄必致繁滋又能禽獲叛身類非謹惜既無堪能坐陵勞吏名器虛假所妨實多將階級不足供賞服勤無以自勸又尋此制施一邦而已若其是耶則應與天下為一若其非耶亦不宜獨行一郡民離憂患其弊將甚臣忝守所職懼難遵用致率管穴冒以陳聞羊希字泰聞太山羊城人厯廣州刺史為晋康太守劉思道所殺與安北咨議參軍孫詵書吳郡陸法真厯官有清節嘗為劉秀之安北録事參軍希與詵書足下同僚似有陸録事者此生東南名地又張𤣥外孫持身至清雅有志節年髙官下秉操不衰計當日夕相與申意宋書劾謝洸奏宋起居注泰始二年希為御史中丞奏洸一作沈山隂令謝洸親憂未除嘗著青絳納兩襠請免洸前所居官東平冲王服制議孝武帝孝建元年六月有司奏故十六皇弟休倩薨夭年始及殤追贈諡東平冲王服制有未成准輒下禮官詳議太學博士陸澄議有司尋澄議無眀證却使秉正澄重議更上右丞羊希參議詔可陸澄議案禮有成人道則不為殤今既追胙土宇逺崇封秩圭黼備典成孰大焉典文式昭殤名去矣夫典文垂式元服表身猶以免孺子之制全丈夫之義安有名班爵首而可服以殤禮重議竊謂贈之為義所以追加名器故贈公者便成公贈卿者便成卿贈之以王得不為王乎然有有在生而封或既沒而爵俱受帝命不為吉凶殊典同備文物豈以存亡異數今璽策咸秩是成人之禮群后臨哀非下殤之制若喪用成人親以殤服末學含疑未之或辨敢求詳衷如所稱羊希參議尋澄議既無畫然前例不合准據案禮子不殤父臣不殤君君父至尊臣子恩重不得以幼年而降又曰尊同則服其親服推此文者旁親自宜服殤所不殤者唯施臣子而已沈演之字臺真吳興武康人厯吏部尚書太子右衛率薦劉真道劉道錫表元嘉十三年東土旱遣揚州治中從事史沈演之巡行在所上表上嘉之各賜榖千斛以真道為步兵校尉宰邑剸政必以簡惠成能蒞職闡治務以利民著績故王奐見紀於前升卿流稱于後竊見錢唐令劉真道餘杭令劉道錫皆奉公恤民恪勤匪懈百姓稱詠訟訴希簡又翦蕩凶非屢能擒獲灾水之初餘杭髙堤崩潰洪流迅激勢不可量道錫躬先吏民親執板築塘既還立縣邑獲全經厯諸縣訪核名實並為二邦之首最治民之良宰嘉禾頌元嘉二十四年七月嘉禾生華林園及景陽山中領軍吉陽縣侯沈演之奏頌煥炳禎圗昭晰瑞典運傾方閟時亨始顯綈狀既章鳥文斯辨於皇聖辟承物紀逺眀兩辰麗昌輝天衍其一理妙位崇事神業盛淵渥德澤虛寂道政協化安心調樂移性玉衡從體瑶光得正臣星垂采景雲立慶其二極仁所被罔幽不攘至和所感靡况弗彰鵷出丹穴鸚起西湘白鹿踰海素鳥越江結響穹隂儀形鍾陽其三治人奉天乃勤乃格黛未俶載髙廩已積嘉禾重穋甘露流液擢秀辰畦揚頴角澤離穟合豪榮區䕃斥其四盈箱徴殷貫桑表周今我大宋靈貺綢繆帝終撝謙繹思勿休躬薦宗廟溫恭率由降福以誠孝享䖍羞其五頒趾推功登徽睿詔恩覃隱顯賞延荒徼河溓海夷山華嶽耀憬琛敻賮兼澤委效日表地外改服請教其六茂對盛時綏萬屢豐厭厭歸素秩秩大同上藏諸用下知所從仰式王度俯歌南風鴻名稱首永保無窮其七上白鳩頌表元嘉二十四年九月白鳩見演之又為頌表上臣聞貞裕之美介于盛王休瑞之臻罔違哲后故鳴鳯表垂衣之化翔鷦徴解網之仁陛下道德嗣基聖眀纘世教清鳥紀治昌雲官禮漸同川澤浹末徼天嘉眀懿民樂薰風星辰以之炳煥日月以之光華神圖祗緯盈觀閟序白質黑章充牣靈囿應感之符畢臻而因心之祥未屬以素鳩自逺毨翰歸飛資性間淑羽貌鮮麗既聞之先說又親覩嘉祥不勝藻抃上頌一首辭不稽典分乏采章愧不足式昭皇慶崇讃盛美蓋率輿誦備之篇末其頌曰有哲其儀時惟皓鳩性協五教名編素丘殷厯方昌婉翹來逰漢録克韡爰降爰休其一於顯盛宋睿慶遐傳聖皇在上道照鴻軒稱施既平孝思永言人和于地神像于天其二禮樂孔秩靈物咸昭白雀集苞丹鳯棲郊文騶儷跡嘉頴抽苗灼灼縞羽從化馴朝其三豈伊赴林必周之栩豈伊歸義必商之所惟德是依惟仁是處育景陽嶽濯姿帝宇其四刑厯頒興理感迭通雉飛越裳鷺起西雍蒸然戾止實兼斯容一茲民聽穆是王風其五扶令育訟彭城王義康表義康坐劉湛等出鎮豫章前龍驤將軍巴東扶令育詣闕上表收付建康獄賜死蓋聞哲王不逆切㫖之諫以博聞為道人臣不忌殱夷之罰以盡言為忠是故周昌極諫馮唐面折孝惠所以克固儲嗣魏尚所以復任雲中彼二臣豈好逆主干時犯顔違色者哉又袁盎之諫孝文曰淮南王若道遇死則陛下有殺弟之名奈何文帝不用追悔無及臣草莽微臣竊不自揆敢抱葵藿傾陽之心仰慕周易匪躬之志故不逺六千里願言命侶謹貢丹愚希垂察納伏惟陛下躬執大象首出萬物王化咸通三才必理闢大人之路開大道之門搜殊逸于巖穴招竒英于仄陋窮谷無白駒之倡喬嶽無遺寶之嗟豈特羅飛翮于垂天網沉鱗于溟海况于彭城王義康先朝之愛子陛下之次弟哉一旦黜削逺送南服恩絶于內形隔于逺躬離眀主身放聖世草萊黔首皆為陛下痛之臣追惟景平元嘉之釁幾於危殆三公託以興廢之宜密懷不臣之計台輔伺隙于京甸强楚窺窬於上流或顯逆而陵主有生之所惴恐神祇之所忿忌也賴宗社靈長廟算流逺灑滌慶埃殱馘醜類氛霧時靖四門載清當爾之時義康豈不預參皇猷均此休否哉且陛下舊楚形勝非親勿居遂以驃騎之號任以藩夏之重撫政南郢綏民遏冦播皇宋之澤以洽幽荒陛下之潤被之九有豈直南荆之民沾渥而已焉遂召之以輔宰又寄之以和味既居三事又牧徐揚所以幽顯齊歡人神同忭莫不言陛下授之為得義康受之為是也今如何信疑貌之似闕兄弟之恩乎若有迷謬之愆可責之罪正可數之以善惡導之以義方且廬陵王往事足以知今此乃陛下前車之殷鑒後乘之靈龜也夫曽子之不殺忠臣之篤譬二告而猶織仁王之令範故詩云無信人之言人實不信又云兄弟雖鬩不廢親也尚書云克眀峻德以親九族九族既睦可以親百姓兄弟安可棄乎臣伏願陛下上尋往代黜廢之禍下惟近者讒言之釁廬陵王既申寃魂於后土彭城王亦弭疑愆于宋京豈徒皇代當今之計蓋乃良史萬代之美也且諂諛難辨是非易黷福始禍先古人所畏故愛身之士自為已計莫不結舌杜口孰肯冒忌干主哉臣以頑昧獨獻微管所以勤勤懇懇必訴丹誠者實恐義康年窮命盡奄忽于南遂令陛下有棄弟之責臣雖微賤竊為陛下羞之况書言記事史豈能屈典謨而諱哉脫如臣慮陛下恨之何益揚子雲曰獲福之大莫先於和穆遘禍之深莫過於內難每服斯言以為警戒矧今覩王室大事豈得韜筆默爾而已哉臣將恐天下風靡離間是懼遂令宇內遷觀民庶革心欲致康哉實為難也陛下徒云惡枝之宜伐豈悟伐柯之傷樹乃往古之所悲當今所宜改也陛下若蕩以平聽屏此猜情垂訊芻蕘之謀曲察狂瞽之計一發非意之詔逮訪博古之士速召義康返于京甸兄弟協和君臣緝穆息宇內之譏絶多言之路如是則四海之望塞讒說之道消矣何必司徒公揚州牧然後可以安彭城王哉若臣所唘違憲于國為非請即伏誅以謝陛下雖復分形赴鑊煮體烹尸始願所甘豈不幸甚范曄字蔚宗車騎將軍泰少子出繼從伯𢎞之博涉經史善為文章厯左衛將軍太子詹事言彭城王義康奏義康為大將軍被黜鎮豫章曄時為太子詹事魯國孔熙先為員外𣪚騎侍郎久不調素善天文云太祖必以非道晏駕當由骨肉相殘江州應出天子義康當之因引曄外甥謝綜與曄等共相署置謀立義康曄欲探時旨乃言義康于上不納逆謀既定熙先使弟休先為檄文又以徐湛之素為義康所愛因結事湛之告以密計曄乃詐謀以上祖道衡陽南平王日為亂而差互不得發義康與湛之書宣示同黨湛之表上其事悉伏誅元嘉二十二年九月也臣厯觀前史二漢故事諸蕃王政以訞詛幸灾便正大逆之罰况義康奸心舋跡彰著遐邇而至今無恙臣竊惑焉且大梗常存將重階亂骨肉之際人所難言臣受恩深重故冒犯披露詐彭城王義康與丹陽尹徐湛之書吾凡人短才生長富貴任情用已有過不聞與物無恆喜怒違實致使小人多怨士類不歸禍敗已成猶不覺悟退加尋省方知自招刻肌刻骨何所復補然至于盡心奉上誠貫幽顯拳拳謹慎惟恐不及乃可恃寵驕盈實不敢故為欺罔也豈苞藏逆心以招灰滅所以推誠自信不復防護異同率意信心不顧萬物議論遂致讒巧潛構衆惡歸集甲奸險好利負吾事深乙凶愚不齒扇長無賴丙丁趨走小子唯知諂進伺求長短共造虛說致令禍陷骨肉誅戮無辜凡在過釁竟有何徵而刑罰所加同之元惡傷和枉理感徹天地吾雖幽逼日苦命在漏刻義慨之士時有音信每知天文人事及外間物情土崩瓦解必在朝夕是為釁起羣賢濫延國家夙夜憤踊心腹交戰朝之君子及士庶白黑懷義秉理者寧可不識時運之㑹而坐待橫流耶除君側之惡非唯一代况此等狂亂罪孰終古所無加之翦戮易於摧朽耶可以吾意宣示衆賢若能同心奮發族裂逆黨豈非功均創業重造宋室乎但兵凶戰危或致侵濫若有一豪犯順誅及九族處分之要委之羣賢皆當謹奉朝廷動止聞唘往日嫌怨一時豁然然後吾當謝罪北闕就戮有司茍安社稷瞑目無恨勉之勉之宋書獄中與諸甥姪書曄初為尚書吏部郎左遷宣城太守不得志乃刪衆家後漢書為一家之作及既被收于獄中與諸甥姪書以自序沈約云曄自序並實故存之吾狂釁覆滅豈復可言汝等皆當以罪人棄之然平生行已在懷猶應可尋至于能不意中所解汝等或不悉知吾少懶學問晚成人年三十許政始有向耳自爾以來轉為心化推老將至者亦當未巳也往往有微解言乃不能自盡為性不尋注書心氣惡小苦思便憒悶口機又不調利以此無談功至于所通解處皆自得之於胸懷耳文章轉進但才少思難所以每于操筆其所成篇殆無全稱者常耻作文士文患其事盡於形情急于薻義牽其㫖韻移其意雖時有能者大較多不免此纍政可類工巧圖繢竟無得也常謂情志所託故當以意為主以文傳意以意為主則其㫖必見以文傳意則其詞不流然後抽其芬芳振其金石耳此中情性㫖趣千條百品屈曲有成理自謂頗識其數嘗為人言多不能賞意或異故也性别宫商識清濁斯自然也觀古今文人多不全了此處縱有㑹此者不必從根本中來言之皆有實證非為空談年少中謝莊最有其分手筆差易于文不拘韻故也吾思乃無定方特能濟難適輕重所禀之分猶當未盡但多公家之言少於事外逺致以此為恨亦由無意于文名故也本未關史書政恆覺其不可解耳既造後漢轉得統緒詳觀古今著述及評論殆少可意者班氏最有髙名既任情無例不可甲乙辨後贊於理近無所得唯志可推耳博贍不可及之整理未必愧也吾雜傳論皆有精意深㫖既有裁味故約其詞句至于循吏以下及六夷諸序論筆勢縱放實天下之竒作其中合者往往不减過秦篇嘗共比方班氏所作非但不愧之而已欲遍作諸志前漢所有者悉令備雖事不必多且使見文得盡又欲因事就卷內發論以正一代得失意復不果贊自是吾文之傑思殆無一字空設竒變不窮同合異體乃自不知所以稱之此書行故應有賞音者紀傳例為舉其大略耳諸細意甚多自古體大而思精未有此也恐世人不能盡之多貴古賤今所以稱情狂言耳吾於音樂聽功不及自揮但所精非雅聲為可恨然至於一絶處亦復何異耶其中體趣言之不可盡弦外之意虛響之音不知所從而來雖少許處而㫖態無極亦嘗以授人士庶中未有一毫似者此永不傳矣吾書雖小小有意筆勢不快餘竟不成就每愧此名宋書皆洪邁隨筆云宋書謝儼傳范曄所撰十志一託儼搜撰曄敗悉蠟以覆車宋文帝令丹陽史徐湛之就儼尋求已不復得一代以為恨其志今缺曄獄中與諸甥姪書曰既造後漢欲遍作諸志前漢所有者悉令備雖事不必多具使見文得盡又欲因事就卷內發論以正一代得失意復不果此說與儼傳不同然儼傳所云乃范紀第十卷公主注中引之今宋書却無殊不可曉劉昭注補志三十卷至本朝乾興元年判國子監孫奭始奏以􅍯前史之闕和香方序曄撰和香方其序所言悉以比類名士麝本多忌比庾炳之零藿虛燥比何尚之詹唐黏濕比沈演之棗膏昏鈍比羊𤣥保甲煎淺俗比徐湛之甘松蘇合比慧琳道人沈實易和以自比也麝本多忌過分必害沈實易和盈斤無傷零藿虛燥詹唐黏濕甘松蘇合安息鬱金㮈多和羅之屬並被珍於外國無取于中土又棗膏昏鈍甲煎淺俗非唯無助于馨烈乃當彌增於尤疾也雙鶴詩序客有寄余雙鶴者其一揚翰皎潔響逸九皋其一翅折志衰自視缺然余因歎玩之遂為之詩孔休先熙先弟置檄在先故此詐為徐湛之檄征鎮文揚州刺史徐湛之告四方王公守宰夫休否相乘天道無常狂狡肆逆眀哲是殛故小白有一匡之勛重耳有翼戴之德自景平肇始皇室多故大行皇帝天誕英姿聰眀睿武拔自藩國嗣位統天憂勞萬機垂心庶務是以邦內安逸四海同風而頃年以來奸豎亂政刑罰乖淫隂陽違舛致使釁起蕭墻危禍萃集賊臣趙伯符積怨含毒遂縱凶醜肆兵犯蹕禍流儲二崇樹非所傾墜皇基罪百浞豷過于𤣥莽開闢以來未聞斯比率土叩心華夷泣血咸懷亡身之誠同思糜軀之報湛之曄與行中領軍蕭思話行護軍將軍臧質行左衛將軍孔熙先建威將軍孔休先忠貫白日誠著幽顯義痛其心事傷其目投命奮戈萬殞莫顧即日斬伯符首及其黨與雖豺狼即戮王道惟新而普天無統羣蒙靡係彭城王體自髙祖聖眀在躬德格天地勛溢區宇世路威夷勿用南服龍潛鳯棲于茲六稔蒼生飢德億兆渴化豈惟東征有鴟梟之歌陜西有勿剪之歎而已哉靈祇告徵祥之應䜟記表帝王之符上愜天心下合人望正位辰極非王而誰今遣行護軍將軍臧質等齎皇帝璽綬星馳奉迎百官備禮駱驛繼進並命羣師鎮戍常若干撓義徒有犯無貸昔年使反湛之奉賜手敕逆誡禍亂預覩斯萌今宣示朝賢共拯危溺若無斷謀事失於後機遂使聖躬濫酷大變奄集哀恨崩裂撫心摧梗不知何地可以厝身輒督勵尫頓死而後己孔熙先魯郡魯人默之子默之為廣州刺史坐臧彭城王保免熙先密懷報因成逆謀獄中上文帝書所陳並天文占候䜟上有骨肉相殘之禍其言深切囚小人猖狂識無逺概徒徇意氣之小感不料逆順之大方與第二弟休先首為奸謀干犯國憲膾脯醢無補尤戾陛下大眀含𢎞量苞天海録其一介之節猥垂優逮之詔恩非望始沒有遺榮終古以來未有斯比夫盜馬絶纓之臣懷璧投書之士其行至賤其過至微由識不世之恩以盡軀命之報卒能立功齊魏致勛秦楚囚雖身陷禍逆名節俱喪然少也慷慨竊慕烈士之遺風但墜崕之木事絶升躋覆盎之水理乖收汲方當身膏鈇鉞詒誡方來若使魂而有靈結草無逺然區區丹抱不負夙心貪及視息少得申暢自惟性愛羣書心解數術智之所周力之所至莫不窮攬究其幽微考論既往誠多審驗謹略陳所知條牒如故别狀願且勿遺棄存之中書若囚死之後或可追存庶九泉之下少塞釁責徐湛之字孝源東海剡人司徒羡之兄孫厯尚書僕射元凶劭弒逆併見殺上言范曄謀逆表臣與范曄本無素舊中忝門下與之鄰省屢來見就故漸成周旋比年以來意態轉見傾動險忌富貴情深自謂任遇未髙遂生怨望非唯攻伐朝士譏謗聖時乃上議朝廷下及藩輔驅扇同異恣口肆心如此之事已具上簡近員外𣪚騎侍郎孔熙先忽令大將軍府吏仲承祖騰曄及謝綜等意欲收合不逞規有所建以臣昔蒙義康接盼又去嵗羣小為臣妄生風塵謂必嫌懼深見勸誘兼云人情樂亂機不可失䜟緯天文並有徵驗曄尋自來復具陳此并說臣論議轉惡全身為難即以唘聞被敕使相酬引究其情狀于是悉出檄書選事及同惡人名手墨翰跡謹封上呈凶悖之甚古今罕比由臣暗于交士聞此逆謀臨唘震惶荒情無措文帝詔報湛之表如此良可駭惋曄素無行檢少負瑕釁但以才藝可施故收其所長頻加榮爵遂參清顯而險利之性有過溪壑不識恩遇猶懷怨憤每存容養冀能悛革不謂同惡相濟狂悖至此便可收掩依法窮詰自理表范曄等謀逆湛之始與之同後發其事所陳多不盡為曄等欵辭所連詣廷尉歸罪上慰遣之湛之復上表優詔不許賊臣范曄孔熙先等連結謀逆法靜尼宣分往還與大將軍臣義康共相脣齒備於鞠對伏尋仲承祖始達熙先等意便極言姦狀而臣兒女近情不識大體上聞之初不務指斥紙翰所載尤復漫略者實以凶計既表逆事歸露又仰緣聖慈不欲窮盡故言勢依違未敢縷陳情㫖無隱已昭天鍳及羣凶收禽各有所例曄等口辭多見誣謗承祖醜言紛紜特甚乃云臣與義康宿有密契在省之言期以為定潛通奸意報示天文末云熙先縣指必同以誑於曄或以智勇見稱或以愚懦為目既美其信懷可覆復駭其動止必唘凡諸詭妄還自違伐多舉事端不究源統齎傳之信無有主名所徵之人又已死沒首尾乖互自為矛楯即臣誘引之辭以為始謀之證銜臣糾告並見怨咎縱肆狂言必見禍陷伏自探省亦復有由昔義康南出之始敕臣入相伴慰晨夕覲對經踰旬日逆圖成謀雖無顯然懟容異意頗形言㫖遺臣利刃期以際㑹臣苦加諫譬深加距塞以為怨憤所至不足為慮便以關唘懼成虛妄思量反復實經愚心非為納受曲相蔽匿又令申情范曄釋中間之憾致懷蕭思話恨婚意未申謂此僥幸亦不宣達陛下敦惜天倫彰于四海藩禁優簡親理咸通又昔蒙眷顧不容自絶音翰信命時相往來或言少意多㫖深文淺辭色之間往往難測臣每懼異聞皆略而不答惟心無邪悖故不稍以自嫌慺慺丹實具如此唘至于法靜所傳及熙先等謀知實不早見關之日便即以聞雖晨光幽燭曲昭窮欵裁以正義無所逃刑束骸北闕請罪司冦乾施含宥未加治考中㫖頻降制使還往仰荷恩私哀惶失守臣殃積罪深丁罹酷罰久應屏棄永謝人理况奸謀所染忠孝頓闕智防愚淺暗於禍萌士類未眀其心群庶謂之同惡朝野側目衆議沸騰専信讐隙之辭不復稍相申體臣雖駑下情非木石豈不知醜㸃難嬰伏劍為易而靦然視息忍此餘生實非茍吝微命假延漏刻誠以負戾灰滅貽惡方來貪及視息少自披訴冀幽誠丹欵倘或昭然雖復身膏草土九泉無恨顯居官次垢穢朝班厚顔何地可以自處乞䝉隳放伏待鈇鑕翠龜表初學記句容縣人獲龜一頭體被翠毫騰路飛集孟靈休昶之子􅊞臨汝公官祕書監與何勗書雍穆之之孫嗣封南康郡公嗜食瘡痂以為味似鰒魚嘗詣靈休靈休先患疚瘡瘡痂落床上因取食之靈休大驚答曰性之所嗜靈休瘡痂未落者悉褫取以飴雍雍既去靈休與勗書南昌國史二百許人遞互與鞭瘡痂常以給膳劉雍向顧見噉遂舉體流血宋書何勗無忌子􅊞封安成公官侍中與江夏王義恭箋義恭性愛古物常遍就朝士求之侍中何勗已有所送而王徴索不已何甚不平出行于道遇狗枷敗犢鼻乃命左右取之還以箱擎送之箋曰承復須古物今奉秦李斯狗枷漢相如犢鼻謝綽宋拾遺録何長瑜東海人謝靈運既東與長瑜及族弟惠連頴川荀雍太山羊璿之等以文章賞㑹謂之四友寄宗人何勗書臨川王義慶招集文士長瑜自國侍郎至平西記室參軍嘗於江陵寄書與勗以韻語叙義慶州府僚佐如此者五六句而輕薄少年遂演之凡人士並為題目皆加劇言苦句其文流行義慶大怒白文帝除廣州所統曽城令及廬陵王紹鎮尋陽以為南中郎行參軍掌書記之任行至板橋遇暴風溺死陸展染白髮欲以媚側室青青不解久星星行復出宋書應展為臧質長史及質反從誅何尚之上言得免孔覬字思逺㑹稽山隂人歷輔國將軍行㑹稽郡事從東師起兵敗見殺辭衡陽王義季箋覬少有風力好讀書歷義季安西主簿戶曹參軍嶺南義陽太守轉署記室奉箋固辭義季不能奪遂得免記室之局實惟華要自非文行秀敏莫或居之覬遜業之舉無聞於鄉部惰遊之貶有編於疲農直山淵藏引用不遐棄故得抃風儛潤慿附彌年今日之命非所敢冒昔之學優藝富猶尚斯難况覬能薄質魯亦何容易覬聞居方辨物君人所以官才陳力就列自下所以奉上覬雖不敏常服斯言今寵籍惟舊舉非尚德恐無以提衡一隅僉允視聽者也伏願天眀照其心請乞改今局授以間曹則鳬鶴從方所憂去矣又夫以記室之要宜須通才敏忠加性情勤密者覬學不綜貫性又疏惰何可以屬知祕記秉筆文閨假吹之尤方斯非濫覬少淪常檢本無逺植榮進之願何能忘懷若實有螢爝增輝光景固其騰聲之日飛藻之辰也豈敢自求從容保其淡逸伏願矜其魯拙業之有地則曲成之施終始優渥並宋書劉興祖伐河北議元嘉二十九年太祖更遣將張永王𤣥謨等伐魏青州刺史劉興祖建議伐河北上意止存河南不伐納𤣥謨攻碻磝不剋退還河南阻饑野無所掠脫意外固守非旬月可拔稽留大衆轉輸方勞伐罪弔民事存急速今僞帥始死兼逼暑時國內猜擾不暇逺赴關內之衆裁足自守愚謂宜長驅中山據其關要冀州已北民人尚豐兼麥已向熟資因為易向義之徒必應響赴若中州震動黃河以南自當消潰臣城守之外可有三千人今更發三千兵假别駕崔勛之振威將軍領所發隊并二州望族從蓋栁津直衝中山申垣率厯城之衆可有二千駱驛俱進較略二軍可七千許人既入其心腹調租發車以充軍用若前驅乘勝張永及河南衆軍便宜一時濟河使聲實兼舉愚計謬允宜並建司牧撫柔初附定州刺史取大嶺冀州刺史向井陘并州刺史屯鴈門幽州刺史塞軍都相州刺史備大行因事指麾隨宜加授畏威欣寵人百其懷濟河之日請大統版假常忿將率憚於深逺勛之等慷慨之誠誓必死效若能成功清一可待若不剋捷不為大傷並催促裝束伏聽敕㫖劉亥之北征上計元嘉起居注以今月十二日入泗口緣道挹沙開溝以夜繼日日才行十餘里或七八里劉楨御史中丞糾廣州刺史韋郎奏元嘉起居注風聞前廣州刺史韋郎蒞任虐法暴濁實彰於州於廣州所造鏤銀鉿二枚朱牙楯三十幡朱畫青綾盾三十五幡犀白鎧六領白席三百二十領銀塗漆屏風二十三牀又緑沉屏風一牀請以見事追免郎前所居官袁璠論荀萬秋唘元嘉起居注領曹郎中荀萬秋每設事緣私逰肆其所之豈可復參列士林編名天閣請免萬秋所居官袁淑字陽源陳郡陽夏人厯太子左衛率元凶謀弒不從被殺謝中丞章太平御覽竊惟此職昭贊實預損益必須兼缺威正刺骨窮文使權家勛族不敢藉强而侮物戚門右姓不得稱雄以掩衆昔傅咸缺治臣僚戢懼孫寶移疾卿尹皆怠禦敵議淑元嘉末為御史中丞時魏人南侵至瓜步太祖使百官議防禦之術淑上議臣聞函車之獸離山必斃絶波之鱗宕流則枯羯冦遺醜趨致畿甸蟻萃螽集聞已崩殪天險巖曠地限深遐故全魏戢其圖盛晋輟其議情屈力殫氣挫勇竭諒不虞於來臨本無怵于能濟矣乃者燮定擕逺阻違授律由將有㢮拙故士少鬬志圍潰之衆匪冦傾淪攻制之師空自班𣪚濟西徑騎急戰蹴旅淮上訓卒簡備靡旗是由綏整寡衷戎昭多昧遂使栲潞入患泉伊來擾紛殄姬風泯毒禹績騰書有渭隂之迫懸鋒均咸陽之警然而切揣虛實伏匿先彰校索伎能譎詭既顯綿地千里彌行阻深表裡躓硋後先介逼捨陵衍之習競湍沙之利今虹見萍生土膏泉動津陸陷溢痁禍洊興芻藁已單米粟莫係水㝢襟帶進必傾霣河溢扁固退亦隳滅所謂栖烏于烈火之上養魚於叢棘之中或謂損緩江右寬繕淮內竊謂拯扼閩城舊史為允棄逺凉土前言稱非限此要荒猶弗委割况聨被京國咫尺神甸數州摧歸列邑殱痍山淵反覆草木塗地今丘賦千乘井笇萬集肩摩倍於長安締袂百于臨淄什一而籍實慊民願履畝以稅既洽農和户兢戰心人含鋭志皆欲贏糧請奮釋緯乘城謂宜懸金鑄印要壯果之士重幣甘辭招推決之將舉薦板築之下抽登臺皂之間賞之以焚書報之以相爵俄而昭才賀闕異能間至戎貪而無謀肆而不整迷乎向背之次謬於合𣪚之宜犯軍志之極害觸兵家之甚諱咸畜憤矣僉策戰矣稱願影從謡言緍命宜選敢悍數千騖行潛掩偃旗褁甲鉗馬銜枚㑹稽而起晨壓未陳旌譟亂舉火鼓四臨使景不暇移塵不及起無不禽鎩獸讋冰解霧𣪚掃洗哨類漂鹵浮山如有決罦漏網逡窠逗穴命淮汝戈船遏其還徑兖部徑卒梗其歸塗必翦元雄懸首麾下乃將隻輪不返戰䡺無旋矣于是信臣騰威武士繕力緹組接隂鞞柝聨響若其僞遁嬴張出沒無際楚言漢斾顯默如神固已日月蔽虧川谷蕩貿負塞殘孽阻山燼黨收險竊命慿城借土則當因威席卷乘機芟剿泗汴秀士星流電燭徐阜嚴兵雨湊雲集蹶亂桑溪之北搖潰瀚海以南絶其心根勿使能植銜索之枯幾何不蠧是由涸澤而漁焚林而狩若浚風之儛輕籜杲日之拂浮霜既而尉洽荷掠之餘望弔網悲之鬼然後天行樞運猋舉煙升青蓋西巡翠華東幸經唘州野滌一軫策俾髙闕再勒燕然後銘方乃奠山沉河創禮輯䇿闡耀炎昊之遺則貫軼商夏之舊文今衆賈拳勇而將術踈怯意者稔泰日積承平嵗久邑無驚赴之急家緩餽戰之勤闕閲訓之禮簡參屬之飾且亦薦採之法庸未蔇歟若乃邦造里選攉論深切躬擐盡幽斬帶尋逺設有沉眀能照俊偉自宣誠感泉雨流通金石氣懾飛賁知窮苴起審邪正順逆之數達昏眀損益之宜能揆合民心愚睿物性登丹墀而敷䇿躡青蒲而揚謀上說辰鑒下弭素言足以安民紓國救灾恤患則宜拔過寵貴之上褒升戚舊之右别其旗章榮其班祿出得専譽使不禀命降席折節同廣武之請設壇致禮均淮隂之授必有要盟之功竊符之捷夷裔暴狠內外侮棄始附之衆分茷無序蠱以威利勢必擕離首順之徒靡然自及今淶繹故典瀍土纓緌翦焉幽播折首凶狡是猶眇者願眀痿之思步動商遄㑹功終易感劫晋在于善覘全鄭實寄良諜多縱反間汨惑心耳發險易之前抵興喪之術衝其猜伏拂其嫌嗜汨以連率之貴餌以析壤之資罄筆端之用展辭鋒之鋭振辨則堅圍可解馳羽而巗邑易傾必府鬲土崩枝幹瓦裂故燕樂相悔項范交疑矣或乃言約功深事邇廣應齊圉反駕趙養還君盡輿誦之道畢能事之效臣幸得出內層禁遊心眀代澤與身泰恩隨年行無以逢迎昌運潤飾鴻法今塗有遺鏃蠆未息蜂敢思凉識少酬閎施但坐幕既乏昭文免胄不能致果竊觀都護之邊論屬國之兵謨終朝之抗辭杜耿之言事咸云及經之棘猶闕上笇燭郛之敬裁收下策自恥懦木智不綜微敢露昧見無會昭採與始興王濬書濬嘗送錢三萬餉淑一宿復遣追取謂使人謬誤欲以戲淑淑與濬書袁司直之視館敢寓書於上國之宫尹日者猥枉泉賦降委弊邑弊邑敬事是遑無或違二懼非郊贈之禮覲饗之資不虞君王惠之于是也是有懵焉弗圖旦夕發咫尺之記籍左右而請以為胥授失㫖爰速先幣曽是附庸臣委末學孤聞者如之何勿疑且亦聞之前志曰七年之中一與一奪義士猶或非之况密邇旬次何其裒益之亟也藉恐二三諸侯有以觀大國之政是用敢布心腹弊室弱生砥節清廉好是潔直以不邪之故而貧聞天下寧有昧夫嗟金者哉不腆供賦束馬先璧以俟命惟執事所以圖之與何尚之書尚之為尚書令領太子詹事致仕于方山著退居賦以眀所守而議者咸謂尚之不能固志淑為太子左衛率與尚之書詔書敦勸尚之復攝職昨遣修問承丈人已晦志山田雖曰年禮宜遵亦事難斯貴俾踈班邴魏通美于前策龔貢山衛淪慚乎曩篇規逮休告雪滌素懷冀尋幽之歡畢缺𤣥之適但淑逸操偏迥野性瞢滯果滋冲寂必沈樂忘歸然而已議塗聞者謂丈人徽眀未耗譽業方籍儻能屈事康道降節殉務舍南瀕之操淑此行求决矣望眷有積約日無誤宋書側尚之宅在南澗寺故云南瀕弔古文賈誼發憤於湘江長卿愁悉於園邑彥真因文以悲出伯喈衒史而求入文舉疏誕以殃速德祖精密而禍及夫然不患思之貧無苦識之淺士以伐能見斥女以驕色貽遣以往古為鏡鑒以未來為針艾書余言于子紳亦何勞乎蓍蔡雞九錫文下並袁淑俳諧集維神雀元年嵗在辛酉八月己酉朔十三日丁酉帝顓頊遣征西大將軍下雉公王鳯西中郎將白門侯扁鵲咨爾浚雞山子維君天姿英茂乘機晨鳴雖風雨之如晦抗不已之竒聲今以君為使持節金西蠻校尉西河太守以揚州之㑹稽封爾為㑹稽公以前浚雞山子為湯沐邑君其祇承豫命使西海之水如帶浚雞之山如礪國以永存爰及苗裔賀表浚山侍郎丁鴻舍人鳬亭男梁鴻郎中蘇鵠死罪伏惟君德著朝野勛加鵷鷟故天王鳯皇特錫位封今鳯鵲等在柏外願時拜受不勝欣豫之情謹詣栖下以聞廬山公九錫文若乃三軍陸邁糧運艱難謀臣停算武夫吟歎爾乃長鳴上黨慷慨應官﨑嶇千里荷囊致餐用捷大勛歷世不刋斯實爾之功者也音隨時興晨夜不默仰契𤣥象俯協漏刻應更長鳴毫分不忒雖挈壺著稱未足比德斯又爾之智也若乃六合昏晦三辰幽冥猶憶天時用不廢聲斯又爾之眀也青脊絳身長頭廣額修尾後垂巨耳雙磔斯又爾之相也嘉麥既熟實須精麵負荷回衡迅若轉電惠我衆庶神祇獲薦斯又爾之能也爾有濟師旅之勛而加之以衆能是用遣中大夫閭丘騾加爾使銜勒大鳴鴻臚班腳大將軍宫亭侯以揚州之廬江江州之廬陵吳國之桐廬合浦之珠廬封爾為廬山公大蘭王九錫文大亥十年九月乙亥朔十三日丁亥北燕伯使使者豪豨册命大蘭王曰咨惟君禀太隂之沈精標羣形於𤣥質體肥腯而洪茂長無心以逰逸資豢養於人主雖無爵而有秩此君之純也君昔封國殷商號曰豕氏葉隆當時名垂于世此君之美也白蹢彰於周詩涉波應乎隆象歌詠出于人口經千載而流響此君之德也君相與野逰唯君為雄顧羣數百自西徂東俯噴沫則成霧仰奮鬛則生風猛毒必噬有敵必攻長驅直突陳無全鋒此君之勇也常山王九錫文及至圖身失所羈束人門馴纓服制惟意所牽登楹而遨抱梁而眠拾托遺餘恣口所便逰新亭曲水詩序太平御覽離榭修幕陵隧彌阜鑣容斾綵裛野麗雲宗炳字少文南陽涅陽人有隱操纍加徴辟不應元嘉二十年終于江陵師子擊象圖序初學記梁伯玉說沙門釋僧吉云嘗從天竺欲向大秦其間忽聞數十里外哮哮攬攬驚天怖地頃之但見百獸率走蹌地足絶而四巨象俄焉而至以鼻卷泥自厚塗數尺數數噴鼻隅立俄有師子三頭崩石析木直搏四象以殪盤石血若溢泉巨樹草偃俄御覽作虓盤作崩若溢作溢若甘頌煌煌嘉實磊如景星南金其色隋珠其形御覽作厥形畫山水序炳善書畫好山水西陟荆巫南登衡嶽凡所逰厯皆圖于壁坐卧向之嘗自為畫山水序聖人含道應物賢者澄懷味象至于山水質有而趣靈是以軒轅堯孔廣成大㟴許由孤竹之流必有崆峒具茨藐姑箕首大蒙之逰焉又稱仁智之樂焉夫聖人以神法道而賢者通山水以形媚道而仁者樂不亦幾乎余眷戀廬衡契闊荆巫不知老之將至愧不能凝氣怡身傷跕石門之流于是畫象布色構兹雲嶺夫理絶于中古之上者可意求於千載之下㫖微于言象之外者可心取于書策之內况乎身所盤桓目所綢繆以形寫形以色貌色也且夫崑崘山之大瞳子之小迫目以寸則其形莫覩迥以數里則可圍于寸眸誠由去之稍闊則其見彌小今張綃素以逺映則崑閬之形可圍于方寸之內竪劃三寸當千仞之髙橫墨數尺體百里之迥是以觀畫圖者徒患類之不巧不以制小而纍其似此自然之勢如是則嵩華之秀𤣥牝之靈皆可得之于一圖矣夫以應目㑹心為理者類之成巧則目亦同應心亦俱㑹應㑹感神神超理得雖復虛求幽巖何以加焉又神本亡端栖形感類理入影迹誠能妙寫亦誠盡矣于是閒居理氣拂觴鳴琴披圖幽對坐究四荒不違天勵之藂獨應無人之野峰岫嶤嶷雲林森渺聖賢映于絶代萬趣融其神思余復何為哉暢神而已神之所暢孰有先焉宗炳别傳張彥逺厯代名畫記引載之雷次宗字仲倫豫章南昌人隱居廬山元嘉末徴詣京邑為築招隱館于鍾山西巖下使為皇太子諸王講經卒于鍾山與子姪書次宗少入廬山事釋慧逺篤志好學隱退不交世務本州辟從事員外散騎侍郎徴並不就與子姪書以言所志夫生之修短咸有定分定分之外不可以智力求但當于所禀之中順而勿率耳吾少嬰羸患事鍾養疾為性好閒志棲物表故雖在童稚之年已懷逺迹之意暨于弱冠遂託業廬山逮事釋和尚於時師友淵源務訓𢎞道外慕等夷內懷悱發于是洗氣神眀玩心墳典勉志勤躬夜以繼日爰有山水之好悟言之歡實足以通理輔性成夫亹亹之業樂以忘憂不知朝日之晏矣自逰道餐風二十餘載淵匠既傾良朋凋索續以釁逆違天僃嘗荼蓼疇昔誠願頓盡一朝心慮荒散情意衰損故遂與汝曹歸耕壟畔山居谷飲人理久絶日月不處忽復十年犬馬之齒已踰知命崦嵫將迫前塗幾何實逺想尚子五嶽之舉近謝居室瑣瑣之勤及今耄未至惛衰不及頓尚可厲志于所期縱心于所託棲誠來生之津梁専氣莫年之攝養玩嵗日于良辰偷餘樂於將除在心所期盡于此矣汝等年各成長冠娶已畢修惜衡泌吾復何憂但願守全所志以保令終耳自今已往家事大小一勿見關子平之言可以為法宋書宋文紀卷十三
