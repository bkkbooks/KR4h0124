body:
  text: 宋文紀巻十四明梅鼎祚編蕭思話南蘭陵人孝懿皇后弟子歴鎮西將軍郢州刺史奉世祖牋元凶弑立以思話爲徐兖二州刺史思話即率部曲還彭城起義以應世祖遣使奉牋下官近在厯下始奉國諱所承使人不知闊狹既還在路漸有所聞猶謂人倫無容有此私懷感慨未敢在言奉被今教果出慮表重增哀惋不能自勝此實天地所不覆載人神所不容忍率土民氓莫不憤咽况下官蒙荷榮渥義兼常志此月五日被驛使追命騎還朝切齒拊心輒已鍾疾雖百口在都一非所顧正欲遣啟受規略㑹奉今㫖悲懼兼情伏承司徒英圖電發殿下神武霜斷臧質忠義並到不謀同時仗順沿流席卷江甸前驅風邁已應在近下官復練始集遣輔國將軍申坦龍驤將軍梁坦二軍分配精甲五千申坦爲統便以即日水陸齊下下官悉率文武駱驛繼發憑威策懦勢同振朽開泰有期悲欣交集蕭惠開南蘭陵人思話子歴益寧二州刺史少府南郡太守未拜卒上解職表惠開孝建元年自太子中庶子轉黃門侍郎與侍中何偃爭事偃親遇甚隆使門下推彈之惠開上表解職由是忤㫖别敕以屬疾多免官陛下未照臣愚故引參近侍臣以職事非長故委能何偃凡諸當不敢參議竊見積射將軍徐沖之爲偃命所黜臣愚懷謂有可申故聊設微異偃恃恩使貴欲使人靡二情便訶脅主者手定文案割落臣議專載已辭雖天照廣臨竟未見察臣理違顔咫尺致兹壅濫則臣之受劾蓋何足悲但不順待中臣有其咎當而行之不知何過且議之不允未有彈科省心揆天了知在宥臣不能謝愆右職改意重臣刺骨鑠金將在朝夕乞解所忝保拙松庭柳元景字孝仁河東解人厯侍中尚書令南豫州刺史爲前廢帝所殺南史作字叔仁誤元景弟叔仁與朝士書元景除寧朔將軍京兆廣平二郡太守於樊城立府舍世祖入討元凶以爲諮議參軍領中兵加冠軍將軍配萬人爲前鋒宗慤薛安都等十三軍皆𨽻焉元景與朝士書國禍寃深凶人肆逆民神崩憤若無天地南中郎親率義師以討元惡司徒臧冠軍並同大舉舳艫千里購賞之利備之元景不武忝任行間總勒精勇先鋒道路勢乗上流衆兼百倍諸賢弈世忠義身爲國良皆受遇先朝荷榮日久而拘逼冦廷莫由申効想聞今問悲慶兼常大行届道廓清惟始企遲面對展雪哀情宋書爲世祖時南中郎將江州刺史臧冠軍質宣告討臧質檄書質奉南郡王義宣舉兵東下世祖遣撫軍將軍柳元景統王𤣥謨等屯梁山元景檄書宣告夫革道應運基命之洪符嗣業興邦紹厯之明算自非瑞積神衷德充民極孰能升臨寳位景屬天居大宋啟期理髙中世皇根帝業永流無疆夷陂遞來遘兹凶難國禍寃深人綱鬱滅主上聖略聰武孝感通神義變草木哀動精緯躬近南郊親掃大逆道援横流徳模靈造三光重照七廟載興臧質少負疵釁衣冠不齒昧利誣天著於觸事受任述職不以宣効爲心專方莅民惟以侵剥爲務官自賄至族以貨傾是以康周陀覆命屠宗寃達蒼昊郭伯西門遺出自皂𨽻寵越州朝往莅東土鬻爵三千率卒西討竊俘取黜荷恩彭泗貪虐以逞坑戮邊氓忽若草芥傾竭倉庾割没軍糧作牧漢南公盜府蓄矯易文簿專行欺妄及受命北伐憚役緩期師出有辰顧懷私愛匹馬棄衆宵行獨返遂復擕嬪擁姬淫宴軍幕孔范之變顯於逆辭凡此諸釁皆彰著於憲簡振曝於觀聽去歳義舉雖豫誠欵而淹留西楚私相崇戴奉書致命形於心迹新亭之捷大難已夷凶命假存懸在晷刻廣莫之軍曾無遺矢重關自開僞衆已潰質猶復盤桓衢巷後騎陳師勞不足甄定於朝議虗張功伐扇動怨辭自謂斯舉勲莫已若初踐殿守忘犬馬之情奔趣帑藏頓傾天府山海𢎞量包荒藏疾録其一介之心掩其不逞之釁遂爵首元等職班盛級優榮溢寵莫與爲疇自恣醜薄罔知涯涘干謁陳聞曽無紀極請樂窮太子之英求器盡官府之選徐司空匪躬王室遭罹凶禍質與之少長親交兼常曽無撫孤之仁惟聞陵侮之酷尺田寸寳靡有孑遺及受命南徂臨路滋甚逼奪妻嬪略市金帛怨動京邑醜聞都鄙棄逐舊故委蔑忠勤魯尚期尹周之徒心腹所倚注訴於御筵袁同連子敬之儔爪牙所杖一逝而不反雖上㫖頻煩屢求勞牒質但稱伐在已不逮僚𨽻託咎朝廷歸罪有司國士解心有識莫附何文敬趨走厮養天性愚狡質迷其姦諂寘懷委仗遂外擅威刑内遊房室質生與釁俱不可詳䆒擢髮數罪曽何足言丞相威重位尊任居分陜宗國倚賴實兼恒情而不及謙冲之塗弗見逆順之訓蔽同郤至理乖范爕遂乃逺忽世祀近受欺遘仗納姦疏還謀社稷日者宴安上流坐觀成敗示遣疲卒衆裁三千戎馬不供軍糧靡獻皇朝直以親秩之重酬寵兼極近漸别子禮越常均茍識無所守功弗由已必爲義不全終于敗德今兹放命恨心于本推諸昔嵗迹是誠非矣且國家夷險情事異常豫是臣子孰不星赴而玩冦忘哀曽無奔拽面蕃十稔惠政蔑聞重贓深掠縱慾已甚姬妾百房尼僧千計敗道傷俗悖亂人神民怨盈塗國謗彌嵗又賊劭未禽凶嵗猶彊將毁其私墳戮其諸子圖成駭機垂賴義舉捷期云速不日告平釋怨毒之心解倒懸之急論恩叙德造育爲重援人自助棄人快讒怙亂疑功未聞其比僕以不肖過䝉榮私荷佩升越光絶倫伍家本北邊志存慷慨常甘投生以狥艱棘惟恩思難激氣衝襟故以眺三湘而永慨望九江而遐憤若使身死國康誓在隕命况仰稟聖略俯鞠義徒萬全之形愚夫所照夫薛竟陵控率突騎陸道歩馳檀右衛申右率垣游擊整勒鋭師飛輪構路王豫州方舟繕甲久已前驅僕訓卒利兵凌波電進沈鎮軍蕭安南接舳連旌首尾風合驃騎竟陵王懿親令譽聞望攸歸大司馬江夏王道略明逺徽猷茂世並旄鉞臨塗雲驅齊引羣兵競邁秘駕徐啟八鑾揺響五車舒斾千乗雷動萬軸雲囘騰威發號星流漢轉以上臨下易於轉員加以三謀協從七緯告慶幽顯同心昭然易覩諸軍或世荷恩幸或身聞教義當知君臣大節誓不可犯冠屨至誨難用倒置履安奉順聲泰事全孰與附逆居危身害名醜慈親垂白受戮弱子嬰孩就誅所以有詔遲回未震雷霆者正爲諸君身拘冦手或懷乃心吉凶由人無謂爲逺今而不變後悔何及受檄之日心馳賊庭謝莊字希逸陳郡陽夏人厯中書令散騎常侍與世祖啟事元凶弑立莊轉司徒左長史世祖入討宻送檄書與莊令加改治宣布莊遣腹心門生具慶奉啟事宻詣世祖賊劭自絶於天裂冠毁冕窮弑極逆開闢未聞四海泣血幽明同憤奉三月二十七日檄聖迹昭然伏讀感慶天祚王室叡哲重光殿下文明在嶽神武居陜肅將乾威龔行天罰滌社稷之仇雪華夷之耻使弛墜之構更獲締造垢辱之甿復得明目伏承所命柳元景司馬文恭宗慤沈慶之等精甲十萬已次近道殿下親董鋭旅授律繼進荆鄢之師岷漢之衆舳艫萬里旌斾虧天九土冥符羣后畢㑹今獨夫醜類曽不盈旅自相暴殄省闥横流百僚屏氣道路以目檄至輒布之京邑朝野同欣里頌塗歌室家相慶莫不望景聳魂瞻雲佇足先帝以日月之光照臨區㝢風澤所漸無幽不洽况下官世荷寵靈叨恩踰量謝病私門幸免虎口雖志在投報其路無由今大軍近次永清無逺欣悲踊躍不知所裁與大司馬江夏王義恭牋莊拜吏部尚書素多疾不願居選部與義恭牋後坐辭疾多免官下官凡人非有達槩異識俗外之志實因羸疾常恐奄忽故少來無意于人間豈當有心於崇達耶頃年乗亊囘薄遂果饕非次既足貽誚明時又亦取愧朝友前以聖道初開未遑引退及此諸夏事寧方陳微請欵志未伸仍荷今授被恩之始具披寸心非惟在已知尤實懼塵穢彞序稟生多病天下所悉兩脅癖疾殆與生俱一月發動不减兩三每至一惡痛來逼心氣餘如綖利患數年遂成痼疾吸吸惙惙常如行尸恒居死病而不復道者豈是病痊直以荷恩深重思答殊施牽課尫瘵以綜所忝眼患五月來便不復得夜坐恒閉帷避風日晝夜惽懵爲此不復得朝謁諸王慶弔親舊唯被敇見不容停耳此叚不堪見賔已數十日持此苦生而使銓綜九流應對無方之訴實由聖慈罔已然當之信自苦劇若才堪事任而體氣休健承寵異之遇處自效之塗豈茍欲思閒辭事耶家素貧弊宅舍未立兒息不免麤糲而安之若命寧復是能忘微禄正以復有切于此處故無復他願耳今之所希唯在小閑下官微命於天下至輕在巳不能不重屢經披請未蒙哀恕良由誠淺辭訥不足上感家世無年亡髙祖四十曽祖三十二亡祖四十七下官新嵗便三十五加以疾患如此當復幾時見聖世就其中煎憹若此實在可矜前時曽啟願三吳敇㫖云都不須復議外出莫非過恩然亦是下官生運不應見一閑逸今不敢復言此當付之來生耳但得保餘年無復物務少得養痾此便是志願永畢在衡門下有所懷動止必聞亦無假居職患於不能裨補萬一耳識淺才常羸疾如此孤負主上擢授之恩私心實自哀愧入年便當更申前請以死自固但庸近所訴恐未能仰徹公恩盼𢎞深粗照誠懇願侍坐言次賜垂拯助則苦誠至心庻獲哀允若不蒙降祐下官當於何希冀耶仰慿愍察願不垂恡宋書作癖疾南史作癖疢恒閉帷避風日恒閉帷避風朝謁作朝修今之所希惟在小間作今之所止惟在小閤拯作接爲朝士與袁顗書藝文類聚云謝莊夫夷陂相因興革遞數或多難而固其國或殷憂而啟聖明此既著於前史亦彰於聞見王室不造昏凶肆虐神鼎將淪宗稷幾泯幸天未亡宋乾厯有歸主上體自聖文繼明作睿而辱均牖里屯踰夏臺既天地俱憤義勇同奮尅殄鯨鯢三靈更造應天順民爰集寳命四海屬息肩之歡華戎見來蘇之泰吾等獲免刀鋸僅全首領復身奉惟新命承亨運緩帶談笑擊壤聖世汝雖劬勞于外跡阻京師然心期所寄江漢何逺自九江告變皆謂鄧氏狂惑比日國言籍籍頗塵吾子道路之議豈其或然聞此之日能無駭惋凶人反道敗德日夜滋深眤近狡慝取謀豺虎非惟毒流外物惡積中朝乃欲毁陵邑虐崇憲燒宗廟鹵御物然後蕩覆京都必使蘭蕕俱盡自非聖主廟算靈圖俛眉遜避維持内外擁衛臣下則赤縣爲戎百姓其魚矣此事此理寧可熟念既天道輔順謳歌有奉高祖之孫文皇之子德洞九幽功貫三曜匡拯家國提毓黔首若不子民南面將使神器何歸而羣下構慝妄生窺覬成軫惑燕貫髙亂趙讒人罔極自古有之汝中京冠冕儒雅世襲多見前載縣鑒忠邪何逺遺郎中之清軌近忘太尉之純槩相與或羣從舅甥或姻婭周欵一旦胡越能無悵恨若疑誑所至邪詖無窮汝當誓衆奮戈翦此朝食若自延過聽迷塗未逺聖上臨物以仁接下以愛豈直雍齒先封乃當射鈎見相矣當由力窘跡屈丹誠未亮耶跂予南服寤寐延首若反棹沿流歸誠鳳闕錫珪開㝢非爾而誰吾等並過荷曲慈俱叨非服紆金拖玉改觀蓬門入奉舜禹之渥出見羲唐之化雍容揄揚信白駒空谷之時也柰何毁擲先基自蹈凶戾山門蕭瑟松庭誰掃言念楚路豈不思父母之邦幸納惡石以蠲美疢裁書表意爾其圖之顗太尉淑兄子時尚書右僕射蔡興宗是顗舅領軍將軍袁粲是顗從父弟故書云羣從舅甥也魏通互市議世祖初莊爲侍中議臣愚以爲獯獫棄義唯利是視關市之請或以覘國順之示弱無明柔逺拒而觀釁有足表彊且漢文和親豈止彭陽之冦武帝修約不廢馬邑之謀故有餘則經略不足則閉關何爲屈冠帶之邦通引弓之俗樹無益之軌招塵點之風交易爽議既應深杜和約詭論尤宜固絶臣庸管多蔽豈識國儀恩誘降逮敢不披盡論行節儉表世祖始踐阼欲宣𢎞風則下節儉詔書莊慮此制不行言之詔云貴戚競利興貨廛肆者悉皆禁制此實允㥦民聽其中若有犯違則應依制裁糾若廢法申恩便爲令有所屈此處分伏願深思無縁明詔既下而聲實乖爽臣愚謂大臣在禄位者尤不宜與民爭利不審可得在此詔不拔葵去織實宜深𢎞上廣捜才路表孝建初遷左衛將軍上表有詔莊表如此可付外詳議事不行臣聞功照千里非特燭車之珍徳柔鄰國豈徒祕璧之貴故詩稱殄悴誓述榮懷用能道臻無積化至恭已伏惟陛下膺慶集圖締㝢開殿夕爽選政昃旦調風采言厮輿觀謡仄逺斯實辰階告平頌聲方製臣竊惟隆被所漸治亂之由何嘗不興資得才替因失士故楚書以善人爲寳虞典以則哲爲難進選之軌既弛中代登造之律未闡當今必欲崇本康務庇民濟俗匪更惉懘奚取九成夫才生于時古今豈貳士出于世屯泰焉殊升厯中陽英賢起於徐沛受籙白水茂異出於荆宛寧二都智之所産七隩才之所集實遇與不遇用與不用耳今大道光亨萬務俟徳而九服之曠九流之艱提鈞懸衡委之選部一人之鑒易限而天下之才難原以易限之鑒鏡難原之才使國罔遺授野無滯器其可得乎昔公叔與僎同升管仲取臣於盗趙文非親士踈嗣祁奚豈諂讎比子茹茅以彚作範前經舉爾所知式昭往牒且自古任薦賞罰𢎞明成子舉三哲而身致魏輔應侯任二士而已捐秦相臼季稱冀缺而疇以田采張㪍進陳湯而坐以褫爵此先事之盛准亦後王之彞鑒如臣愚見宜普命大臣各舉所知以付尚書依分銓用若任得其才據主延賞有不稱職宜及其坐重者免黜輕者左遷被舉之身加以禁錮年數多少隨愆議制若犯大辟則任者刑論又政平訟理莫先親民親民之要實歸守宰故黄霸治潁川累稔杜畿居河東厯載或就加恩秩或入崇輝寵今莅民之職自非公私必應代換者宜遵六年之制進獲章明庸惰退得民不勤擾如此則下無浮謬之愆上靡棄能之累考績之風載泰楢薪之歌克昌臣生屬亨路身漸鴻猷遂得奉詔左右陳愚於側敢露芻言懼氛恒典功照千里南史作功傾魏后燭車作照車鄰國作秦客治亂作成敗弛作隳闡作聞崇作豐才之所集作愚之所育授作賢昔公叔登臣管仲升盗親士作私親禠作弛制作限擾作勞慶皇太子元服上至尊伏惟皇太子殿下明兩承乾元良作貳杭法于身英華自逺樂以修中禮以制外三善克懋德成教尊今日昭辰顯加元服對靈祇之望儔上庠之歡率天罄世莫不載躍又皇太子元服上皇太子表離景承宸樞光陪極毓問東華飛英上序樂正歌風司成頌德清明神鏡温文在躬練日簡辰顯備元服懋三王之教爥少陽之重東海王讓司空表臣側觀前載與窺洪典三事之授惟帝其難臣乗少籍長久分踰涯量出滿入泰每究榮光不悟乾燭方逺義路同遺下參𢎞化上尸爕理自非德仞具瞻聲堪民詠未有妄臻此澤空集兹靈讓吏部尚書表招才琴釣之上取士歌牧之中終能克夷景命榮懷萬宇豈容先私首曲近有經過且不習冠制趙客興鑒未聞綂馭鄭臣有規匪痗身譏讓中書令表伏惟殿下登馭震維臨齊璿政澤與風翔恩從雲動臣聞璧門天邃鳳沼神深絲綸王言出納帝命自非望允當時譽宣庠塾未有謬垂曲寵空席兹榮在於平壯猶不可勉况於綿痼百志俱淪謝賜貂裘表臣莊言主衣黄達言敇賜臣貂裘匭發袵開𤣥華有曜靡毫柔毳黯鑑自疑固以綵越綴翬光逾緝鷰臣聞嚬笑不妄韓裳勿假續有昭庸楚纊爰建臣歡忭自歌而同委衾之澤勤勞未報而叨解裘之寵空荷榮施徒賁微軀承殊恩必識服以淪生銘悦之情㒺知所寘臣受假無由躬拜謹遣表改定刑獄奏莊以辭疾多坐免官大明元年起為都官尚書奏臣聞明慎用刑獄存姬典哀矜折獄實暉吕命罪疑從輕既前王之格範寧失弗經亦列聖之恒訓用能化致升平道臻恭巳逮漢文傷不辜之罰除相坐之令孝宣倍深文之吏立鞠訊之法當是時也號令刑存陛下踐位親臨聽訟億兆相賀以為無寃民矣而此囹圄未虚頌聲尚缺臣竊謂五聽之慈弗宣於宰物三宥之澤未洽於民謡頃年軍旅餘弊刼掠猶繁監司計獲多非其實或規免咎不慮國患楚對之下鮮不誣濫身遭鉄鑕之誅家嬰孥戮之痛比五同閈莫不及罪是則一人罰謬坐者数十昔齊女告天臨淄䑓殞孝婦寃録東海愆陽此皆符變靈祇初咸景緯臣近兼訊見重囚八人旋觀其初死有餘罪詳察其理實並無辜恐此等不少誠可怵惕也舊官長竟囚畢郡遣督郵案騐仍就施行督郵賤吏非能異於官長有案騐之名而無研究之實愚謂此制宜革自今入重之囚縣考正畢以事言郡并送囚身委二千石親臨覈辨必収聲呑釁然後就戮若二千石不能决乃度廷尉神州統外移之刺史刺史有疑亦歸䑓獄必令死者不怨生者不恨庶鬻棺之諺輟歎於終古兩造之察流詠於方今臣學闇申韓才寡治術輕陳愚管懼乖國憲為尚書八座封皇子郡王奏臣聞桐珪睦親書河汾之策賜帶懐賢敬東平之祚諒以訓經終始義洽垣墉第某皇弟等器彩明敏令識穎悟並宜憲章前典光啟祚宇作屛王室式雍帝載臣等參議可封郡王為尚書八座改封郡長公主奏臣聞爵厚懿戚國之恒典景祚既新禮與時渥永興等七公主可封郡長公主北中郎新安王拜司徒章不惟震施罔匱鴻澤方稠爕調之重遂臻非據智小謀大周易興規少陽微暄有鑒前史辨其動植布其安擾以倡九牧阜成王教豈臣眇末所能克荷又爲某中郎將謝兼司徒章臣聞爕理隂陽寅亮天地弗惟其官無人則闕司徒掌敷五典職擾兆民豈悟乾靈罔匱光渥方闡不次之任殊絶藩岳豈可權尸三事假備六符慙震周廻顧歩交悸孝武帝哀策文應門洞望馳道南除叢塗已撤鬱鬯將虗哀子嗣皇帝擗摽池綍周遑旌軫攀七緯之崩淪慟三靈之徂盡百神慕而行雲沉萬國哀而素霜霣衣冠緬邈弓劒不追敢緝謳頌髣髴希夷其辭曰樞電皇根月瑶國緒𦙍裔丹陵蟬聨華渚二后在天大行纂武克睿克聖重規襲矩昭昭金式明明玉温望雲其逺就日其尊雨零露湛夏暖冬暄聲芳納麓道昭賔門上德無稱至功不器怊悵四始優游六位綴響蘭深緝言瓊秘悠哉梁踐眇焉汾肆敬業開㝢離經作翰鴻起荆河鸞遊楚漢泗濵霑明江區承奐陜左清郊棠隂虗館地維不紐乾綱弛機羲庭薄蝕紫路流飛泣血𣲖涘顧瞻川沂孝貫樞極義震寰圍誓鉞皇郊詔師牧甸七景締華五雲巻煽雪怨園邑掃恥瀛縣啟聖宸居集寳龍見王室多故國歩方蹇淮濟烈冠江荆毁冕東楚亂常西華啟釁動算揮圖爰戡爰剪浹宙斯澄綿區咸鏡修風曉起德星夕映溽露飛甘舒雲結慶禎被動植信泊翔泳缺禮克宣墜章必搆方堂饗極圓流肆胄南聳郊宫北清靈囿瑶軒春藉翠華冬狩經緯窮文克定盡武鄗上呈祥介丘載佇在盈念冗成功弗處榮鏡中世弈舄前古睿業初逺鴻化方亭丹雲承日素景媵星玉几去襲綴衣在庭辭重陽之昭昭降大夜之冥冥氣貿炎凉史詔龜筮文物空嚴鑾和虚衛動蜃輅之逶迤顧璧羽之容裔出國門而分天地向幽途而異身世龍旌欝而青槐逺驚葭亂而白楊翳觀初霜之變條聽秋風之下蔕橋山絙雲榖林虧日輦道結寒松庭盡宻芝蓋迫軨上驤眷轡萬㝢肅其北􅯷靈阿閴其深隘南維有時傾離光不常鏡騰英聲與茂實方流華於舞詠皇太子妃哀策文楹凝桂酒庭肅龍輼風吹國路雲起郊門皇帝傷總繸之掩綵悼副褘之滅華行光既宴長河又斜顧而言曰琁瑶有毁郁烈無湮剪素裁簡授之史臣其辭曰霍岫虧天灊流凝漢祥發桐珪慶昭金算毓景帝出飛芳戚閈秘儀施谷升音集灌月晷幾望娣袂維良釋幃春宫承筐少陽五葉衍藻四訓抽光葳蕤蕙振婉孌瓊相清徽就逺祲沴方搏臨華罷翠當曄收蘭複殿生響長廡結寒節移虗饋氣變容衣中庭草曖階上螢飛傷縈里第痛溢朝闈霜侵燭昧風密帷凄驚葭夕轉龍驂夜嘶筵既訣兮奠既撤背青闕兮去神閨旌掩欝而還泛蓋逶迤而顧低素紼歛維華軿解馭山隧恒隂松阿不曙離天渥兮就消沉委白日兮即冥暮菊有秀兮蘅有芬德方逺兮聲彌樹孝武殷貴妃謚冊文維年月日皇帝曰咨故淑儀殷氏惟爾含徽挺茂爰光素里友琴流荇實華紫掖奉軒景以柔明登譽處椒風以婉孌升名幽閑之範日藹層闈繁祉之慶方崇蕃世而當春掩藻中波滅源朕用震悼傷于厥心松區巳剪泉𡨕將墜宜有旌徳第行式衍聲芳今遣某官集冊告謚曰宣魂而有靈尚兹寵渥嗚呼哀哉孝武宣貴妃誄并序伃莊爲誄賛軌引漢昭母趙倢堯母門事廢帝在東宫銜之及登位詰責莊曰卿昔作殷貴妃誄頗知有東宫不將殺之繫於尚方太宗定亂乃得出惟大明六年夏四月壬子宣貴妃薨律谷罷煖龍鄉輟曉照車去魏聯城辭趙皇帝痛掖殿之既閴悼泉塗之已宫廵歩檐而臨蕙路集重陽而望椒風嗚呼哀哉天寵方隆王姬下姻肅雍揆景陟屺爰臻國軫䘮淑之傷家凝霣庇之怨敢撰德於旂旒庻圖芳於鐘鼎其辭曰𤣥丘煙煴瑶臺降芬髙唐渫雨巫山欝雲誕發蘭儀光啟玉度望月方娥瞻星比婺毓德素里棲景宸軒處麗絺綌出懋蘋蘩修詩賁道稱圖照言翼訓姒幄賛軌堯門綢繆史館容與經闈陳風緝藻臨彖分微游蓺殫數撫律窮機躊躇冬愛怊悵秋暉展如之華實邦之媛敬懃顯陽肅恭崇憲奉榮維約承慈以遜逮下延和臨朝違怨祚靈集祉慶藹迎祥皇𦙍璿式帝女金相聨跗齊穎接萼均芳以藩以牧燭代輝梁視朔書氣觀臺告祲八頌扃和六祈輟滲衡總滅容翬翟毁衽掩綵瑶光收華紫禁嗚呼哀哉帷軒夕改軿輅晨遷離宫天邃别殿雲懸靈衣虗襲組帳空烟巾見餘軸匣有遺絃嗚呼哀哉移氣朔兮變羅紈白露凝兮嵗將闌庭樹驚兮中帷響金釭曖兮王座寒純孝擗其俱毁共氣摧其同欒仰昊天之莫報怨凱風之徒攀茫昧與善寂寥餘慶䘮過于哀棘實滅性世覆冲華國虗淵令嗚呼哀哉題湊既肅龜筮既辰階撤兩奠庭引雙輴維慕維愛曰子曰身慟皇情于容物崩列辟于上旻崇徽章而出寰甸照殊策而去城闉嗚呼哀哉經建春而右轉循閶闔而徑度旌委欝于飛飛龍逶遲于步步鏘楚挽于槐風遏邊簫于松霧涉姑射而環廻望樂池而顧慕嗚呼哀哉晨輼解鳳曉蓋俄金山庭寢日隧路抽隂重扄閉兮燈已黯中泉寂兮此夜深銷神躬于壤末散靈魄于天潯響乘氣兮蘭馭風徳有逺兮聲無窮嗚呼哀哉黄門侍郎劉琨之誄秋風散兮凉葉稀出吳州兮謝江畿瞻國門兮聳雲路睇舊里兮驚客衣魂終朝而三奪心一夜而九飛過建春兮背闕庭厯承明兮去城輦旌徘徊而北係轜逶迤而不轉挽掩隧而辛嘶驥含愁而鳴俛顧物色之共傷見車徒之相泫豫章公主墓誌銘稟中樞之照體星軒之華肅恭在國掖庭欽其風恪勤衡館庶族仰其德神葉靈條爰自帝堯文信啟魯肇京于楚宵燭載照娥英是從婉娩絺綌優柔肅雍蘅蕙有寳金碧不居泉庭一夜里館長蕪司空何尚之墓誌逺源長瀾自晉徂韓潜川韜玉霍岫騰鸞處華民瞻出光帝難寂寞夀仁茫昧報施調於餁歸經難褰寄晻映留芳煙煴作義竹賛瞻彼中唐緑竹猗猗貞而不介弱而不虧杳裊人圃蕭瑟雲崖推名楚潭美質梁池殷琰陳郡長平人歴少府加給事中宣貴妃誄太平御覧嚴位服於旗容尚徽謚於銘䇿節哀路於蕭鐘齊行鑣於輬翟臧質字含文東莞莒人燾之弟厯車騎將軍江州刺史從義宣反敗誅答魏主書元嘉中魏太武南侵太祖以質爲輔國將軍北救至盱眙太武築長圍攻之與質書時魏地童謡曰軺車北來如穿雉不意魏馬飲江水魏主北歸石濟死魏欲渡江天不徙質答書引之省示具悉姦懷爾自恃四脚屢犯國疆諸如此事不可具說王𤣥謨退於東梁坦散於西爾謂何以不聞童謡言耶魏馬飲江水佛狸死卯年此期未至以二軍開飲江之徑爾冥期使然非復人事寡人受命相滅期之白登師行未逺爾自送死豈容復令生全饗有桑乾哉但爾往攻此城假令寡人不能殺爾爾由我而死爾若有幸得爲亂兵所殺爾若不幸則生相鎖縳載以一驢直送都市我本不圖全若天地無靈力屈於爾韲之粉之屠之裂之如此未足謝本朝爾識智及衆力豈能勝苻堅耶頃年展爾陸梁者是爾未飲江太嵗未卯年故爾斛蘭昔深入彭城值少日雨隻馬不返爾豈憶耶即時春雨已降四方大衆始就雲集爾但安意攻城莫走糧食闕乏者告之當出廪相飴得所送劒刀欲令我揮之爾身耶甚苦人附反各自努力無煩多云並宋書作國彊通鑑邊境梁坦作申坦爾謂何以不聞童謡言耶作爾獨不聞童謡之言乎徑作路莫走作勿遽走告之作可見語又與魏人書宋購斬燾封開國縣侯食邑一萬户賜布絹各萬匹質寫臺格與魏軍書太武攻城三旬死過半乃引還示詔北方諸士庶狸伐見與書如别爾等正朔之民何爲力自取如此大丈夫豈可不知轉禍爲福耶今寫臺格如别書自思之宋書所資治通鑑爾語敵中諸士庶佛狸與書相待如此爾正朔之民何爲自取縻滅豈可不知轉禍爲福耶舉兵上孝武帝表世祖即位拜質爲江州刺史質素有威名自謂人才爲一世英傑遂有異圖以南郡王義宣凡闇易可制勒欲外相推奉以成其志因説誘舉兵内向先上表詳義宣下臣聞執藥隨親非情謬於甘苦揮斤斬毒豈忘痛於肌膚蓋以先疑後順忠焉必往忍小存大雖愛必從丞相臣義宣育悊台鉉拊聲聨服定主勤王之業勲越乎齊晉宗戚懿親之寄望崇于魯衛而惡直醜正寔繁有黨或染凶作僞疾害元功或藉勞挾寵乗威縱戾自知愆深釁重必貽剿戮乃成紫毁朱交間忠輔崇樹私徒招聚羣惡念舊愛老無一而存豈不由凶醜相扇志肆讒惑陛下垂慈狎達不稍惟疑遂令負扆席圖蔽於流議投杼市虎成於十夫鑒古揆今實懷危逼故投袂樊葉立節于本朝揮戈晉陽務清于君側臣誠庸懦奉教前朝雖恧緇衣好賢之美敢希巷伯惡惡之情固已藉風聽而宵憤撫短䇿而馳念况乃宏命爰格誠係宗社今奉㫖前邁星言啟行臣本凡瑣少無逺槩因縁際㑹遂班槐鼎素望既盈愜心實足豈應徼功非冀更希異寵直以蔓草難除去惡宜速是以無顧夷險慮不及身仰恃天眷察亮丹心茍血誠不照甘心罪戮伏願陛下先鑒元輔匪躬茂節未録庸瑣奉國微誠不遂淟涊之情以失四海之望昭戮馬劒顯肆市朝則結旌向國全鋒凱歸九流凝序三光平耀斯則仰説宗廟俯愜兆民裁表感慨涕言無巳魯爽小字女生扶風郿人厯汝陽太守從義宣起兵見殺奉南平王鑠鑠字休𤣥文帝第四子厯侍中驃騎將軍録尚書事爲元凶劭所任世祖立毒殺之爽祖魯宗之以義熈元年起義爲輔國將軍雍州刺史屢建大功與司馬休之北奔父軌爲魏寧南將軍荆州刺史圖欲歸順未果爽少有武藝魏主燾常置左右元嘉末軌死爽襲爲父官其弟秀才力過爽爲魏中書郎燾南行遣爽向壽陽仍至瓜步始與秀定歸南之謀長社戍魏有六七百人爽遣三百騎往界上參聽夜擊敵衆盡殺之馳入虎牢遂率部曲及願從合千餘家奔汝南秀從許昌還夀陽奉辭於鑠鑠馳驛以聞上大悦以爽爲征虜將軍司州刺史秀輔國將軍管陽潁川二郡大守爽秀得罪本朝負釁三世生長絶域逺身敵國兄弟闔門淪㸃僞授殞命不可還國無因近係南雲傾屬東日葢猶痿人思步盲者願明嵩霍咫尺江河匪逺夷庚壅塞隔同天地痛心疾首晝慨宵悲魏主猖狂豺豕其志虐徧華戎怨結幽顯自盱眙旋軍亡殪過半昏酣沉湎恣性肆身爽秀等因民之憤籍將旋之願齊契義奮梟馘醜徒馮恃皇威肅清逋穢牢落諸城指期尅定規以涓塵微雪夙負方當束骸北闕待戮司冦懦節未申伏心邊表明大王殿下以叡茂居蕃文武兼姿逺邇欽傾承風聞德願垂援拯以慰䖍望老弱百口先遣歸庇逼逼丹心仰希懷逺謹遣同義潁川聶元初奉詞陳聞宋書文帝詔僞寧南將軍魯爽中書郎魯秀志榦削到忠誠久著撫兹福先闔門效欵招集義鋭梟剪􅀢醜肅定邊城獻馘象魏雖宣孟之去翟歸晉穨當之出胡入漢方之此日曽何足云朕實嘉之宜即授任逞其忠略爽可督司州陳留東郡濟隂濮陽五郡諸軍事征虜將軍司州刺史秀可輔國將軍管陽潁川二郡太守其諸子弟及同契士庶委征虜府以時申言詳加酬叙版文魯爽爲司州刺史孝建元年二月臧質奉義宣反約秋當同舉爽狂酒即日起兵義宣進爽號征北將軍爽送所造輿服詣江陵叛義宣及質等並起征北府户曹版文義宣駭愕所送並留竟陵不聽進兵敗爲薛安都所殺丞相劉補天子名義宣車騎臧今補丞相名質平曲朱今補車騎名脩之皆版到奉行張暢字少微吳郡吳人歴㑹稽太守與從弟張永書永字景雲茂世子厯征北將軍南兗州刺史永初爲冀州刺史經畧河南攻碻磝城大破於魏爲撫軍將軍蕭思話所收繫厯城獄元凶弑立起永督諸軍事輔國將軍青州刺史南譙王義宣起義乂板永爲冀州刺史永遣司馬崔勲之中兵參軍劉則二軍馳赴國難時思話在彭城義宣慮二人不相諧緝與思話書勸與永坦懷乂使永從兄長史暢與永書云近有都信具汝刑網之源可謂雖在縲紲而復心無愧矣蕭公平厚先無嫌隙見汝翰迹言不相傷何其滔滔稱人意耶當今世故艱迫義氣雲起方藉羣賢共康時難當逺慕亷藺在公之德近效平勃忘私之美忽此蔕芥尅申舊情公亦命蕭示以踈達兼令相執共遵此㫖宋書楊赤牘載張暢答魏虜李孝伯求甘云知更須黄甘若給彼軍即不能足若供魏主未當乏絶故不復致孝按張暢傳暢爲安北長史沛郡太守與魏伯往返口語殊衆悉非書也王亦注辨河清頌渾渾洪河家國之濵襟帶晉衛領袖齊秦龍門誕溜積石傳津乗運能育經啟天文化流上帝時表初星飛書曝瑞龍圖照神協靈既偉通氣載榮張永字景雲暢弟歴侍中南兗州刺史將士休假議永孝建初爲尚書左丞時將士休假年開三畨紛紜道路永建議從之臣聞開兵從稼前王以之兼隙耕戰遞勞先代以之經逺當今化寧萬里文同九服捐金走驥於焉自始伏見將士休假多蒙三畨程㑹既促裝赴在早故一嵗之間四馳遥路或失遽春耜或違要秋登致使公替常儲家闕舊粟考定利害宜加詳改愚謂交代之限以一年爲制使正士之念勞未及積遊農之望收功嵗成斯則王度無騫民業斯植矣張悦孝武時爲湘州刺史瑇瑁麈尾銘移珍西岳賁藻南濆姚古流制鑠道飛文凝華掞景揺綵争雲夷心似鏡色象斯分王謨舉用楊頭等表武都王楊文徳以伐啖頭羌不尅爲梁州刺史劉秀之執送荆州使文德從兄頭戍茄蘆世祖孝建二年以前武都王楊𤣥長孫元和爲征虜將軍以頭爲輔國將軍元和繼楊氏正統頭母妻子弟並爲魏人所執頭至誠奉順朝廷既不正元和號位部落未有定主雍州刺史王謨表請不許被敇令臣遣使與楊元和楊頭相聞幷致信餉即遣中軍行參軍呂智宗齎書幷信等亦自遣使隨智宗及頭語智宗頃破家爲國母妻子弟并墜沒敵中不顧孝道陳力邊捍竭忠盡誠未爲朝廷所識若以元和承統宜授王爵若以其年小未堪大任則應别有所委頃來公私紛紜華戎交構皆此之由臣伏尋頭元嘉以來實有忠誠於國棄親遺愛誠在可嘉氐羌負逺又與魏咫尺急之則反緩之則怨觀頭使人言語不敢便望仇池公所希政在西秦州假節而巳如臣愚見蕃捍漢川使無邊患頭實有力四千户荒州殆不足吝元和小弱若未可專委復數年之後必堪嗣業用之不難若才用不堪則應歸頭若茄蘆不守漢川亦無立理蔡興宗字興宗廓之子歴尚書僕射荆州刺史申令孫繫廷尉議興宗大明時爲廷尉卿有解士先者告申坦昔與義宣同謀時坦已死子令孫作山陽郡自繫廷尉興宗議若坦昔爲戎首身今尚存累經肆眚猶應蒙宥令孫天屬理相爲隱况人亡事逺追相誣訐斷以禮律義不合關若士先審知逆謀當時即應聞啟包藏積年發因私怨况稱風聲路傳實無定主而干黷欺罔罪合極法餉郭原平朱百年妻米教並辭不受秩年之貺著自國書餼貧之典有聞甲令况髙柴窮老萊婦屯暮者哉永興郭原平世稟孝德洞業儲靈深仁絶操追風曠古棲貞處約華耉方嚴山隂朱百年道終物表妻孔耋齒孀居窶迫殘日欽風撫事嗟慨滿懷可以帳下米各餉百斛劉瑀字茂琳穆之孫歴東陽吳興太守彈蕭惠開非才非望非勲非徳彈王僧達瑀遷御史中丞使氣尚人爲憲司甚得志彈王僧達朝士莫不畏其筆端䕃藉髙華人品冗末與顔峻書瑀爲御史中丞轉右衛將軍瑀願爲侍中不得因求益州世祖許之及行甚不得意至江陵與竣書朱脩之三世叛兵一旦居荆州青油幕下作謝宣明面見向使齊師以長刀引吾下席於吾何有政恐匈奴輕漢耳宋書從一旦南史作一日魏魏書云朱脩之爲宋文帝事中郎守滑臺爲將安頡所擒魏世祖授以内職爲雲中鎮將入馮文通文通送之江南赤牘作牢脩之又列晉人誤與親故書瑀免官復起爲東陽太守遷吳興太守侍中何偃常案之云參伍時望瑀大怒曰我於時望何參伍之有遂與偃絶及爲吏部尚書意彌憤憤族叔秀之爲丹陽尹瑀又與親故書其年疽發背何偃亦發背廱瑀疾篤聞偃亡懽躍叫呼於是亦卒吾家黑面阿秀遂居留安衆處朝廷不爲多士宋書史留南作劉劉秀之字道寶穆之從兄子世居京口歴雍州刺史民殺長吏議大明四年改定制令謂民殺長吏值赦宜加徙送秀之爲尚書右僕射議從之律文雖不顯民殺官長之㫖若值赦但止徙送便與悠悠殺人曽無一異民敬官長比之父母行害之身雖遇赦謂宜長付尚方窮其天命家口令補兵路瓊之建康人崇憲太后弟子歴衡陽内史乞贈父道慶表大明四年瓊之爲撫軍參軍上表於是贈給亊中瓊之兄弟並超顯職先臣故懷安令道慶賦命乖辰自違明世敢縁衛戍請名之典特乞雲雨微垂灑潤孔淵之㑹稽山隂人丹陽尹靈符第二子厯尚書比部郎坐父賜死張江陵及妻罵母議時安陸縣民張江陵與妻吳共罵母黄令死黄忿恨自經死值赦律父子賊殺傷敺父母梟首罵詈棄市謀殺夫之父母亦棄市值赦免刑補治江陵母以罵自裁重於傷敺及罵若同殺科則又疑重制唯有打母遇赦猶梟首無罵母致死值赦之科淵之議從之吳免棄市夫題里逆心而仁者不入名且惡之况乃人事故歐傷呪咀法所不原詈之致盡則理無可宥罰有從輕盖疑失善求之文㫖非此之謂江陵雖值赦恩故合梟首婦本以義愛非天屬黄之所恨情不在吳原死補治有允正法顧琛字𢎞瑋呉郡吳人歴員外常侍中散大夫啓孝武帝大明初琛爲吳郡太守免官停家先嘗與西陽太守張牧並竞陵王誕故佐誕據廣陵反遣客陸延稔齎書詣琛等及其二子並有板授時世祖以琛或有異志遣使就吳郡太守王曇生誅琛父子㑹延稔先至琛即執斬之遣二子送首啟世祖世祖嘉之召以爲西陽王撫軍司馬劉誕猖狂遂構釁逆凡在含齒莫不駭惋臣等預荷國恩特百常憤忽以今月二十四日中獲賊誕疏欲見邀誘臣即共執録僞使并得誕與撫軍長史沈懷文揚州别駕孔道存撫軍中兵參軍孔璪前司兵參軍孔桓之前司空主簿張晏書具列本郡太守王曇生臣即日便應星馳歸骨輦轂臣母年老身在侍養輒遣息寳素寳先束骸詣闕宋書顧寳先大明中歴尚書水部郎報父吳郡太守琛書太宗初即位上流反叛輔國將軍袁覬自㑹稽起兵遣書要琛琛與長子寳素謀議其少子寳先時爲山隂令馳書報琛顗前鋒已渡江琛據郡同反兵敗琛歸降南師已近朝廷孤弱不時順從必有覆㓕之禍宋書劉思南史通典並作劉勰唐賜妻子議賜往北村飲還得蠱病臨死語妻張刳腹出病張及賜子副從之郡縣以張妻傷夫五嵗刑子不孝棄市並非科例三公郎劉思及顧覬之並議詔如覬之賜妻痛遵往言兒識謝及理考事原心非存忍害謂宜哀矜顧覬之字偉仁吳人歴湘州刺史唐賜妻子議法移路尸猶爲不道况在妻子而忍行凡人所不行不宜曲通小情當以大理爲斷謂副爲不孝張同不道顧愿字子恭吳郡吳人好學有文辭大明中舉秀才對策擢著作佐郎太子舍人定命論愿伯父覬之嘗謂秉命有定分非智力所移唯應恭已守道信天任運而闇者不達妄求僥倖徒虧雅道無關得䘮乃以其意命愿著定命論仲尼云道之將行命也道之將廢命也丘明又稱天之所支不可壞天之所壞不可支卜商亦曰死生有命富貴在天孟軻則以不遇魯侯爲辭斯則命運竒偶生數離合有自來矣馬遷劉向揚雄班固之徒著書立言咸以爲首世之論者多有不同嘗試申之曰夫生之資氣清濁異原命之禀數盈虗乖致是以心貌詭貿性運舛殊故有邪正昏明之差脩夭榮枯之序皆理定於萬古之前事徴於千代之外冲神寂鑒一以貫之至乃卜相末技巫史賤術猶能豫題興亡逆表成敗禍福指期識照不能徙吉凶素著威衛不能防若夏氓宅生於帝宫豈蠲殘傷之祟漢臣衍貨於天府寧免餧斃之魂且又善惡之理雖詳而禍福之驗常昧逆順之體誠分而吉凶之效嘗隱智絡天地猶罹沈牖之災明照日月必嬰申匡之難増信積德離患於長飢席義枕仁徼禍於促算何則理運茍其必至聖明其猶病諸况乃蕞迹流惑之徒投心顓蒙之域而欲役慮以揣利害策情以笇窮通其爲重傷豈不惑甚是以通人君子閑泰其神冲緩其度不矯俗以延聲不依世以期榮審乎無假自求多福榮辱脩夭夫何爲哉問曰夫書稱惠迪貽吉易載履信逢祐前哲餘議亦以將迎有㑹淪塞無兆宣攝有方夭閼無命善游消魂於深梁工騎燼生於曠野明珠昭駭於闇至蟠木取悦於先容是以罕樂以陽施長世景惠以隂德遐紀彭竇以繕衛延命盈忌以荒湎促齡陳張稱台鼎之崇嚴辛衍宰相之盛若乃游惡蹈凶處逆踐禍宣昭史策易以研正至如神仙所序天竺所書事雖難徴理未易詰留滯傾光思聞通裁對曰子可謂扶繩而辨循刻而議若乃宣攝有方豈非吉運所屬將迎有㑹實亦凶數自挻若夫陽施隂德長世遐年揆厥所原孰往非命研復來㫖讎校往説起予惟商未識所異資生稟運參差萬殊逆順吉凶理數不一原夫食椒非養生之術咀劒豈衛性之經命之所延人肉其骨而含嚼膏梁時或嬰患深澗乖徼寵之津空谷絶探榮之轍運之所集物稊其枯而俯仰竿牘終然離沮爾乃蹻跖横行曽原窘步湯周延世詡邑絶緒吉凶徴應糾纒若兹畢萬保軀密賤琖領梁野之言豈不或妄榖南魯北甘此促生彭翁竇叟將以何術晉平趙敬淫放巳該漢主魏相奚獨傷夭同異若斯是非孰正至如雷濵凝分挫志逺圖棘津隂拱振功高世樊生冲矯鐫旌善之文華子高抗銘懲非之策皆士衡所云同川而異歸者也殊塗均致實繁有徴即理易推在言可略昔兩都全盛六合殷昌霧集貴寵之閭雲動權豪之術鈞貿貽談豈惟陳張而巳觀夫二子才未越衆而此以藉榮揮價彼獨擯景淪聲通否之運斷可知矣嚴辛不安時任命而委罪亮直亦地脉之徒歟若神仙所序顯明脩習齊彊燕平厥驗未著李覃董芬其效安在喬松之侣雲飛天居夷列之徒風行水息良由理數懸挺實乃鍾兹景命天竺遺文星華方策因造前定果報指期貧豪莫差脩夭無爽有允瑣辭無愆鄙説統而言之孰往非命冥期前定各從所歸善惡無所矯其趨愚智焉能殊其理若乃得議其工失蚩其拙操之則慄舍之則悲斯固染情於近累豈不貽誚於通識問曰清論光心英辨溢目求諸鄙懷良有未盡若勤止皆運險易自天理定前期靡非闇至玉門犂丘叡識弗免豈非聖愚齊致仁虐同功昏明之用將何施而可對曰夫聖人懷虗以涵育凝明以洞照惟虗也故無往而不通惟明也故無來而不燭涸海流金弗染温凉之岨嚴兵猛兕無累𤓰刃之災忘生而生愈全遺神而神彌暢若玉門犂丘葢同迹於人故同人有患然而均心於天亦均天無害大賢則體備形器慮盡藏假静默以居否深拱以違礥皆數在清全故鍾兹妙識是以稟仲尼之道不在奔車之上資伯夷之運不處覆舟之下若乃越難趨險逡廵弗獲履危踐機僶俛從事愚之所司聖亦何爲及中下之流馳心妄動是非舛幹倚伏移貿故北宫意逆而功順東門心晦而迹明宣應遺筮而逢吉張松協數而遘禍且智防有紀患累無方爾乃猘狗逐而華子奔腐鼠遺而虞氏㓕匣猨逸而林木殘櫝珠亡而池水竭凡厥條流曲難詳備揺形役思其效安徴豈若澡雪塵府洗練神宅据道爲心依德爲慮使迹窮則義斯暢身泰則理兼通豈不美哉何必遺此而取彼問曰夫建極開化樹聲貽則典防之興由來尚矣必乃幽符懸兆冥數指期善惡前徴是非素定名教之道不亦幾乎息哉對曰天生蒸民樹之物則教義所禀豈非冥數何則形氣之具必有待而存顓蒙之倫豈無因而立必假纎紈以安生藉梁豢以延祀資信禮以繕性秉亷義以劾情聖人聰明深懿履道測化通體天地同情日月仰觀俯察撫運裁風於是乎昭日星之紀正霜雨之度張雲霞之明衍風露之渥浮舟翼滯騰駕振幽又乃甄理三才辨綜五德𢎞鋪七體之端宣昭八經之緒是以時雍在運羣方是通抱德煬和全真保性故信食相資代爲唇齒富教相假遞成輔車今弛棄纎紈損絶粱豢必云徼生委命豈不巳曉其迷至于湮斥亷義屏黜信禮責以祈存推數遂乃未辨其惑連類若斯乖妄滋甚然則敎義之道生運所資寵辱榮枯常由此作斯固命中之一物非所以爲難也問曰循復前㫖既以理命縣兆生數冥期研覆後文又云依仗名教帥循訓範若籍數任天則放情蕩思拘訓馴範則防慮檢䘮函矢殊用矛戈異適雙美之談豈能兩遂對曰夫性運乖舛心貌詭殊請布末懷略言其要若乃吉命所鍾縱情蹈道訓性而順因心則靈凶數所挻率由踐逆聞言不信長惡無悛此愚智不移聲訓所遺者也其有見善如不及從諫如順流是則命待教全運須化立譬以良醫之室病者所存至如澄神清魂平心實氣無妄之痾勿藥有喜所謂縱情蹈道無假檃括若膏肓之疾長桑不治體府之病陽慶弗理此則率由踐逆自絶調御至乃趙儲之命宜永須扁鵲而後全齊后之數必延待文摯而後濟亦猶運鍾循奬彞範所興善惡無主唯運所集而異膏粱方丈沈疾弗顧瑶碧盈尺阽危弗存夫静躁之容造次必於是曲直之性顛沛不可移是以夷惠均聖而異方遵竦齊通而殊事雖復鈐桎羿奡思服巢許之情捶勒曽史言膺蹻跖之慮不然之事斷可知也必幽符鑚仰冥數修習雖存陵惰其可得乎故運屬波流勢無防慮命徼山立理無放情用殊函矢雙美奚躓談異矛戈兩濟何傷問曰夫君臣恩深師資義固所以霑榮塗施提飾荷聲故刳心流腸捐生以抗節火妻灰子薶名以償義若幽期天兆則明剔可遺冥數自賔則感効宜絶豈其然乎對曰論之所明原本以爲理難之所疑即末以爲用盖隂閉之巧不傳萌漸之調長絶故知妄言賞理古人所難吾所謂命固以綿絡古今彌貫終始爰及君臣父子師友夫妻皆天數冥合神運𤣥至逮乎暌愛離㑹既命之所甄昬爽順戾亦運之所漸爾乃松柳異質薺荼殊性故疾風知勁草嚴霜識貞木何異忠孝之質資行夙昭至於刻志酬生題誠復施殉節投命酬義忘巳亦由石雖可毁堅不可銷丹雖可磨赤不可滅因斯而言君臣師資既幽期自賔心力感効亦冥數天兆夫獨何怪哉陸子真薦關康之奏康之河東揚人學通經釋徴辟不就世祖即位遣大使巡行天下使反薦康之不見省康之業履恒貞操朂清固行信閭黨譽延邦邑棲志希古操不可渝宜加徴聘以潔風軌孫薩詣郡列辭薩彭城人大明五年發三五丁薩應充行坐違期付獄兄棘詣郡乞以身代薩乂辭列免兄棘妻許復語棘君當門户且大家以小郎屬君豈可委罪太守張岱依事表上世祖下詔門户不建罪應至此狂愚犯法實是薩身自應依法受戮兄弟少孤薩三嵗失父一生恃賴唯在長兄兄雖可垂愍有何心處世孝武帝詔棘薩甿𨽻節行可甄特原罪州加辟命并賜許帛二十匹周殷啓孝武帝世祖即位改元孝建殷時爲中軍府録事參軍上啓俗敝如此竟不能革今士大夫父母在而兄弟異計十家而七庶人父子殊產八家而五其甚者乃危亡不相知飢寒不相恤又疾讒害其間不可稱數宜明其禁以易其風後魏書袁覬位武陵内史臨終與兄顗書覬子彖字偉才小字史公少有風氣善屬文歴諸王府參軍不就覬臨終與兄顗書史公才識可喜足慰先基矣南齊書王元曾東海人仕别駕與劉惠書惠沛郡相人臨賀太守劉瓛字子珪大明四年舉秀才兄璲亦有名先應州舉元曾與瓛父書此嵗賢子充秀州閭可謂得人南史宋文紀巻十四
