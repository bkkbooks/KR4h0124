body:
  text: 宋文紀卷十八明梅鼎祚編周山文皇弟訓養母服制議元徽二年七月有司奏第七皇弟訓養母鄭修容喪未詳服制下禮官議正參議並同山文議案庶母慈已者小功五月鄭玄云其使養之命不為母子亦服庶母慈已之服愚謂第七皇弟宜從小功之制孫緬前丞廟祠執爵議後廢帝元徽二年有司奏至尊親祠太廟文皇帝太后之日孝武皇帝及昭穆太后雖親非正統而嘗經北面未詳應親執爵與不下禮官議周山文韓賁孫緬並議上詔緬為允太學博士周山文議博士顔燮等同山文案禮尊者尊統上卑者尊統下孝武皇帝於至尊雖親親非正統而祖宗之號列于七廟愚謂親奉之日應執觴爵昭皇太后既親非禮正宜使三公行事兼太常丞韓賁議晉景帝之於世祖肅祖之於孝武皆旁尊也親執觴杓今孝武皇帝於至尊親惟伯父功列祖宗奉祠之日謂宜親執按昭皇太后於主上親無名秩情則疏逺庶母在我猶子祭孫止况伯父之庶母愚謂昭后觴爵可付之有司前左丞孫緬議晉世祖宗祠顯宗烈宗肅祖並是晉帝之伯今朝明凖而初無有司行事之禮愚謂主上親執孝武皇帝觴爵有愜情敬昭皇太后君母之貴見尊一時而與章宣二廟同饗閟宫非唯不躬奉乃宜議其毁替請且依舊三公行事殷匪子昭太后廟毁置議後廢帝元徽二年有司奏昭太后廟毁置下禮官議太常丞韓賁都令史殷匪子並議左丞王諶重參議謂以幣遍告二廟薶毁殷主於北墻宣太后上室仍設脯以安神匪子議為允詔可韓賁議按君母之尊義發春秋庶後饗薦無間周典七廟承統猶親盡則毁况伯之所生而無服代祭稽之前代未見其凖殷匪子議昭皇太后不係於祖宗進退宜毁議者云妾祔於妾祖姑祔既必告毁不容異應告章皇太后一室按記云妾袝於妾祖姑無妾祖姑則易牲而祔於女君可也始章太后於昭太后論昭穆而言則非妾祖姑又非女君於義不當伏尋昭太后名位允極昔初袝之始自上袝於趙后即安於西廟並皆幣告諸室古者大事必告又云每事必告禮牲幣雜用檢魏晉以來互有不同元嘉十六年下禮官辨正太學博士殷靈祚議稱吉事用牲凶事用幣自兹而後吉凶為判已是一代之成典今事雖不全凶亦未近吉故宜依舊以幣遍告二廟又尋昭太后毁主無義陳列於太祖博士欲依虞主薶於廟兩階之間按階間本以薶告幣薶虞主之所昔虞喜云依五經典議以毁主袝於虞主薶於廟之圵墻最為可據昭太后神主毁之薶之後上室不可不虛置太后便應上下升之既升之頃又應設脯醢以安神今禮官所議謬略未周遷毁事大請廣詳訪沈俁之公府長史應服朝服議江左公府長史無朝服縣令單衣幘後廢帝元徽四年司徒右長史王儉議公府長史應服朝服請臺詳議曹郎中沈俁之議不宜改儉又上議及俁之再議參詳並同儉議遂寢王儉議春秋國語云貌者情之華服者心之文巖廊盛禮衣冠為大是故軍國異容內外殊序而自頃承用每有乖違府職掌人教四方是則臣居毗佐志在當官永言先典載懷夕惕按晉令公府長史官品第六銅印墨綬朝服進賢兩梁冠掾屬官品第七朝服進賢一梁冠晉官表注亦與令同而今長史椽屬但著朱衣而已此則公違明文積習成謬謂宜依舊制長史兩梁冠掾屬一梁冠並同備朝服中單韋舄率由舊章若所上蒙允并請班司徒二府及諸儀同三府通為永凖又尋舊事司徒公府領步兵者職僚悉同降朝不領兵者主簿祭酒中單韋舄並備令史以下唯著玄衣今府既開公謹遵此制其或有署臺位者玄服為疑按令稱諸有兼官皆從重官之例尋內官為重其署臺位者悉宜著位之服不在玄服之例若署諸卿寺位兼府職者雖三品而卿寺為卑則宜依以公府玄衣之制服章事重禮義所先請臺詳服沈俁之議制圭象德損替因時裁服象功施用隨代車旗變於商周冠佩革於秦漢豈必殊代襲容改尚沿物哉夫邉貂假近侍之首賤㥽登尊極之顔一適時用便隆後制况朱裳以朝緬頃百祀韋舄不加浩然惟舊服為定章事成永則其儉之所秉會非古訓青素相因代有損益何事棄盛宋之興法追往晉之頽典變改空煩謂不宜革王儉又議自頃服章多闕有違前準近議依令文被報不宜改革又稱左丞劉議按令文凡有朝服今多闕亡然則文存服損非唯鉉佐用舍既久即為舊章如下旨伏尋皇宋受終每因晉舊制律令條章同規在昔若事有宜必合懲改則當上關詔書下由朝議縣諸日月垂則後昆豈得因外府之乖謬以為盛宋之興典用晉氏之律令而謂其儀為頽法哉順違從失非所望于髙議申眀舊典何改革之可論又左丞引令史之闕服以為鉉佐之眀比夫名位不同禮數異等令史從省或有權宜達官簡略為失彌重又主簿祭酒備服于王庭長史掾屬朱衣以就列于是倫比自成矛盾此而可忍孰不可安將引令以遵舊臺據失以為例研詳符旨良所未譬當官而行何強之有制令昭然守以無二沈俁之又議雲火從物沿損異儀帝樂五殊王禮三變豈獨大宋造命必咸仍於晉舊哉夫宗社疑文庭廟闕典或上降制書下協朝議何乃鉉府佐屬裳黻稍改白虎之詔斷宣室之疇咨乎又許令史之從省咎達官之簡略律茍可遵固無辨於貴賤規若必等亦何關於權宜一用一舍彌增其滯且佐非韋舄之職吏本朝服之官凡在班列罔不如一此皆前令違而遂改今制允而長用也爵異服殊寧會矛盾之譬討論疑制焉取強弱之辨府執既革之餘文臺據永行之成典良有期於無固非所望於行迷孔欣七誨太平御覽携同好命瓜牙攝烏虎杖雄戈緣山結網參雲張羅王叔之一作淑之藝文諸書或云晉人或云宋人按唐經籍志宋王叔之集十卷隨經籍志有宋王敘之集七卷梁十卷敘與叔字相類恐是一人亦晉而入宋者也又有王升之在晉叔字有作叔寫者頗與升類或總一人今不可考舟贊致逺任重各因所由陸則騁車水惟用舟弱楫輕棹利涉濟求緬彼漁父鼓枻清謳蘭菊銘蘭既春敷菊又秋榮芳薰百草色豔羣英孰是芳質在幽愈馨送隱論崇退儒生問於抱朴丈人曰請問隱何為者也而生上古徇之至今繼踵何哉丈人曰夫全朴之道萬物一氣三極湛然天人無際豈有朝野之别隱顯之端哉則夫隱者於已失者也平原既開風流散漫故隱者所以全其真素養其浩然之氣也懷舊賦序余與從甥孫道濟交好特至昔寓荆州同處一室冬多間暇長共學書余收而録之欲以為索居之友道濟因記紙末曰舅還山之日覽此相存間書見其手迹皎若平日悽悵傷心傷孤鳥詩序偶得二鳥將欲放之俄頃而一者死一者既放屢顧悲鳴感微禽之有心遂為詩以傷之翟雉賦序余在荆楚見人有養雉翟二鳥者慨然感之而為賦云臧道顔御覽作臧彥或其名弔驢文初學記載宋袁淑大蘭王九鍚文後因附宋夫徵祥契於有感景行表於事迹故銓才授任必求之卓越考能核用亦存乎望實以貌定名則稱謂而標聲色位號則由焉而授爰有竒人西州之馳驅者體質強直稟性沈雅聰敏寬詳髙音逺暢真驢氏之名駒也諸葛闡禁革飾綵奏太平御覽引宋書沈約宋書不載夫嵗時有利害之收而蠶桑有經常之苦機杼居不變之勤而民用有奢儉之異今仲冬南至有五絲命縷之服仲夏北至比肆連行糾繩縻無用之工玄黃侵衣革之費飾綵雖貴始無所入尺絶寸分終於捐棄部一邑以推百城其費博矣謹率愚管謂宜禁革荀倫初學今本作茍倫誤與河伯箋異苑云河內荀儒字君林乘氷省勇氏陷河而死兄倫字君文求尸積日不得設祭水側投箋與河伯宿岸側氷開手執箋浮上倫又箋謝之初學記不載其事異苑不載其文疑異苑劉敬叔所撰苟倫是晉末宋初聊從初學伏惟河伯府君君侯潛曜靈泉翺翔神渚發洪流於崑崙揚髙波於砥桂包四瀆以稱王總百川而為主初學記朝道元一作晉人與吞公箋吞他前切姓族書有吞景雲道元居在城南接水近塘草木幽鬱蚊虻所藏茅茨陋宇才容數床無有髙門大户來風致涼積汙纍燻體貌萎黃未免夏暑逆愁冬霜冬則兩愊之薄被上有牽綿與敝絮撤以三股之絲綖夾以四升之粗布狹領不掩其巨形促緣不覆其長度伸腳則足出攣捲則脊露髙似孫緯略漏藝文類聚未全鬱一作蔚陋作貌作日夾作聨脊作背奴曰髙安兩手並殘指如竹筒畏風惡寒小者家生厥名曰饒腹中瘕堅大如飯捎飽食終日不能作勞借一小兒傖公吳母近因冬節暫詣其舅狗咬一脛肉落如手攣筋徹骨跂而不愈長婢來成左目失明動則入井已死復生次婢良信有桓公司馬之􅠰行步雖曠了無前進隱疾難明辭不盡韻小婢從成南方之奚形如驚麞言語嘍􅍣聲音駭人惟堪驅雞它無所役遣詣阿嵇復被狗咋困熟如泥初學記並韻語箋又有露車一乘轅復摧折以犂轅續之左﨑右嵧強弱相負傍行斫轅太平御覽范氏王鍚妻鍚字寡光太保𢎞子位江夏內史與王僧逹書蔡興宗歷中書監左光祿大夫幼立風概家行尤謹奉宗姑侍寡嫂養孤兄子有間于世僧逹與兄鍚不協鍚妻范聰明婦人也有才學與僧逹書詰讓之昔謝太傅奉嫂王夫人如慈母今蔡興宗亦有恭和之稱宋書無名氏宋徐州答魏移書知以楊難當投命告敗比之窮鳩欲動衆以相存拯救危恤難有國者之所用心雖然移書之言亦已過矣何者楊氏先世以來受晉爵號修職守藩為我西服十載之中再造逆亂號年建義猖狂妄作為臣不忠宜加誅討又加難當稱臣彼國宜是顧畏首尾兩屬求全果是純臣服事於魏何宜與人和親而聽臣下縱逸昔景平之末國祚中微彼乘我內難侵我司兗是以七年治兵義在經略三帥涉河秋毫不犯但崇此信誓不負約言耳彼伺我軍仍相掩襲俘我甲士翦我邊民是彼有兩曲我有二直也司馬楚文思亡命竄伏魯軌刁雍實為蠆尾而擁其逋挑開其疆場元顯無子焉得天助謬稱假託何足以云又譏竊興師旅不相關移若如來言又非所受黃龍國王受我正朔且渠茂虔父子歸欵彼皆殘滅俘馘豈有先言况仇池奉晉十世事宋三葉九伐所加何傷於彼僕聞師曲為老義作亂雄言貴稱情不在夸大移書本詣梁益而謬來鄙府大人不逺幸無過談宋兗州答魏安南平南府移書宋元嘉二十三年魏安南平南府又移書兗州以南國僑置州不依城土多濫圵境名號又欲遊獵具區故兗州答移夫皇極肇建實膺神明之符生民初載實稟沖和之氣故司牧之功宣於上代仁義之道興自諸華在昔有晉混一區宇九譯承風遐戎嚮附永嘉失御天綱圯裂石容苻姚遞乘非據或栖息趙魏或保聚邠岐我皇宋屬當歸歷受終晉氏北臨河濟西盡咸汧弔民伐罪流澤五都魏爾時袛德悔禍思用和輯交通使命以祈天衷來移所謂分疆畫境其要久定者也俄而不恆其信虞我國憂侵牢及洛至于清濟往嵗入河且欲綏理舊城是以頓兵南澨秋毫無犯軍師不能奉遵廟算保有成功回斾之日重失司兗來移云不因土立州招引亡命夫古有分土而無分民德之休明四方襁負昔周道方隆靈臺初構民之附比八十萬家彼不思𢎞善政而恐人之棄已縱威肆虐老弱無遺詳觀今古略聽輿誦未有窮凶以延期安忍而懷衆者也若必宜因土立州則彼立徐揚豈有其地往年貴主獻書云強者為雄斯則棄德任力逆行倒施有一於此何以能振復加欲遊獵具區觀化南國今治道方融逺人必至開館飾邸則有司存來嵗元辰天人協慶鸞旗省方東巡稽嶺若欲邀恩宜赴兹會懷德貴蚤無或後期又稱馳獵積年野無飛伏此邦解綱舍前矜蜫育鷇七澤八藪禽獸豐碩虞候搜算義非所吝三代肆覲其典雖缺呼韓入漢厥儀猶全饋餼之秋每存豐厚並宋書彭城參佐慶武陵王獲白鹿箋世祖為武陵王自雍州刺史改授徐州圵鎮彭城伏承獲白鹿於彭城之東山皓質玉映育性馴和藝文類聚人為江斆讓婚表宋世諸主莫不嚴妬太宗每疾之時光祿大夫江湛孫斆當尚世祖女上使人為斆作讓婚表以遍示諸主伏承詔旨當以臨海公主降嬪榮出望表恩加典外顧審輶蔽伏用憂惶臣寒門悴族人凡質陋閭閻有對本隔天姻如臣素流室貧業寡年今將冠皆已有室荆叉布裙足以成禮每不自解無偶迄兹謀訪莫尋素族弗問自惟門慶屢降公主天恩所覃容及醜末懷憂抱愓慮不獲免徵命所當果膺兹舉雖門忝宗榮於臣非幸仰緣聖貸冒陳愚實自晉氏以來配尚王姫者雖纍經美胄亟有名才至於王敦攝氣桓溫斂威真長佯愚以求免子敬炙足以違詔王偃無仲都之質而倮露於圵階何瑀闕龍工之姿而投軀於深井謝莊殆自同於矇室殷沖幾不免於強鉏數人者非無才意而勢屈於崇貴事隔於聞覽吞悲茹氣無所逃訴制勒甚於僕𨽻防間過於婢妾往來出入人理之常當賓待客朋從之義而令掃轍息駕無窺門之期廢筵抽席絶接對之理非唯交友離異乃亦兄弟疏闊第令受酒肉之賜制以動靜監子荷錢帛之私節其言笑姆妳爭媚相勸以嚴妮媪競前相諂以急第令必凡庸下才監子皆葭萌愚豎議舉止則未間是非聽言語則謬於虛實姆嬭敢恃耆舊唯贊妒忌尼媪自唱多知務檢口舌其間又有應答問訊卜筮師母乃至殘餘飲食詰辨與誰衣被故敝必責頭領又出入之宜繁省難衷或進不獲前或入不聽出不入則嫌於欲疏求出則疑有别意召必以三晡為期遣必以日出為限夕不見晚魄朝不識曙星至於夜步月而弄琴晝拱袂而披卷一生之內與此長乖又聲影裁聞則少婢奔迸裾袂向席則老醜叢來左右整刷以疑寵見嫌賔客未冠以少容見斥禮則有列媵象則有貫魚本無嫚嫡之嫌豈有輕婦之誚况今義絶傍私虔恭正匹而每事必言無儀適設辭輒言輕易我又竊聞諸主集聚唯論夫族緩不足為急者法急則可為緩者師更相扇誘本其恆意不可貸借固實常辭或言野敗去或言人笑我雖家曰私利有甚王憲發口所言恆同科律王藻雖復強狠頗經學涉戲笑之事遂為寃魄褚曖憂憤用致夭絶傷理害義難以具聞夫螽斯之德實致克昌專妒之行有妨繁衍是以尚主之門往往絶嗣駙馬之身通離釁咎以臣凡弱何以克堪必將毁族淪門豈伊身責前後嬰此其人雖衆然皆患彰遐邇事隔天朝故吞言咽理無敢論訴臣幸屬聖明矜照由道𢎞物以典處親以公臣之鄙懷可得自盡如臣門分世荷殊榮足守前基便預提拂清官顯宦或由才升一叨婚戚咸有恩假是以仰冒非宜披露丹實非唯止陳一巳規全身願實乃廣申諸門憂患之切伏願天慈照察特賜蠲停使燕雀微羣得保叢蔚蠢物含生自已彌篤若恩詔難降披請不申便當文身剪髮投山竄海有司廟祀歌辭奏武帝永初元年七月有司奏十二月有司又奏並詔可無名氏附皇朝肇建廟祀廟設雅樂太常鄭鮮之等八十八人各撰立新歌黃門侍郎王韶之所撰歌辭七首並合施用又奏依舊正旦設樂參詳屬三省改太樂諸歌舞詩黃門侍郎王韶之立三十二章合用教試日近宜逆誦習輒申攝施行有司請免餘姚令何玢之奏詔可居元嘉起注初揚州刺史王引上會稽從事韋詣解列先風聞餘姚令何玢之造作平牀一乘船舴艋一艘精麗過常用功兼倍請免玢官有司掖庭有故不舉祭奏元嘉七年四月奏詔可禮喪服傳云有死於宫中者則為之三月不舉祭今禮祀既戒而掖庭有故下太常依禮詳正太學博士江邃袁朗徐道娛陳珉等議參互不同殿中曹郎中領祠部謝元議以為遵依禮傳使有司行事於義為安輒重參詳宗廟敬重饗祀精明雖聖情罔極必在親奉然茍曰有疑則情以禮屈無所稱述於義有據請如元所上有司中丞出行分道奏元嘉十三年御史中丞劉式之議每至出行未知制與何官分道應有舊科法唯稱中丞專道傳詔荷信詔喚衆官應詔者行得制令無分别他官之文既無盡然定則凖承有疑謂皇太子正議東儲不宜與衆同例中丞應與分道揚州刺史丹陽尹建康令並是京輦土地之主或檢校非違或赴救水火事應神速不宜稽駐亦合分道又尋六門則為行馬之內且禁衛非違並由二衛及領軍未詳京尹建康令門內之徒及公事亦得與中丞分道與有其凖參舊儀告報參詳所宜分道聽如臺所上其六門內既非州郡縣部界則不合依門外其尚書令二僕射所應分道亦悉與中丞同有司心喪􅎭服奏元嘉十七年元皇后崩皇太子心喪三年禮心喪不著有無禫制世或兩行詔使博議有司奏詔可喪禮有􅎭以祥變有漸不宜便除即吉故其聞服以綅縞也心喪已經十三月大祥十五月禫變除禮畢餘一期不應復有禫宣下以為永制皇子母服議元嘉二十九年南平王鑠所生母吳淑儀薨依禮無服麻衣練冠既葬而除有司奏皇子皆申母服古者與尊者為體不得服其私親而比世諸侯咸用士禮五服之內悉皆成服於其所生反不得遂州詳蔣恭兄弟爭受罪議恭義興臨津人妻弟英晞張與晉陵蔣崇平為劫侶晞張常避水寄恭家事發討録不獲收恭及兄協付獄恭以晞張是其婦親協以身是户主爭求免罪郡元嘉中縣依事上詳州議之乃除恭義成令協義怡令禮讓者以義為先自厚者以利為上末世俗薄靡不自私伏膺聖教猶或不逮况在野夫未逹誥訓而能互發天倫之憂甘受莫測之罪若斯情義實為殊特蔑爾恭協而能行之兹乃終古之所希盛世之嘉事二子乘舟無以過此豈宜總執憲文加以罪戮且晞張封筒逺行他界為劫造釁自外贓不還家所寓村伍容有不知不合加罪勒縣遣之還復民伍有司參議不應致禮太傅奏世祖即祚江夏王義恭進位太傅領大司馬上不欲致禮太傅諷有司奏詔報從之聖旨謙光尊師重道欲致拜太傅斯誠𢎞兹逺風敦闡盛則然周之師保實稱三吏晉因於魏特加其禮帝道嚴極既有常尊考之史載未見兹典故卞壼孫楚並謂人君無降尊之義逺稽聖典近即羣心臣等參議謂不應有加拜之禮孝武帝詔報暗薄纂統實慿師範思盡虔恭以承道訓所奉稽諸往代謂無拜禮據文既明便從所執有司奏南郊遷日議大明二年正月南郊有司奏使禮官議正博士王燮之曹郎朱膺之尚書何偃右丞徐爰並議參議宜依經遇雨遷用後辛不重告若殺牲薦血之後值雨則有司行事詔可今月六日南郊輿駕親奉至時或雨魏世值雨髙堂隆謂應更用後辛晉時既出遇雨顧和亦云宜更告徐禪云晉武之世或用丙或用已或用庚使禮官議正并詳若得遷日應更告廟與不王燮之議遇雨遷郊則先代成議禮傳所記辛日有徵郊特牲曰郊之用辛也周之始郊日以至鄭玄注曰三王之郊一用夏正用辛者取其齋戒用辛也又月令曰乃擇元日祈榖於上帝注曰元日謂上辛郊祭天也又春秋載郊有二成十七年九月辛丑郊公羊曰曷用郊用正月上辛哀元年四月辛已郊榖梁曰自正月至于三月郊之時也以十二月下辛卜正月上辛如不從以正月下辛卜十二月上辛如不從以二月下辛卜三月上辛以斯明之則郊祭之禮未有不用辛日者也晉氏或丙或巳或庚並有别議武帝以十二月丙寅南郊受禪斯則不得用辛也又太始一年十一月已卯始并圎丘方澤二至之祀合於二郊三年十一月庚寅冬至祠天郊於圓丘是猶用圎丘之禮非專祈榖之祭故人不得用辛也今之郊享既行夏時雖得遷却謂宜猶必用辛也徐襌所據或為未宜又按郊特牲曰受命于祖廟作龜于禰宫鄭玄注曰受命謂告退而卜也則告義在郊非為告曰今日雖有遷而郊禮不異愚謂不宜重告朱膺之議案先儒論郊其議不一周禮有冬至日圎丘之祭月令孟春有祈榖于上帝鄭氏説圓丘祀昊天上帝以帝嚳配所謂禘也祈榖祀五精之帝以后稷配所謂郊也二祭異時其神不同諸儒云圎丘之祭以后稷配取其所在名之曰郊以形體言之謂之圓丘名雖有二其實一祭晉武捨鄭而從諸儒是以郊用冬至日既以至日理無常辛然則晉代中原不用辛日郊如徐禪議也江左以來皆用正月當以傳云三王之郊各以其正晉不改正朔行夏之時故因以首嵗不以冬日皆用上辛近代成典也夫祭之禮過時不舉今在孟春郊時未過值雨遷日於禮無違既已告日而以事不從禋祀重敬謂宜更告高堂隆云九日南郊十日圵郊是為圵郊可不以辛也何偃議鄭玄注禮記引易説三王之郊一用夏正周禮凡國大事多用正嵗左傳又啓蟄而郊則鄭之此説誠有據矣衆家異議或云三王各用其正郊天此蓋曲學之辨於禮無取固知榖梁三春皆可郊之月真所謂膚淺也然用辛之説莫不畢同晉郊庚已參差未見前徵愚謂宜從晉遷郊依禮用辛燮之以受命作龜知告不在日學之密也徐爰議郊禮用辛有礙遷日禮官祠曹考詳已備何偃據禮不應重告愚情所同尋告郊尅辰於今宜改告事而已次辛十日居然展齋養牲在滌無緣三月謂毛血告牷之後雖有事礙便應有司行事不容遷郊有司南郊儀注奏南郊親奉儀注皇帝初著平天冠火龍黼黻之服還變通天冠絳紗袍廟祀親奉舊儀皇帝初服與郊不異而還變著黑介幘單衣即事乖體謂宜同郊還亦變者通天冠絳紗袍又舊儀乘金根車今五路既備依禮玉路以祀亦宜改金根車為玉路有司大小駕儀奏漢注儀大駕鹵簿公卿奉引大將軍參乘太僕卿御法駕侍中參乘奉車郎御晉氏江左大駕未立故郊祀用法駕宗廟以小駕至於儀服二駕不異拜陵御服單衣㥽百官陪從朱衣而已亦謂之小駕名實乖舛考尋前記大駕上陵圵郊周禮宗廟於昊天有降宜以大駕郊祀法駕祠廟小駕上陵如為從序今改祠廟為法駕鹵簿其軍幢多少臨時配之至尊乘玉路以金路象路革路木路小輦輪御軺衣書等車為副其餘並如常儀有司凌室藏氷奏大明六年五月詔立凌室藏氷有司奏季冬之月氷壯之時凌室長率山虞及輿𨽻取氷於深山窮谷涸隂沍寒之處以納于凌隂務令周密無泄其氣先以黑牡稚黍祭司寒於凌室之北仲春之月春分之日以黑羔秬黍祭司寒啓氷室先薦寢廟二廟夏祠用鑑盛氷室一鑑以禦溫氣蠅蚋三御殿及大官膳羞並以鑑供氷自春分立秋有臣妾喪詔贈祕器自立夏至立秋不限稱數以周喪事繕制夷盤隨氷借給有司奏立宣貴妃廟乃立别廟于都下據春秋仲子非魯惠公元嫡尚得考别宮今貴妃蓋天秩之崇班理應創新南史有司余齊民孝行奏齊民晉陵人為邑書吏父在家亡及歸母言父遺言恨不見子於是號呌殯所須臾便絶大明中州郡上言有司奏改其里為孝義里蠲租布賜其母榖百斛收賢旌善萬代無殊心至自天古今豈異齊民至性由中情非外感淳情凝至深心天徹跪訊遺旨一慟殞亡雖迹異參柴而誠均丘趙方今聖務彪被移革華夏實乃風淳以禮治本惟孝靈祥歸應其道先彰齊民越自氓𨽻行貫生品旌閭表墓允出在兹有司劫竊依舊制奏明帝泰始四年四月奏及帝崩其例乃寢自今凡劫竊執官仗拒戰邏司攻剽亭寺及傷害吏人并監司將吏自為劫皆不限人數悉依舊制斬刑若遇赦黥及兩頰劫字斷去兩腳筋徙付交梁寧州五人以下止相逼奪者亦依黥作劫字斷去兩腳筋徙付逺州若遇赦原斷徒猶黥面依舊補冶士家口應及坐悉依舊結謫南史諒暗內奉嘗祠議泰豫元年七月有司奏七月嘗祠至尊諒閣之內為親奉與不使下禮官通議詔可未詳何人伏尋三年之制自天子逹漢文愍秦餘之弊於是制為權典魏晉以來卒哭而祔則就吉案禮記王制三年不祭惟祭天地社稷為越紼而行事鄭玄云唯不敢以卑廢尊也范宣難杜預假暢所以闕宗廟祭者皆人理所奉哀戚之情同於生者譙周祭志稱禮身有喪則不為吉祭緦麻之喪於祖考有服者則亦不祭謂神不享也尋宫中有故雖在無服亦廢祭三月有喪不祭如或非若三年之內必宜親奉者則應禘序昭穆而今必須免喪然後禘祫故知未祭之意當似可思起居注晉武有二喪兩期之中並不自祠亦近代前事也伏惟至尊孝越姬文情深明發公服雖釋純哀內纒推訪典例則未應親奉有司祗應祭不為曠仰思從敬竊謂為允臣等參議甚有明證宜如所上有司明堂制奏孝武帝大明五年依漢汶上儀設五帝位太祖文帝對饗祭皇天上帝鼎俎彞簋一依太廟禮堂制作大殿屋十二間無古三十六户七十二牖文飾雕畫而已時有司奏伏尋明堂辟雍制無定文自漢暨晉莫之能辨周書云清廟明堂路寢同制鄭玄注禮義生於斯諸儒又云明堂在國之陽丙已之地三里之內晉侍中裴頠以為尊祖配天其義明著廟宇之制理據未分直可為殿以崇嚴祀其餘雜碎一皆除之裴頠所奏竊謂可安國學之南地實丙已其牆宇規範宜擬則太廟唯十有二間以應一周之數通典蓋吳上文帝歸順表初魏人謡言滅魏者吳也太武帝燾甚惡之宋元嘉二十三年圵地瀘水人蓋吳於杏城天台反諸戎響應有衆十餘萬上表歸順太武遣軍擊之屢敗乃自率大衆攻之吳又上表太祖詔授雍州刺史北地公會吳討屠各為流矢所中死自靈祚南遷禍纒神土二京失統豺狼縱毒蒼元蹈犬噬之悲舊都哀荼蓼之痛臣以庸鄙仗義因機乘拓跋天亡之期藉二州思奮之憤故創迹天台爰暨咸雍義風一鼓率土響同威聲既張士卒效勇師不崇朝羣狡震裂殄逆鱗於函關掃凶迹於秦土非仰協宋靈俯允羣願焉能若斯者哉今平城遺虐連兵大壇東西狼顧威形莫接長安孤危河洛不戍平陽二孽世連土宇擁率部落控弦五萬東屯潼塞任質軍門私署安西將軍常山白廣平練甲髙平進師汧隴圵漠護軍結駟連騎提戈載驅魏蘭洛生等部曲數千擬擊偽鎮闔境顒顒仰望皇澤伏願陛下給一旅之衆圵臨河陜賜臣威儀兼給戎械進可以厭捍凶寇覆其巢窟退可以宣國威武鎮御舊京使中都有鳴鑾之響荒餘懷來蘇之德謹遣使人趙綰馳表丹誠又表臣聞天無二日地無二主昔中都失統九域分崩群凶丘列於天邑飛梟鴟目於四海先皇慈懷內發愍及戎荒翦偽羌於長安雪黎民之塗炭政教既被民始寧蘇天未忘難禍亂仍起獫狁侏張侵暴中國使長安宅代北之氓鄴洛聚拓跋之族縱毒生民虐流兆庶士女能言莫不歎憤傾首東望仰希拯接咸同旱苗之待天澤赤子之望慈親臣仰恩天時以義伐暴輒東西結連南圵樹黨五州同盟迭相要契仰馮威靈千里雲集冀廓除榛莽以待王師義夫始臻莫不瓦解魏主二月四日傾資倒庫與臣連營接刃交鋒無日不戰獲賊過半伏尸蔽野伏願特遣偏師賜垂拯接若天威既震足使魏人潰亡遺民小大咸蒙生造文帝詔報圵地蓋吳起衆秦川華戎響附奮其義勇頻煩克捷屢遣表疏逺效忠欵志梟逆冦以立勳績宜加爵號裒奬乃誠可以為使持節都督關隴諸軍事安西將軍雍州刺史北地郡公使雍梁遣軍界上以相援接吐骨渾慕璝上文帝表慕璝兄阿豺少帝時授爵未及拜命而卒慕璝立元嘉六年上表七年詔報大宋應運四海宅心臣亡兄阿豺慕義天朝欵情素著去年七月五日謁者董湛至宣傳明詔顯授榮爵而臣私門不幸亡兄見背臣以懦弱負荷後任然天恩所報本在臣門若更反覆懼停信命輒拜受寵任奉遵上旨伏願詳處更授章策文帝詔報吐骨渾慕璝兄弟慕義至誠可嘉宜授䇿爵以甄忠欵可督塞表諸軍事征西將軍沙州刺史隴西公訶羅陀國王堅鎧西南夷奉文帝表元嘉十一年伏承聖王信重三寶興立塔寺周滿國界城郭莊嚴清淨無穢四衢交通廣博平坦臺殿羅列狀若衆山莊嚴微妙猶如天宫聖王出時四兵具足𨗳從無數以為守衛都人士女麗服光飾市㕓豐富珍賄無量王法清整無相侵奪學徒遊集三乘競進敷演正法雲布雨潤四海流通萬國交會長江眇漫清淨深廣有生咸資莫能銷穢隂陽調和災厲不行誰有斯美大宋揚都聖王無倫臨覆上國有大慈悲子育萬物平等忍辱怨親無二濟乏周窮無所藏積靡不昭逹如日之明無不受樂猶如淨月宰輔賢良群臣貞潔盡忠奉主心無異想伏惟皇帝是我真主臣是訶羅陀國主名曰堅鎧今敬稽首聖王足下惟願大王知我此心久矣非適今也山海阻逺無緣自逹今故遣使表此丹誠所遣二人一名毗紉一名婆田令到天子足下堅鎧微蔑誰能知者是故今遣二人表此微心此情既果雖死猶生仰惟大國藩守曠逺我即邉方藩守之一上國臣民普蒙慈澤願垂恩逮等彼僕臣臣國先時人衆殷盛不為諸國所見陵迫今轉衰弱鄰國競侵伏願聖王逺垂覆護并市易往反不為禁閉若見哀念願時遣還令此諸國不見輕侮亦令大王名聲普聞扶危救弱正是今日今遣二人是臣同心有所宣啓誠實可信願敇廣州時遣舶還不令所在有所陵奪願自今以後賜年年奉使今奉微物願垂哀納呵羅單國王毗沙跋摩奉文帝表元嘉十年後為其子所纂奪又上表常勝天子陛下諸佛世尊常樂安隱三逹六通為世間道是名如來應供正覺遺形舍利造諸塔像莊嚴國土如須彌山村邑聚落次第羅匝城郭館宇如忉利天宫宫殿髙廣樓閣莊嚴四兵具足能伏怨敵國土豐樂無諸患難奉承先王正法治化人民良善慶無不利處雪山隂雪水流注百川洋溢八味清淨周匝屈曲順趣大海一切衆生咸得受用於諸國土殊勝第一是名震旦大宋揚都承嗣常勝大王之業德合天心仁廕四海聖智周備化無不順雖人是天護世降生功德寶藏大悲救世為我尊主常勝天子是故至誠五體敬禮呵羅單國王毗沙跋摩稽首問訊又表大吉天子足下離淫怒癡哀愍羣生相好具足天龍神等恭敬供養世尊威德身光明照如水中月如日初闕間自蒙普照十方其白如雪亦如月光清淨如華顔色照曜威儀殊勝諸天龍神之所恭敬以正法寶梵行衆僧莊嚴國土人民熾盛安隱快樂城閣髙峻如乾他山衆多勇士守護此城樓閣莊嚴道巷平正著種種衣猶如天服於一切國為最殊勝吉楊州城無憂天主愍念羣生安樂民人律儀清淨慈心深廣正法治化共養三寶名稱逺至一切並聞民人樂見如月初生譬如梵王世界之主一切人天恭敬作禮呵羅單跋摩以頂禮足猶如現前以體布地如殿陛道供養恭敬如奉世尊以頂著地曲躬問訊忝承先業家慶無量忽為惡子所見爭奪遂失本國今唯一心歸誠天子以自存命今遣毗紉問迅大家意欲自往歸誠宣訴復畏大海風波不逹今命得存亦由毗紉此人忠志其恩難報此是大家國今為惡子所奪而見驅擯意頗忿惋規欲雪復伏願大家聽毗糿買諸鎧仗袍襖及馬願為料理毗紉使得時還前遣闍邪仙婆羅訶蒙大家厚賜悉惡子奪去啓大家使知今奉薄獻願垂納受闍婆達國王師黎婆達陀阿羅跋摩奉文帝表元嘉十二年宋國大主大吉天子足下敬禮一切種智安隱天人師降伏四魔成等正覺轉尊法輪度脫衆生教化已周入于涅槃舍利流布起無量塔衆寶莊嚴如須彌山經法流布如日照明無量淨僧猶如列宿國界廣大民人衆多宫殿城郭如忉利天宫名大宋揚州大國大吉天子安處其中紹繼先聖王有四海閻浮提內莫不來服悉以兹水普飲一切我雖在逺亦霑靈潤是以雖隔巨海常遙臣屬願照至誠垂哀納受若蒙聽許當年遣信若有所須惟命是獻伏願信受不生異想今遣使主佛大陀婆副使葛抵奉宣微誠稽首敬禮大吉天子足下婆陀所啓願見信受諸有所請唯願賜聽今奉微物以表微心師子國王剎利摩訶南奉文帝表元嘉五年謹白大宋明主雖山海殊隔而音信時通伏承皇帝道德高逺覆載同於天地明照齊乎日月四海之外無往不伏方國諸王莫不遣信奉獻以表歸德之誠或泛海三年陸行千日畏威懷德無逺不至我先王以來唯以修德為正不嚴而治奉事三寶道濟天下欣人為善慶若在巳欲與天子共𢎞正法以度難化故托四道人遣二白衣送牙臺像以為信誓信還願垂音告天竺一迦毗黎國王月愛奉文帝表元嘉五年伏聞彼國據江傍海山川周固衆妙悉備莊嚴清淨猶如化城宫殿莊嚴街巷平坦人民充滿歡娛安樂聖王出逰四海隨從聖明仁愛不害衆生萬邦歸仰國富如海國中衆生奉順正法大王仁聖化之以道慈施羣生無所遺惜帝修淨戒軌道不及無上法船濟諸沈弱羣寮百官受樂無怨諸天擁護萬神侍衛天魔降伏莫不歸化王身端嚴如日初出仁澤普潤猶如大雲聖賢承業如日月天於彼真丹最為殊勝臣之所住名迦毗河東際于海其城四邉悉紫紺石首羅天護令國安隱國王相承未嘗斷絶國中人民率皆修善諸國來集共遵道法諸寺舍中皆七寶形像衆妙供具如先王法臣自修檢不犯道禁臣名月愛棄世王種惟願大王聖體和善羣臣百官悉自安隱今以此國羣臣吏民山川珍寶一切歸屬五體歸誠大王足下山海遐隔無由朝覲宗仰之至遣使下承使主父名天魔悉逹使主名尼陀逹此人由來良善忠信是故今遣奉使表誠大王若有所須珍竒異物悉當奉送此之境土便是王國王之法令治國善道悉當承用願二國信使往來不絶此反使還願賜一使具宣聖命備敕所宜欵至之誠望不空仄所白如是願加哀愍奉獻金剛指環摩勒金環諸寶物赤白鸚鵡各一頭百濟國王餘慶求賜除表世祖大明三年臣國纍葉偏受殊恩文武良輔世蒙朝爵行冠軍將軍右賢王餘紀等十一人忠勤宜在顯進伏願垂愍並聽賜除倭國王武上順帝表武倭王興之弟嗣兄立升明二年遣使上表詔除使持節都督倭新羅任那伽羅秦韓慕韓六國諸軍事安東大將軍倭王封國偏逺作藩於外自昔祖禰躬擐甲胄跋踄山川不遑寧處東征毛人五十五國西服衆夷六十六國渡平海北九十五國王道融泰廓土遐畿纍葉朝宗不愆于嵗臣雖下愚忝胤先緒驅率所統歸崇天極道徑百濟裝治船舫而句驪無道圗欲見吞掠抄邉𨽻虔劉不已每致稽滯以失良風雖曰進路或通或不臣亡考濟實忿寇讎壅塞天路控弦百萬義聲感激方欲大舉奄喪父兄使垂成之功不獲一簣居在諒暗不動兵甲是以偃息未捷至今欲練甲治兵申父兄之志義士虎賁文武效功白刃交前亦所不顧若以帝德覆載摧此強敵克靖方難無替前功竊自假開府儀同三司其餘假授以勸忠節氐人楊難當襲封武都王後自立為大秦王年號建義冦蜀兵敗奔魏後死於魏奉文帝謝罪表楊氏自漢末據有仇池世為氐王至宋髙祖踐阼改楊盛封武都王盛猶稱晉義熙之號盛子玄文帝時代立始奉元嘉正朔玄卒弟難當廢玄子而自立使流人司馬飛龍入益州為冦時太祖遣蕭思話代梁州刺史甄法護難當因舉兵襲梁州法護委郡奔洋川以其黨趙溫為梁州思話使司馬蕭道成進討所向克捷梁州平難當遣使奉表謝罪太祖以其邉裔下詔宥之臣聞生成之德含氣同係而榮悴殊塗遭遇異兆至於恩降自然誠無答謝夫以狂聖道隔猶存克念之誠况君親莫二不期自感者哉每思自竭奉遵先訓丹誠未諒大謗巳臻梁州刺史甄法護誣臣遣司馬飛龍擾亂西蜀諸所譖引言非一事長塗萬里無路自明風塵之聲日有滋甚與其逆生寧就清滅文武同憤制不自由遣參軍姚道賢齎書詣梁州刺史蕭思話尋續又遣詣臺歸罪道賢至西城為守兵所殺行李蔽擁日月莫照法護恇擾望風奔逃臣即回軍秋毫無犯權留少守以俟會通其後數旬官軍尋至守兵單弱懼不自免續遣輕兵共相迎接值秦流民懷土及本行將既旋不容禁制由臣約防無素以致斯闕臣本厯代守蕃世荷殊寵王化始基順天委命要名期義不在今日豈可假托妖妄毁敗成功如此之形灼然易見仰恃聖明必垂鑒察但臣微心不逹迹違忠順至乃聲聞朝廷勞煩師旅負辱之深罪當誅責逺隔遐荒告謝無地謹遣兼長史齊亮聽命有司并奉送所授第十一符䇿伏待天旨文帝詔報楊難當表如此悔謝前愆可特恕宥并特還章節河西王大且渠茂虔上文帝諡父蒙遜武宣表蒙遜受宋命為河西王薨第三子茂虔時為酒泉太守衆議欲立為主襲蒙遜位號元嘉十一年茂虔上表詔乃授封臣聞功以濟物為高非竹帛無以述德名以當實為美非諡號無以休終先臣蒙遜西復涼城澤憺昆裔芟夷羣暴清灑區夏暨運鍾有道備大宋之宗臣爵班九伏享惟永之丕祚功名昭著尅固貞節考終由正而請名之路無階懿迹雖𢎞而述敘之美有缺臣子痛感咸用不安謹案諡法尅定禍亂曰武善聞周逹曰宣先臣廓清河外勳光天府標榜稱迹實兼斯義輒上諡為武宣王若允天聽垂之史筆則幽顯荷榮始終無恨文帝詔使持節侍中都督秦河沙涼四州諸軍事車騎大將軍開府儀同三司領護胸奴中郎將西夷挍尉涼州牧河西王蒙遜才兼文武勳濟西服爰自萬里欵誠夙著方仗忠果翼宣逺略奄至薨隕悽悼于懷便遣使弔祭并加顯諡嗣子茂虔纂戎前軌乃心彌彰宜蒙寵授紹兹蕃業可持節散騎常侍都督涼秦河沙四州諸軍事征西大將軍領護胸奴中郎將西夷挍尉涼州刺史河西王朱道珍鬼與南陽劉廓書道珍嘗為孱陵令廓為荆州參軍每與圍碁日夜相就局子略無暫輟道珍以宋元徽三年六月二十六日亡至九月廓坐齋中忽見一人以書授廓云朱孱陵書廓開書看是道珍手迹既讀書失信所在寢疾尋卒每思棊聚非意致闊方有來緣想能近領述異記事領渚宫遺作顧青州古冢銘南齊書云孝武世青州人發古冢得銘帝問學士鮑照徐爰蘇寶生並不能悉賈淵對曰此是司馬越女嫁茍晞兒撿試果然青州世子東海女郎岱嶽神教義熙五年宋髙祖伐廣固岱廟女巫秦氏能降靈宣教因訪捷期乃稱神教天授英輔神麾所擬有征無戰蕞爾小虜不足制也到來年二月五日當尅宋文紀卷十八
