body:
  text: 宋文紀卷十明梅鼎祚編謝靈運小字客兒陳郡陽夏人晉車騎玄之孫襲封康樂公文章之美江左莫逮仕晉祕書丞入宋厯轉太子左衛率出為永嘉太守臨川內史坐狂悖徙廣州棄市撰征賦序靈運義興中為黃門侍郎髙祖北征奉使慰勞於彭城作撰征賦蓋聞昏明殊位貞晦異道雖景度回革亂多治寡是故升平難於恆運剝喪易以橫流皇晉受命河汾來遷吳楚數歷九世年踰十紀西秦無一援之望東周有三辱之憤可為積禍纒釁固以久矣况乃陵塋幽翳情敬莫遂日月推薄帝心彌逺慶靈將升時來不爽相國宋公得一居貞回乾運軸內匡寰表外清遐陬每以區宇未統側席盈慮值天祚悠興昧弱授機龜筮元謀符瑞景徵於是仰祗俯協順天從兆興止戈之師躬暫勞之討以義熙十有二年五月丁酉敬戒九伐申命六軍治兵于京畿次師于汳上雲檣千艘靁輜萬乘羽騎盈塗飛旍蔽日别命羣帥誨謨惠䇿法竒於三略義祕於六韜所以鉤棘未曜殞前禽於金墉威弧始彀走鈒隼於滑臺曾不踰月二方獻捷宏功懋德獨絶古今天子感東山之劬勞慶格天之光大明發興於鑒寐使臣遵于原隰余攝官承乏謬充殊役皇華愧於先雅靡盬悴于征人以仲冬就行分春反命塗經九守路踰千里沿江亂淮遡薄泗汳詳觀城邑周覽丘墳眷言古迹其懷巳多昔皇祖作藩受命淮徐道固苞桑勳由仁積年月多歷市朝巳改永為洪業纒懷清厯於是采訪故老尋履往迹而逺感深慨痛心殞涕遂寫集聞見作賦撰西征俾事運遷謝託此不朽山居賦序靈運少帝時出守永嘉稱疾去職移籍會稽修營别業傍山帶江盡幽居之美作山居賦并自注古巢居冗處曰巖棲棟宇居山曰山居在林野曰丘園在郊郭曰城傍四者不同可以理推言心也黃屋實不殊於汾陽即事也山居良有異乎市㕓抱疾就間順從性情敢率所樂而以作賦揚子雲云詩人之賦麗以則文體宜兼以成其美今所賦既非京都宫觀逰獵聲色之盛而敘山野草木水石穀稼之事才乏昔人心放俗外詠於文則可勉而就之求麗邈以逺矣覽者廢張左之艷辭尋臺皓之深意去飾取素儻值其心耳意實言表而書不盡遺迹索意託之有賞羅浮山賦序客夜夢見延陵茅山在京之東南明旦得洞經所載羅浮山事云茅山是洞庭口南通羅浮正與夢中意相會遂感而作羅浮山賦歸塗賦序昔文章之士多作行旅賦或欣在觀國或怵在斥徒或述職邦邑或羈役戎陳事由于外興不自已雖髙才可推求懷未愜今量分告退反身草澤經塗履運用感其心感時賦序夫逝物之感有生所同穨年致悲時愳其速豈能忘懷乃作斯賦擬魏太子鄴中集詩序魏太子建安末余時在鄴宫朝逰夕宴究歡愈之極天下良辰美景賞心樂事四者難并今昆弟友朋二三諸彥共盡之矣古來此娛書籍未見何者楚襄王時有宋玉唐景梁孝王時有鄒枚嚴馬逰者美矣而其主不文漢武帝時徐樂諸才備應對之能而雄猜多忌豈獲晤言之適不誣方將庶必賢於今日爾嵗月如流零落將盡撰文懷人感往增愴王粲家本秦川貴公子孫遭亂流寓自傷情多陳琳袁本初書記之士故述喪亂事多徐幹少無宦情有箕穎之心事故仕世多素辭劉楨卓犖偏人而文最有氣所得頗經竒應瑒汝潁之士流離世故頗有飄薄之歎阮瑀管書記之任故有優渥之言平原侯植公子不及世事但美遨逰然頗有憂生之嗟述祖德詩序太元中王父龕定淮南負荷世業尊主隆人逮賢相徂謝君子道消拂衣蕃嶽考卜東山事同樂生之時志期范蠡之舉謝封康樂侯表靈運祖玄晉太元中封康樂郡公安帝時靈運降封襲侯昔強氐暴虐恃僣歷紀既噬五都志吞六合遂陷沒西河傾覆南漢凌藉紀郢跨越淮泗于時䇿畫惟疑地險已謝咸愳君臣同泯有生無餘亡祖奉國威靈董符戎重盡心所事尅黜禍亂功參盤鼎胙土南服逮至臣身值遭泰路日月改暉榮落代運輸稅唐化生幸無已不悟天道下濟鴻均曲成乃眷遐績式是興微分虎紐龜復顯茅土鳴玉拖紱班景元勛澤洽往德恩覃來胤永惟先蹤逺感崩結豈臣尩弱所當忝承臣聞至公無私甄善則一皇恩逺被殘代可侔是以信陵之賢簡在髙祖之心望諸之道復獲隆漢之封觀史嘆古欽兹盛美豈謂榮渥近霑微躬傾宗殞元心識其會酬恩答厚罔知所由詣闕上自理表靈運為祕書監解職東還鑿山浚湖功役無巳嘗自始寧南山伐木開徑直至臨海從者數百人在會稽亦多徒衆驚動縣邑顗為太守與靈運積構讐隟乃表其異志發兵自防靈運詣闕上表自理太祖以靈運為臨川內史在郡逰放不異永嘉為有司所紏徙付廣州尋于廣州棄市臣自抱疾歸山于今三載居非郊郭事乖人間幽棲窮巖外緣兩絶守分養命庶畢餘年忽以去月二十八日得會稽太守臣顗二十七日疏云比日異論噂􅊱此雖相了百姓不許寂默今微為其防披疏駭惋不解所由便星言奔馳歸骨陛下及經山隂防衛彰赫彭排馬槍斷絶衢巷偵羅縱橫戈甲竟道不知微臣罪為何事及見顗雖曰見亮而裝防如此唯有罔懼臣昔沗近侍豫蒙天恩若其罪迹炳明文字有證非但顯戮司敗以正國典普天之下自無容身之地今虛聲為罪何酷如之夫自古讒謗聖賢不免然致謗之來要有由趣或輕死重氣結黨聚羣或勇冠鄉邦劍客馳逐未聞俎豆之學欲為逆節之罪山棲之士而構陵上之釁今影迹無端假謗空設終古之酷未之或有匪吝其生實悲其痛誠復內省不疚而抱理莫申是以牽曵疾病束骸歸欵仰慿陛下天鑒曲臨則死之日猶生之年也臣憂怖彌日羸疾發動尸存恍惚不知所陳勸伐河北書靈運徴為祕書監多稱疾不朝太祖諷令表陳賜假東歸臨行上書自中原喪亂百有餘年流離冦戎湮沒殊類先帝聰明神武哀濟羣生將欲蕩定趙魏大同文軌使久凋反於正化偏俗歸於華風運謝事乖理違願絶仰德抱悲恨存生盡况陵塋未幾敵人伺隙預在有識誰不憤歎而景平藝事並非其才且遘紛京師豈慮託付遂使孤城窮陷莫肻拯忠烈囚朔漠綿河三千翻為冦有晚遣鎮戍皆先朝之所開拓一旦淪亡此國恥宜雪被於近事者也又北境自染魏人窮苦備罹徵調賦斂靡有止巳所求不獲輒致誅殞身禍家破闔門比屋此亦仁者所謂傷心者也咸云西夷舍末逺師隴外東夷乘虛呼可掩襲西軍既反得據關中長圍咸陽還路已絶雖遣救援停住河東遂乃逺討大城欲為首尾而西冦深山重阻根本自固徒棄巢窟未足相拯師老於外國虛於內時來之會莫復過此觀兵耀威實在今日若相持未巳或生事變忽值新起之衆則異於今茍乖其時難為經略雖兵食倍多則萬全無必矣又歷觀前代類以兼弱為本古今聖德未之或殊豈不以天時人事理數相得興亡之度定期居然故古人云既見天殃又見人災乃可以謀昔魏氏之強平定荆冀乃乘袁劉之弱晉氏之盛拓開吳蜀亦因葛陸之衰此皆前世成事著於史䇿者也自羌平之後天下亦謂敵當俱滅長驅滑臺席卷下城奪氣喪魄指日就盡但長安違律潼關失守用緩天誅假延嵗月日來至今十有二載是謂一紀曩有前言况五國代興世數已屆餘命盡於來年自相攻伐兩取其困卞莊之形驗之今役仰望聖澤有若飢渴注心南雲為日已久來蘇之冀實歸聖明此而弗乘後則未兆即日府藏誠無兼儲然凡造大事待國富兵強不必乘會於我為易責在得時器械既充衆力粗足方於前後乃當有優常議損益久證冀州口數百萬有餘田賦之沃著自貢典先才經創基趾猶存澄流引源桑麻蔽野強富之實昭然可知為國長久之計孰若一往之費耶或懲關西之敗而謂河北難守二境形勢表裏不同關西雜居種類不一昔在前漢屯軍霸上通火甘泉况乃逺戍之軍值新故交代之際者乎河北悉是舊户差無雜人連嶺判阻三關作隘若逰騎長驅則沙漠風靡若嚴兵守塞則冀方山固昔隴西傷破鼂錯興言胸奴慢侮賈誼憤歎方於今日皆為賖矣晉武中主耳值孫皓虐亂天祚其德亦由巨平奉䇿荀賈折謀故能業崇當年區宇一統况今陛下聰明聖哲天下歸仁文德與武功並震霜威共素風俱舉協以宰輔賢明諸王美令嶽牧宣烈虎臣盈朝而天威逺命亦何敵不滅矧伊頑冦假日而已哉伏惟深機志務久定神謨臣卑賤側陋竄景巖穴實仰希太平之道傾覩岱宗之封雖乏相如之筆庶免史談之憤以此謝病京師萬無恨矣久欲上陳懼在觸置蒙賜恩假暫違禁省消渴十年常慮朝露抱此愚志昧死以聞與廬陵王義真箋靈運移籍會稽與隱士王𢎞之孔淳之等縱放為娛有終焉之志𢎞之字方平琅邪人仕衛軍參軍解職家會稽上虞始寧汰川有佳山水依巖築室淳之字彥深魯人愛好墳籍居會稽剡縣阮萬齡尉氏人亦家剡縣永初及元嘉並徴不就淳之後起應命會稽既豐山水是以江左嘉遁並多居之但季世慕榮幽栖者寡或復才為時求弗獲從志至若王𢎞之拂衣歸耕踰歷三紀孔淳之隱約窮岫自始迄今阮萬齡辭事就間纂成先業浙河之外栖遲山澤如斯而巳既逺同羲唐亦激貪厲競殿下愛素好古常若布衣每意昔聞虛想巖冗若遣一介有以相存真可謂千載盛美也與弟二首聞惡道溪中九十九里有五十九灘王右軍逰此惡道歎其竒絶遂書突星瀨于石圗經麗水縣有惡道惡道有突星瀨謝靈運與弟書永嘉記曰王右軍逰惡道歎其竒絶遂書突星瀨於石見太平御覽永嘉記以下非謝書也又前月十二日至永嘉郡蠣不如鄞縣車螯亦不如北海逰名山志并序夫衣食人生之所資山水性分之所適今滯所資之纍擁其所適之性耳俗議多云歡足本在華堂枕嵓漱流者乏於大志故保其枯稿余謂不然君子有愛物之情有救物之能橫流之弊非才不治故有屈己以濟彼豈以名利之場賢於清曠之域耶語萬乘則鼎湖有縱轡論儲二則嵩山有絶控又陶朱髙揖越相留侯願辭漢傅推此而言可以明矣破石溪南二百餘里又有石帆修廣與破石等度質色亦同傳云古有人以破石之半為石帆故名彼為石帆此名破石永寧安固二縣中路東南便是赤石又枕海巫湖三面悉髙山枕水渚山溪澗凡有五處南第一谷今在所謂石壁精舍石門澗六處石門遡水上入兩山口兩邉石壁右邉石巖下臨澗水神子溪南山與七里山分流去斤竹澗數里華子岡麻山第三谷故老相傳華子期者祿里先生弟子翔集此頂故華子為稱也桂林頂逺則嵊尖疆中從臨江樓步路南上二里餘左望湖中右傍長江始寧又北轉一汀十里直指舍下園南門樓自南樓百步許對橫山西南有石門山兩巖間微有門形故以為稱瀑布飛瀉丹翠交曜廬山宋武帝誄九有同悲四海等哀矧伊下臣思戀徘徊敢遵前典式述聖徽乃作誄曰舜潛歷巖髙晦泗渚龍德而隱風積乃舉皇之遁世屯難方阻眷此區寰閔爾淪胥太元之季權戚攜薄隆安之初主相蒙弱嶽牧糾虔朝廷紛錯妖橫乘隟蛟噴鯨躍既擾奧區遂斥帝廛亂離斯瘼不後不先實賴明哲授手康旃紀度回薄餘分成閏舊晉中微偽楚藉釁躡彼潛機整此英陳推亡必朽固存斯振盧循負險肆慝遐嶺殄我江豫迫我臺省民既搖蕩國將遷鼎乘騶歸轅式固皇境𢎞危濟險弭難釋殆虎騎騖隰舟師漲海傾冗尋巢窮幽測昧昔去洛汭息肩江沚世更十君年踰百祀國絶興復家成桑梓荒默莫恤頽國誰恥夏典載禹九道是行商誥述湯兼攻是并勤彼周流協此經營仗鉞伐鼓赫赫明明乃敕衆師竟執戎昭誨以三略惠以六韜雲撤周京席卷秦郊復禮前塋雪愧舊朝既清西關將旋東道中憩徐豫兼應燕趙業盛曩代惠侔大造澤及四海功格八表悠悠聲教綿綿川陸北獻氊裘南貢金竹髽首冠辨穿胸斂服寒冗欣日巢栖玩屋匪惟遐談靈物偕就孰是人事自天所祐甘露芝草祥雲瑞宿嘉禾連木素烏皓獸昔之所感謳頌同音今之所應幽顯一心宋克虞德晉猶唐欽曰總八紘于兹三齡四維開張九流昭明敦儉務素欽賢愛萌制規作訓闡教修經禮樂已甄雲雨未𢎞將陟井陘薄掃白登北朔渴望飛旌衡輣東岱靈遲玉牒金縢天地不征蒼生寡福巳荷一遇棄我何速梁顛木頽甘殞以贖同軌畢至率土咸哀殊方均服欒欒素縗灑淚成雨響呌如雷史臣考卜髙山開基貞龜無逺遷靈有期孠皇劈摽羣后崩悲孰云不戚痛百在兹惟祖之夕流火始變秋月未永飛漏急箭鳴簫哀噭金觴虛奠列駕長隧發輦華殿華殿既謝長隧是幸雙蓋躊躇六間引領攀援容貌眷戀俄頃哀哀百僚長辭含哽奉教百朝執鞭三始從履五牧年歷十祀天光下濟謬蒙眷齒愧微刀筆頗預逰止垂幕侍講接筵餐理修曙朗夕登臺泛沼匪月匪日無晏無早如何一旦緬邈穹昊徽容未逺聖靈超然收淚即路含戚何言風霜蕭瑟山海蒼茫地苦情矜節速心傷孰是幽哀實戀我皇情思如環萱蘇豈忘宋廬陵王誄廬陵王義真與靈運情欵異常構扇異同非毁執政徐羡之等患之出為永嘉太守奏廢義真為庶人徙新安尋使人殺之靈運為之誄又有廬陵王墓下詩事非淮南而痛深於中霧迹非任城而暴甚於仰毒託體皇極銜怨至盡豈惟有識傷慨故亦率土悽心蓋出罔巳之悲以陳酸切之事云爾誄曰哀哀君王終仁且德在枉無言即罪有默曾是忍虐古來一酷身微咎纍痛踰鴆毒何斯禍斯乃怨乃辱命如可延人百其贖矜急景之難留悼驚波之易淪自君王之冥漠歷彌稔於此春聆鳴禽之響谷視喬木之干雲咸感節而興恱獨懷悲而莫申侯射隼于髙墉赫王典以正刑服二辜于北犴致九伐于南荆發酸痛于仁詔令寵贈于哀心布悽楚于帝言攄綢繆于皇音書袟銘懷幽卷賾戢妙抱密用舍以造舒卷不失亮惟勤玩無或暇逸侍泛舟贊泛鷁兮逰蘭池渚相委兮石參差日隱雲兮月照林風遼泠兮水漣漪謝惠連靈運族弟與靈運等以文章賞會有才悟而輕薄仕彭城王法曹行參軍祭周居士文藝文為學生祭周居士文維君陶造化之純元侔先哲之遐蹤體無事於髙尚蹈虛素乎中庸不臣天子不事諸侯公辟弗昐王命匪酬窮歡極樂帶索被裘祭禹廟文謹遣左曹掾奉水土之羞敬薦夏帝之靈咨聖繼天載誕英徽克明克哲知章知微運此宏謨恤彼民憂身勞五嶽形疲九州呱呱弗顧虔虔是欽物貴尺璧我重寸隂乃錫玄圭以告成功虞數既改夏德乃隆臨朝總政巡國觀風淹留稽嶺乃徂行宫恭司皇役敬屬暉融神且略薦乃昭其忠祭古冢文并序東府掘城北塹入丈餘得古冢上無封域不用磚甓以木為槨中有二棺正方兩頭無和明器之屬材瓦銅漆有數十種多異形不可盡識刻木為人長三尺可有二十餘頭初開見悉是人形以物棖撥之應手灰滅棺上有五銖錢百餘枚水中有甘蔗節及梅李核瓜瓣皆浮出不甚爛壞銘志不存世代不可得而知也公命城者改埋於東岡祭之以豚酒既不知其名字逺近故假為之號曰冥漠君云爾元嘉七年九月十四日司徒御屬領直兵令史統作城録事臨漳令亭侯朱林具豚醪之祭敬薦冥漠君之靈恭總徒旅版築是司窮泉為塹聚壤成基一槨既啓雙棺在兹捨畚悽愴縱鍤漣洏芻靈巳毁塗車既摧几筵糜腐俎豆傾低盤或梅李盎或醢醯蔗傳餘節瓜表遺犀追惟夫子生自何代曜質幾年潛靈幾載為夀為天寧顯寧晦銘志湮滅姓字不傳今誰子後曩誰子先功名美惡如何蔑然百堵皆作十仞斯齊墉不可轉塹不可回黃腸既毁便房巳頽循題興念撫俑增哀射聲垂仁廣漢流渥祠骸府阿掩骼城曲仰羡古風為君改卜輪移北隍窀穸東麓壙即新營棺仍舊木合葬非古周公所存敬遵昔義還祔雙魂酒以兩壺牲以特豚幽靈髣佛歆我犧樽嗚呼哀哉連珠蓋聞獻技者易忽養德者難致是以子張重趼不獲哀公之祿干木偃息不受文侯之位蓋聞機心難湛不接異類淳德易孚可狎殊方是以髙羅舉而雲鳥降海人萃而水禽翔蓋聞春蘭早芳實忌鳴鴂秋菊晚秀無憚繁霜何則榮乎始者易悴貞乎末者難傷是以傅長沙而志沮登金馬而名揚蓋聞修己知足慮得其逸竟榮昧進志忘其審是以飲河滿腸而求安愈泰緣木務髙而畏下滋甚雪贊藝文類聚氣遍霜繁年豐雪積彼厲我和爾素子白其德懿矣玩之庭隙權陋瑶臺暫踐盈尺四海贊九夷六蠻八狄七戎雕鏤異質裳裸殊風致之以德車軌斯同琴贊嶧陽孤桐裁為鳴琴體兼九絲聲備五音重華載揮以養民心孫登是玩取樂山林白羽扇贊唯兹白羽體此皎潔涼齊清風素同白雪其儀可貴是用玩悅揮之襟袖以御炎熱仙人草贊余之中園有仙人草焉春穎其苗夏秀其英秋有貞實冬無雕色可謂貫四時而不改者也既嘉其名而美其質染筆作詠庶以攄述云園有嘉草名曰仙人曄曄煒煒莫莫臻臻穎發炎暑苗秀和春竒爾靈質乃植中鄰松贊松惟靈木擬心雲端迹絶玉除形寄青巒子欲我知求之嵗寒目針氣之清明雙眸善識唯道是視瞻彼正直口針宣納之由實伊樞機唯舌是出馳駟安追差釐千里君子慎微何用口爽信在甘肥鮑照字明逺東海人文辭贍逸厯選中書舍人初為臨川王義慶國侍郎及臨川王子頊鎮荆州為前軍參軍子頊舉兵敗遇害為栁令謝驃騎表臣言伏承詔書加臣驃騎將軍餘如故顧循空薄屢墜成命仰當天寵伏抱慙灼臣素陋人本絶分望適野謝山川之志輟耕無鴻鵠之歎宦希鄉部富期農牧夙當昌朝早值恩洽天綱紛橫皇歷歸聖佐輪不殷良馬未汗功半下列爵超上賞奮迹騰光參差駕服翰起雲飛拂翼虹路雖曩之稅駕拖紫襟擔丹轂方之微臣彼安足齒齊此而歸懼塵王度况遂頻煩重彰濫越伏願天德曲成資始令終雨露之惠自華及殞特屈慈奬降申愚固則綢繆之施復踰造物不勝感躍惶駭之情謹拜表以聞解褐謝侍郎表臣照言臣孤門賤生操無炯迹鶉棲草澤情不及官不悟天明廣矚騰滯援沈觀光幽節聞道朝年榮多身限思非終報臣云云謝秣陵令表時為中書舍人臣照言即日被尚書召以臣為秣陵令臣負鍤下農執羈末皂情有局塗志無逺立遘命逢天得汙官牒不悟恩澤無窮謬當奬試用謝刀筆猥承宰職豈是暗懦所能克任今便抵召違離省闥係戀罔極不勝下情謹拜表以聞謝賜藥啓臣衛躬不謹養命無術情淪五難妙謝九法飇落先傷衰痾早及遐缺近臨猥委存恤􅠰同山嶽蒙靈藥之賜惠非河間謬仙使之屈恩逾脯糗惠重帷席荷對銜慙伏抱襟渥謝永安令解禁止啓臣田茅下第質非謝品志終四民希絶三仕邀世逢辰謬及推擇恩成曲積榮秩兼過雖誓投纎生昊天罔極迄無犬馬孤慙星嵗加以淪節雪飇沈誠欵晦值天先燭幽神照廣察澡疊從宥與物更稟遂晞曬陽春湔汰秋水綴翼雲條葺鮮決沼洗膽明目抃手太平重甄再造含氣孰比不悟乾陶彌運復垂埏飾驕迹升等改觀非服振纓珥筆聫承貴寵豈臣浮朽所可恭從實非愚瞢所宜循踐瑣族易灰脆漏已迫空荷載燾終責仰復飲氷肅事懹火畢命不勝屏營之情謹啓事以聞論國制啓臣啓臣聞尺之量錦工者裁之袤丈之木繩墨在焉事無巨細非法不行當今世間政睦藩國相望君舉必書動成準式息躬聖壤十有餘載條制節文宜其備矣諸王列封動靜兼該而竊見國之處事未盡善臣之暗蔽私心有惜伏見彭城國舊制猶有數卷雖多殊革大綱可依愚謂宜令掌故刋而撰之上著朝典藩邦之度下揆國訓繁簡之誼傍酌州縣寬猛之中章程久具永為恆制豈伊今美乃足貴之將來臣忝充直員脫以啓聞煩而非要伏追慙悚謹啓謝上除啓臣言被宣賜臣上除臣伏事日淺蒙荷巳豐天澤所及且喜且懼但臣自丁常梪來塗階級非所敢冀今日榮願直爾不少冒乞停止上除伏望重許干穢悚息通世子自解僕以常梪無用於世遭逢謬幸被受恩榮誠願論畢久宜捐落仁眷篤終復獲淹停感今惟昔銜佩無巳但自無堪尸素纍載腹心之愧寤寐為憂今請解所職願蒙矜許自奉清塵于兹六祀墜辰永往遺恩在心執紙哽咽言不自宣重與世子啓奉還誨深承殷勤篤眷之重披讀未終悲愧交集僕以常人所蒙隆厚久應知退非適今日銜恩戀德用缺進心今者之請必願鑑許且僕棲遲無事咫尺館第餐稟風微非旦則夕居職還私兩者無異而于僕無用有以自處豈非仁念始終之惠重致于日彌深慙感謝假啓二首臣啓臣居家乏治上漏下濕暑雨將降有懼崩壓比欲完葺私寡功力板鍤陶塗必須躬役冒欲請假三十日伏願天恩賜垂矜許干啓復追悚息謹啓臣啓臣所患彌留病顧沈痼自近蒙歸頻更頓處日夜間困或數四委然一弊瞻景待化加以凶衰嬰遘慘悼終鮮兄弟仲由所哀臣實百罹孤苦風雨天倫同氣實惟一妹存沒永訣不獲計見封瘞泉壤臨送私懷感恨情痛兼深臣母年老經離憂傷服粗食淡羸耗增疾心計焦迫進退罔躓冒乞申假百日伏願天慈賜垂矜許臣違福履身事屯悴歎息和景掩淚春風執啓涕結伏追惶悚謹啓奉始興王白紵舞歌詞啓侍郎臣鮑照啓被教作白紵舞歌詞謹竭庸陋裁為四曲附啓上呈職方淟悴思塗猥局言既無雅聲未能文不足以宣贊聖旨抽拔妙實謹遣簡餘慙隨悚盈謹啓侍郎上疏臣言臣北州衰淪身地孤賤衆善必達百行無一生丁昌運自比人曹操乏端槩業謝成迹徂年空往瑣心靡述褫轡投簮於斯終志束菜負薪期與相畢安此定命忝彼公朝不悟乾羅廣收圎明兼覽雕瓠飾笙備雲和之品潢汙流藻充金鼎之實鎩羽暴鱗復見翻躍枯楊寒炭遂起煙華未識微躬猥能及此未知陋生何以為報祗奉恩命憂愧增灼不勝感荷屏營之情謹詣閣拜疏以聞謝解禁止疏臣言被宣令解臣禁止天光鄭重不可勝逢飛走知感矧臣人類臣聞獲過于神或慿尸祝以請得罪于君可因左右而謝臣自惟孤賤盜幸榮級暗澀大誼猖狂世禮竒非阮籍無保持之助才愧馮衍有轁􅀈之困自非聖明超然覽臣于視聽之外則今日渥澤更成妄遭來辰萎葉終先朝草小人嵗暮知能何報徒厚恩華憂懼歎息不任下情謹詣拜疏以聞侍郎滿辭閣疏臣言臣所居職限滿今便收迹金閨雲路從兹自逺鮪􅀈沈藏方絶光景祗戀遲回結涕濡泗臣嚚杌窮賤情嗜踳昧身弱涓甃地幽井谷本應守業墾疁剿芿牧雞圈豕以給征賦而幼性猖狂因頑慕勇釋擔受書廢耕學文畫虎既敗學步無成反拙歸跂還陋燕雀日晏途逺塊然自喪加以無良根孤伎薄既同馮衍負困之纍復抱相如痟渴之疾志逐軍離事與曩合束馬埋輪絶遊息世宿福餘慶爰遘聖明煦蒸霜霰莩甲雲落得從下走叨迹人行操勒負羇班榮扈𨽻矜愚訓短哀有弗及奉此而歸足以沒齒雖摩肌髮無報天德更冀營魂還能結草不勝感戀之情謹詣闕拜疏奉辭以聞轉常侍上疏臣言即日被中曹板轉臣為左常侍臣自惟常人觸事無可謬被拔擢實惟光榮臣既無髣佛上報殊絶之恩有分每豐其過前後輕重輒得原恕奬以君子之方赦其不間教訓大愆不責矜澤必加是臣所以夙夜自念知遭遇之至深至厚也末冀未望便荷今榮欣喜感恱不敢偽讓庶保終始身命為初不勝下情謹詣閣拜疏謝以聞征北世子誕育上疏臣等言臣聞本枝無疆布諸前典衆多彌貴信之華封故德積則慶深業昌則祚廣伏承王子以中氣正月鍾靈納和誕躬紫閣應祚朱紱弧天夙陳圭璋攸覿雲光麗輝巖澤昭采嘉祥爰孚柔顔載晬凡在氓𨽻莫不忭恱臣霑恩踰物慶倍自中不勝殊歡溢喜謹奉表以聞謝隨恩被原疏臣言即日被曹宣命元統內外五刑以下浩澤蕩汰臣亦預焉得從漢律故謬之辨暗遭周典肆眚之科大喜卒至非願所圗魚愕雞晲且悚且慙臣誠下愚不達義方然君尊臣恭豈同犬馬且常侍臣淵穆疏草即臣所作助人為恭猶加敬憶自巳率禮寧敢慢忘由臣悴賤可侮可誣曾參殺人臣豈無過寢病幽栖無援朝列身孤節卑易成論硋幸大明臨下仁道育物澤泊翾走臣覃末慶然古人有言楊者易生之木也一人植之十人拔之無生楊矣何則植之者難拔之者易况臣一植之功不立衆拔之過屢至同彼風霜異此貞脆書稱天秩有禮易載神福在謙臣之謙禮理謝福秩仰銜俯愧行歎坐戚即欲顛沛拜恩下庭但臣病久柴羸不堪冒涉小得趨馳星駕登路不勝荷佩之誠謹上疏以聞皇孫誕育上疏兼郎中令侍郎臣等言伏承東儲積慶皇孫誕育國啓昌期民迎福運臺禁稱祉井廬相賀伏惟聖懷載深鴻悆不任下情謹詣閣上疏以聞登大雷岸與妹書吾自發寒雨全行日少加秋潦浩汗山溪猥至渡沂無邉險徑逰棧石星飯結荷衣水宿旅客貧辛波路壯濶始以今日食時僅及大雷塗登千里日踰十晨嚴霜慘節悲風斷肌去親為客如何如何向因涉頓憑觀川陸遨神清渚流涕方曛東顧三洲之隔西眺九派之分窺地門之絶景望天際之孤雲長圗大念隱心者久矣南則積山萬狀爭氣負髙含霞飲景參差代雄凌跨長隴前後相屬帶天有匝橫地無窮東則砥原逺隰亡端靡際寒蓬夕卷古樹雲平旋風匹起思鳥羣歸靜聽無聞極視不見北則陂池潛演湖脈通連苧蒿攸積菰蘆所繁栖波之鳥水化之蟲智吞禺強捕人號噪驚聒紛乎其中西則回江永指長波天合滔滔何窮漫漫安竭創古迄今舳艫相接思寫不測修靈浩蕩知其何故哉西南望廬山又特驚異基壓江潮峰與辰漢連接上常積雲霞雕錦褥若華夕曜巖澤氣通傳明散綵赫似絳天左右青靄表裏紫霄從嶺而上氣甚金光半山以下純為黛色信可以神居帝郊鎮控湘漢者也若潨洞所積溪壑所射鼓怒之所豗擊湧澓之所蕩滌則上窮荻浦下至狶洲南薄燕瓜北極雷澱削長埤短可數百里中騰波觸天髙浪灌日吞吐百川寫泄萬壑輕煙不流華鼎振涾弱草朱靡洪漣隴蹙散渙長驚電透箭疾穹溘崩聚坻飛嶺覆回沫冠山奔濤空谷砧石為之摧碎倚岸為之􅀢落仰視大火俯聽波聲愁魄脅息心驚慓矣至於繁化殊育詭質怪章則有江鵝海鴨魚鮫水虎之類豚首象鼻芒鬚針尾之族石蟹土蚌燕箕雀蛤之儔折甲曲牙逆鱗返舌之屬掩沙漲被草渚浴雨排風吹潦㺯翮夕景欲沈曉霧將合孤雛寒嘯逰鴻逺吟樵蘇一歎舟子再泣誠足悲憂不可説也風吹雷飇夜戒前路下弦內外望達所屆寒暑難適汝專自慎夙夜戒護勿我為念恐欲知之聊書所覩臨塗草蹙辭意不周河清頌并序美元嘉中河濟俱清當時以為瑞照為頌其序甚工臣聞善談天者必徴象於人工言古者先考績於今鴻羲以降遐哉邈乎鏤山嶽雕篆素昭德垂勳可謂多矣而史編唐堯之功載格于上下樂登文王之操稱於昭于天素狐玄玉聿彰符命朴牛文蚓爰定祥厯魚鳥動色禾稚興讓皆物不盈眥而美溢金石頌聲為之而寢詩人於是不作庸非惑歟自我皇宋之承天命也仰應龍木之精俯協龜水之靈君圍帝寶粲爛瑰英固以業光曩代事華前德矣聖上天飛踐極迄兹二十有四載道化周流玄澤汪濊地平天成含生阜熙文同軌通表裏釐福曜德中區黎庶知讓觀英遐外夷貊懷惠秩禮恤勤散露臺之金賑民舒國傾御邸之粟約違迫脅奢去甚泰宴無留飲畎不盤樂物色異人優遊鯁直顯靡失心幽無怨魄精照日月事洞天情故不勞仗斧之使號令不肅而自嚴無辱鳳舉之事靈怪不名而自彰萬里神行飇塵不起農商野廬邉城偃柝冀馬南金填委內府馴象棲爵充羅外苑阿紈纂組之饒衣覆宗國魚鹽杞梓之利傍贍荒遐士民殷富繁軼五陵宫宇宏麗崇冠三川閭閈有盈歌吹無絶朱輪疊轍華冕重肩豈徒世無窮人民獲休息朝呼韓罷酤鐵而巳哉是以嘉祥纍仍福應尤盛青丘之狐丹冗之鳥栖阿閣遊禁園金芝九莖木禾六秀銅池發膏畝腴宜以謁薦宗廟和協律吕煙霏霧集不可勝紀然而聖上猶夙興昧旦若有望而未至宏規逺圗如有追而莫及神明之貺推而弗居也是以琬碑鏐檢盛典蕪而不治朝紳省方大化抑而未許崇文協律之士藴儛頌於外坐朝陪宴之臣懷揄揚於內三靈佇眷九壤注心既有日矣嵗宫乾維月纒蒼陸長河巨濟異源同清澄波萬壑潔瀾千里斯誠曠世偉觀昭啓皇明者也語曰影從表瑞從德此其效焉宣尼稱鳳鳥不至河不出圗傳曰俟河之清人夀幾何皆傷不可見者也然則古人所未見者今殫見之矣孟軻曰千載一聖是旦暮也豈不信哉夫四皇六帝樹聲長世大寶也澤浸羣生國富刑清鴻德也制禮裁樂惇風遷俗文教也誅箠羯黠束顙象闕武功也鳴禽躍魚滌穢河渠至祥也大寶鴻德文教武功其崇如此幽明同贊民祗與能厥應如彼唯天為大堯實則之皇哉唐哉疇與為抑又聞之勢之所覃者淺則美之所傳者近道之所感者深則慶之所流者逺是以豐功韙命潤色縢䇿盛德形容藻被歌頌察之上代則奚斯吉甫之徒鳴玉鑾於前視之中古則相如王褒之屬馳金羈於後絶景揚光清埃繼路故班固稱漢成之世奏御者千有餘篇文章之盛與三代同風由是言之斯乃臣子舊職國家通議不可輟也臣雖不敏敢不勉乎乃作頌曰窺刋崩石捃逸殘竹巢風寂寥羲埃綿邈巨生大年贍學淵聞鞶繡成景粉繢顓軒徒玩井科未覩天河亘古通今明鮮晦多千齡一見書史登歌旋我皇駕揆景方塗凌周躐殷蹶唐轢虞如彼七緯纍璧重珠髙祖撥亂首物定靈更開天地再鑄羣生帝御三傑龍步八坰朔南暨教海北騰聲淪深格髙浹遐洞冥毚鼎遷宋玄圭告成大明方徽鴻光中微聖命誰堪皇厯攸歸謀從筮協神與民推廣旗西映紫蓋東輝納瑞螭玉升政衡機金輪豹飾珠冕龍衣正位北辰垂拱南面天下何思日用罔倦復禮歸仁觀恆通變一物有違戚言毁膳非躬簡法厚下安宅謙德彌光損道滋益孝崇享祀勤隆耕籍饘酎秋羊封墐春骼嬰耄兼粱鰥孤重帛體由學染俗以教遷禮導刑清樂鬯風宣分衢讓齒折訟推田野旌伏彥朝賞登賢儒訓優柔武節焱鷙文憲精𢎞戎容犀利樞鈐明審程彠周備吏礪平端民差幸覬桴鼓凝埃烽驛垂轡銷我長劍歸為農器閩外水鄊鄣表炎國隴首西南渤尾東北赩赩嶺丹渾渾泉黑移琛雲勉轉集卭𤏡狼歌薦功鳥談陳德治博化光民阜財盛斑白行謡清綺髙詠雲表幽和物章明慶麗植雕質蠢行藻性仁草晨莩德宿宵映海無隱飇山有黃落牛羊內首閭户外拓瑞木朋生祥禽輩作薰風蕩閨飴露流閣器範神妙劑調象藥匪直也斯偉慶方溱注彼四瀆媚此雙川伏靈遙紀閟貺遐年澄波缺嶽鏡流蔥山泉室凝澱水府清涓俯瞰夷都降視驪淵朱宫潛耀紫閣隂鮮昔在爽德王風不昌乃溢乃竭或壅或亡潔源濫壑曾是未央先民永慨大道悠長云何其實鍾靈我皇聞諸師説天竦聽密分介焉如響匪逺疾矧是皇心妙夫貞一左右天經戶牖人術訐謨布簡絲言盈室嵗有綿祀清豈崇日一人之慶吹萬稟和靈根方固修源重波副睿二哲帝體皇柯景雲蔚嶽秀星駢羅垂光九野騰響四遐輔車鼎足槃石虎牙世匹周室基永漢家泰階既平洪河既清大人在上區宇文明樵夫議道漁父濯纓臣照作頌鋪德樹聲凌煙樓銘并序王宋臨川起臣聞憑飇薦響唱微效長垂波鑒景功少致深是以氷臺築乎魏邑鳳閣起於漢京皆所以贊生通志感恱幽情者也伏見所製凌煙樓棲置崇迥延瞰平寂即秀神臯因基地勢東臨吳甸西眺楚關奔江永寫鱗嶺相葺重樹窮天通原盡目悲積陳古賞絶舊年誠可以暉曠髙明藻徹逺心矣夫識緣感傾事待言彰匪言匪述綿世罔傳敢作銘曰垂一作乘巖巖崇樓藐藐層隅階基天削户牖雲區瞰江列楹望景延佇積清風露合綵煙塗俯窺淮海俯眺荆吳我王結駕藻思神居宜此萬春修靈所扶合一作含藥奩銘嵗霣走丸生厭隤牆時無驟得年有遐方水玉出煙靈飛生光龜文電衣龍綵雲裳九芝八石延正蕩斜二脂六體振衰返華毛姬餌葉鳳子藏花景絶翠虬氣隱赬霞深神罕别妙竒不揚或煩虎杖或亂蛇牀故不世不可以服未達不可以嘗眩睛逆目是乃為良靈飛一作神靈飛白書勢銘秋毫精徑霜素凝鮮霑此瑶波染彼松煙超出八法盡竒六文鳥企龍躍珠解泉分輕如遊霧重似崩雲絶鋒劍摧驚勢箭飛差池燕起振迅鴻歸臨危制節中險騰機圭角星芒明麗爛逸絲縈髮垂平理端密盈尺錦兩片字金溢故仙芝煩弱既匪足雙蟲虎瑣碎又安能匹君子品之是最神筆石帆銘應風剖流息石橫波下潨地紐上獵星羅吐湘引漢歙蠡吞沱西歷岷冢北瀉淮河眇森𢎞藹積廣連深淪天測際亘海窮隂雲族未起風柯不吟崩濤山墜鬱浪雷沈在昔鴻荒刋啓源陸表裏民邦經緯鳥服瞻貞視晦坎水巽木乃剡乃鏟既刳既斫飛深浮逺巢潭館谷涉川之利謂易則難臨淵之戒曰危乃安泊潛輕濟冥表勤言穆我戒逐留御不還徒悲猿鶴空駕滄煙君子彼想祗心載惕林簡松栝水採龍鷁覘氣涉潮投祭沈璧揆檢舍圗命辰定歷二崤虎口周王夙趨九折羊腸漢臣電驅潛鱗浮翼爭景乘虛衡石赬鰩帝子察殂青山斷河后父沈軀川吏掌津敢告訪途瓜步山楬文歲舍龍紀月巡鳥張鮑子辭吳客楚指兖歸揚道出關津升髙問途北眺氊鄉南曬炎國分風代川揆氣閩澤四睨天宫窮曜星絡東窺海門候景落日逰精八表駃視四遐超然永念意類交橫信哉古人有數寸之籥持千金之關非有其才施處勢要也瓜步山者亦江中眇小山也徒以因迥為髙據絶作雄而凌清瞰逺擅竒含秀是亦居勢使之然也故才之多少不如勢之多少逺矣仰望穹垂俯視地域涕洟江河疣贅丘嶽雖奮風漂石驚電剖山地綸維陷川鬬毁宫毫盈髮虛曾未注言况乎沈河浮海之髙遺金堆璧之竒四遷八聘之䇿三黜五逐之疵販交買名之薄吮癰舐痔之卑安足議其是非松柏篇序余患腳上氣四十餘日知舊先借傅玄集以余病劇遂見還開帙適見樂府詩龜鶴篇於危病中見長逝詞惻然酸懷抱如此重病彌時不差呼吸乏喘舉目悲矣火藥間缺而擬之見賣玉器者詩序見賣玉器者或人欲買疑其是珉不肻成市聊作此詩以戲買者宋文紀卷十
