body:
  text: 宋文紀卷七明梅鼎祚編劉穆之字道和東莞莒人世居京口初為髙祖府主簿委以腹心之任厯左僕射穆之與朱齡石便尺牘嘗於髙祖坐與齡石答書自旦至中穆之得百函齡石八十函而穆之應對無廢密白髙祖疏此與周祗徐廣劉栁孔寧子等並髙祖晉末輔政時書疏髙祖既討平桓玄安帝反正為青徐二州刺史鎮丹徒而固讓司徒王謐録尚書領揚州及謐薨髙祖次應入輔劉毅等不欲髙祖入議以中領軍謝混為揚州或欲令髙祖于丹徒領州以內事付尚書僕射孟昶遣尚書右丞皮沈以二議咨髙祖沈先與穆之言穆之以劉孟諸公一時推功非宿定臣主揚州根本所繫不可假人偽起如厠即密疏白髙祖髙祖由是入輔皮沈如至其言不可從穆之帖所欲足下家弊爾倉卒無祿故推遷不得不相用事巳御出寧復吾所得回復足下且當就之公還當思更律啓申師情事也劉穆之白淳化怗朱超石齡石弟厯河東太守中書侍郎兄弟雖出自將家並間尺牘關中亂與齡石俱沒赫連勃勃見殺與兄書登北邙逺眺衆美多盡光武墳邉杏甚美今送其核又七里澗有石梁即旅人橋凡是數橋皆纍石為之亦髙壯制作甚佳橋去洛陽宫六七里悉用大石下圓以通水可受大舫過也制作竒狀並水經注又洛水道路本好青槐映蔭可愛洛陽記映洛水郡國志作洛下蔭作蔭映又楊佺期洛陽記千金堰在洛陽城西去城三十五里堰上有榖水塢超石與兄書按此或疑楊佺期晉人而有超石書蓋注者並引之耳非記引也千金堤舊堰榖水魏時更修謂之千金塢選注東沈休文詩出千金堰西臨鴈鶩陂又初學記陵雲臺上有竒井望之幽然投一石子擲之久方聞聲又石經大都其碑髙一丈許廣四尺駢羅相接王誕字茂世太保𢎞從兄厯吳國內史義熙九年卒益晉孝武帝哀策文晉孝武帝崩從叔尚書令珣為哀策文出本示珣曰猶少序節物二句誕攬筆便益其秋冬代變後云珣歎清拔因而用之霜繁廣除風回髙殿伐廣固祭牙文誕為武帝太尉長史北伐廣固領齊郡太守文筆委誕敬建崇牙顯兹威靈使鳴金輟釁無戰有寧皇風幽被凱斾歸旌王𢎞字休元琅琊臨沂人珣子歷太保領中書監陳會稽王司馬道子𢎞為晉會稽王道子驃騎參軍主簿時農務頓息末役煩興𢎞以為宜建屯田陳之道子欲以為黃門侍郎父珣以其年少固辭近靣所咨立屯田事巳具簡聖懷南畝事興時不可失宜早督田畯以要歲功而府資單刻控引無所雖復厲以重勸肅以嚴威適足令囹圄充積而無救于事實也伏見南局諸冶募吏數百雖資以廩贍收入甚微愚謂若回以配農必功利百倍矣然軍器所須不可都廢今欲留銅官大冶及都邑小冶各一所重其功課一準揚州州之求取亦當無乏餘者罷之以充東作之要又𣣔二局田曹各立典軍募吏依冶募比例并聽取山湖人此皆無損於私有益於公者也其中亦應疇量分判畨假及給廩多少自可一以委之本曹親局所統必當練悉且近東曹板水曹參軍納之領此任其人頗有幹能自足了其事耳頃年以來斯務𢎞廢田蕪廩虛實亦由此𢎞過蒙識擢志輸短效豈可相與寢默有懷弗聞耶至于當否尊自當裁以逺鑒若所啓謬允者伏願便以時施行庶嵗有務農之勤倉有盈廩之實禮節之興可以垂拱待也彈謝靈運奏宋國初建𢎞遷尚書僕射奏彈靈運髙祖時為宋公令報臣聞間厥有家垂訓大易作威専戮致誡周書斯典或違刑兹無赦世子左衛率康樂縣公謝靈運力人桂興淫其嬖妾殺興江涘棄尸洪流事發京畿播聞遐邇宜加重劾肅正朝風案世子左衛率康樂縣公謝靈運過蒙恩奬頻叨榮授聞禮知禁為日巳久而不能防間閫闈致滋紛穢罔顧憲軌忿殺自由此而勿治典刑將替請以見事免靈運所居官上臺削爵土收付大理治罪御史中丞都亭侯王淮之顯居要任邦之司直風聲噂􅊱曽不彈舉若知而弗糾則情法斯撓如其不知則尸昧已甚豈可復預班清階式是國憲請免所居官以侯還散輩中內臺舊體不得用風聲舉彈此事彰赫暴之朝野執憲蔑聞羣司循舊國典既頽所虧者重臣𢎞忝承人乏位副朝端若復謹守常科則終莫之糾政所以不敢拱默自同秉懿違舊之愆伏須準裁武帝為宋公令報靈運免官而巳餘如奏端右簡正風軌誠副所期豈拘常儀自今為永制上文帝辭封表𢎞自江州刺史入朝預謀廢立文帝即位以定䇿功進位司空封建安郡公食邑千户上表固辭乃見許臣聞趙武稱隨會夫子之家事治言於晉國無隱情臣千載幸會謬荷榮遇雖以智能虛薄政績蔑聞而言無隱情竊所庶幾向令天啓其心預定大䇿而名編司勳功不見紀固將請不賞之罪懸龍蛇之書豈當稽違成命茍修下節但無功勤暴之四海進闕君子勞心之謀退違小人勞力之效而聖朝僣賞于上愚臣茍忝于下則為厚誣當時永貽口實竊財之誚比此為輕懼塵盛猷虧玷為大微躬所惜一朝亦盡非唯仰塵國紀實亦俯畏友朋憂心彌疹胡顔靡託且凡人之交尚申知已况在明主可用理干所以敢遂愚狷守之以死上文帝請遜位啓𢎞為侍中司徒揚州刺史録尚書元嘉五年春大旱引咎遜位臣聞三才雖殊其致則一故世道休明五福攸應政有失德咎徴必顯臣抑又聞之台輔之職論道讃契上佐人主燮理隂陽位以德授則和氣淳穆寇竊非據則謫見于天是以陳平有辭不濫主者之局邴吉停駕大懼牛喘之由斯固有國之所同天人之逺旨陛下聖哲御世光隆宜休徴表祥醴泉毖涌而頃隂陽隔并亢旱成災秋無嚴霜冬無積雪疾癘之氣彌厯四時此豈非任失其人覆餗之咎臣以庸短自畢凡流謬逢嘉運叨恩在昔陛下忘其不腆又重之以今任正位槐鼎統理神州珥貂衣衮總録朝端內外要重頓萃微躬窮極寵貴人臣莫比令德居之猶或難稱矧伊陋昧何以充任此之易了不俟明識但受命之始屬值時艱六戎親戒憂及社稷誠是臣下致節忘身之時當有何心塵撓聖聽所以僶俯從事循牆馳驅志在宣力慮不及逺既鯨鯢折首西夏底定便宜其本懷避賢謝拙而常人偷安日甘一日實亦仰佩天眷未能自巳荏苒推遷忽及三載遂令負乘之釁彰著幽明愆伏之災患纒氓庶上缺皇朝緝熙之美下增官謗覆折之災伏念惶赧五情飛散雖曰厚顔何以寧處不逺而復大易攸稱小懲大戒細人之福近復之美非所敢觖懲戒之幸竊懷庶幾今履端惟始朝慶禮畢輒還私門思愆家巷庶徴塞天譴少弭謗讟伏願鑑其所守即而許之臨啓愧塞不自宣盡並宋書辭總録揚州表元年六月𢎞又上表由是彭城王義康代𢎞為司徒與之分録臣聞異姓為後宗周之明義親不在外有國之所先故魯長滕君春秋所美楚出棄疾前史垂誡矧乃茂親明德道光一時述職侯甸朝政勿及而以庶族庸陋浮華之臣超踰先典居中贊契豈可以憲章古式緝熙治道驃騎將軍臣義康徽猷淵邈明德彌劭敷政江漢化被荆南搢紳屬情想樂當務周旦之寄不謀同詞分陜雖重比此為輕臣實空暗階恩踰越俯積素餐仰玷盛化公私二三無一而可昔叔孫未進優孟見弞展季在下臧文貽譏况道隆地昵義兼前禮臣於古人無能為役負乘竊位萬物謂何雖曰厚顔胡能以處斯亡之懼實疚其心乞解州録以允民望伏願陛下逺存至公近鑑丹款俯順朝野改授親賢豈惟下臣獲免大戾凡厥衆𨽻孰不慶幸若天眷罔巳脫復遲回請出臣表逮聞外內朝議輿誦或有可擇文帝詔報省表逺擬隆周經國之體近述大易卑牧之志三復沖旨良用憮然公體道淵虛明識經逺毗翼艱難勳猷光茂俾朕獲辰居垂拱司契委成豈容髙遜總録固辭神州使成務有缺以重朕之不德耶深存體國所望夤亮驃騎親賢之寄地均旦奭還入內輔參贊機務輒敬從所執又表近冒表聞披陳愚管實兾天鑒體其至誠而奉被還詔未蒙酬察徒塵聖覽仰延優旨顧影慚惶罔識攸厝臣忝荷要重四載于今既違前史量力之誡又微古人進賢之美尸位固寵日積官謗旋觀周行興愧巳厚况在親賢朝野歸德甫思引身曷云能補惟塵大典虧喪巳多不悟天眷之隆復垂恩奬名器弗毁蒙寵如舊感愚自揆茫然無涯臣義康既總録百揆毗贊盛化忝厠下風咨憑有所內朝細務庶可免竭神州任重望實兼該臣何人斯寇竊不巳為爾推遷覆敗將及就無人事之愆必有隂陽之患伏念惟憂疹如疾首不知何理可以自安但成旨巳決渙汗難反加臣懦劣少無此志進不能抗言陳辭以死自固退不能重繭置氷鮮食為瘠祗畏天威遂復俯仰至於攝督所部料綜文案曹局吏役所須不多其餘文武皆為冗長相府初建或有未充請留職僚同事而巳自此以外及諸資實一送司徒臣受恩深重休戚是預義無虛飾茍自貶損伏願聖察特垂許順不令誠訴其見抑奪文帝詔報衛軍表如此司徒宜須事力可順公雅懷割二千人配府資儲不煩事送謝賜河上梨表太平御覽奉賜河上梨一千逺方味甘每垂降及仰佩恩榮俯增祗愧廣陵前浦開表伏聞廣陵前浦榛蕪厯久近復開除清源虛邃含明內鑒瑞以數致象以類應夫如是者鸞響鳳儀可停屬而須矣與八座丞郎疏𢎞為衛將軍博練治體留心庶事斟酌時宜每存優允與八座丞郎疏左丞江奧吏部郎何尚之議並不同𢎞復為議奏聞太祖詔衛軍議為允同伍犯法無士人不罪之紏然每至詰謫輒有請訴若垂恩宥則法廢不可行依事糾責則物以為苦怨宜更為其制使得憂苦之衷也又主守偷五匹常偷四十匹並加大辟議者咸以為重宜進主偷十匹常偷五十匹死四十匹降以補兵既得小寬民命亦足以有懲也想各言所懷左丞江奧議士人犯盜贓不及棄市者刑竟自在贓汙淫盜之目清議終身經赦不原當之者足以塞愆聞之者足以鑒誡若復雷同羣小謫以兵役愚謂為苦符伍雖比屋鄰居至於士庶之際實自天隔舍藏之罪無以相關奴客與符伍交接所有藏蔽可以得知是以罪及奴客自是客身犯愆非代郎主受罪也如其無奴則不應坐右丞孔默之議君子小人既雜為符伍不得不以相檢為義士庶雖殊而理有聞察譬百司居上所以下不必躬親而後同坐是故犯違之日理自關今罪其養子典計者蓋義存戮僕如此則無奴之室豈得宴安但既云復士宜令輸贖常盜四十匹主守五匹降死補兵雖大存寬惠以紓民命然官及二千石及失節士大夫時有犯者罪乃可戮恐不可以補兵也謂此制可施小人士人自還用舊律尚書郎王淮之議昔為山隂令士人在伍謂之押符同伍有愆得不及坐士人有罪符伍糾之此非士庶殊制實使即刑當罪耳夫束修之胄與小人隔絶防檢無方宜及不逞之士事接羣細既同符伍故使糾之于時行此非唯一處左丞議奴客與鄰伍相關可得檢察符中有犯使刑坐即事而求有乖實理有奴客者類多使役東西分散住家者少其有停者左右驅馳動止所須出門甚寡典計者在家十無其一奴客在伍濫刑必衆恐非立法當罪本旨右丞議士人犯偷不及大辟者宥補兵雖欲𢎞士懼無以懲邪乘理則君子違之則小人制嚴於上猶冒犯之以其宥科犯者或衆使畏法其心乃所以大宥也且士庶異制意所不同殿中郎謝元議謂宜先治其本然後其末可理本所以探士大夫於符而末所以檢小人耶可使受檢於小人耶士犯坐奴是士庶天隔則士無𢎞庶之由以不知而押之於伍則是受檢於小人也然則小人有罪士人無事僕𨽻何罪而令坐之若以實相交關貴其聞察則意有未因何者名實殊章公私異令奴不押符是無名也民之資財是私賤也以私賤無名之人豫公家有實之任公私混淆名實非允由此而言謂不宜坐還從其主於事為宜無奴之士不在此例若士人本檢小人則小人有過巳應獲罪而其奴則義歸戮僕然則無奴之士未合宴安使之輸贖於事非謬二科所附惟制之本耳此自是辨章二本欲使各從其分至於求之管見宜附前科區别士庶於義為美盜制按左丞議士人既終不為兵革幸可同寬宥之惠不必依舊律於議咸允吏部郎何尚之議按孔右丞議士人坐符伍為罪有奴罪奴無奴輸贖既許士庶緬隔則聞察自難不宜以難知之事定以必知之法夫有奴不賢無奴不必不賢今多僮者傲然於王憲無僕者怵迫於時綱是為恩之所霑恆在程卓法之所設必加顔原求之鄙懷實所未愜謝殿中謂奴不隨主於名分不明誠是有理然奴僕實與閭里相關今都不問恐有所失意同左丞議又議尋律令既不分別士庶又士人坐同伍罹謫者無處無之多為時恩所宥故不盡親謫耳吳及義興適有許陸之徒以同符合給二千石論啓丹書巳未問會稽士人云十數年前亦有四族坐比被責以時恩獲停而王尚書云人舊無同伍坐所未之解恐蒞任之日偶不值此事故耶聖明御世士人誠不憂至苦然要須臨事論通上干天聽為紛擾不如近為定科使輕重有節也又尋甲符制蠲士人不傳符耳令使復除亦得如之共相狎領有違糾列了無等衰非許士人閭里之外也諸議云士庶緬絶不相參知則士人犯法庶民得不知若庶民不許不知何許士人不知小民自非超然簡獨永絶塵粃者比門接棟小以為意終自聞之不必須日夕來往也右丞百司之言粗是其况如裒陵士人實與閭巷關通相知情狀乃當於冠帶小民今謂之士人便無小人之坐署為小民輒受士人之罰於情於法不其頗歟且都令不及士流士流為輕則小人令使徴預其罰便事至相糾閭伍之防亦謂不同謂士人可不受同伍之謫耳罪其奴客庸何傷耶無奴客可令輸贖有修身閭閻與羣小實隔又或無奴僮為衆所明者官長二千石便當親臨列上依事遣判偷五匹四十匹謂應見優量者實以小吏無知臨財易昧或由疏慢事蹈重科求之於心常有可愍故欲小進匹數寬其性命耳至於官長以上荷蒙祿榮付以局任當正已明憲檢下防非而親犯科律亂法冒利五匹乃已為𢎞矣士人無私相偷四十匹理就使至此致以明罰固其宜耳並何容復加哀矜且此輩士人可殺不可謫有如諸論本意自不在此也近聞之道路聊欲共論不呼乃爾難精既衆議糾紛將不如其巳若呼不應停寢謂宜集議奏聞決之聖旨議民役奏舊制民年十三半役十六全役當以十三以上能自營私及公故以充役而考之見事猶或未盡體之強弱不皆稱年且在家自隨力所能堪不容過苦移之公役動有定科循吏隱恤可無其患庸宰守常巳有勤劇况值苛政豈可稱言乃有務在豐役增進年齒孤逺貧弱其敝尤深至令依寄無所生死靡告一身之切逃竄求免家人逺討胎孕不育巧避羅憲實亦由之今王化惟新四方無事役召之應存乎消息十五至十六宜為半丁十七為全成粲河南人平陸令與王𢎞書太祖即位以𢎞定䇿功進司空封建安郡公上表固辭及徐羡之等誅徴𢎞為侍中司徒揚州刺史録尚書上西征謝晦𢎞與驃騎彭城王義康居守時大旱𢎞引咎遜位粲與𢎞書𢎞本有退志由是固自陳請乃降為衛將軍僕聞軌物設教必隨時制宜世代盈虛亦與之消息夫勢之所處非親不居是以周之宗盟異姓為後權軸之要任歸二南斯前代之明謨當今之顯轍明公位極台鼎四海具瞻劬勞夙夜義同吐握而總録百揆兼牧畿甸功實盛大莫之與儔天道福謙宜存挹損驃騎彭城王道德昭備上之懿弟宗本歸源所應推先宜出據列蕃齊光魯衛明公髙枕論道燮理隂陽則天下和平災害不作福慶與大宋升隆享年與松喬齊久名垂萬代豈不美歟宋書王曇首太保𢎞少弟厯侍中太子詹事南臺不開門啓元嘉四年太祖駕出北堂嘗使三更竟開廣莫門南臺云應須白虎幡銀字棨不肯開門尚書左丞羊玄保奏免御史中丞傅隆以下曇首時領驍騎將軍繼啓上特無所問更立科條既無墨敕又闕幡棨雖稱上旨不異單刺元嘉二年雖有再開門例此乃前事之違今之守舊未為非禮但既據舊使應有疑却本末曽無此狀猶宜厥咎其不請白虎幡銀字棨致門不時開由尚書相承之矣亦合糾正周祗國子博士諫髙祖書劉敬宣字萬夀彭城人為髙祖寵任欲令立功晉義熙三年表遣敬宣伐蜀譙縱祗書諫不從假敬宣節監征蜀諸軍事賊固守不出敬宣糧盡軍中多疾疫引還自義旗之建所征無不必克此可謂天人交助信順之徴也今大難巳夷君臣俱泰頃五榖轉豐民無飢苦劫盜之患亦為弭息此誠漸足無事宜大寧治本蜀賊宜平六合宜一非為不爾也古人有言天時不如地利地利不如人和今往伐蜀萬有餘里泝流天險動經時嵗若此軍直指成都徑擒譙氏者復是將帥奮威一快之舉耳然益土荒殘野無青草成都之內殆無孑遺計得彼利與今行軍之費不足相補也而今往艱險雨雪方降驅三州三吳之人投之三巴三蜀之土其中疾病死亡豈可稱計此一疑也賊必不守窮城將決力戰今我往勞困彼來甚逸若忽使師行不利人情波駭大勢挫衄此二疑也且千里饋糧士有飢色况今泝險萬里所在無儲若兵不解運漕不繼雖韓白之將何以成功此三疑也今云可征者不過謂彼親離衆叛耳愚謂不然夫彼以一匹夫而能致今日之事若衆力離散亦何以至此官所遣兵皆烏合受募之人亦必無千人一心有前無退矣為治者固先定其內而理其外先安其近而懷其逺自頃狂狡不息誅戮相繼未可謂人和也天險如彼未可謂地利也毛修之家讎未雪不應以得死為恨劉敬宣蒙生存之恩亦宜性命仰報今將軍欲驅二死之甘心而忘國家之重計愚情竊所未安闕門之外非所宜豫茍其有心不覺披盡宋書陽毛修之字敬文滎陽武人父瑾秦梁二州刺史為譙縱所殺故云家讎平敬宣初與父牢之謀襲桓玄事敗奔司馬休之武帝京口手書召敬宣封武岡縣男拜江州刺史故云蒙生存之恩執友針四輔揚輝伐木幽林撫喬鸞飛爰逮姬衰俗遂凋成交緣利昵朋因偽情谷風興哀繁霜夏零道之未盡𢎞焉由人自室有回過門則親微言綿邈清談輟響金雖能照塵積翳朗西河感離口悟投杖慊慊文侯友賢好學英英燕昭禮郭致樂推誠嵗寒功標松竹落落僑札遼遼莊惠解帶一遇道映萬世人亦有言貴則易交利重太山道輕鴻毛久而致敬見之晏平霜雪既至徑柏冬青枇杷賦序昔魯季孫有嘉樹韓宣子賦譽之屈原離騷亦著橘賦至枇杷樹寒暑無變負雪揚華余植庭圃遂賦之云徐廣字野民東管姑幕人晉都水使者藻之子仕晉厯祕書監宋禪拜中散大夫元嘉二年卒晉李太皇太后服議后簡文宫人出本微生孝武帝即位尊為太后安帝時尊為太皇太后隆安四年薨朝廷疑其服廣為祠部郎議從之晉書尚書左僕射何澄右僕射王雅尚書車胤孔安國祠部郎徐廣等議太皇太后名位允正體同皇極禮制備盡情理彌申陽秋之義母以子貴既稱夫人禮服從正故成風顯夫人之號僖公服三年之喪子於父之所生體尊義重且祖不厭孫固宜遂服無屈而緣情立制若嫌明文不存則疑斯從重謂應同於為祖母後齊衰三年服宋書末晉禮志云齊哀期杜氏通典末云齊衰周永安皇后無服但一舉哀百官亦一周於是帝服齊衰三年百僚服周彌晉書作兼僖公作昭公通典又作文公遂服書作追服太常殷茂議以下通典太皇太后名稱雖尊而據非正體主上纂承宗祖不宜持重謂齊服為安廣又問若以魯侯所行失禮者左傳不見譏責而漢代持服與正嫡無異殷太常所上服事於禮中尋求俱無明文然僕之所言専據春秋也車胤答漢代皆服重且大體已定此當無復翻革耶獻髙祖書廣厯轉正員常侍領著作義熙六年髙祖輔政時有風雹為災廣獻書風雹變未必為災古之聖賢輒懼而修已所以興政化而隆德教也嘗忝服事宿眷未忘思竭塵露率誠于習明公初建義旗匡復宗社神武應運信宿平夷且恭謙儉約虛心匪懈來蘇之化功用若神頃事故既多刑德並用戰功殷積報敘難盡萬機繁湊固應難速且小細煩密羣下多懼又榖帛豐賤而民情不勸禁司互設而劫盜多有誠由俗弊未易整而望深未易炳追思義熙之始如有不同何者好安願逸萬物之大趣習舊駭新凡識所不免要當俯順羣情抑揚隨俗則朝野歡泰具瞻允康矣言無可採願矜其愚欵之志宋書告老表永初元年拜中散大夫上表辭之臣年時衰老朝敬永闕端居都邑徒增替怠臣墳墓在晉陵臣又生長京口戀舊懷逺每增感慕心息道玄謬荷朝恩忝宰此邑乞相隨之官歸終桑梓微志獲申殞沒無恨東宫頌初學記禮樂承軒典册授庭命服唯九龍旗鸞旌孔琳之字彥琳會稽山隂人晉義熙初遷尚書吏部郎宋國侍中厯祠部尚書景平元年卒廢錢用榖帛議琳之辟本國常侍桓玄輔政議欲廢錢用榖帛琳之議諫又議肉刑不可復玄好人附悅是以不見知洪範八政以貨次食豈不以交易之資為用之至要者乎若使不以交易百姓用力于為錢則是妨其為生之業禁之可也今農自務榖工自務器四民各肄其業何嘗致勤於錢故聖王制無用之貨以通有用之財既無毁敗之費又省運置之苦此錢所以嗣功龜貝厯代不廢者也榖帛為寶本充衣食今分以為貨則致損甚多又勞毁于商販之手耗棄于割截之用此之為敝著于自曩故鍾繇曰巧偽之民競藴濕榖以要利制薄絹以充資魏世制以嚴刑弗能禁也是以司馬芝以為用錢非徒豐國亦所以省刑錢之不用由於兵亂積久自至于廢有由而然漢末是也今既用而廢之則百姓頓亡其財今括囊天下之榖以周天下之食或倉庾充衍或糧靡斗儲以相資通則貧者仰富致之之道實假于錢一朝斷之便為棄物是有錢無糧之民皆坐而飢困此斷錢之立敝也今據用錢之處不為貧用榖之處不為富又民習來久革之必惑語曰利不百不易業况又錢便于榖耶魏明帝時錢廢榖用三十年矣以不便於民乃舉朝大議精力逹治之士莫不以宜復用錢民無異情朝無異論彼尚舍榖帛而用錢足以明榖帛之弊著於已試世謂魏氏不用錢久積纍巨萬故欲行之利公富國斯殆不然昔晉文後舅犯之謀而先成季之信以為雖有一時之勳不如萬世之益于時名賢在列君子盈朝大謀天下之利害將定經國之要術若穀實便錢義不昧當時之近利而廢永用之通業斷可知矣斯實由困而思革改而更張耳近孝武之末天下無事時和年豐百姓樂業便自榖帛殷阜幾乎家給人足驗之事實錢又不妨民也頃兵革屢興荒饉荐及飢寒未振實此之由公既援而拯之大革視聽𢎞敦本之教明廣農之科敬授民時各順其業遊蕩知反務末自休固以南畝競力野無遺壤矣於是以往升平必至何衣食之足恤愚謂救弊之術無取於廢錢運置南史作難運勞毁作勞煩三十作四十以貨次食晉書作貨為食次運置作難運庾作庫衍作溢精力逹治作精才達政民無作下無事實作實事各順作各從復肉刑議唐虞象刑夏后立辟蓋淳薄既異致化實同寬猛相濟惟變所適書曰刑罰世輕世重言隨時也夫三代風純而事簡故罕蹈刑辟季末俗巧而務殷故動陷憲網若三千行于叔世必省踊貴之尤此五帝不相循法肉刑不可悉復者也漢文發仁惻之意傷自新之路莫由革古創制號稱刑厝然名輕而實重反更傷民故孝景嗣位輕之以緩緩而民慢又不禁邪期於刑罰之中所以見美在昔厯代詳論而未獲厥中者也兵荒後罹法更多棄市之刑本斬右趾漢文一謬承而弗革所以前賢恨恨議之而未辨鍾繇陳羣之意雖小有不同而欲右趾代棄市若從其言則所活者衆矣降死之生誠為輕法然人情慎顯而輕昧忽逺而驚近是以盤盂有銘韋弦作佩况在小人尤其所惑或目所不睹則忽而不戒日陳於前則驚心駭矚由此言之重之不必不傷輕之不必不懼而可以全其性命蕃其産育仁既濟物功亦益衆又今之所患逋逃為先屢叛不革宜令逃身靡所亦以肅戒未犯永絶惡原至於餘條宜依舊制豈曰允中貴獻管穴實同南史作不同同恨恨作悵悵别議四條琳之厯太尉主簿尚書左丞揚州治中從事史所居著績衆官獻便宜議者以為宜修庠序恤典刑審官方明黜陟舉逸拔才務農簡調琳之獨於衆議之外别建言夫璽印者所以辨章官爵立契符信官莫大於皇帝爵莫尊於公侯而傳國之璽厯代迭用襲封之印奕世相傳貴在仍舊無取改作今世唯尉一職獨用一印至於內外羣官每遷悉改討尋其義私所未逹若謂官各異姓與傳襲不同則未若異代之為殊也若論其名器雖有公卿之貴未若帝王之重若以或有誅夷之臣忌其凶穢則漢用秦璽延祚四百未聞以子嬰身戮國亡而棄之不佩帝王公侯之尊不疑於傳璽人臣衆僚之卑何嫌於即印載籍未聞其説推例自乖其準而終年刻鑄喪功消實金銀銅炭之費不可稱言非所以因循舊貫易簡之道愚謂衆官即用一印無煩改作若有新制官又官多印少文或零失然後乃鑄則仰禆天府非唯小益迭南史作遞愚謂作愚請又凶門柏裝不出禮典起自末代積習生常遂成舊俗爰自天子逹於庶人誠行之有由卒革必駭然茍無關于情而有愆禮度存之未有所明去之未有所失固當式遵先典釐革後謬况復兼以遊費實為民患者乎凡人士喪儀多出閭里每有此須動十數萬損民財力而義無所取至于寒庶則人思自竭雖復室如懸磬莫不傾産殫財所謂葬之以禮其若此乎謂宜謹遵先典一罷凶門之式表以素扇足以示凶又昔事故飢荒米榖綿絹皆貴其後米價登復而絹于今一倍綿絹既貴蠶業者滋雖勤厲兼倍而貴猶不息愚謂致此良有其由昔事故之前軍器正用鎧而已至於袍襖裲襠必俟戰陳實在庫藏永無損毁今儀從直衛及邀邏使命有防衛送迎悉用袍襖之屬非唯一府衆軍皆然綿帛易敗勢不支久又晝以禦寒夜以寢卧曽未周年便自敗裂每絲綿新登易折租以市又諸府競收動有千萬積貴不已實由于斯私服為之難貴官庫為之空盡愚謂若侍衛所須固不可廢其餘則依舊用鎧小小使命送迎之屬止宜給仗不煩鎧襖用之既簡則其價自降又夫不耻惡食唯君子能之肴饌尚奢為日久矣今雖改張是𢎞而此風未革所甘不過一味而陳必方丈適口之外皆為悅目之費富者以之示夸貧者為之單産衆所同鄙而莫能獨異愚謂宜粗為其品使奢儉有中若有不改加以貶黜則德儉之化不日而流劾尚書令徐羡之奏琳之永初二年為御史中丞劾奏羡之自是百僚震肅莫敢犯禁臣聞事上以奉憲為恭臨下以威嚴為整然後朝典惟明蒞衆必肅斯道或替則憲綱其頽臣以今月七日預皇太子正會會畢車去并猥臣停門侍闕有何人乘馬當臣車前收捕驅遣命去何人罵詈收捕咨審欲録每有公事臣常慮有紛紜語令勿問而何人獨罵不止臣乃使録何人不肯下馬連叫大喚有兩威儀走來擊臣收捕尚書令省事倪宗又牽威儀手力擊臣下人宗云中丞何得行凶敢録令公人凡是中丞收捕威儀悉皆縛取臣敕下人一不得鬬凶勢輈張有頃乃散又有羣人就臣車側録收捕樊馬子牙行築馬子頓伏不能還臺臣自録非本無對校而宗敢乘勢凶恣篡奪罪身尚書令臣羡之與臣列車紛紜若此或云羡之不禁或云羡之禁而不止縱而不禁既乖國憲禁而不止又不經通陵犯監司凶聲彰赫容縱宗等曽無糾問虧損國威無大臣之體不有凖繩風裁何寄羡之內居朝右外司輦轂位任隆重百辟所瞻而不能𢎞惜朝章肅是風軌致使宇下縱肆陵暴憲司凶赫之聲起自京邑所謂己有短垣而自踰之又宗為篡奪之主縱不糾問二三虧違宜有裁貶請免羡之所居官以公還第宗等篡奪之愆已屬掌故御史隨事檢處武帝詔報小人難可檢御司空無所問餘如奏孔璠之艾贊論藹靈艾蔚彼修坂混區羣卉理深用逺劉栁南陽涅陽人仕晉江州刺史入宋厯尚書右僕射左光祿大夫與髙祖薦周續之續之字道祖鴈門廣武人入廬山事沙門慧逺與劉遺民陶潛號為潯陽三隱栁為江州刺史薦之髙祖辟為太尉掾不就臣聞恢耀和肆必在兼城之寶翼亮崇本宜紆髙世之逸是以渭濵佐周聖德廣運商洛匡漢英業乃昌伏惟明公道邁振古應天繼期遊外暢于冥內體逺形于應近雖汾陽之舉輟駕於時艱明揚之旨潛感於窮谷矣竊見處士鴈門周續之清真貞素思學鉤深弱冠獨往心無近事性之所遣榮華與飢寒俱落情之所慕巖澤與琴書共逺加以仁心內發義懷外亮留愛昆卉誠著桃李若升之宰府必鼎味斯和濯纓儒官亦王猷遐緝臧文不知失在降賢言偃得人功由升士願照其丹𨽻不以人廢言宋書孔寧子會稽人厯黃門侍郎領步兵校尉陳髙祖損益奏寧子為髙祖太尉主簿陳損益隆化之道莫先於官得其才枚卜之方莫若人慎其舉雖復因革不同損益有物求賢審官未之或改師錫僉曰煥乎欽明之誥拔茅征吉著於幽賁之爻晉師有成瓜衍作賞楚乘無入蒍賈不賀今舊命惟新幽人引領韶之盡美巳備於振綱武之未盡或存於理目雖九官之職未可備舉親民之選尤宜在先愚欲使天朝四品官外及守牧各舉一人堪為二千石長吏者以赴選官隨缺敘用得賢受賞失舉任罰夫惟帝之難豈庸識所易然舉爾所知非求多人因百官之明孰與一識之見執咎在巳豈容徇物之私今非以選曹所詮果於乖謬衆職所舉必也惟良蓋宜使求賢闢其廣塗考績取其少殿若才實拔羣進宜尚德治阿之宰不必計年免徒之守豈限資秩自此以還故當才均以資資均以地宰蒞之官誠曰吏職然監觀民瘼翼化宣風則隱厚之求急於刀筆能事之功托於德心以此論才行之年嵗豈惟政無秕蠧民庇手足而巳將使公路日清私請漸塞士多心競仁必由巳處士砥自求之節任子藏交馳之情寧子庸微不識治體冒昧陳愚退懼違謬宋書水澄鑒無虗積之成川湍飛瑩谷激石冷然井頌天髙聽卑載厚流謙揮鋒既擊跪拜亦霑惟益有作德逺事兼明王用汲人具爾瞻宋文紀卷七
