body:
  text: 宋文紀卷四明梅鼎祚編明帝名彧字休炳文帝第十一子封湘東王為廢帝所幽弒帝自立在位八年廟號太宗追崇江夏王義恭令書義恭為廢帝枉殺太宗定亂令書故中書監太宰領太尉録尚書事江夏王道性淵深睿鑒通逺樹聲列藩宣風鉉德位隆姬輔任屬負圖勤勞國家方熙託付之重盡心毗導永融雍睦之化而凶醜忌威奄加寃害夷戮有暴殯穸無聞憤逹幽明痛貫朝野朕蒙險在難含哀莫申幸賴祖宗之靈克纂祈天之祚仰惟勳戚震慟于厥心昔梁王徴庸警蹕備禮東平好善黃屋在廷况公德猷𢎞懋彞典未殊者哉可追崇使持節侍中都督中外諸軍事丞相領太尉中書監録尚書事王如故路休之拜官令書太宗廢幼主欲悅路太后之心乃下令書時未即位太皇太后蚤垂愛遇沿情即事同於天屬前車騎咨議參軍路休之前丹陽丞路茂之崇憲密戚蚤延榮貴並懷所勳宜殊恆飾休之可黃門侍郎領步兵校尉茂之可中書侍郎追贈栁元景令元景謀廢立為前廢帝所誅太宗即位下令故侍中尚書令驃騎大將軍巴東郡開國公新除開府儀同三司南豫州刺史元景風度𢎞簡體局深沉正義亮時恭素範物幽明道盡則首贊孝圖盛運開歷則毗燮皇化方任孚漢輔業懋殷衡而蜂豺肆濫顯加禍毒寃動勳烈悲深朝貫朕承七廟之靈纂臨寶業情典既申痛悼彌軫宜崇賁徽冊以旌忠懿可追贈使持節都督南豫豫江三州諸軍事太尉侍中刺史國公如故即位改元詔泰始元年十二月即景和元年冬髙祖武皇帝德洞四瀛化綿九服太祖文皇帝以大明定基世祖孝武皇帝以下武寧亂日月所照梯山航海風雨所均削衽襲帶所以業固盛漢聲溢隆周子業凶嚚自天忍悖成性人面獸心見於髫日反道敗德著自比年其狎侮五常怠棄三正矯誣上天毒流下國實開闢所未有書契所未聞再罹遏密而無一日之哀齊斬在躬方深北里之樂虎兕難匣馮河必彰遂誅滅上宰窮舋逆之酷虐害國輔究孥戮之刑子鸞同生以昔憾殄殪敬猷兄弟以睚眦殱夷徴逼義陽將加屠膾陵辱戚藩檟楚妃主奪立左右竊子置儲肆凶于朝宣淫于國事穢東陵行汙飛走積舋罔極日月滋深比遂圖犯𤣥宫志窺題湊將肆梟獍之禍騁商頓之心又欲鴆毒崇憲虐加諸父事均宫閫聲遍國都鴟梟小竪莫不寵䁥朝廷忠誠必加戮挫收掩之㫖虓虎結轍掠奪之使白刃相望百僚危氣首領無有全地萬姓崩心妻子不復相保所以鬼哭山鳴星鉤血降神氣殆於馭索景祚危於綴旒朕假寐凝憂泣血待旦慮大宋之基於焉而泯武文之業將墜于淵賴七廟之靈藉八百之慶巨猾斯殄鴻沴時褰皇綱絶而復紐天緯缺而更張猥以寡薄屬承乾統上緝三光之重俯顧庶民之艱業業矜矜若履氷谷思與億兆同此維新可大赦天下改景和元年為泰始元年賜民爵一級鰥寡孤獨不能自存者人穀五斛逋租宿債勿復收犯鄉論清議贓汚淫盜並悉洗除長徒之身特賜原遣亡官失爵禁錮舊勞一依舊典其昏制謬封並皆刋削分遣大使詔元年十二月朕戡亂寧民屬膺景祚鴻制初造革道維新而國故頻罹仁澤偏壅每寤寐疚心罔識攸濟巡方問俗𢎞政所先可分遣大使廣求民瘼考守宰之良採衡閭之善若獄犴淹枉傷民害教者具以事聞鰥寡孤獨癃殘六疾不能自存者郡縣優量賑給貞婦孝子髙行力田許悉條奏務詢輿誦廣納嘉謀每盡皇華之㫖俾若朕親覽焉减省大官御府詔元年皇室多故糜費滋廣且久嵗不登公私歉弊方刻意從儉𢎞濟時艱政道未孚慨愧兼積大官供膳可詳所減撤尚方御府雕文篆刻無益之物一皆蠲省務存簡約以稱朕心有司詳立科品寬惠詔二年十一月其日又詔治崇簡易化疾繁侈逺觀隆替明著軌跡者也朕拯斯墜運屬此屯極仍之以凋耗因之以師旅而識昧前王務艱昔代俾夫舊賦既繁為費彌廣寤寐萬務每思𢎞革方欲緩繇優調愛民為先有司詳加寬惠更立科品其方物職貢各順土宜出獻納貢敬依時令凡諸蠧俗妨民之事趣末違本之業雕華靡麗竒器異技並嚴加裁斷務歸要實左右尚方御府諸署供御製造咸存儉約庶淳風至教微遵太古阜財興讓少敦季俗又詔矢機詢政立教之攸本舉賢聘逸𢎞化之所基故負鼎進策殷道以康釋釣作輔周祚斯乂朕甫承大業訓道未敷雖側席忠規竚夢巖築而良圖莫薦奇士弗聞永鑒通古無忘宵寐今藩隅克晏敷化維始屢懷存治實望針闕王公卿尹羣僚庶官其有嘉謀直獻匡俗濟時咸切事陳奏無或依隱若乃林澤貞栖丘園耿潔博洽古今敦崇孝讓四方在任可明書搜揚具即以聞隨就褒立原蕩衆藩從亂詔二年十二月近衆藩稱亂多染舋科或誠係本朝事緣逼迫混同證錮良以悵然夫天道尚仁德刑並用雷霆時至雲雨必解朕眷言靜念思𢎞風澤凡應禁削皆從原蕩其文武堪能隨才銓用衡虞科制詔三年八月古者衡虞置制蝝蚳不收川澤産育登器進御所以繁阜民財養遂生德頃商販逐末競早爭新折未實之果收豪家之利籠非膳之翼為戲童之資豈所以還風尚本捐華務實宜修道布仁以革斯蠧自今鱗介羽毛肴核衆品非時月可採器味所須可一皆禁斷嚴為科置大赦詔三年八月法網之用期世而行寬惠之道因時而布况朕尚德戡亂依仁馭俗且每就𢎞簡以隆至治而頻罹兵革繇賦未休軍民巧僞興事甚多蹈刑入憲諒非一科至乃假名戎伍竊爵私庭因戰散亡託懼逃役且往諸淪逼雖經纍宥逋竄之黨猶為實繁宵言永懷良兼矜疚思所以重播至澤覃被區宇可大赦天下欽刑詔四年九月夫愆有小大憲隨寬猛故五刑殊用三典異施而降辟次網便暨鉗撻求之法科差品滋逺朕務存欽恤每有矜貸尋創制科罪輕重同之大辟即事原情未為詳衷自今凡竊執官仗拒戰邏司或攻剽亭寺及害吏民者凡此諸條悉依舊制五人以下相逼奪者可特賜黥刖投畀四逺仍用代殺方古為優全命長户施同造物庶簡惠之化有孚羣萌好生之德無漏幽品羣司舉隱逸詔五年九月夫箕潁之操振古所貴冲素之風哲王攸重朕屬橫流之㑹接難晦之辰龕暴翦亂日不暇給今雖關隴猶靄區縣澄氛偃武修文於是乎在思崇廉恥用靜馳薄固已物色載懷寢興竚歎其有貞栖隱約自事衡樊鑿坯遺榮負釣辭聘志恬江海行髙塵俗者在所精加搜括時以名聞將賁園矜德茂昭厥禮羣司各舉所知以時授爵郊祀詔泰始二年十一月下詔有司奏檢未有先准黃門侍郎徐爰議建安王休仁等同爰議參議為允詔可朕載新寶命仍離多難戎車遄駕經略務殷禋告雖備弗獲親禮今九服既康百祀咸秩宜聿遵前典郊謁上帝黃門侍郎徐爰議虞稱肆類殷述昭告蓋以創世成功德盛業逺開統肇基必享上帝漢魏以來聿遵斯典髙祖武皇帝克伐僞楚晉安帝尚在江陵即於京師告義功於郊兆伏惟太始應符神武英斷王赫出討戎戒淹時雖司奉弗虧親謁尚闕謹尋晉武郊以二月晉元禋以三月有非常之慶必有非常之典不得拘以常祀限以正月上辛愚謂宜下史官考擇十一月嘉吉車駕親郊奉謁昊天上帝髙祖武皇帝配饗其餘祔食不關今祭詳議郊享明堂詔泰始六年詔前兼曹郎虞願議謂間嵗為允緣咨參議並同曹郎王延秀重議通關八座同延秀議後廢帝元徽二年有司奏郊祀明堂同日間嵗古禮王者每嵗郊享爰及明堂自晉以來間年一郊明堂同日質文詳略疏數有分今可間二年一郊間嵗一明堂外可詳議兼曹郎虞願議郊祭宗祀俱主天神而同日殷薦於義為黷明詔使圓丘報功三載一享明堂配帝間嵗昭薦詳辰酌衷實允懋典曹郎王延秀議改革之宜實如聖㫖前虞願議蓋是仰述而已未顯後例謹尋自初郊間二載明堂間一年第二郊與第三明堂還復同嵗願謂自始郊明堂以後宜各間二年以斯相推長得異嵗定制車服議泰始四年車服之飾象數是遵故盛皇留範列聖垂制朕近改定五路酌古代今修成六服沿時變禮所施之事各有條叙便可付外載之典章朕以大冕純玉繅𤣥衣黃裳乘玉輅郊祀天宗祀明堂又以法冕五綵繅𤣥衣絳裳乘金輅祀太廟元正大㑹諸侯又以飾冠冕四綵繅紫衣紅裳乘象輅小㑹宴饗餞送諸侯臨軒㑹王公又以肅冕三綵繅朱衣裳乘革輅征伐不賔講武校獵又以宏冕二綵繒青衣裳乘木輅耕稼饗國子又以通天冠朱紗袍為聽政之服報奏路太后别居外宫詔明帝少失所生為后撫養及踐祚號崇憲太后有司奏請別居詔不許朕備丁艱罰蚤嬰孤苦特䝉崇憲太后聖訓撫育昔在蕃閫常奉藥膳中迫凶威抱懷莫遂今泰運初唘情典獲申方欲親奉晨昏盡歡閨禁不得如所奏有司崇憲太后别居外宫奏夫德敷於內典章必逺化覃於外徽號宜宣伏惟皇太后懿聖自天母儀允著義明八逺道變九圍聖明登御景祚攸改皇太后宜即前號别居外宫路太后服緦詔朕幼集荼蓼夙慿德訓龕暴定業實資仁範恩著屯夷有兼常慕夫禮沿情施義循事立可特齊衰三月以伸追仰之情路太后遷殯詔太后葬世祖陵東南號修寧陵先是晉安王子勛未卒巫者謂宜開昭太后陵以為厭勝修復倉卒泰始四年詔有司奏可崇憲昭太后修寧陵地大明之世久所考卜前歲遭諸蕃之難禮從權宜奉營倉卒未暇營改而塋隧之所山原卑陋頃年穨壞日有滋甚恆費修整終無永固宜詳考地形殊乖相勢朕蚤䝉慈遇情理兼常思使終始之義載彰幽顯史官可就巖山左右更宅吉地明審龜筮須選令辰式遵舊典以禮創制今中㝢雖寧邊塵未息營就之功務在從簡舉言尋悲情如切割有司奏詔可北疆未緝戎役是務禮之詳略各沿時宜臣等參議修寧陵𤣥宫補治毁壞權施油殿暫出梓宫事畢即窆於事為允黜晉熙太妃謝氏詔義陽王昶文帝第九子為徐州刺史景和中廢帝欲討誅之起兵不捷棄母妻奔魏遺妾生二子並以太妃不慈夭卒泰始六年太宗以皇子燮繼昶改昶封晉熙王乃下詔夫虎狼護子猴猿負孫毒性薄情亦有仁愛故識念氣類尚均羣品况在人倫可忘天屬晉煕太妃謝氏沉刻無親物理罕比征北公雖孝道無替而遭此不慈自少及長闕恩鞠之恃乃至休否莫關寒溫不訪晨昏屏塞定省靡因事無違忤動致誚責毒句發口人所難聞加惡備苦過于讎隙遂事憤於宗姻義傷於行路公故妃郗氏婦禮無違逢此嚴酷遂以憂卒用夭盛年又謝氏食則豐珍衣則文麗奉已之餘播覃群下而諸孫纊不溫體食不充飢付于姆嬭之手縱以任軍之路遇其所生棄若糞土繿縷比于重囚窮困過於下使誠皇規方逺沙塞將一公修短不諱亦難豫圖兼妾女纍弱一第領主防間之道人理斯急朕所以詔第六子燮奉公為𦙍欲以毗整一門為公繼紹但謝氏待骨肉至親尚相棄篾况以義合免苦為難患萌防漸危機須斷便可還其本家削絶蕃秩降廬江王禕詔泰始五年河東栁欣慰謀反欲立禕要結征北咨議參軍杜幼文左軍參軍宋祖珍前鄀令王隆伯禕與相酬贈三人具奏其事上乃下詔出禕鎮宣城尋遣使逼令自殺昔周室既盛二叔流言漢祚方隆七蕃迷叛斯實事彰往代難興自古雖聖賢御極㝢內紓患太尉廬江王藉慶皇枝蚤升寵樹幼無立德長缺修聲淡薄親情厚結行路狎眤羣細疏澀人士自朕撥亂定宇受命應天實尚敦睦克敷友于故崇殊爵超居上台而公常懷不平表於事迹公若德深望重宜膺大統朕初平暴亂豈敢當璧自然推符奉璽天祚有歸且朕雖居尊極不敢自恃宗室之事無不咨公不虞志欲難滿妄生窺怨積慝在襟遂謀社稷曩者四方遘禍兵斥畿甸搢紳憂惶親賢同憤唯公獨幸厥灾深抃時難晝則從禽遊肆夜則縱酒弦歌側耳視隂企賊休問司徒休仁等並各令弟事兼家國摧鋒履險各伐一方蒙霜踐棘辛勤已甚况身被矢石否泰難虞悠悠之人尚有信分公未曾有一函之使遺半紙之書志棄五弟以餌讎賊自謂身非勳烈義不參謀必期凶逆道申以圖輔相及皇威既震羣凶肅蕩九有同慶萬國含欣而公容氣更沮下帷晦迹每覘天察宿懷協左道呪詛禱請謹事邪巫常被髮跣足稽首北極遂圖畫朕躬勒以名字或加之矢刃或烹之鼎鑊公在江州得一漢女云知吉凶能行厭呪大設供養朝夕拜伏衣裝嚴整敬事如神令其祝詛孝武并及崇憲祈皇室危弱統天稱已巫稱神㫖必得如願後事發覺委罪所生徼幸㩻䧢僅得自免近又有道士張寶為公見信事既彰露肆之于法公不知慙懼猶加營理遣左右二人主掌殯舍顯行邪志罔顧吏司又挾閹竪陳道明交關不逞傳驛音意投金散寶以為信誓又使府史徐虎兒招引邊將要結禁旅規害台輔圖犯宫掖公受性不仁才非治用昔忝江州無稱被徴前蒞㑹稽以罪左黜公稽古寡聞嚴而無理言不暢寒暑惠不及帷房朝野所輕搢紳同侮豈堪輔相之地寧任蒞民之職非唯一朝有自來矣大明之世迄于永光公常留中未嘗外撫何以在今方起嫌怨公少即長人情無哀戚侍拜長寧從祀宗廟顔無戚狀淚不垂臉兄弟長幼靡有愛心昔因孝武御筵置酒心誠不著于時義陽念遇本薄遭公此譛益被猜嫌朕當時狼狽不暇自理賴崇憲太后譬解百端少䝉申亮得免殃責景和狂主醜毒橫流初誅宰輔豺志方扇于建章宫召朕兄弟逼酒使醉公因酒勢遂肆苦言云朕及休仁與太宰親數往必清間贈貺豐厚朕當時惶駭五內崩墜于其語次劣得少止往又經在尋陽長公主第兄弟共集忽中坐忿怒厲色見指以朕行止出入每不能固若得稱心規肆忿憾惟公此㫖蚤欲見滅而天道受善朕獲南面不長惡逆挫公毒心自大明積費國弊民凋加景和奢虐府藏罄盡朕在位甫爾恤義具瞻仍值中阻蜂起日耗萬金公卿庶民傾産歸獻積受台奉資蓄優廣朕踐阼之初公請故太宰東傳餘錢見入數百萬內不充養外不助國散賜諂諛遍惠趨隸推心考行事類斯比羣小交構遂生異圖籍籍之議轉盈民口公若地居衡寄任專八柄德育於民勳髙於物勢不自安於事為可公既才均櫟木牽以曲全因髙無民得守虛靜而坐作凶咎自缺深釁由朕誠感無素爰至於此永尋多難惋慨實深凡人所行各有本志朕博愛尚仁為日已久尚能含讎恕罪著于觸事豈容于公不相隱忍但禍萌易漸去惡宜疾負荷之重寧得坐觀且蔓草難除燎火須撲狡扇之徒宜時誅剪已詔司戮肅正典刑公身居戚長情禮兼至準之常科顧有惻怛宜少申國憲以弔不臧今以淮南宣城歷陽三郡還立南豫州降公為車騎將軍開府儀同三司南豫州刺史削邑千户待中王如故與建安王休仁書休仁文帝第十二子太宗即位休仁為司徒尚書令揚州刺史尋諸方逆命休仁出據虎檻進據赭圻總統諸軍隨宜應接中流平定休仁之力也初行與蘇侯神結為兄弟以求神助事平與休仁書此段殊得蘇侯兄弟力南史此段殊得蘇兄神力祀蘇侯晉叛將蘇峻也宋齊間之每事多祈于蔣侯子文及蘇侯與建安王休仁詔廬江王禕字休秀文帝第八子為太尉尤凡劣諸兄弟唾鄙之太宗與休仁詔後坐悖怨自殺人既不比數西方公汝便為諸王之長時禕住西州故謂西方公誅建安王休仁詔廢帝狂悖忌憚諸父並囚之殿內及太宗弒帝休仁進司徒尚書令揚州刺史休仁與太宗夙相愛友及廢帝世同經危難泰始初四方逆命兵至近畿休仁親當矢石大勳克建任總百揆朝野輻輳上漸不悅因慮諸弟彊盛太子幼弱齎藥賜死乃下詔有司奏絶屬籍見息徙逺郡並治邢太妃詔報又與諸方鎮大臣詔夫無將之誅諒惟通典知咎自引實有偏介劉休仁地屬密親位居台重朕友寄特深寵秩兼茂不能𢎞贊國猷禆宣政道而自處相任妄生猜嫌側納羣小之說內懷不逞之志晦景蔽迹無事陽愚因近疾患沉篤內外憂悚休仁規逼禁兵謀為亂逆朕曲推天倫未忍明法申詔誥礪辨核事原休仁慙恩懼罪遽自引决追尋悲痛情不自勝思屈法科以伸矜悼可宥其二子并全封爵但家國多虞舋起台輔永尋既往感慨追深有司奏臣聞明罰無親情屈於司綱國典有經威申於義滅是以梁趙之誅跣出稱過來言之罰克入致動謹案劉休仁苞蓄禍迹事蔽于天明竄匿沉姦情宣于民聽自以屬居戚近早延恩睦異禮殊義望越常均往嵗授鉞南討本非才命唘行濃湖特以親攝仰遵廟略俯藉衆效屬承泰運竊附成勳而亟叨天功多自臧伐既聖明御㝢躬覽萬機百司有紀官方無越而休仁矜勳怙貴自謂應總朝權遂妄生疑難深自猜外故司空晉平刺王休祐少無令業長滋貪暴歷任陜荆流毒西夏編户嗟散列邑雕虛聖澤含𢎞未明正憲亟與休仁論其愆迹辭意既密不宜傳廣遂飭容㫖反相勸激休祐以休仁位居朝右任遇優崇必能為已力援故深相黨結休祐於是輸金薦寶承顔接意造䣛之間必論朝政遂無日不俱行無時不同宿聲酣聚集密語清閒休仁含姦扇惑善於計數說休祐使外託専慎之法密行貪詐之心謂朝廷不覺人莫之寤休祐遂乃外積怨懼內協禍心既得贊激凶慝轉熾與休仁共為姦謀潛伺機隙圖造釁變規肆凶狡休仁致殞倉卒實維天誅而晉平國太妃妾邢不能追慙子惡上感曲恩更懷不逞巫蠱呪詛休仁因聖躬不和猥謀姦逆滅道反常莫斯為甚殛肆朝市庶申國刑而法網未加自引厥命天慈矜厚减法崇恩賜全二息及其爵封斯誠𢎞風曠德貫絶通古然非所以棄惡流釁懲懼亂臣者也臣等參議謂宜追降休仁為庶人絶其屬籍見息悉徙逺郡休祐愆謀始露亦宜裁黜徙削之科一同舊凖收邢付獄依法窮治又詔報邢匹婦狂愚不足與計休仁知釁自引情有追傷可特為降始安縣王食邑千户并停伯融等流徙聽襲封爵詔諸方鎮大臣休仁致殞卿未具悉事之始末今疏以相示休祐貪恣非政法網之所不容昔漢梁孝王淮南厲王無它釁悖正以越漢制度耳况休祐吞嚼聚斂為西數州之蝗取與鄙虐無復人情屢得王景文禇淵沈攸之等唘陳其罪惡轉不可容吾篤兄弟之恩不欲致之以法且每恨大明兄弟情薄親見休祐屯苦之時始得寬寧彌不忍問所以改授徐州冀其去朝廷近必應能自悛革及拜徐州未及之任便徴動萬端暴濁愈甚既每為民蠧不可復全休仁身粗有知解兼為宰相又吾與其兄弟情昵特復異常頗與休仁論休祐釁狀休祐以休仁為吾所親必應知吾意又云休仁言對能為損益遂多與財賂深相結事乃寢必同宿行必共車休仁性軟易感說遂成繾綣共為一家是吾所吐密言一時倒寫吾與休仁少小異常惟虛心信之初不措疑雖爾猶慮清閒之時非意脫有聞者吾近向休祐推情戒訓嚴切休祐更不復致疑休祐死後我將其內外左右問以情狀方知言語漏泄并具之由彌日懊惋心神萎孰休仁又說休祐云汝但作佞此法自足安我常秉許為家從來頗得此力但試用看有驗不休祐從之於是大有獻奉言多乖實積惡自不可恕自休祐殞亡之始休仁欵曲共知休仁既無罪釁主相本若一體吾之推意初無有間休祐貪愚為天下所疾致殞之本為民除患兄弟無復多人彌應思弔不咸益相親信休祐平生狼抗無賴吾慮休仁往哭或生祟禍且吾爾日本辦仗往哭晚定不行吾所以為設方便呼入在省而休仁得吾召入大自驚疑遂入辭楊太妃顔色狀意甚與常異既至省楊太妃驟遣監子去來參察從此日生嫌懼而吾之推情初不疑覺從休祐死後吾再幸休仁第飲噉極日排閣入內初無猜防休仁坐生嫌畏一日吾春中多期射雉每休仁清閒多往雉場中或敕使陪輦及不行日多不見之每值宵休仁輒語左右云我已復得今一日及在房內見諸妓妾恆語我云不知朝夕見底若一旦死去作鬼亦不取汝取汝正足亂人耳休祐死時日已三晡吾射雉始從雉場出休仁從騎左右伏野中吾遣人召之稱云腹痛不堪騎馬爾時諸王車皆停在朱雀門裏日既暝不暇逺呼車吾衣書車近在離門裏敕呼來下油幢絡擬以載之吾由來諳悉其體有冷患聞腹痛知必是冷乃敕太醫上省送供御髙梁薑飲以賜之休仁得飲忽大驚告左右稱敗今日了左右答曰此飲是御師名封題休仁乃令左右先飲竟猶不甚信乃僶俯噬之裁進一合許妄先嫌二事事如是由來十日五日一就問太妃自休祐死後每吾詔必先至楊太妃間如分别狀休仁由來自營府國興生文書二月中史承祖齎文書呈之忽語承祖云我得成許那何煩將來吾虛心如舊不復見信既懷不安大自嫌恐惟以情理不容復有善心休仁既經南討與宿衛將帥經習狎共事相識者布滿外內日常出入于廂下經過與諸相識將帥都不交言及吾前者積日失適休仁出入殿省諸衛主帥裁相悉者無不和顔厚相撫勞爾時吾既甚惡意不欲見外人悠悠所傳互言差劇休仁規欲聞知方便使曇度道人及勞彥逺屢求啓闞覘吾起居及其所啓皆非急事吾意亦不厝疑吾與休仁親情實異少年以來恆相追隨情向大趣亦往往多同難否之日每共契濶休仁南討為都統既有勳績狀之於心亦何極已但休仁於吾望既不輕小人無知亦多挾背向既生猜二不復自寧夫禍難之由皆意所不悟如其意趣人莫能測事不獲已反覆思惟不得不有近日處分夫于兄弟之情不能無厚薄休祐之亡雖復悼念猶可以理割遣及休仁之殞悲愍特深千念不能已巳舉言傷心事之細碎既不可曲載詔文恐物不必即解兼欲存其兒子不欲窮法為詔之辭不得不云有兵謀非事實也故相報卿知楊太妃者休仁母楊修儀報巴陵王休若休若文帝第十九子歷江州刺史賜死晉平王休祐文帝第十三子為驃騎大將軍荆州刺史歷從南徐州佷戾彊梁前後忤上非一太宗因從射雉遣夀寂之等於路拉殺之託言墜馬時休若在江陵其日馳信報之吾與驃騎南山射雉驃騎馬驚與直閣夏文秀馬相踏文秀墮地驃騎失鞚馬驚觸松樹墮地落硎中時頓悶不識人故馳報弟馬驚南史作馬重驚此或口詔又休若為雍州刺史進衛將軍典籖夏寶期事休若無禮唘太宗誅之未報輒于獄行刑上大怒與休若書降號左將軍削封五百户孝建大明中汝敢行此耶孝建大明並孝武帝年號與驃騎大將軍桂陽王休範書休範見後太宗以休若和善能諧緝物情僞遷為江州刺史徴還召拜手書殷勤即賜死與休範書外間有一師姓徐名紹之狀如狂病自云為塗步郎所使云三月中忽云神語道巴陵王應作天子汝使巴陵王密知之於是師便訪覔休若左右人不能得東宫典書姓何者相識數去來師解神語東宫典書具道神語東宫典書答云我識巴陵間一左右當為汝向道數日東宫典書復來語師云我已為汝語巴陵左右道因達巴陵巴陵具知云莫聲但聽又頃者史官奏天文占候頗云休若應挾異端神道芒昧乃不可全信然前後相准略亦不無髣佛且帖肆間自大明以來有若好之謡于今未止詔若百重章句皆配以美辭美事諸不逞之徒咸云必是休若休若且知道路有異音里巷有若好之謡在西已竒懼致王敬先吐猖狂之言近休祐休仁被誅休若彌不自安又左右多是不相當負罪之徒恆說以道路之言叩動之相與唱云萬民之心屬在休若感激其意尋休若從來心迹殊有可嫌劉亮問高次祖汝一應識此人當給休若休若在東縱恣羣下無本末還朝被貶爵位小退次祖被亮使歸過問訊大泣語次祖云我東行是一段功在郡橫為羣小輩過失大被貶降我實憤怨不解劉輔國何意不作次祖答云劉輔國䝉朝廷生成之恩豈宜有此理推此已是有竒意吾使諸王在蕃正令優游而已本不以武事而休若在西廣召弓馬健兒都不唘聞又戾道明等昔親為賊罪應萬死休若至西大信遇之乃潛將往不唘京吾知汝意謂休若處奉因事事何如心迹既不復可測因其還朝在第與書事事詰誚於內許密自引分狀如暴疾致故差得於其名位及兒子悉得全也休若既是汝弟使其狼心得申者汝得守冶城邊作太尉公耶非但事關計亦於汝甚切汝可密白荀太妃令知廬江王禕昔在西州故上云冶城邉荀太妃休範母章百重下一有字徙松滋侯子房詔子房孝武帝第六子初封尋陽王太宗即位由㑹稽太守徴為撫軍領太常長史孔覬舉兵應晉安王子勛事敗見囚貶為松滋侯路休之等以崇憲太后崩不自安劉祗在南兗州嚴龍宿為世祖所委信至是並懷異圖故下詔并誅之不虞之釁著自終古情為法屈聖達是遵朕掃穢定傾再全寶業逺惟鴻基猥當負荷思𢎞治道務盡敦睦而妖豎遘扇安造異圖自西南阻兵東夏侵斥都邸羣凶密相唇齒路休之兄弟專作謀主規興禍亂令舍人嚴龍覘覦宫省以羽林出討宿衛單罄候隙伺間將謀竊發劉祗在蕃規相應援通言北冦引令過淮頃休範濟江潜欲拒捍賴卜祚靈長姦回弗逞隂慝已露宜盡憲辟實以方難未夷曲加遵養今王化帖泰宜辨忠邪涓流不壅燎火難滅便可委之有司肅正刑典松滋侯子房等淪陷逆徒協同醜悖遂與籖帥羣小潛通南釁連結祗等還圖朕躬雖咎度已彰在法無宥猶子之情良所未忍可廢為庶人徙付逺郡追贈新安王子鸞等詔子鸞孝武帝第八子以母殷貴妃有寵愛冠諸子為前廢帝所殺太宗即位下詔夫紓寃申痛雖往必追緣情惻愛感事彌逺故使持節都督南徐州諸軍事撫軍將軍南徐州刺史新安王子鸞夙表成器蚤延殊寵方樹美業克光蕃維而凶心肆忌奄罹橫禍興言永傷有兼常懷宜旍天秀以雪沉魂可贈使持節侍中都督南徐兖二州諸軍事司徒南徐州刺史王如故第十二皇女第二皇子子師俱嬰謬酷有增酸悼皇女可贈縣公主子師復先封為南海王並加徽諡又為新安王子鸞立嗣詔哀枉追逺仁道所𢎞興滅繼絶盛典斯貴朕務古思治恩禮必敷異族猶敦况在近戚故新除使持節侍中都督南徐兖二州諸軍事司徒南徐州刺史新安王子鸞年雖冲弱性識早茂鍾慈世祖冠寵列蕃值景和凶虐橫罹酷禍國𦙍無主寃祀莫寄尋念痛悼夙軫于懷可以建平王景素息延年為嗣封第九子智隨為武陵王詔改名贊字仲敷世祖孝武皇帝雖恃尊墯惠勳狹政弛樂飲無饜事因於寧泰任威縱費義緣于務寡故以積怨動天流殃後嗣景和肇釁義嘉成禍世祖繼體陷憲無遺昔皇家中圮含生懼滅賴英孝感奮掃雪寃恥勳績墜歷拯兹窮氓繼絶追逺禮訓攸尚况既帝且兄而缺斯典今以第九子智隨奉世祖為子武陵郡大明之世事均代邦可封智隨武陵王食邑五千户尋世祖一門女纍不少既無釐總義須防間諸侯雖不得祖稱天子而事有一家之切且歸寧有所疹疾相營得失是任閨房有稟朕應天在位恩深九族庶此足申追睦之懷敷愛之㫖手詔譬袁顗顗字景章陳郡陽夏人顗前廢帝時歷遷吏部尚書俄而寵衰自慮及禍詭辭求出領寧蠻校尉雍州刺史至襄陽修繕兵械纂集士卒反意已定㑹太宗定大事進顗號右將軍顗詐稱被太皇太后令起兵奉表勸晉安王子勛即位太宗使朝士與顗書顗本無將略又信往來之言京師米貴斗錢數百以為不勞攻伐行自離散於是擁甲以待太宗使顗舊門生徐碩奉手詔譬之又使朝士與顗書並不聽兵敗見殺卿歷觀古今嶮之與彊何嘗可恃自朕踐阼塗路梗塞卿無由奉表未經為臣今追蹤竇融猶未為晚也南史作獨未晚也詔沈文秀文秀字仲逺吳興武康人太宗已定亂晉安王子勛據尋陽反文秀為青州刺史薛安都勸令同逆上遣其弟文炳詔文秀文秀歸命請罪即安本任號輔國將軍為敵所殺皇帝前問督青州徐州之東莞東安二郡諸軍事建威將軍青州刺史朕去嵗撥亂功振普天於卿一門特有殊澤卿得延命至今誰之力耶何故背國負恩逺同逆豎今天下已定四方寧一卿獨守窮城何所歸奉且卿百口在都兼有墳墓想情非木石猶或顧懷故指遣文炳具相宣示凡諸逆節親為戎首一不加罪文炳所具卿獨何人而能自立便可速率部曲同到軍門别詔有司一無所問如其不爾國有常刑非惟戮及弟息亦當夷卿墳壠既以謝齊土百姓亦以勞將士之心故有今詔追贈范道興等詔晉安王子勛之亂前軍典籖范道興志不同逆為鄧琬所殺其餘奉順見害者並為上所愍詔贈有司復奏張興世等封各有差前鎮軍參軍督護范道興朕之舊隸經從北藩徒役南畿遭離命㑹抱恩固節受害羣凶言念純誠良可閔愴可贈員外散騎侍郎南城令鮑法度後軍典籖馮次民永新令應生新建令軍延寶上饒令黃難等違逆識順同被誅滅言念既往宜在追録可贈生奉朝請法度南臺御史次民延寶難並員外將軍顔㚟擢中書侍郎詔㚟為延之第三子延之先領太宗湘東王師即位下詔延之昔師訓朕躬情契兼欵前記室參軍濟陽太守㚟伏勤蕃朝綢繆恩舊可擢為中書侍郎紹封顔師伯詔師伯為前廢帝所誅太宗即位下詔故散騎常侍僕射領丹陽尹平都縣子師伯昔逢代運豫班榮賞遭罹厄㑹隕命淫刑宗嗣殄絶良用矜悼但其心黷貨宜貶贈典可紹封社以尉寃魂羊希降號詔希泰始三年出為廣州刺史初請女夫蕭惠徴帶南海太守復請為東莞不許既到任又請補南海太守下詔希卑門寒士纍世無聞輕薄多舋備彰歷職徒以清刻一介擢授嶺南干上逞欲求訴不已可降號橫野將軍殷恆左遷詔恆父道矜景仁子也明帝時恆為侍中度支尚書屬父疾積久為有司所奏下詔道矜生便有病無更橫疾恆因愚習惰久妨清序可降為散騎常侍降南史作除無更橫疾一作比更無橫疾復戴法興封爵詔法興為世祖寵幸執權日久及廢帝即位所為凶侈每相禁制因閹人華願兒譛殺之太宗泰始二年下詔有司奏以孫襲封又詔停之故越騎校尉吳昌縣開國男戴法興昔從孝武誠勤左右入定社稷預誓河山及出侍東儲竭盡心力嬰害凶悖朕甚愍之可追復削注還其封爵又詔法興小人専權豪恣雖虐主所害義由國討不宜復貪人之爵封爵可停徐爰徙交州詔爰長於附㑹又飾以典文自太祖世祖以逮前廢帝並所任遇太宗在蕃不說及景和世太宗屈辱卑約爰禮敬甚簡益銜之泰始三年詔徙交州既行又詔夫事君無禮教道弗容訕上衒已人倫所棄太中大夫徐爰拔迹厮猥推斥叨逢遂官參時望門伍豪族遷位轉榮莫非超荷而諂側傾險與性自俱利口讒妄自少及長奉公任事釐豪蔑聞初無愧滿常有窺進先朝賞以芻輩之中粗有學解故得漸蒙驅䇿出入兩宫太初僞立盡心佞事義師已震方得南奔及孝武居統唯極諂諛附㑹承㫖專恣厥性致使政治苛縱興造乖法損德害民皆由此豎景和悖險深相贊協茍取偷存罔顧節義任算設數取合人主㩻嶇姦矯所志必從故歷事七朝白首全貴自以體含德厚識鑑機先迷塗遂深罔知革悟朕撥亂反正勳濟天下靈祇助順羣逆必夷况爰恩養而無輸效遂內挾異心著于形迹陽愚杜口罔所陳聞惰事緩文庶申詭略當今朝列賢彥國無佞邪而秉心弗純纍蠧時政以其自告之辰用賜歸老之職榮禮優崇寧非叨過不謂潜怨斥外進競不已勤言託意觸遇斯發小人之情雖所先照猶許其當改未忍加法遂恃朕仁𢎞必求容貸昨因觴宴肆意譏毁謂制詔所為皆資傍說又宰輔無斷朝要非才恃老與舊慢戾斯甚此邉難未靜安衆以惠戎略是務政綱從簡故得使此小物乘寬自縱乃合投畀豺虎以清王猷但朽悴將盡不足窮法可特原罪徙付交州又除廣州統內詔八議緩罪舊在一條五刑所抵耆必加貸徐爰前後釁迹理無可申廢棄海埵實允國憲但蚤蒙朕識曲矜愚朽既經大宥思沾殊渥可特除廣州統內郡徙沈勃詔勃為演之次子好文章善彈琴圍棊泰始中為太子右衛率加給事中時欲北討使勃還鄉募人多受貨賄上怒下詔沈勃琴書藝業口有美稱而輕躁耽酒幼多罪愆比奢淫過度妓女數十聲酣放縱無復劑限自恃吳興土豪比門義故脅說士庶告索無已又輒聽募將委役還私託注病叛遂有數百周旋門生競受財貨多者至萬少者千金考計贓物二百餘萬便宜明罰敕法以正典刑故光祿大夫演之昔受深遇忠績在朝尋逺矜懷能無𢎞律可徙勃西垂令一思愆悔手詔劉懷珍字道玉平原人入齊歷散騎常侍安北將軍建平王景素為荆州徙懷珍右軍司馬遷南郡太守加寧朔將軍明帝手詔懷珍奉㫖卿性忠讜平所仗賴在彼與年少共事不可深存受益景素兒乃佳但不能接物頗亦墮事卿每諫之寢疾又詔明帝崩乃為安成王撫軍司馬卿不應乃作景素佐才舊所寄今徴卿參二衛直南齊書詔沈攸之攸之見後攸之為前將軍與魏人戰不利太宗復令進圍彭城攸之以淮泗既乾糧運不繼固執以為非往返者七上大怒詔曰云云攸之懼進軍行至遲墟上悔追軍令返卿春中求伐彭城吾恐軍士疲勞且去冬奔散人心未宜復用不許卿所唘今便不肯為吾行耶卿若不行便可使吳喜獨去與劉勔張興世蕭道成詔勔字伯猷彭城人歷中領軍以戰死興世字文德竟陵人歷通直散騎常侍徙光祿大夫道成為齊武帝吳喜吳興臨安人歷淮陵太守督豫州諸軍事初喜東討白太宗得尋陽王子房及諸賊即於東梟斬東土既平喜見南賊方熾慮後翻覆受禍乃生送子房還都凡諸大帥顧琛王曇生等皆被全活上內密銜之及平荆州恣意剽虜贓私萬計其後壽寂之誅喜內懼因唘乞中散大夫上有疾為身後之慮以喜素得人情乃賜死喜未死一日上與勔等詔吳喜出自卑寒少被驅使利口任詐輕狡萬端自元嘉以來便充刀筆小役賣弄威恩茍取物情處處交結皆為黨與衆中常以正直為詞而內實阿媚每仗計數運其佞巧甘言悅色曲以事人不忠不平彰于觸事從來作諸署主意所不協者覔罪委頓之以示清直而餘人恣意為非一不撿問故甚得物情昔大明中黟歙二縣有亡命數千人攻破縣邑殺害官長劉子向在㑹稽再遣為主帥領三千精甲水陸討伐再往失利孝武以喜將數十人至二縣說誘羣賊賊即歸降詭數幻惑乃能如此故每豫驅馳窮諸狡慝及泰始初東討止有三百人直造三吳凡再經薄戰而自破岡以東至海十郡無不清蕩百姓聞吳河東來便望風自退若非積取三吳人情何以得弭伏如此其統軍寬慢無章放恣諸將無所裁檢故部曲為之致力觀其意趣止在賊平之後應力為國計喜初東征發都指天畫地云得劉子房即當屏除袁標等皆加斬戮使略無生口既平之後緩兵施恩納罪人之貨誘諸賊帥令各逃藏受賂得物不可稱紀聽諸賊帥假稱為降而擁衛子房遂得生歸朝廷收羅羣逆皆作爪牙撫接幽密過于義士推此意正是聞南賊大盛殷孝祖戰亡人情大惡慮逆徒得志規以自免喜善為姦變每以計數自將於朝廷時三吳首獻慶捷於南賊則不殺其黨頗著隂誠當云東人恇怯望風自散皆是彼無處分非其苦相逼迫保全子房及顧琛等足表丹誠進退二塗可以無患南賊未平惟以軍糧為急西南及北道斷不通東土新平商運稀簡朝廷乃至鬻官賣爵以救災困斗斛收斂猶有不充喜在赭圻軍主者頓偷一百三十斛米初不問罪諸軍主皆云宜治喜不獲已止與三十鞭又不責備凡所曲意類皆如此喜至荆州公私殷富錢物無復孑遺喜乘兵威之盛誅求推檢凡所課責既無定科又嚴令驅蹙皆使立辦所使之人莫非姦猾因公行私迫脅在所入官之物侵竊過半納資請託不知厭已西難既殄便應還朝而解故槃停託云扞蜀實由貨易交關事未回展又遣人入蠻矯詔慰勞賧伐所得一以入私又遣部下將吏兼因土地富人往襄陽或蜀漢屬託郡縣侵官害民興生求利千端萬緒從西還大艑小䑵爰及草舫錢米布絹無船不滿自喜以下逮至小將人人重載莫不兼資喜本小人多被使役經由水陸州郡殆遍所至之處輒結物情妄竊善稱聲滿天下密懷姦惡人莫之知喜軍中諸將非劫便賊惟云賊何須殺但取之必得其用雖復羸弱亦言健兒可惜天下未平但令以功贖罪處遇料理反勝勞人此輩所感惟喜莫云恩由朝廷凶惡不革恆出醜聲勞人義士相與歎息竝云我等不愛性命擊擒此賊朝廷不肯殺去反與我齊今天下若更有賊我不復能擊也此等既隨喜行多無功效或隱在衆後或在幔屋中眠賊既破散與勞人同受爵賞既被詰問辭白百端云此輩既見原宥擊賊有功那得不依例加賞褚淵往南選諸將卒喜為軍中經為賊者就淵求官倍于義士淵以喜最前獻捷名位已通又為統副難相違拒是以得官受賞反多義人義人雖忿喜不平又懷其寬弛往嵗竺超之聞四方反叛人情畏賊無敢求為朝廷行者乃慨然攘步隨喜出征為其軍副身經臨敵自東還失喜意說超之多酒不堪驅使遂相委棄髙敬祖年雖少宿氣力實健其有處分為軍中所稱喜薄其衰老云無所施正以二人忠清與已異行超之為人乃多飲酒計喜軍中主帥豈無飲酒者特是不利超之故以酒致言耳敬祖既無餘事直云年老託為乞郡潜相遣斥其餘主帥並貪濁諂媚之流皆提携東西不相離舍喜聞天壤間有罪人死或應繫者必唘以入軍皆得官爵厚被處遇應入死之人緣已得活非唯得活又復如意人非木石何能不感設令吾攻喜門此輩誰不致力但是喜不敢生心耳喜軍中人皆是喜身爪牙豈關於國喜自得軍號已來多置吏佐是人加板無復限極為兄弟子姪及其同堂羣從乞東名縣連城四五皆灼然巧盜侵官奪私亡命罪人州郡不得討﨑嶇蔽匿必也黨護臺州符㫖殆不復行船車牛犢應為公家所假借者託之於喜吏司便不敢問它縣奴婢入界便略百姓牛犢輒牽殺噉州郡應及役者並入喜家喜兄茹公等悉下取錢盈村滿里諸吳姻親就人間徴求無復紀極百姓嗷然人人悉苦喜具知此初不禁呵索惠子罪不甚江悆既已被恩得免憲辟小小忤意輒加刑斬張悅賊中大帥逼迫歸降沈攸之録付喜云殺活當由朝廷將帥征伐既有常體自應執歸之有司喜即便打鎖解襦與箸對膝圍棊仍造重義私惠招物觸事如斯張靈度凶愚小人背叛之首喜在西輒恕其罪私將下都與之周旋情若同體狼子野心獨懷毒性遂與栁欣尉等謀立劉禕吾使喜録之而喜密報令去去未得逺為建康所録喜背國親惡乃至於是初從西反圖兼右丞貪因事物以行私詐吾患其諂曲抑而不許從此怨懟意用不平喜西救汝隂縱肆兵將掠暴居民姦人婦女逼奪雞犬虜略縱橫緣路官長莫敢呵問脫誤有縳録一人喜輒大怒百姓呼嗟人人失望近段佛榮求還乃欲用喜代之西人聞其當來皆欲叛走云吳軍中人皆是生劫若作刺史吾等豈有活路既無它計正當叛投敵耳夫伐罪弔民用清國道豈有殘虐無辜剝奪為務害政防國罔上附下罪舋若此而可久容臧文仲有云見有善於其君如孝子之養父母見有惡於君若鷹鸇之逐鳥雀耿弇不以賊遺君父前史以為美談而喜軍中五千人皆親經反逆携養左右豈有奉上之心喜志意張大每稱漢髙魏武本是何人近忽通唘求解軍任乞中散大夫喜是何人乃敢作此舉止且當今邉疆未寧正是喜輸蹄領之日若以自處之宜當節儉廉慎靜掃閉門不與外物交關專心奉上何得以其蜼螭髙自比擬當是自顧愆舋事宣遐邇又見壽寂之流徙施修林被擊物惡傷類內懷憂恐故興此計圖欲自安朝廷之士及大臣藩鎮喜殆無所畏者畏者惟吾一人耳人生修短不可豫量若吾壽百年世間無喜何所虧損若使吾四月中疾患不得治力天下豈可有喜一人尋喜心迹不可奉守文之主豈可遭國家閒隙有可乘之㑹耶世人多云時可畏國政嚴歷觀有天下御億兆仗威齊衆何代不然故上古象刑民淳不犯後聖懲僞易以剠墨唐堯至仁不赦四凶之罪漢高大度而急三傑之誅且太公為治先華士之刑宣尼作宰肆少正之戮自昔力安社稷功濟蒼生班劒引前笳鼓陪後不能保此者歷代無數養之以福十分有一耳至若喜之深罪其得免乎夫福之於貴雖以功績致之必由道德守之故善始者未足稱竒令終者乃可重耳凡置官養士本在利國當其為利愛之如赤子及其為害畏之若仇讎豈暇逺尋初功而應忍受終敝耳將之為用譬如餌藥當人羸冷資散石以全身及熱勢發動去堅積以止患豈憶始時之益不計後日之損存前者之賞抑當今之罰非忘其功勢不獲已耳喜罪釁山積志意難容雖有功效不足自補交為國患焉得不除且欲防微杜漸憂在未萌不欲方幅露其罪惡明當嚴詔切之令自為其所卿諸人將相大臣股肱所寄賞罰事重應與卿等論之卿意並謂云何並宋書封王景文蔡興宗詔太宗剪除暴主又平四方欲引朝望以佐大業乃下詔景文固讓不許受五百户夫良圖宣國賞崇彛命殊績顯朝䇿勤王府安南將軍江州刺史景文風度淹粹理懷清暢體兼望實誠備夷岨寶歷方唘密贊義旗妖徒干紀預毗廟略宜登茅社永傳厥祚朕澄氛寧樞實資多士疏爵疇庸實膺徽烈尚書右僕射領衛尉興宗識懷詳正思局通敏吏部尚書領太子左衛率淵器情間茂風業韶逺並謀參軍政績亮時艱拓宇開邑實允勳典景文可封江安縣侯食邑八百户興宗可始昌縣伯淵可南城縣伯食邑五百户蔡景𤣥還封詔景𤣥父興宗泰豫元年薨遺令奏還封爵追贈後授景𤣥固辭不受表疏十餘上詔許景𤣥表如此故散騎常侍中書監左光祿大夫開府儀同三司樂安縣開國伯興宗忠恪立朝謀猷宣著往屬時難勳亮帷幄錫圭分壤實允通誥而懇誠慊訴備彰存歿廉概素情有潔聲軌景𤣥固陳先志良以惻然雖彛典宜全而哀欵難奪可特申不瞑之請永矜克讓之風武都王楊僧嗣加爵詔僧嗣繼從兄元和自立泰始二年詔僧嗣逺守西疆世篤忠欵宜加旌顯以甄義槩可冠軍將軍北秦州刺史泰豫元年四月遺詔朕自臨御億兆仍屬戎冦雖每存𢎞化而惠弗覃逺軍國凋弊刑訟未息今大漸維危載深矜歎可緩徭優調去繁就約因改之宜詳有簡衷務以愛民為先以宣朕遺意鄭修容帖鄭修容有兄喪今成服汝可令汝內人知之再報休祐休範二家內人知也彧報淳化帖桂黃伯思云祐晉平王也範陽王也宋史以休祐為休闕蓋冊牘傳寫之訛當以祐為是後廢帝名昱字德融明帝長子在位五年為蕭道成所弒大使分行四方詔泰豫元年四月即位六月下詔明年改元元徽夫興王經制實先民隱方求廣教刑于四維朕以煢眇夙膺寶歷永言民政未接聽覽眷言乃顧無忘寤寐可遣大使分行四方觀採風謠問其疾苦令有咈民法不便俗者悉各條奏若守宰恩威可紀廉勤允著依事騰聞如獄訟誣枉職事紕謬惰公存私害民利已者無或隱昧廣納芻輿之議博求獻藝之規巡省之道務令精洽深簡行識俾若朕親覽焉又牧守薦賢詔夫寢夢期賢往誥垂美物色求良前書稱盛朕以冲昧嗣膺寶業思仰述聖猷勉𢎞政道興言多士常想得人可普下牧守廣加搜採其有孝友聞族義讓光閭或匿名屠釣隱身耕牧足以整厲澆風扶益淳化者凡厥一善咸無遺逸虛輪佇帛俟聞嘉薦改元大赦詔元徽元年正月夫緩法昭恩裁風茂典蠲憲貸眚訓俗彛義朕臨馭宸樞夤制氓㝢式存寬簡思孚矜惠今開元肆宥萬品惟新凡兹流斥宜均𢎞洗自元年以前貽罪徙放者悉聽還本土申土斷詔元年八月分方正俗著自虞冊川谷異制煥乎姬典故井隧有辨閭伍無雜用能七教克宣八政斯序雖綿代殊軌沿革異儀或民懷遷俗或國尚興徙漢陽列燕代之豪關西熾齊楚之族並通籍新邑即居成舊洎金行委御禮樂南移中州黎庶襁負揚越聖武造運道一閎區貽長世之規申土斷之制而夷險相因盈晦遞襲歲饉凋流戎役惰散違鄉寓境漸至繁積宜式遵鴻軌以為永憲庶阜俗昌民反風定保夷胥山之險澄瀚海之波括河圖于五服振玉軔于五都矣蠲改調役詔元年四月國賦氓稅蓋有恆品往屬戎難務先軍實徴課之宜或乖昔准湘江二州糧運偏積調役既繁庶徒彌擾因循權政容有未革民單力敝嵗月愈甚永言矜歎情兼宵寐可遣使到所明力詳察其輸違舊令役非公限者並即蠲改具條以聞均賞詔二年四月頃列爵叙勳銓榮酬義條流積廣又各淹闕嵗往事留理至逋壅在所參差多違甄飭賞未均洽每疚厥心可悉依舊准並下注職减撤服御詔二年五月頃國賦多騫公儲罕給近治戎雖淺而軍費已多廩藏虛罄難用馭逺宜矯革淫長務在節儉其供奉服御悉就减撤雕文靡麗廢而勿修凡諸游費一皆禁斷可詳為科格又詔三年閏三月頃民俗滋弊國度未殷嵗時屢騫編户不給且邊虞尚警徭費彌繁永言夕惕寢興增疚思𢎞豐耗之制以敦約素之風庶偫蓄拯民以康治道大官珍膳御府麗服諸所供擬一皆减撤可詳為其格務從簡衷尚書令袁粲訊獄詔後廢帝即位未親朝政下詔比亢序愆度留熏耀晷有傷秋稼方貽民瘼朕以眇疚未𢎞政道囹圄尚繁枉滯猶積晨兢夕厲每惻于懷尚書令可與執法以下就訊衆獄使寃訟洗遂瘐弊昭蘇頒下州郡咸令無壅贈劉勔詔勔元徽中拒桂陽王休範戰死事平後廢帝下詔夫義實天經忠惟人則篆素流采金石宣輝自非識洞情靈理感生極豈有捐軀衛主捨命匡朝者哉故持節鎮軍將軍守尚書右僕射中領軍鄱陽縣開國侯勔思懷亮粹體業淹明𢎞勳樹績譽洽華野綢繆顧託契濶屯夷方倚謀猷翌康帝道逆蕃扇禍逼擾京甸援桴誓旅奉御行師身與事滅名隨操逺朕用傷悼震慟于厥心昔王允秉誠卞壼峻節均風往德歸茂先軌泉途就永寃逝無追思崇徽䇿式光惇史可贈散騎常侍司空本官侯如故諡曰忠昭公别敕李安民安民見齊安民元徽初除司州刺史領義陽太守別敕九江須防邉備宜重今有此授以增鄢郢之勢無所致辭也南齊書順帝諱凖字仲謀小字智觀明帝第三子初封安成王蕭道成殞廢帝迎立在位三年禪于齊罷省御府二署工作詔元徽五年七月即位改元升明露臺息構義光漢德雉裘焚制事隆晉道故以檢奢軌化敦儉馭俗頃甸服未靜師旅連年委蓄屢空勞蔽莫偃而丹雘之飾糜耗難訾寶賂之費徴賦靡計今車服儀制實宜約損使徽章有序勿得侈濫可罷省御府二署凡工麗雕鐫傷風毁治一皆禁斷庶永昭憲則𢎞兹始政州郡舉才詔升明元年九月昔聖王既歿淳風已衰龜書永湮龍圖長祕故三代之末德刑相擾世淪物競道詖人諛然猶正士比轂竒才接軫朕襲運金樞纂靈瑤極負扆巡政日晏忘疲永言興替望古盈慮姬夏典載猶傳緗帙漢魏餘文布在方冊故元封興茂才之制地節創獨行之品振維務本存乎得人今可宣下州郡搜揚幽仄摽采鄉邑隨名薦上朕將親覽甄其茂異庶野無遺彥永激遐芳追諡王敬𢎞文貞公詔升明二年夫塗祕蘭幽貞芳載越徽猷沉逺懋禮彌昭故侍中左光祿大夫開府儀同三司敬𢎞神韻冲簡識㝢標峻德敷象魏道藹丘園髙挹榮冕凝心塵外清光粹範振俗淳風兼以纍朝延賞聲華在詠而嘉篆闕文猷䇿韜裏尚想遙芬興懷寢寤便可詳定輝諡式旌追典武都王楊文度兄弟授爵詔僧嗣卒文度復自立為武都王遣弟文𢎞伐仇池破戍兵於蘭臯升明元年詔茂賞有章實昭國度疇庸斯炳載宣史冊督北秦州諸軍事寧朔將軍平羌校尉北秦州刺史武都王文度門乘輝寵世榮邉邑忠果既亮才徑兼彰龍驤將軍楊文𢎞肅協成規躬提桴鼓申稜百頃席卷蘭臯功烈之美並足嘉歎宜膺爵授以酬勳績文度可使持節都督北秦雍二州諸軍事征西將軍刺史校尉悉如故文𢎞輔國將軍略陽太守宋文紀卷四
