body:
  text: 宋文紀巻一明梅鼎祚編武帝姓劉名裕字徳輿彭城人楚元王交之後亊晉安帝誅桓元歴位太尉相國封宋公進爵為王恭帝時簒晉國號宋都建業在位三年廟號髙祖討桓元移京邑檄髙祖晉安帝初以破妖賊孫恩為建武將軍下邳太守桓元從兄脩以撫軍鎮丹徒以髙祖為中叅軍及恩奔敗死衆推盧循為主髙祖復東征循而元尋簒位遷安帝於尋陽髙祖還京口與劉毅何無忌等起義兵討元衆推髙祖為盟主移檄京邑大破賊軍元具舟浮江南走髙祖鎮石頭立留臺官為使持節都督領軍將軍徐州刺史夫治亂相因理不常泰狡焉肆虐或值聖明自我大晉陽九屢構隆安以來難結皇室忠臣碎於虎口貞良斃於豺狼逆臣桓元陵虐人鬼阻兵荆郢肆暴都邑天未亡難凶力繁興踰年之間遂傾皇祚主上播越流幸非所神器沉淪七廟毁墜夏后之罹浞豷有漢之遭莽卓方之於元未足為喻自元簒逆于今歴年亢旱彌時民無生氣加以士庶疲於轉輸文武困於造築父子乖離室家分散豈唯大東有杼軸之悲摽梅有傾筐之塈而已哉仰觀天文俯察人事此而能久孰有可亡凡在有心誰不扼腕諱等所以叩心泣血不遑啓處者也是故夕寐宵興援奬忠烈潜構﨑嶇險過履虎輔國將軍劉毅廣武將軍何無忌鎮北主簿孟昶兖州主簿魏詠之寧逺將軍劉道規龍驤將軍劉藩振威將軍檀憑之等忠烈斷金精貫白日荷戈奮袂志在畢命益州刺史毛璩萬里齊契掃定荆楚江州刺史郭昶之奉迎主上宫于尋陽鎮北叅軍王元徳等並率部曲保據石頭揚武將軍諸葛長民收集義士巳據歴陽征虜叅軍庾頥之等潜相連結以為内應同力協規所在蜂起即日斬偽徐州刺史安成王脩青州刺史宏首義衆既集文武争先咸謂不有一統則事無以輯諱辤不獲巳遂摠軍要庶上慿祖宗之靈下罄義夫之力剪馘逋逆蕩清京輦公侯諸君或世樹忠貞或身荷爵寵而並俛眉猾竪自効莫由顧瞻周道寧不弔乎今日之舉良其㑹也諱以虚薄才非古人勢接於巳踐之機受任於既穨之運丹誠未宣感慨憤躍望霄漢以永懷眄山川以増厲授檄之日神馳賊廷平桓元上安帝乞正封賞奏安帝反正至自江陵髙祖上言封賞於是尚書奏封唱義謀主鎮軍將軍劉裕豫章郡公食邑萬戸餘封賞有差昔天禍皇室巨狡縱簒臣等義惟舊隸豫䝉國恩仰契信順之符俯厲人臣之憤雖社稷之靈抑亦事由衆濟其翼奬忠勤之佐文武畢力之士敷執在巳之謙用虧國體之大輒攝衆軍先上同謀起義始平京口廣陵二城臣及撫軍將軍毅等二百七十二人并後赴義出都縁道大戰所餘一千五百六十六人又輔國將軍長民故給事中王元徳等十人各一千八百四十八人乞正封賞其西征衆軍須論集續上州郡請準土斷表義熈九年髙祖自至江陵時民居未一表請於是依界土斷唯徐兖青三州居晉陵者不在斷例臣聞先王制治九土攸序分境畫疆各安其居在昔盛世人無遷業故井田之制三代以隆秦革斯政漢遂不改富强兼并於是為弊然九服弗擾所託成舊在漢西京大遷田景之族以實關中即以三輔為鄉閭不復係之於齊楚自永嘉播越爰託淮海朝有匡復之算民懷思本之心經畧之圖日不暇給是以寧民綏治猶有未遑及至大司馬桓温以民無定本傷治為深庚戌土斷以一其業于時財阜國豐實由于此自兹迄今綿歴年載畫一之制漸用穨弛雜居流寓閭伍弗修王化所以未純民瘼所以猶在臣荷重任恥責寔深自非改調解張無以濟治夫人情滯常難與慮始所謂父母之邦以為桑梓者誠以生焉終焉敬愛所託耳今所居累世墳壟成行敬恭之誠豈不與事而至請準庚戌土斷之科庶子本所𢎞稍與事著然後率之以仁義鼓之以威武超大江而跨黄河撫九州而復舊土則戀本之志乃速由于當年在始暫勤要終所以能易伏惟陛下垂矜萬民憐其所失永懷鴻鴈之詩思隆中興之業既委臣以國重期臣以寧濟若所啓合允請付外施行杜氏通典治作理隆作崇斯作其九服弗優所託成舊二句在齊楚下民作人子本所作存其本武作聲由作申平長安上渾儀表晉起居注義熈十四年近于長安獲張衡所作渾儀玉圭歴代寳器久沉冦戎謹奉陛下歸之天府請褒贈王鎮惡表髙祖北伐以鎮惡為先鋒攻䧟長安姚泓降留第二子桂陽公義真鎮守鎮惡領安西司馬馮翊太守委以扞禦之任義真中兵叅軍沈田子與鎮惡不協為田子所殺時晉義熈十四年也髙祖表奏左將軍青州刺史故安西司馬征虜將軍王鎮惡志節亮直機略明舉自策名州府屢著誠績荆南遘釁勢據上流難興彊蕃憂兼内侮鎮惡輕舟先邁神兵電臨旰食之虞一朝霧散及王師西伐有事中原長驅洛陽肅清湖陜入渭之捷指麾無前遂廓定咸陽俘執偽后克成之效莫與為疇實扞城所寄國之方邵也近北敵遊魂冦掠渭北統率衆軍曜威撲討賊既還奔還次涇上故龍驤將軍沈田子忽發狂易奄加刃害忠勲未究受禍不圗痛恤兼至惋悼無巳伏惟聖懷為之傷惻田子狂悖即巳備憲鎮惡誠著艱難勲參前烈殊績未酬宜䝉追寵願敇有司議其褒贈請追封孟龍符表髙祖伐廣固以龍符為先鋒軍達臨朐乗勝追逐為慕容超所害贈徐州刺史又表封臨沅縣男故龍驤將軍廣川太守孟龍符忠勇果毅隕身王事宜䝉甄表以顯貞節聖恩嘉悼寵贈方州龍符投袂義初前驅効命推鋒三㨗每為衆先及西剿桓歆北殄河朔朝議爵賞未及施行㑹今北伐復統前旅臨朐之戰氣冠三軍于時逆徒寔繁控弦掩澤龍符匹馬電躍所向摧靡奮戈深入知死弗吝賊超奔遁依險烏聚大軍因勢方軌長驅考其庸績豫叅濟不竊謂宜班爵土以褒勲烈請加贈孫季髙表季髙名處以字行為振武將軍廣固之役先登有功又大破盧循追至鬱林㑹病卒追贈龍驤將軍南海太守復表贈交州刺史孫季髙嶺南之勲巳䝉褒贈臣更思惟盧循稔惡一紀據有全域若今根本未拔投奔有所招合餘燼猶能為虞縣師逺討方勤廟算而季髙汎海萬里投命洪流波激電邁指日遄至遂奄定南海覆其巢窟使循進退靡依輕舟逺迸曾不旬月妖凶殱殄蕩滌之功寔庸為大徃年所贈猶為未優愚謂宜更贈一州即其本號庶令忠勲不湮勞臣増厲沈田子長安戰功表晉義熈十二年髙祖為太尉北伐姚泓田子領别軍從武闗入所向摧䧟得泓偽乗輿服御髙祖表言安帝詔加慰勞長安遂平叅征虜軍事振武將軍扶風太守沈田子率領勁鋭背城電激身先士卒勇冠戎陳奮寡對衆所向必摧自辰及未斬馘千數泓喪旗棄衆奔還霸西咸陽空盡義徒四合清蕩餘燼勢在跂踵晉安帝詔報逋冦阻隘晏安假日舉斧函谷規延王誅群師勤王將離寒暑公躬秉鈇鉞稜威首塗戎輅載脂則郊壘疉巻崤陜甫踐則潼塞開扃姚泓窘逼棄城送死藍田偏師覆之霸川甲首成林俘獲蔽野偽首奔迸華戎雲集積紀逋冦旦夕夷殄嵩岳降瑞表孫嚴宋書沙門釋法義於嵩高廟所石壇下得玉璧三十二枚黄金一餅符彩潤潔河南太守毛修之以靈岳降瑞送諸神府奉晉武陵王司馬遵牋遵字茂逺元帝孫歴拜太保遵為中領軍桓元簒朝廷密詔使摠攝萬機加侍中大將軍時光禄勲丁承之左衛將軍禇粲游擊將軍司馬秀役使官人為御史中丞王楨之所糾察謝牋言辭怨憤承之造司宜藏髙祖為領軍將軍與遵牋並免官粲等備位大臣所懷必盡執憲不允自應據理陳訴而横興怨忿歸咎有司宜加裁當以清風軌沈約宋書與劉毅書毅字希樂彭城沛人歴荆州刺史武帝以貳于巳奏晉安帝誅之毅南征盧循裕與毅書又遣毅從弟藩止之毅大怒謂藩曰我以一時之功相推耳汝便謂我不及劉裕也投書于地與循戰敗吾往習擊妖賊曉其變態新獲姧利其鋒不可輕宜須裝嚴畢與弟同舉宋書同前晉書為通鑑合二書一篇吾徃與妖賊戰曉其變態今修船垂畢將居前撲之剋平之日上流之任皆以相委敕建威將軍孫季髙孫處字季髙㑹稽永興人以字行盧循廣州守兵不以海道為防髙祖為宋公遣季髙乗海奄至焚賊舟艦屠其城初咸以海道艱逺必至為難且分徹見力二三非要髙祖不從乃敕季髙受命而行如期尅捷大軍十二月之交必破妖冦卿今時當至廣州傾其巢窟令賊奔走之日無所歸投宋書與朱齡石函書齡石字伯兒沛郡沛人歴雍州刺史敵攻見害髙祖與齡石密謀取蜀曰劉敬宣往年出黄虎無功而退今以大衆自外水取成都疑兵出内水此制敵之竒也因遣齡石為元帥率寧朔將軍臧熹龍驤將軍朱林等發自江陵别有函書全封齡石署函邊曰至白帝乃開諸軍至自白帝發書倍道兼行譙縱果備内水重兵戍涪城屯彭模夾水為城齡石大破之譙縦奔于涪城而蜀平衆軍悉從外水取成都臧熹朱林於中水取廣漢使羸弱乗髙艦十餘由内水向黄虎宋書作羸通鑑老遺韓延之書晉宗室司馬休之字季預譙敬王恬第三子為平西將軍荆州刺史子文思出嗣譙郡王在京師招集輕俠髙祖執送休之使自為其所休之表廢文思并與髙祖書後結雍州刺史魯宗之共誅執政休之子文寳兄子文祖並於都賜死時延之為休之府録事叅軍有幹用才能髙祖之故吏也髙祖親征休之未至江陵密移延之書延之報之髙祖得書歎息以示諸佐曰事人應如此兵敗從休之奔姚興復奔魏休之道死文思事源逺近所知去秋遣康之送還司馬軍者推至公之極也而了不遜愧又無表疏文思經正不反此是天地之不容吾受命西討止其父子而巳彼土僑舊為所驅逼一無所問往年郗僧施謝邵任集之等交構積嵗専為劉毅謀主所以至此卿等諸人一時逼廹本無纎釁吾處懷期物自有由來今在近路正是諸人歸身之日若大軍登道交鋒接刃蘭艾吾誠不分故具示意并示同懷諸人宋書同前晉書文思事意逺近所知去秋遣康之送還司馬君者推至公之極也而了無愧心久絶表疏此是天地所不容吾受命西征止其父子而巳彼土僑舊為之驅逼一無所問往年郗僧施謝劭任集之等交構積嵗専為劉毅規謀所以至此今卿諸人一時逼廹本無纎釁吾虚懷期物自有由來今在近路是諸賢濟身之日若大軍相臨交鋒接刃蘭艾雜糅或恐不分故白此意併可示同懷諸人韓延之報宋公書延之字顯宗南陽赭陽人入魏為虎牢鎮將魯陽侯承親率戎馬逺履西畿闔境士庶莫不遑駭何者莫知師出之名故也今辱來疏始知以譙王前事良増歎息司馬平西體國忠貞款愛待物當於古人中求耳以君公有匡復之勲家國䝉賴推徳委誠每事詢仰譙王往以微事見劾猶自表遜位况以大過而當嘿然耶但康之前言有所不盡故重使胡道諮白所懷道未及返巳奏表廢之所不盡者命耳推寄相與之懷正當如此有何不可便興兵戈自義旗秉權以來四方方伯誰敢不先相諮疇而逕表天子耶譙王為宰相所責文表廢之經正何歸表使何因可謂欲加之罪其無辭乎劉諱足下海内之人誰不見足下此心而復欲欺誑國士天地所不容在彼不在此矣來示言處懷期物自有由來今伐人之君啗人以利真可謂處懷期物自有由來者矣劉藩死於閭闔之内諸葛斃於左右之手甘言詫方伯襲之以輕兵遂使席上靡款懷之士閫外無自信諸侯以是為得算良可恥也貴府將佐及朝廷賢徳寄性命以過日心企太平久矣吾誠鄙劣嘗聞道於君子以平西之至徳寧可無授命之臣乎未能自投虎口比迹郗任之徒明矣假令天長䘮亂九流混濁當與臧洪游於地下不復多言宋書駭惶駭魏書作恠混作渾同前晉書聞親率戎馬逺履西畿闔境士庶莫不恇駭何者莫知師出之名故也辱來疏始委以譙王前事良増歎息司馬平西體國忠貞款懷待物以君有匡復之勲家國䝉賴推徳委誠每事詢仰譙王往以微事見劾猶自遜位况以大過而當默然也但康之前言有所不盡故重使胡道申白所懷道未及反巳奏表廢之所不盡者命耳推寄相與正當如此有何不可便及兵戈自義旗巳來方伯誰敢不先相諮疇而徑表天子可謂欲加之罪其無辭乎海内之士誰不見足下此心而復欲誑國士天地所不容在彼不在此矣來言虚懷期物自有由來今伐人之君啗人以利真可謂虚懷期物自有由來矣劉藩死於閶闔之門諸葛斃於左右之手甘言詫語方伯襲之以輕兵遂使席上靡款懷之士閫外無自信諸侯以是為得算良可恥也吾誠鄙劣嘗聞道於君子以平西之至徳寧可無授命之臣乎假令天長䘮亂九流渾濁當與臧洪游於地下耳與臧燾書燾字徳仁東莞莒人歴太常光禄大夫燾為太學博士叅右將軍何無忌軍事隨府轉鎮南將軍髙祖鎮京口與燾書頃學尚廢弛後進頽業衡門之内清風輟響良由戎車屢警禮樂中息浮夫近志情與事染豈可不敷崇墳籍敦厲風尚此境人士子姪如林明發捜訪想聞令軌然荆玉含寳要俟開瑩幽蘭懷馨事資扇發獨習寡悟義著周典今經師不逺而赴業無聞非唯志學者鮮或是勸誘未至邪想復𢎞之賜沈林子書林子字敬士吳興武康人歴河東太守輔國將軍初髙祖為太尉以林子為叅軍及伐羌林子叅征西軍事悉署三府中兵加建武將軍統軍為前鋒攻姚泓偽東平公姚紹於潼闗紹退走還保定城留偽將軍姚鸞精兵守嶮林子銜枚夜襲屠其城而坑其衆髙祖賜書頻再破賊慶快無譬既屢摧破想不復久耳與長沙王道憐書道憐髙祖中弟封長沙王謝裕字景仁以字行歴仕左僕射與髙祖雅相善申以婚姻及卒髙祖親臨哭之與道憐書謝景仁殞逝悲痛摧割不能自勝汝聞問惋愕亦不可堪其氣體淹中情寄實重方欲與之共康庶務一旦至此痛惜兼深往矣奈何當復奈何並宋書江陵下書髙祖既輔朝政後將軍劉毅西鎮江陵頗有異圗因自表討毅誅之至江陵下書夫去弊拯民必存簡恕捨網修綱雖煩易理江荆彫殘刑政多闕頃年事故綏撫未周遂令百姓疲匱嵗月滋甚財傷役困慮不幸生彫殘之餘而不減舊刻剥徴求不循政道宰蒞之司或非良幹未能菲躬儉茍求盈給積習生常漸不知改近因戎役來涉二州踐境親民愈見其瘼思欲振其所急䘏其所苦凡租税調役悉宜以見戸為正州郡縣屯田池塞諸非軍國所資利入守宰者今一切除之州郡縣吏皆依尚書定制實戸置臺調癸夘梓材庚子皮毛可悉停省别量所出巴陵均折度支依舊兵運原五嵗刑巳下凡所質録賊家餘口亦悉原放江陵又下書義熈十一年髙祖討荆州刺史司馬休之休之衆潰奔江陵平下書此州積弊事故相仍民疲田蕪杼軸空匱加以舊章乖昧事役頻苦童髦奪飬老穉服戎空戸從役或越紼應召每永懷民瘼宵分忘寢誠宜蠲除苛政𢎞兹簡恵庶令凋風弊政與事而新寧一之化成於朞月荆雍二州西局蠻府吏及軍人年十二以還六十以上及扶飬孤幼單丁大艱悉仰遣之窮獨不能存者給其長賑府州久懃將吏依勞銓序并除今年租税北討下書義熈十二年髙祖北討姚泓加領征西將軍司豫二州刺史以世子為徐兗二州刺史下書吾倡大義首自本州克復皇祚遂建勲烈外夷勍敵内清姦黨皆邦人州黨竭誠盡力之效也情若風霜義貫金石今當奉辭西斾有事闗河弱嗣叨䝉復忝今授情事纒綿可謂深矣頃軍國務殷刑辟未息眷言懷之能不多歎其犯罪繫五嵗以還可一原遣文武勞滿未䝉榮轉者便隨班序報辟召宗炳周續之書髙祖開府下書並辟太尉掾不起吾忝大寵思延賢彦而兎罝潛處考槃未臻側席丘園良增虚佇南陽宗炳鴈門周續之並植操幽棲無悶巾褐可下辟召以禮屈之原宥國内令義熈十四年六月髙祖受相國宋公九錫之命下令孤以寡薄負荷殊重守位奉藩危溢是懼朝恩隆泰委美推功遂方軌齊晉擬議國典雖亮誠守分十稔于今而成命弗廻百辟胥暨内外庶僚敦勉周至籍運來之功參休明之迹乗菲薄之資同盛徳之事監寐永言未知攸託隆祚之始思覃斯慶其赦國内殊死以下今月二十三日昧爽以前悉皆原宥鰥寡孤獨不能自存者人賜粟五斛府州刑罪亦同蕩然其餘詳依舊準徴戴顒韋元令髙祖初命顒為太尉叅軍不就宋國初建復下令並不起前太尉叅軍戴顒辟士韋元秉操幽遁守志不渝宜加旌引以𢎞止退並可散騎侍郎在通直受禪告天策文皇帝臣諱敢用𤣥牡昭告皇天后帝晉帝以卜世告終厯數有歸欽若景運以命于諱夫樹君宰世天下為公徳充帝王樂推攸集越俶唐虞降暨漢魏靡不以上哲格文祖元勲陟帝位故能大拯黔首垂訓無窮晉自東遷四維不振宰輔憑依為日巳久難棘隆安禍成元興遂至帝主遷播宗祀湮滅諱雖地非齊晉衆無一旅仰憤時難俯悼横流投袂一援則皇祀克復及危而能持顛而能扶姦宄具殱僭偽必滅誠興廢有期否終有數至於大造晉室撥亂濟民因藉時來寔尸其重加以殊俗慕義重譯來庭正朔所暨咸服聲教至乃三靈垂象山川告祥人神協祉嵗月滋著是以羣公卿士億兆夷人僉曰皇靈降鑒於上晉朝款誠於下天命不可以久淹宸極不可以暫曠遂逼羣議恭兹大禮猥以寡徳託於兆民之上雖仰畏天威略是小節顧探永懷祗懼若霣敬簡元辰升壇受禪告類上帝用酬萬國之情克隆天保永祚于有宋惟明靈是饗宋書紀志並載皇天志作皇皇黎作首不振作弗樹馮依作焉依主作王一援作一麾有數作必泰重作勞庭作款協祉作和協探作深􅀢作厲日作辰情作嘉望受禪追尊皇考為孝穆皇帝策皇考郡功曹翹維永初元年七月皇帝謹遣某官某奉策上皇考尊號曰孝穆皇帝仰惟聖靈邈焉阻逺昔有周丕崇祚興昌季其在魏晉亦申情禮所以聿追來孝所因者本謹稽式上代考諸令准稱謂既極情典攸遂所以仰順天人俯穆率土在心逺慕庶云有慰追尊皇妣為穆皇后策維年月朔皇帝謹遣某官某奉策上皇妣尊號曰孝穆皇后伏惟皇妣資坤厚之性體母儀之徳等美姜嫄齊列任姒訓穆中閨化流自逺膺厯運之期饗兹天位謹依前典敬奉大禮仰慕聖善之愛俯増蓼莪之思並杜氏通典改元大赦詔永初元年夫世代迭興承天統極雖遭遇異塗因革殊事若乃功濟區宇道振生民興廢所階異世一揆朕以寡薄屬當艱運藉否終之期因士民之力用獲拯溺匡世撥亂安國寧民業未半古功參曩烈晉氏以多難仍遘厯運巳移欽若前王憲章令軌用集大命於朕躬惟徳匪嗣辭不獲申遂祗順三靈饗兹景祚燔柴於南郊受終於文祖猥當與能之期爰集樂推之運嘉祚肇開隆慶惟始思俾休嘉恵兹兆庶其大赦天下改晉元熈二年為永初元年賜民爵二級鰥寡孤獨不能自存者人穀五斛逋租宿債勿復收其有犯鄉論清議贓汙淫盜一皆蕩滌洗除與之更始長徒之身特皆原遣亡官失爵禁錮奪勞一依舊準紹封晉勲臣詔元年六月夫微禹之感歎深後昆盛徳必祀道隆百世晉氏封爵咸隨運改至於徳參微管勲濟蒼生愛人懷樹猶或勿剪雖在異代義無冺絶降殺之儀一依前典可降始興公封始興縣公廬陵公封柴桑縣公各千戸始安公封荔浦縣侯長沙公封醴陵縣侯康樂公可即封縣侯各五百戸以奉晉故丞相王導太傅謝安大將軍温嶠大司馬陶侃車騎將軍謝元之祀其宣力義熈豫同艱難者一依本秩無所減降平亂酬賞詔元年六月夫銘功紀勞有國之要典慎終追舊在心之所隆自大業創基十有七載世路迍邅戎車嵗動自東徂西靡有寧日實賴將帥竭心文武盡効寧内拓外迄用有成威靈逺著冦逆消蕩遂當揖讓之禮猥饗天人之祚念功簡勞無忘鑒寐凡厥誠勤宜同國慶其酬賞復除之科以時論舉戰亡之身厚加復贈遣大使分行四方詔元年六月古之王者廵狩省方躬覽民物捜揚幽隠拯災䘏患用能風澤遐被逺至邇安朕以寡闇道謝前哲因受終之期託兆庶之上鑒寐屬慮思求民瘼才弱事艱苦無津濟夕惕永念心馳遐域可遣大使分行四方旌賢舉善問所疾苦其有獄訟虧濫政刑乖愆傷化擾治未允民聴者皆當具以事聞萬事之宜無失厥中暢朝廷乃眷之㫖宣下民壅隔之情増俸詔元年六月百官事殷俸薄禄不代耕雖國儲未豐要令公私周濟諸供納昔減半者可悉復舊六軍見禄粗可不在此例其餘官僚或自本俸素少者亦疇量増之省除刼科詔元年七月往者軍國務殷事有權制刧科峻重施之一時今王道維新政和法簡可一除之還遵舊條反叛淫盜三犯補冶士本謂一事三犯終無悛革主者頃多并數衆事合而為三甚違立制之㫖普更申明復彭沛下邳三郡詔元年八月彭沛下邳三郡首事所基情義繾綣事由情奬古今所同彭城桑梓本鄉加隆攸在優復之制宜同豐沛其沛郡下邳可復租布三十年慶典原赦詔元年八月追謚妃臧氏為敬皇后太子為皇太子下詔朕承厯受終猥饗天命荷積善之祚藉士民之力率由令範先后祗嚴宣訓七廟肇建情敬無違加以儲宫備禮皇基彌固國慶家禮爰集旬日豈予一人獨荷兹慶其見刑罪無輕重可悉原赦限百日以今為始先因軍事所發奴僮各還本主若死亡及勲勞破免亦依限還直衛䘏晉世陵塋詔元年八月晉世帝后及藩王諸陵守衛宜便置格其名賢先哲見優前代或立徳著節或寧亂庇民墳塋未逺並宜洒掃主者具條以聞叅詳衆議詔元年閏八月主者處案雖多所諮詳若衆官命議宜令明審自頃或摠稱叅詳於文漫略自今有厝意者皆當指名其人所見不同依舊繼啓停冬使詔元年閏八月諸處冬使或遣或不事役宜省可悉停唯元正大慶不在其例郡縣遣冬使詣州及都督府亦停之除諸房廟詔二年四月淫祠惑民費財前典所絶可竝下在所除諸房廟其先賢及以勲徳立祠者不在此例籌量杖罰詔二年六月杖罰雖有舊科然職務殷碎推坐相尋若皆有其實則體所不堪文行而巳又非設罰之意可籌量觕為中否之格寛兵制詔二年十月兵制峻重務在得宜役身死叛輒考傍親流遷彌廣未見其極遂令冠帶之倫淪陷非所宜革以𢎞泰去其密科自今犯罪充兵合舉戸從役者便付營押領其有戸統及讁止一身者不得復侵濫服親以相連染興國學詔三年正月古之建國教學為先𢎞風訓世莫尚於此發䝉啓滯咸必由之故爰自盛王迄于近代莫不敦崇學藝修建庠序自昔多故戎馬在郊旍旗巻舒日不暇給遂令學校荒廢講誦蔑聞軍旅日陳俎豆藏器訓誘之風將墜於地後生大懼於墻面故老竊歎於子衿此國風所以永思小雅所以懷古今王略逺届華域載清仰風之士日月以冀便宜傅延胄子陶奬童䝉選備儒官𢎞振國學主考詳舊典以時施行分立豫州詔三年二月豫州南臨江滸北接河洛民荒境曠轉輸艱逺撫莅之宜各有其便淮西諸郡可立為豫州自淮以東為南豫州省縣尉詔太平御覽百里之任總歸官長縣尉實效甚微其費不少二品縣可置一尉而巳餘悉停省諸州開禁詔蓺文類聚少府前嵗所封諸州蘆荻可開以利民封族弟遵考為營浦侯詔遵考從髙祖征伐歴遷冠軍將軍晉帝遜位别宫領兵防衛髙祖即位下推恩之詔遵考服屬之親國戚未逺宗室無多宜䝉寵爵可封營浦縣侯食邑五百戸追封外祖趙裔蕭卓詔裔下邳僮人仕平原太守女安嬪孝皇帝生髙祖以産殂宋初追崇號謚卓蘭陵人仕洮陽令女文夀為孝皇繼室髙祖為宋王稱太妃及受禪尊為皇太后永初二年有司奏贈懿卓其年又詔封開國縣侯推恩之禮在情所同故内樹宗子外崇后屬爰自漢魏咸遵斯典外祖趙光禄蕭光禄名器雖隆茅土未建並宜追封開國縣侯食邑五百戸有司請贈趙裔蕭卓奏大孝之徳盛於榮親一人有慶光被萬國是以靈文寵於西京夀張顯於隆漢故平原太守趙裔故洮陽令蕭卓並外屬尊戚不逮休寵臣等仰述聖思逺稽舊章並可追贈光禄大夫加金章紫綬裔命婦孫可豫章郡建昌縣君卓命婦趙可吳郡夀昌縣君追封劉穆之王鎮惡詔髙祖受禪思佐命元勲下詔故侍中司徒南昌侯劉穆之深謀逺猷肇基王迹勲造大業誠實匪躬今理運維新蕃屏並肇感事懷人實深悽悼可進南康郡公邑三千戸故左將軍青州刺史王鎮惡荆郢之捷尅剪放命北伐之勲參迹方叔念勤維績無忘厥心可進龍陽縣侯増邑千五百戸封佐命功臣徐羨之等詔散騎常侍尚書僕射鎮軍將軍丹陽尹徐羨之監江州豫州之西陽新蔡諸軍事撫軍將軍江州刺史華容侯王宏散騎常侍䕶軍將軍作唐男檀道濟中書令領太子詹事傅亮侍中中領軍謝晦前左將軍江州刺史宜陽侯檀韶使持節雍梁南北秦四州荆州之河北諸軍事後將軍雍州刺史關中侯趙倫之使持節督北徐兖青三州諸軍事征虜將軍北徐州刺史南城男劉懷慎散騎常侍領太子左衛率新淦侯王仲徳前冠軍將軍北青州刺史安南男向彌左衛將軍灄陽男劉粹使持節南蠻校尉佷山子到彦之西中郎司馬南郡宜陽侯張劭叅西中郎將軍事建威將軍河東太守資中侯沈林子等或忠規逺謀扶讚𢎞業或肆勤樹績𢎞濟艱難經始圖終勲烈惟茂並宜與國同休饗兹大賚羨之可封南昌縣公宏可華容縣公道濟可改封永脩縣公亮可建城縣公晦可武昌縣公食邑各二千戸韶可更増邑二千五百戸仲徳可増邑二千五百戸懷慎彦之各進爵為侯粹改封建安縣侯並増邑為千戸倫之可封霄城縣侯食邑千戸劭可封臨沮縣伯林子可封漢夀縣伯食邑六百戸開國之制率遵舊章封禇叔度詔叔度晉末為廣州刺史破盧循餘黨有功髙祖受命為右衛將軍甚嘉之下詔夫賞不遺勤則勞臣増勸爵必疇庸故在功咸達叔度南北征討常管戎要西夏不䖍誠著嶺表可封番禺縣男食邑四百戸徐廣封中散大夫詔祕書監徐廣學優行謹歴位恭肅可中散大夫加沈林子輔國將軍詔林子遭憂還東乗輿親幸信使相望葬畢詔起固辭不許軍國多務内外須才前鎮西諮議建威將軍河東太守沈林子不得遂其情事可輔國將軍追贈沈林子詔林子永初三年薨時髙祖不豫羣公恐上慟損竟不使知有司率常典也故輔國將軍沈林子器懷真審忠績允著才志未遂傷悼在懷可追贈征虜將軍封外孫徐湛之詔湛之父達之尚髙祖長女㑹稽公主仕為振威將軍討司馬休之於陣見害湛之幼孤髙祖所愛永初三年詔封永興公主一門嫡長早罹辛苦外孫湛之特所鍾愛且致節之𦙍情實兼常可封枝江縣侯食邑五百戸髙麗王璉百濟王映除授詔使持節都督營州諸軍事征東將軍髙句驪王樂浪公璉使持節督百濟諸軍事鎮東將軍百濟王映並執義海外逺修貢職惟新告始宜荷國休璉可征東大將軍映可鎮東大將軍持節都督王公如故三年加璉散騎常侍贈督平州諸軍事倭讚除授詔倭讚萬里修貢逺誠宜甄可賜除授臨終手詔朝廷不須復有别府宰相帶揚州可置甲士千人若大臣中任要宜有爪牙以備不祥人者可以臺見隊給之有征討悉配以臺見軍隊行還復舊後世若有幼主朝事一委宰相母后不煩臨朝仗既不許入臺殿門要重人可詳給班劒紀功鼎銘宋主劉裕晉永初三年從秦中還紀功鑄一鼎於九江古篆書文曰案裕滅後秦在晉義熈十三年永初乃其簒晉為宋年號也三年薨録誤沸秦洛伏大漠鼎録宋國封建禪代詔策文附為晉安帝進劉裕侍中車騎將軍詔安帝義熈元年正月江陵平天子反正二月詔加鎮軍將軍劉裕為侍中車騎將軍都督中外諸軍事固讓不受參傅亮傳云髙祖登庸之始文筆皆是記室軍滕演北征廣固悉委長史王誕自此後至於受命表策文誥皆亮辭也古稱大者天地其次君臣所以列貫三辰神人代序諒理本於造昧而運周於萬葉故盈否時襲四靈通其變王道或昧貞賢拯其危天命所以永固人心所以攸穆雖夏周中傾賴靡申之績恭倫載竊實二代是維或乗資籍號或業隆異世猶詩書以之休詠記策用為美談未有因心撫民而誠發理應援神器於巳淪若在今之盛者也朕以寡昧遭家不造越自遘閔屬當屯極逆臣桓元乗釁縦慝窮凶恣虐滔天猾夏遂誣罔人神肆其簒亂祖宗之基既湮七廟之饗胥殄若墜淵谷未足斯譬皇度有晉天縦英哲使持節都督揚徐兖豫青冀幽并江九州諸軍事鎮軍將軍徐青二州刺史忠誠天亮神武命世用能貞明協契義夫響臻故順聲一唱二溟巻波英風振路宸居清翳暨冠軍將軍毅輔國將軍無忌振武將軍道規舟旗遄邁而元凶傳首回戈疉揮則荆漢霧廓俾宣元之祚永固於嵩岱傾基重造再集於朕躬宗廟歆七百之祐皇基融載新之命念功惟徳永言銘懷固巳道冠開闢獨絶終古書契以來未之前聞矣雖則功髙靡尚理至難文而崇庸命徳哲王攸先者將以𢎞道制治深闗盛衰故伊望膺殊命之錫桓文饗備物之禮况宏徴不世顧邈百代者宜極名器之隆以光大國之盛而領軍謙虚自衷誠㫖屢顯朕重逆仲父乃所以愈彰徳美也鎮軍可進位侍中車騎將軍都督中外諸軍事使持節徐青二州刺史如故顯祚大邦啓兹疆宇封豫章郡公加號詔義熈二年十月論匡復功封唱義謀主鎮軍將軍劉裕為豫章郡公天子重申前令加侍中進號車騎將軍固讓三年二月天子遣兼太常葛籍授公策有扈滔天夷羿乗釁亂節干紀實撓皇極賊臣桓元怙寵肆逆乃摧傾華霍倒拔嵩岱五嶽既夷六地易所公命世英縦藏器待時因心資敬誓雪國恥慨憤陵夷誠發宵寐既而嵗月屢遷神器巳逺忠孝幽寄實貫三靈爾乃介石勝機宣契畢舉訴蒼天以為正揮義旅而一驅奔鋒數百勢烈激電百萬不能抗限制路日直植城遂使衝鯨潰流暴鱗奔漢廟勝逺加重氛載滌二儀廓清三光返照事遂永代功髙開闢理微稱謂義感朕心若夫道為身濟猶縻厥爵况乃誠徳俱深勲冠天人者乎是用建兹邦國永祚山河言念載懷匪云足報往欽哉俾屏余一人長弼皇晉流風垂祚暉烈無窮其降承嘉策對敭朕命封劉裕為宋公詔義熈十二年十月夫嵩岱配極則乾道増輝藩岳作屏則帝王成務是以夏殷資昆彭之伯有周倚齊晉之輔鑒諸前典儀刑萬代翼治扶危靡不由此太尉公命世天縦齊聖廣淵明燭四方道光宇宙爰自棐忱初廸則投懃王國妖蝥孔熾則功存社稷固以四維是荷萬邦攸賴者矣暨桓元僣逆傾蕩四海公深秉大節靈武霆震𢎞濟朕躬再造王室每惟勲徳銘於厥心遂北清海岱南夷百越荆雍稽服庸岷順軌剋黜方難式遏冦虐及阿衡王猷班序内外仰興絶風傍嗣逸業秉禮以整俗遵王以垂訓聲教逺被無思不洽爰暨木居海處之酋被髪雕題之長莫不忘其陋險九譯來庭此葢播諸徽策靡究其詳者也曩者永嘉不綱諸夏幅裂終古帝居淪胥戎羯永言園陵率土同慕公明發遐慨撫機電征親董侯伯稜威致討旗旝首塗則八表響震偏師先路則多壘雲徹舊都載清五陵復禮百城屈膝千落影從自篇籍所載生民以來勲徳懋功未有若此之盛者也昔周吕佐叡聖之主因三分之形把旄仗鉞一時指麾皆大啓疆宇跨州兼國其在桓文方兹尤儉然亦顯被寵章光錫殊品况乃獨絶百代顧邈前烈者哉朕每𢎞鑒古訓思遵令圖以公深秉冲挹用闕大禮天人引領于兹六載况今禹迹齊軌九隩同文司勲抗策普天増佇遂公髙挹大愆國章三靈眷屬朕實祗懼便宜顯達羣望允崇盛典其進位相國摠百揆揚州牧封十郡為宋公備九錫之禮加璽綬逺遊冠位在諸侯王上加相國緑綟綬宋公九錫策文朕以寡昧仰纘洪基夷羿乗釁蕩覆王室越在南鄙遷於九江宗祀絶饗人神無位提挈羣凶寄命江滸則我祖宗之業奄墜於地七百之祚剪焉既傾若陟淵海罔知攸濟天未絶晉誕育英輔振厥弛維再造區㝢興亡繼絶俾昏作明元勲至徳朕實賴焉今將授公典策其敬聴朕命乃者桓元肆僣滔天冺夏拔本塞源傾倒六位庶僚俛眉四方莫䘏公精貫朝日氣凌霄漢奮其靈武大殱羣慝剋復皇邑奉帝歆神此公之節始於勤王者也授律羣后泝流長騖薄伐峥嶸獻捷南郢大憝折首羣逆畢夷三光旋采舊物反正此又公之功也出藩入輔𢎞兹保弼阜財利用繁殖生民編戸嵗滋疆宇日啓導徳明刑四境有截此又公之功也鮮卑負衆僣盜三齊狼噬冀青䖍劉沂岱介恃遐阻仍為邊毒公蒐乗秣駟敻入逺疆衝櫓四臨萬雉俱潰竊號之人顯戮司冦拓土三千申威龍漠此又公之功也盧循妖凶伺隙五嶺乗虚肆逆侵覆江豫旍拂寰内矢及王城朝野䘮沮莫有固志家獻徙卜之計國議遷都之規公乗轅南濟義形於色嶷然内湛視險若夷攄略運竒英謨不世狡冦窮衂䘮旗宵遁俾我畿甸拯於將墜此又公之功也追奔逐北揚旍江濆偏旅浮海指日遄至番禺之功俘級萬數左里之捷魚潰鳥散元凶逺迸傳首萬里海南肅清荒服來款此又公之功也劉毅叛渙負舋西夏陵上罔主志肆姧暴附麗協黨扇蕩王畿公御軌以刑消之不日蒼兕電泝神兵風掃罪人斯得荆衡清晏此又公之功也譙縦怙亂冦竊一隅王化阻閡三巴淪溺公指命偏師授以良圗凌波浮湍致届井絡僣豎伏鑕梁岷革偃此又公之功也馬休魯宗阻兵内侮驅率二方連旗稱亂公投袂星言斫其上略江津之師勢踰風電廻斾沔川實繁震懾二叛奔迸荆雍來蘇𤣥澤浸育温風潜被此又公之功也永嘉不競四夷擅華五都幅裂山陵幽辱祖宗懷沒世之憤遺氓有匪風之思公逺齊伊宰納隍之仁近同小白滅亡之恥鞠旅陳師赫然大號分命羣帥北狥司兖許鄭風靡鞏洛載清偽牧逆藩交臂請罪百年榛穢一朝掃濟此又公之功也公有康宇内之勲重之以明徳爰初發迹則竒謨冠古電擊彊妖則鋒無前對聿寧東畿大造黔首若乃草昧經綸化融於嵗計扶危静亂道固於苞桑辨方正位納之軌度蠲削煩苛較若畫一淳風美化盈塞宇宙是以絶域獻琛遐夷納貢王略所宣九服率從雖文命之東漸西被咎繇之邁於種徳何以尚兹朕聞先王之宰世也庸勲尊賢建侯胙土褒以寵章崇其徽物所以協輔皇家永隆藩屏故曲阜光啓遂荒徐宅營丘表海四履有聞其在襄王亦賴匡霸又命晉文備物光錫惟公道冠前烈勲髙振古而殊典未加朕甚懵焉今進授相國以徐州之彭城沛蘭陵下邳淮陽山陽廣陵兖州之髙平魯泰山十郡封公為宋公錫兹𤣥土苴以白茅爰定爾居用建冢社昔晉鄭啟藩入作卿士周召保傅出總二南内外之重公實兼之命使持節太尉尚書左僕射晉寧縣五等男湛授相國印綬宋公璽紱使持節兼司空散騎常侍尚書陽遂鄉侯泰授宋公茅土金虎符第一至第十左竹使符第一至第十左相國位無不摠禮絶朝班居常之名宜與事革其相國摠百揆去録尚書之號上送所假節侍中中外都督太傅太尉印綬豫章公印策進揚州牧領征西將軍司豫北徐雍四州刺史如故公紀綱禮度萬國是式乗介蹈方罔有遷志是以錫公大輅戎輅各一𤣥牡二駟公抑末敦本務農重積采蘩實殷稼穡惟阜是用錫公衮冕之服赤舄副焉公閑邪納正移風改俗陶鈞品物如樂之和是用錫公軒懸之樂六佾之舞公宣美王化導揚休風華夷企踵逺人胥萃是用錫公朱戸以居公官方任能網羅幽滯九臯辤野髦士盈朝是用錫公納陛以登公當軸處中率下以義式遏冦讎清除苛慝是用錫公虎賁之士三百人公明罰恤刑庶獄詳允放命干紀罔有攸縦是用錫公鈇鉞各一公龍驤鳳矯咫尺八紘括囊四海折衝無外是用錫公彤弓一彤矢百盧弓十盧矢千公温恭孝思致䖍禋祀忠肅之志儀刑萬方是用錫公秬鬯一卣珪瓚副焉宋國置丞相以下一遵舊儀欽哉其祗服徃命茂對天休簡恤庶邦敬敷顯徳以終我髙祖之嘉命南史霄漢作虹蜺奉帝歆神作奉歆神祇生民作黎元無狼噬冀青䖍劉沂岱二句毒作害駟作馬俱潰下又無竊號之人二句王城下無朝野䘮沮二句不日下無蒼兕電泝二句清晏作寧晏來蘇下無𤣥澤浸育二句進宋公為宋王詔朕聞先王之蒞天下也上則大寳以尊徳下則建侯以褒功是以成勲告就文命有𤣥圭之錫四海來王姬旦饗龜䝉之封夫翼聖宣績輔徳𢎞猷禮窮元賞寵章希世况明保沖昧獨運陶鈞者哉朕以不徳遭家多難雲雷作屯夷羿竊命失位京邑遂播蠻荆艱難卑約制命凶醜相國宋公天縱睿聖命世應期誠貫三靈大節宏發拯朕躬於巢幕廻靈命於巳崩固巳道窮北面暉格八表者矣及外積全國之勲内累戡黎之伐芟夷彊妖之始藴崇姧猾之源顯仁藏用之道六府孔修之績莫不雲行雨施能事畢舉諒巳方軌於三五不容於典策者焉自永嘉䘮師綿踰十紀五都分崩然正朔時暨唯三秦懸隔未之暫賔至令羌人襲亂淫虐三世資百二之易守恃函谷之可闗廟算韜略不謀之日久矣公命世撫運闡曜威靈内研諸侯之慮外致上天之罰故能倉兕甫訓則許鄭風偃鉦鉞未指則瀍洛霧披俾舊闕之陽復集萬國之軫東京父老重睹司𨽻之章俾朕負扆髙拱而保大洪烈是用逺鑒前典延即羣謀敬授殊錫光啓疆字乗馬之制有陋舊章徽稱之美未窮上爵豈足以顯報懋功允塞民望藩輔王畿長轡六合者乎實以公每秉謙徳卑不可踰難進之道以寵為戚是故降損盛制且有後命也自兹迄今洪勲彌劭稜威九河魏趙底服廻轅崤潼連城氷泮遂長驅灞滻懸旍龍門逆賊姚泓係頸就擒百稔梗穢滌於崇朝祖宗遺憤雪於一旦涉禹之迹方行天下至於海外罔有不服功固萬世其寧惟永豈金石雅頌所能讚揚實可以告於神明勒銘嵩岱者巳朕又聞之周道方逺則鸑鷟鳴岐二南播徳則麟騶呈瑞自公大號初發爰暨告成靈祥炳煥不可勝紀豈伊素雉逺至嘉禾近歸而巳哉朕每仰鑒𤣥應俯察人謀進惟道勲退惟國典豈得遂公冲挹而久藴盛策便宜敬行大禮允副幽顯之望其進宋公爵為王以徐州之海陵東安北琅邪北東莞北東海北譙北梁豫州之汝南北潁川北南頓凡十郡益宋國其相國揚州牧領征西將軍司豫北徐雍四州刺史如故晉恭帝禪宋詔恭帝元熈二年六月傅亮承髙祖密㫖諷帝禪位草詔請書帝欣然操筆曰桓元之時重為劉公所延今日之事本所甘心乃書赤紙為詔夫天造草昧樹之司牧所以陶鈞三極統天施化故大道之行選賢與能隆替無常期禪代非一族貫之百王由來尚矣晉道陵遲仍世多故爰暨元興禍難既積至三光貿位冠履易所安皇播越宗祀墮冺則我宣元之祚永墜於地顧瞻區域剪焉巳傾相國宋王天縦聖徳靈武秀世一匡頽運再造區夏故以興滅繼絶舟航淪溺矣若夫仰在璿璣㫄穆七政薄伐不庭開復疆宇遂乃三俘偽主開滌五都雕顔卉服之鄉龍荒朔漠之長莫不廻首朝陽沐浴𤣥澤故四靈效瑞川岳啓圗嘉祥雜遝休應炳著𤣥象表革命之期華裔注樂推之願代徳之符著乎幽顯瞻烏爰止允集明哲夫豈延康有歸咸熈告謝而巳哉昔火徳既微魏祖底績黄運不競三后肆勤故天之厯數實有攸在朕雖愚闇昧於大道永鑒廢興為日巳久念四代之髙義稽天人之至望予其遜位别宫歸禪於宋一依唐虞漢魏故事禪策咨爾宋王夫𤣥古權輿悠哉邈矣其詳靡得而聞爰自書契降逮三五莫不以上聖君四海止戈定大業然則帝王者宰物之通器君道者天下之至公也昔在上葉深鑒兹道是以天禄既終唐虞弗得傳其嗣符命來格舜禹不獲全其謙所以經緯三才澄斥彛化作範振古垂風萬葉莫尚於兹自是厥後歴代彌劭漢既嗣徳於放勛魏亦方軌於重華諒巳協謀乎人鬼而以百姓為心者也昔我祖宗欽明辰居其極而明晦代序盈虧有期翦商兆禍非唯一世曽是弗尅矧伊在今天之所廢有自來矣惟王體上聖之姿包二儀之徳明齊日月道合四時乃者社稷傾覆王拯而存之中原蕪梗又濟而復之自負固不賔干紀放命肆逆滔天竊據萬里靡不潤之以風雨震之以雷霆九伐之道既敷八法之化自理豈伊博施於民濟斯黔庶固以義洽四海道威八荒者矣至於上天垂象四靈效徴圖䜟之文既明人神之望巳改百工歌於朝庶民頌於野億兆抃踊傾佇惟新自非百姓樂推天命攸集豈伊在予所得獨専是用仰祗皇靈俯順羣議敬禪神器授帝位於爾躬大祚告窮天禄永終於戯王其允執其中敬遵典訓副率土之嘉願恢洪業於無窮時膺休祐以答三靈之眷望禪宋璽書葢聞天生蒸民樹之以君帝皇寄世實公四海崇替係於勲徳升降存乎其人故有國必亡十年著其數代謝無常聖哲握其符昔在上世三聖係軌疇咨四嶽以𢎞揖讓惟先王之有作永垂範于無窮及劉氏致禪實堯是法有魏告終亦憲兹典我世祖所以撫歸運而順人事乗利見而定天保者也而道不常泰戎夷亂華䘮我洛食蹙國江表仍遘否運淪沒相因逮于元興遂傾宗祀幸賴神武光天大節宏發匡復我社稷重造我國家惟王聖徳欽明則天光大應期誕載明保王室内紓國難外播宏略誅大憝于漢陽逋僣盜于沂渚澄氛西岷肅清南越再清江湘拓定樊沔若乃永懷區宇思一聲教王師首路則伊洛澄流稜威崤潼則華嶽褰靄偽酋銜璧咸陽即序雖彞器所銘詩書所詠庸勲之盛莫之與二也遂偃武修文誕敷徳政八統以馭萬民九職以刑邦國思兼三王以施四事故能信著幽顯義感殊方自歴世所賔舟車所暨靡不謳歌仁徳抃舞來庭朕每敬惟道勲永察符運天之厯數實在爾躬是以五緯升度屢示除舊之迹三光協數必昭布新之祥圗䜟禎瑞皎然斯在加以龍顔英特天授殊姿君人之表煥如日月傳稱惟天為大惟堯則之詩云有命自天命此文王夫或躍在淵者終饗九五之位勲格天地者必膺大寳之業昔土徳告沴傳祚于我有晉今厯運改卜永終于兹亦以金徳而傳于宋仰四代之休義鑒明昏之定期詢于羣公爰逮庶尹咸曰休哉罔違朕志今遣使持節兼太保散騎常侍光禄大夫澹兼太尉尚書宣範奉皇帝璽綬受終之禮一如唐虞漢魏故事王其允荅人神君臨萬國時應靈祉酬于上天之眷命駱達陳天文符䜟奏宋武帝既受晉禪太史令駱達奏陳去義熈元年至元熈元年十月太白星晝見經天凡七占曰天下革民更王異姓興義熈元年至元熈元年十一月朔日有蝕之凡四皆蝕從上始臣民失君之象也義熈十一年五月三日彗星出天市其芒埽帝坐天市在房心之北宋之分野得彗柄者興此除舊布新之徴義熈七年七月二十五日五虹見於東方占曰五虹見天子黜聖人出義熈七年八月十一日新天子氣見東南十二年北定中原崇進宋公嵗星裵回房心之間大火宋之分野與武王克殷同得嵗星之分者應王也十一年以來至元熈元年月行失道恒北入太微中占月入太微廷王入為主十三年十月鎮星入太微積留七十餘日到十四年八月十日又入太微不去到元熈元年積二百餘日占鎮星守太微亡君之戒有立王有徙王十四年五月十七日茀星出北斗魁中占曰星茀北斗中聖人受命十四年七月二十九日彗星出太微中彗柄起上相星下芒尾漸長至十餘丈進埽北斗及紫微中占曰彗星出太微社稷亡天下易政入北斗帝宫空一占天下得召人召人聖主也一曰彗孛紫微天下易主十四年十月一日熒惑從入太微鉤巳至元年四月二十七日從端門出積屍留二百六日繞鎮星熒惑與鎮星鉤巳天廷天下更紀十四年十二月嵗太白辰裵回居斗牛之間經旬斗牛厯數之起占曰三星合是謂改立元熈元年十二月二十四日四黑龍登天易傳曰冬龍見天子亡社稷大人應天命之符金雌詩云大火有心水抱之悠悠百年是其時火宋之分野水宋之徳也金雌詩又曰云出而兩漸欲舉短如之何乃相岨交哉亂也當何所唯有隠巖殖禾黍西南之朋困桓父兩云𤣥字也短者云祚短也巖隠不見唯應見谷殖禾谷邊則聖諱炳明也易曰西南得朋故能困桓父也劉向䜟曰上五盡寄致太平草付合成集羣英前句則陛下小諱後句則太子諱也十一年五月西明門地陷水涌出毁門扉閾西者金鄉之門為水所毁此金徳將衰水徳方興之象也太興中民於井中得棧鐘上有古文十八字晉自先帝至今數滿十八年義熈八年太社生桑明尤著者也夫六亢位也漢建安二十五年一百九十六年而禪魏魏自黄初至咸熈二年五十六年而禪晉晉自太始至今元熈二年一百五十六年三代數窮咸以六年少帝名義符小字車兵武帝長子在位二年多過失廢為營陽王徐羨之等使人弑之于吳決獄詔少帝初立時徐羨之為司空下詔平理獄訟政道所先朕哀荒在疚未堪親覽司穴工尚書令可率衆官月一決獄追贈陽瓚詔尚書令傅亮議瓚家在彭城宜即以入臺絹粟賜給文士顔延之為誄焉故寧逺司馬濮陽太守陽瓚滑臺之逼厲誠固守投命均節在危無撓古之忠烈無以加之可追贈給事中并存䘏遺孤以慰存亡吐谷渾阿犲授爵詔景平中阿犲遣使獻方物少帝詔報未及拜受吐谷渾阿犲介在遐表慕義可嘉宜有寵任今酬其來款可督塞表諸軍事安西將軍沙州刺史澆河公詔髙麗王高璉少帝景平二年璉遣長史詣闕獻方物遣使慰勞之皇帝問使持節散騎常侍都督營平二州諸軍事征東大將軍髙句驪王樂浪公纂戎東服庸績繼䡄厥恵既彰款誠亦著踰遼越海納貢本朝朕以不徳忝承鴻緒永懷先蹤思覃遺澤今遣謁者朱邵伯副謁者王邵子等宣㫖慰勞其茂康恵政永隆厥功式昭往命稱朕意焉宋書宋文紀巻一
