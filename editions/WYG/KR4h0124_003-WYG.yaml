body:
  text: 宋文紀巻三明梅鼎祚編孝武帝名駿字休龍文帝第三子封武陵王為江州刺史起誅元凶劭自立在位十一年廟號世祖臨徐兗二州捜揚教徐方地兼梁楚秀士攸出兗土樂頌所流風禮自古豈不異人比肩鴻才世及或踈散山林不聞進達或栖息閭閻懷寳待耀孝性義門明經善政者所在捜揚舉進咸用名聞在藩上白雉表白體表素彩儀禀識自擾陶氣仁風練色淳露不蘄一飲之逸不資三異之勤下並藝文類聚建平王宏冠表宏筮辰協吉撰禮備容資比成徳允被休典廣陵王誕冠表臣誕年禮既升擇休申冠順棄有成服美任典慶雲贊非煙非雲曳紫流光懸華曜藻奄欝臺堂粤予休明震乎珍祥積慶有文靈貺無疆洞井贊絡紀山瑞紫志川靈金膏溢曜玉樹含英端巖毓泉挹祥吐禎彪彬仙牒揮翕詭經清暑殿西甍嘉禾贊維殷粤周有穂表禎祥乎合矣超瑞髙甍非原非澤乃瑞乃靈庶藉天貺廣兹化清梨花贊沃瘠異壤舒慘殊時惟氣在春具物含滋嘉樹之生于彼山基開榮布彩不離塵緇孤桐贊珍無隠徳産必有甄資此孤幹獻枝楚山稍星雲界衍葉炎廛名列貢寳器贊虞絃廵幸舊宫頌惟皇敬眷永慕徐京列裝青野動軌丹廷榮和首律景澤開年林坰發色川郊列泉沿泝遥衍登陟廻懸踐域負外即宫臨山思申陵寢歡結枌都眇懷沛澤勤念宛吾納夀遺老設飲先居堂序缺朝秀廷集閭芳春琴堂橘連理頌列訪神秘詳觀瑞策通柯竦秀實靈所錫離條别榦淹一榮戚道被遐夷承我正厯故侍中司徒建平王宏墓誌銘含榮幼耀膺和早慧徘徊天人優遊經蓺鴻沴纔流皇根中絶體孝盡性懷追孝烈反我宸居毁綱更結管機凝務端朝贊契召輝才融士穎風折秘路長隂昭塗永滅太室牛鼎銘陳隨隠漫録云紹興初有獻鼎于行都上賜三茅觀髙一尺三寸有咫兩耳旁出三足與首皆類牛腹外周紋如篆籀腹内篆銘乃宋孝武帝孝建元年八月二日肇作以享太室者維甲午八月丙寅帝若稽古肇宋鼎審厥象作牛鼎格于太室從用享億萬寧神休惟帝時寳萬世其永賴田汝成西湖志載宋髙宗紹興二十年出古器賜三茅寧夀觀其一漢鼎云有漢建元三年八月作牛鼎祀太室銘曰惟甲午丙寅帝若稽古肇作宋器審厥象作牛鼎格于位室從用饗億寧神休惟帝時保萬世其永賴鼎按建元乃漢武帝三年為癸夘宋孝武帝孝建元年甲午也且中有肇宋語志當傳訛而辭小異祈晴文幽明失序就隂則滯連雨霖霪注而不替潤既違時澤而非恵幸輟霖而吐景權停雲而歛翳照鸞輅於大郊光龍旂於田際耒耜得施黍稷獲藝増髙廪於嘉年登十千於兹嵗蓺文類聚擬漢武帝李夫人賦序殷淑儀寵傾後宫及薨進號貴妃謚曰宣上痛愛不巳遂擬是賦又諷有司奏立新廟朕以亡事棄日閲覽前王詞苑見李夫人賦悽其有懐亦嗟詠久之因感而㑹焉大使廵省風俗詔世祖以元嘉三十年四月自江州入討元凶至新亭即位五月克定京邑逆黨伏誅下詔天步艱難國道用否雖基構永固而氣數時愆朕以眇身奄承皇業奉尋厯命寤寐震懷萬邦風政人治之夲感念陵替若疚在心可分遣大使廵省方俗施行經給之宜詔三十年六月興王立訓務𢎞治節輔臣佐時勤獻政要仰惟聖規每存兹道猥以眇躬屬承景業闡揚遺澤無廢厥心夫量入為出邦有恒典而經給之宜多違常度兵役糜耗府藏散減外内衆供未加損約非所以聿遵先㫖敬奉遺圖自今諸可薄己厚民去煩從簡者悉宜施行以稱朕意舉羣善詔三十年七月世道未夷惟憂在國夫使羣善畢舉固非一才所議况以寡徳屬衰薄之期夙宵寅想永懷待旦王公卿士凡有嘉謀善政可以維風訓俗咸達乃誠無或依隠崇約㢮禁詔三十年七月百姓勞弊徭賦尚繁言念未乂宜崇約損凡用非軍國宜悉停功可省細作并尚方雕文靡巧金銀塗飾事不闗實嚴為之禁供御服膳減除遊侈水陸捕採各順時日官私交市務令優衷其江海田池公家規固者詳所開弛貴戚競利悉皆禁絶勸農舉士詔孝建元年正月首食尚農經邦本務貢士察行寧朝當道内難甫康政訓未洽衣食有仍耗之弊選造無觀國之美昔衛文勤民髙宗恭黙卒能收賢巖穴大殷季年朕每側席疚懷無忘鑒寐凡諸守蒞親民之官可詳申舊條勸盡地利力田善蓄者在所具以名聞褒甄之科精為其格四方孝秀非才勿舉獻答允值即就銓擢若止無可採猶賜除署若有不堪酬奉虚竊榮薦遣還田里加以禁錮尚書百官之元本庶績之樞機丞郎列曹局司有在而頃事無巨細悉歸令僕非所以衆材成構羣能濟業者也可更明體制咸責厥成糾覈勤惰嚴施賞罰建孔廟詔元年十月仲尼體天降徳維周興漢經緯三極冠冕百王爰自前代咸加褒述典司失人用闕宗祀先朝逺存遺範有詔繕立世故妨道事未克就國難頻深忠勇奮厲實憑聖義大教所敦永惟兼懷無忘待旦可開建廟制同諸侯之禮詳擇爽塏厚給祭秩諸苑假與貧民詔二年八月諸苑禁制綿逺有妨肆業可詳所開弛假與貧民恵宥辠徙詔二年九月國道再屯艱虞畢集朕雖寡徳終膺鴻慶惟新之㫖實深百王而恵宥之令未殊常渥永言勤慮寤寐載懷在朕受命之前凡以辠徙放悉聴還本犯釁之門尚有存者子弟可隨才署吏選散騎常侍詔初晉世散騎常侍選望甚重與侍中不異其後用人漸輕孝建三年世祖欲重其選下詔吏部尚書顔竣奏薦孔顗王彧散騎職為近侍事居規納置任之本實惟親要而頃選常侍陵遲未允宜簡授時良永寘清轍顔竣奏常侍華選職任俟才新除臨海太守孔顗意業閒素司徒長史王彧懷尚清理並任為散騎常侍聴申奏詔大明元年十月旒纊之道有孚于結繩日昃之勤巳切于姬后况世弊教淺嵗月澆季朕雖戮力㝢内未明求衣而識狹前王務廣昔代永言菲徳其愧良深朝咨野怨自達者寡恵民利公所昧實衆自今百辟庶尹下民賤𨽻有懷誠抱志擁鬱衡閭失理負謗未聞朝聴者皆聴躬自申奏小大以聞朕因聴政之日親對覽焉春務貸給糧種詔二年正月去嵗東土多經水災春務巳及宜加優課糧種所須以時貸給追叙先恩詔二年正月先帝靈命初興龍飛西楚嵗紀浸逺感往纒心奉迎文武情深常𨽻思𢎞殊澤以申永懷吏身可賜爵一級軍戸免為平民牧守䘏贈貧弱詔二年二月政道未著俗弊尚深豪侈兼并貧弱困窘存闕衣裳沒無歛槥朕甚傷之其明敇守宰勤加存䘏賻贈之科速為條品寛申逋亡詔二年六月往因師旅多有逋亡或連山染逆懼致軍憲或辭役憚勞茍免刑罰雖約法從簡務思𢎞宥恩令驟下而逃逋猶多豈習愚為性狃惡難反將在所長吏宣導乖方可普加寛申咸與更始審貢賦詔二年十二月夫山處巖居不以魚鼈為禮頃嵗多虞軍調繁切違方設賦本濟一時而主者玩習遂為常典杶幹瑶琨任土作貢積羽羣輕終致深弊永言𢎞革無替朕心凡寰衛貢職山淵採捕皆當詳辨産殖考順嵗時勿使牽課虚懸暌忤氣序庶簡約之風有孚於品性恵敏之訓無漏於幽仄賻給北討文武詔三年八月近北討文武於軍亡沒或殞身矢石或癘疾死亡並盡勤王事而歛槥卑薄可普更賻給務令豐厚原宥徒𨽻詔三年八月昔姬道方凝刑罰斯厝漢徳初明犴圄用簡良由上一其道下淳其性今民澆俗薄誠淺偽深重以寡徳弗能心化故知方者尠趣辟實繁向因廵覽見二尚方徒𨽻嬰金履校既有矜復加國慶民和獨隔凱澤益以慙焉可詳所原宥依舊聴訟詔三年九月夫五辟三刺自古所難巧法深文在季彌甚故沿情察訟魯師致捷市獄勿擾漢使飛聲廷尉逺邇疑讞平決攸歸而一蹈幽圄動逾時嵗民嬰其困吏容其私自今囚至辭具並即以聞朕當悉詳斷庶無留獄若繁文滯劾證逮遐廣必須親察以盡情狀自後依舊聴訟行親桑詔三年十月古者薦鞠青壇聿祈多慶分繭𤣥郊以供純服來嵗可使六宫妃嬪修親桑之禮皇太后觀桑禮詔孝武王皇后傳云大明四年三月后率六宫躬桑于西郊皇太后觀禮上下詔朕卜祥大昕測辰拂羽爰詔六宫親蠶川室皇太后降鑾從御佇蹕觀禮緑籧既具𤣥紞方修庶儀發椒闈化動中縣妃主以下可量加班錫詳減四時供限詔四年四月昔紩衣御㝢貶甘示節土簋臨天飭儉昭度朕綈帛之念無忘于懷雖深詔有司省遊務實而嵗月兼積年量虚廣豈以捐豐從損允稱約心四時供限可詳減太半庶裘絺順典有偃民華纂組傷工無競㕓市䘏贍疫癘詔四年都邑節氣未調疫癘猶衆言念民瘼情有矜傷可遣使存問并給醫藥其死亡者隨宜䘏贍閲武原赦詔五年二月昔人稱人道何先於兵為首雖淹紀勿用忘之必危朕以聴覽餘閒因時講事坐作有儀進退無爽軍幢以下普量班錫頃化弗能孚而民未知禁逭役違調起觸刑網凡諸逃亡在今昧爽以前悉皆原赦巳滯囹圄者釋還本役其逋負在大明三年以前一賜原停自此以還鰥貧疾老詳所申減伐蠻之家蠲租税之半近籍改新制在所承用殊謬實多可普更符下聴以今為始若先巳犯制亦同蕩然南徐兗二州緩租詔五年二月南徐兗二州去嵗水潦傷年民多困窶逋租未入者可申至秋登雨水遣使廵行詔五年七月雨水猥降街衢泛溢可遣使廵行窮弊之家賜以薪粟修葺庠序詔五年八月自靈命初基聖圖重逺參正樂職感神明之應崇殖禮囿奮至徳之光聲實同和文以均節化調其俗物性其情故臨經式奠煥乎炳發道䘮世屯學落年永獄訟微衰息之術百姓忘退素之方今息警夷嶂恬波河渚棧山航海鄉風慕義化民成俗兹時篤矣來嵗可修葺庠序旌延國胄庚寅制方鎮所假白板郡縣年限依䑓除食禄三分之一不給送簡恵王畿詔五年十一月王畿内奉京師外表衆夏民殷務廣宜思簡恵可遣尚書就加詳檢并與守宰平治庶獄其有疑滯具以狀聞大閲詔七年正月春蒐之禮著自周令講事之語書于魯史所以昭宣徳度示民軌則今嵗稔氣榮中外寧晏當因農隙葺是舊章可克日于𤣥武湖大閲水師并廵江右講武校獵遣祭霍山詔七年二月江漢楚望咸秩周禋禮九疑於盛唐祀蓬萊於渤海皆前載流訓列聖遺式霍山是曰南嶽實惟國鎮韞靈呈瑞肇光宋道朕駐蹕于野有事岐陽瞻睇風雲徘徊以想可遣使奠祭校獵歴陽大赦詔七年二月車駕校獵于歴陽之烏江朕受天慶命十一年於兹矣憑七廟之靈獲上帝之力禮横四海威震八荒方廵三湘而奠衡嶽次九河而檢云岱今恢覽功成省風畿表觀民六合蒐校長洲騰沙飛礫平嶽蕩海鼖晉合序鐃鉦協節獻鬯如禮饁獸傾郊敬舉王公之觴廣納士民之夀八風循通卿雲叢聚盡天罄瑞率宇竭歡思散太極之泉以福無方之外可大赦天下行幸所無出今嵗租布其逋租餘債勿復收賜民爵一級女子百戸牛酒刺守邑宰及民夫從蒐者普加洽賚又詔朕弱年操製出牧阿維承政宣風薦歴年紀國步中阻治戎江甸難夷情義實繫于懷今或練蒐訓旅涉兹境閭故邑耆舊在目罕存年世未逺殱亡大半撫迹惟事傾慨兼著太宗燕故晉陽洽恩世祖流仁濟畿暢澤永言往猷思廣前賚可蠲歴陽郡租輸三年遣使廵慰問民疾苦鰥寡孤老六疾不能自存者厚賜粟帛髙年加以羊酒凡一介之善隨才銓貫前國名臣及府州佐吏量所沾錫人身巳往施及子孫禁専殺詔七年四月自非臨軍戰陳一不得専殺其罪甚重辟者皆如舊先上須報有司嚴加聴察犯者以殺人罪論敕刺史守令奉手詔詔七年五月自今刺史守宰動民興軍皆須手詔施行唯邊隅外警及姦釁内發變起倉卒者不從此例檢糾占固山澤詔七年七月前詔江海田池與民共利歴嵗未久浸以弛替名山大川往往占固有司嚴加檢糾申明舊制秋旱賑給詔七年八月昔匹婦含怨山燋北鄙孀妻哀慟臺傾東國良以誠之所動在微必著感之所震雖厚必崩朕臨察九野志深待旦弗能使爛然成章各如其節遂令炎精損和陽偏不施嵗云不稔咎實朕由大官供膳宜從貶撤近道刑獄當親料省其王畿内及神州所統可遣尚書與所在共訊畿外諸州委之刺史并訊省律令思存利民其考讁貿襲在大明七年以前一切勿治尤弊之家開倉賑給貸麥種詔七年九月近炎精亢序苗稼多傷今二麥未晩甘澤頻降可下東郡境勤課墾殖尤弊之家量貸麥種省方詔七年九月昔周王驥迹實窮四溟漢帝鑾軫夙徧五嶽是皆所以上對幽靈下理民土自天昌替馭臨宫創圖禮代天鬱世貿興毁皇家造宋日月重光璇璣得序五星順命而戎車嵗動陳詩義闕朕聿含五光奄一天下思盡寳戒之規以塞謀危之路當沿時省方觀察風俗外詳考舊典以副側席之懷車駕廵南豫州詔七年十月朕廵幸所經先見百年者及孤寡老疾並賜粟帛獄繫刑罪並親聴訟其士庶或怨鬱危滯受抑吏司或隠約潔立負擯州里皆聴進朕前面自陳訴若忠信孝義力田殖穀一介之能一藝之美悉加旌賞雖秋澤頻降而夏旱嬰弊可即開行倉並加賑賜行幸考績詔七年十月賞慶刑威奄國彞軌黜幽升明闢㝢恒憲故採言聆風式觀侈質貶爵加地于是乎在今類帝宜社親廵江甸因覲嶽守躬求民瘼思𢎞明試之典以申考績之義行幸所經莅民之職功宣于聴即加甄賞若廢務亂民隨諐議罰主者詳察以聞停東境雜税詔八年正月東境去嵗不稔宜廣商貨逺近販鬻米者可停道中雜税其以仗自防悉勿禁收拯東境詔八年二月去嵗東境偏旱田畝失收使命來者多至乏絶或下窮流穴頓伏街巷朕甚憫之可出倉米付建康秣陵二縣隨宜贍䘏若温拯不時以至捐棄者嚴加糾劾廵幸賑䘏詔初學記夫足踐目見實遵天命尚怨踰深甿俗未同其化自逺幽隠不得其所故降省風俗躬撫黎元廵狩省風俗詔初學記朕聿合五色奄一天下當沿時省方觀察風俗外詳考舊典以副側席之懷也建明堂詔大明五年詔有司奏依晉裴頠議但作大殿屋雕畫而巳昔文徳在周明堂崇祀髙烈惟漢汶邑斯尊所以職祭罔諐氣令斯正鴻名稱首濟世飛聲朕皇考太祖文皇帝功曜洞元聖靈昭俗内穆四門仁濟羣品外薄八荒威憺殊俗南腦勁越西髓剛戎裁禮興稼穡之根張樂協四氣之紀匡飾墳序引無題之外旌延寳臣盡盛徳之範訓深劭農政髙刑厝萬物捸通百神薦祉動協天度下沿地徳故精緯上靈動殖下瑞諸侯軌道河溓海夷朕仰憑洪烈入子萬姓皇考降祐迄將一紀思奉揚休徳永播無窮便可詳考姬典經始明堂宗祀先靈式配上帝誠敬克展幽顯咸秩惟懷永逺感慕崩心有司議奏伏尋明堂辟雍制無定文經記參差傳説乖舛名儒通哲各事所見或以為名異實同或以為名實皆異自漢暨晉莫之能辨周書云清廟明堂路寢同制鄭元注禮義生於斯諸儒又云明堂在國之陽丙巳之地三里之内至於室宇堂个戸牖達向世代湮緬難得該詳晉侍中裴頠西都碩學考詳前載未能制定以為尊祖配天其義明著廟宇之制理據未分直可為殿以崇嚴祀其餘雜碎一皆除之參詳鄭元之注差可準據裴頠之奏竊謂可安國學之南地實丙巳爽塏平暢足以營建其墻宇規範宜擬則太廟唯十有二間以應朞數依漢汶上圖儀設五帝位太祖文皇帝對饗祭皇天上帝雖為差降至於三載恭祀理不容異自郊徂宫亦宜共日禮記郊以特牲詩稱明堂羊牛吉蠲雖同質文殊典且郊有燔柴堂無禋燎則鼎俎彞簋一依廟禮班行百司捜材簡工權置起部尚書將作大匠量物商程尅今秋繕立置古帝王冢戸詔太平御覽先代帝王因時創業君人建國禮尊南面而厯運推移年代久逺丘壠殘毁樵牧相趨塋兆湮蕪封樹莫辨自古以來帝王陵墓可隨近十戸蠲其役以供守視立闕詔輿地志云博望梁山東西隔江相對如門相去數里謂之天門宋孝武詔仍以二山立闕梁山天表象魏以施國形分置吏部尚書詔上常慮權移臣下以吏部尚書選舉所由欲輕其勢力大明二年下詔分置又别詔太宰江夏王義恭於是吏部置尚書二人省五兵尚書謝莊及度支尚書顧顗之並補選職八柄馭下以爵為先九徳咸事政典居首銓衡治樞興替攸寄頃世以來轉失厥序徒秉國鈞終貽權謗今南北多士勲勤彌積物情善否實繁斯任官人之詠維聖克允則哲之美粤帝所難加澆季在俗讓議成風以一人之識當羣品之誚望沈浮自得庸可致乎吏部尚書可依郎分置并詳省閒曹别詔太宰江夏王義恭分選詔旦出在朝論者亦有同異誠知循常甚易改舊生疑但吏部尚書由來與録共選良以一人之識不辨洽通兼予奪威權不宜専一故也前述宣先㫖敬從來奏省録作則永貽後昆自此選舉之要唯由元凱一人若通塞乖衷而訴達者尠且違令與物理至隔閡前王盛主猶或難之况在寡闇尤見其短又選官裁病即嗟誚滿道人之四體㑹盈有虚旬日之間便至怨詈况實有假託不由寢頓者耶一詣不前貧苦交困則兩邊致患互不相體校之以實並有可哀若職置二人則無此弊兼選曹樞要歴代斯重人經此職便成貴塗巳心外議咸不自限故范曄魯爽舉兵滅門以此言之實由榮厚勢驅殷繁所致設可擬議此授唯有數人本積嵗月稍加引進而理無前期多生慮表或嬰艱抱疾事至回移官人之任決不可闕一來一去向人巳周非有黜責巳貴難賤既成妨長寘之無所盛衰遞襲便是一段世臣相處之方臣主生疑所以彌覺此職宜在降階監令端右足處時望無人則闕異于九流今但直銓選部有減前資物情好猜横立别觧本㫖向意終不外宣唯有從郎分置視聴自改選既輕先民情巳變有堪其任大展遷回兼常之宜以時稍進本職非復重官可得不須帶帖數過居之盡無詒怪自中分荆揚子時便有意於此正訝改過不少容生駭惑爾來多年欲至嵗下處分㑹何偃致故應有親人故近因此施行本意詔文不得委悉故復紙墨具陳臺省相臨詔長沙王義欣次子祗大明中為中書郎太宰江夏王義恭領中書監服親不得相臨表求觧職下詔昔二王兩謝俱至崇禮自今三臺五省悉同此例行幹杖詔初五省官所給幹僮不得雜役沈統為著作佐郎坐輕役過差奏免世祖下詔自頃幹僮多不祗給主可量聴行杖増諸弟國封詔大明五年昔韓衛異姓宗周之明憲三封殊級往晉之令典惟皇家創典盡𢎞斯義朕應天命光宅四海思所以憲章前式崇建懿親永垂畫一著于甲令諸弟國封並可増益千戸答太子子業廢帝見後前廢帝幼而狷急在東宫每為世祖所責世祖西廵子業啓叅承起居書迹不謹上詰讓之子業啓事陳謝上又答之書不長進此是一條耳聞汝素多懈怠狷戻日甚何以頑固乃爾耶宋書答廬江王禕南平王鑠蚤薨子敬淵婚禕往視之白世祖借伎因答婚禮不舉樂且敬淵等孤苦倍非宜也封將帥功臣等詔世祖伐逆定亂思將帥之功下詔朕以不天有生罔二泣血千里志復深逆鞠旅伐罪義氣雲湧羣帥仗節指難如歸故曽未積旬宗社載穆遂以眇身猥纂大統永念茂庸思崇徽錫新除使持節散騎常侍都督南兗豫徐兗四州諸軍事鎮軍將軍南兗州刺史沈慶之新除散騎常侍領軍將軍栁元景新除散騎常侍右衛將軍宗慤督兗州諸軍事輔國將軍兖州刺史徐遺寳寧朔將軍始興太守沈法系驃騎咨議叅軍顧彬之或盡誠謀初宣綜戎略或受命元帥一戰寧亂或禀竒軍統協規效捷偏師奉律勢振東南皆忠國忘身義髙前烈功載民聴誠簡朕心定賞策勲兹焉攸在宜列土開邑永蕃皇家慶之可封南昌縣公元景曲江縣公並食邑三千戸慤洮陽縣侯食邑二千戸遺寳益陽縣侯食邑一千五百戸法系平固縣侯彬之陽新縣侯並食邑千戸追贈文帝王皇后母平樂鄉君詔昔漢道既靈博平煇絶魏國方安嘉憲啓䇿皆因心所𢎞酌典沿誥亡外祖親王夫人柔徳淑範光啓坤載屬内位闕正攝饋閨庭儀被芳闈問宣戚里永言感逺思追榮秩宜式傍鴻則敬登徽序又詔趙蕭臧光禄袁敬公平樂郡君墓先未給塋戸加世數巳逺𦙍嗣衰陵外戚尊屬不宜使墳塋蕪穢可各給蠻戸三以供灑埽追贈張敷詔敷父亡以毁卒世祖即位詔贈司徒故左長史張敷貞心簡立幼樹風規居哀毁滅孝道淳至宜在追甄於以報美可追贈侍中追贈王微詔微棲志貞深文行惇洽生自華宗身安隠素足以賁兹丘園惇是薄俗不幸蚤世朕甚悼之可追贈秘書監答劉懷珍詔懐珍孝建中以破魏功拜建武將軍樂陵河間二郡太守明年啓求還孝武答邊維須才未宜陳請祭袁湛墓詔大明三年幸籍田行經湛墓下詔祭故侍中左光禄大夫開府儀同三司晉寧敬公外氏尊戚素風簡正嵗紀稍積墳塋浸逺朕近廵覽千畝遥瞻松隧緬維徽塵感慕増結可遣使祭少申永懷祭殷景仁墓詔大明五年行幸經景仁墓下詔司空文成公景仁徳量淹正風識明允徽績忠謨夙達先照恵政茂譽實留民屬近瞻丘墳感往興悼可遣使致祭䘏賜徐湛之江湛王僧綽門戸詔三人為元凶劭所殺世祖並追贈又詔三家長給廩徐湛之江湛王僧綽門戸荼酷遺孤流寓言念既往感痛兼深可令歸居本宅厚加䘏賜誅王僧達詔僧達屢􅀴狂逆上以終無悛心因南彭城蕃縣民髙闍謀反伏誅下詔即其事陷之於獄賜死王僧達餘慶所鍾早登榮觀輕險無行暴于世談值國道中艱盡室願效甄其薄誠貰其鴻慝爵遍外内身窮榮寵曽無在泮食椹懐音乃協規西楚志擾東區公行剽掠顯奪凶黨倚結羣惡誣亂視聴朕每容隠思加蕩雪曽無犬馬感恩之志而炎火成燎原之勢涓流兆江河之形遂唇齒髙闍契歸蘇寳捜詳妖圖覘察象緯逮賊長臨梟餘黨就鞫咸布辭獄牒宣言虚市猶欲隠忍法為情屈小醜紛紜人扇方甚矯構風塵志希非覬固巳達諸公卿昭于朝野朕焉得輕宗社之重行匹夫之仁殛山誅邪聖典所同戮諷剪律漢法攸尚便可收付廷尉肅正刑書故太保華容文昭公宏契濶歴朝綢繆眷遇豈容忘兹勲徳忽其世祀門爵國姻一不貶絶與東揚州刺史顔竣詔竣字士遜瑯琊臨沂人延之子建平王宏字休度文帝第七子謙儉周慎明曉政事世祖甚信仗之歴為中書監尚書令加散騎常侍薨痛悼甚至與竣詔宏夙情業尚素心令績雖年未及壯願言兼申謂天道可倚輔仁無妄雖寢患淹時慮不至禍豈圖祐善虚設一旦永謝驚惋摧慟五内交殞平生未逺舉目如昨而賞對遊娛緬同千載哀酷纒綿實増痛切卿情均休戚重以周旋乖坼少時奄成今古聞問傷惋當何可言又詔何偃字仲􅒮尚之中子子戢尚山隂公主歴吏部尚書卒世祖與竣書何偃遂成異世美志長往與之周旋重以姻媾臨哭傷怨良不能巳往矣宜贈散騎常侍金紫光禄大夫本官如故封劉延孫顔竣詔朕藉羣能之力雪莫大之恥以眇眇之身託於王公之上思所以䇿勲樹良永寧世烈新除侍中領前軍將軍延孫率懐忠敏器局沉正協替義初誠力俱盡左衛將軍竣立志開亮理思清要茂策忠謩經綸惟始俾積基更造咸有勤焉宜顯授龜社大啓邦家延孫可封東昌縣侯竣建城縣侯食邑各二千戸詔劉延孫延孫彭城吕人初髙祖遺詔京口要地非宗室近戚不得居之大明初竟陵王誕為徐州上深相畏忌不欲使居京口遷之廣陵欲使腹心為徐州據京口以防誕故以南陵授延孫而與之合族大明三年詔延孫徴為侍中尚書左僕射舊京樹親由來常凖卿前出所有别議今此防久弭當以還授小兒贈劉延孫詔故侍中尚書左僕射領䕶軍將軍東昌縣開國侯延孫風局簡正體識沉明綢繆心膂自蕃升朝契濶惟舊幾將二紀靈業中圯則首贊出圖義令既舉則任均蕭冦器允棟幹勲實佐時及累司馬兩官出内尹牧恵政茂課著自民聴忠謨令節簡乎朕心方爕采台階永毗國道奄至薨殞震慟兼深考終定典宜盡哀敬可贈司徒給班劒二十人侍中僕射侯如故賜劉延孫𦵏送詔故司徒文穆公延孫居身寡約家素貧虚每念清美良深悽歎𦵏送資調固當闕乏可賜錢三十萬米千斛封龎秀之等詔世祖入討元凶以伐逆寧亂事資羣謀大明元年下詔昔嵗國難方結疑懦者衆故散騎常侍太子右率龎秀之履險能貞首暢義節用使狡狀先聞軍備夙固醜逆時殄頗有力焉追念厥誠無忘於懷侍中祭酒顔師伯侍中領射聲校尉袁愍孫豫章太守王謙之太子前中庶子領右衛率張淹爰始入討預叅義謀契濶大難宜䝉殊報秀之可封樂安縣伯食邑六百戸師伯平都縣子愍孫興平縣子謙之石陽縣子淹廣晉縣子食邑各五百戸勞顔師伯詔大明二年師伯節度諸將拒魏多所斬獲上嘉其功下詔魏肆其憑陵規暴邊塞輔國將軍青冀二州刺史師伯宣略命師合變應機濟戍奮怒一月四捷支軍異部騁勇齊効頻梟名王大殱羣醜朕用嘉歎良深於懷可遣使慰勞并符輔國府詳考功最以時言上答王元謨元謨遷雍州刺史加都督雍土多僑寓元謨請上斷流民又令九品以上租使貧富相通境内嗟怨訛言元謨欲反時栁元景當權弟僧景為新城太守制令南陽諸郡竝發兵討元謨元謨令内外晏然以觧衆惑馳啓孝武具陳本末帝知其虚馳遣主書吳喜公撫慰之又答書元謨性嚴未嘗妄笑時人言元謨眉頭未曽伸故帝以此戯之梁山風塵初不介意君臣之際過足相保聊復為笑伸卿眉頭宋書同前南史元謨啓明白之日七十老公反欲何求聊復為笑想足以伸卿眉頭耳同前資治通鑑合書史語為一七十老公反欲何求君臣之際足以相保聊復為笑伸卿眉頭耳詔劉秀之秀之字道寳穆之兄歴雍州刺史恵開思話子徙御史中丞世祖與秀之詔及在任百僚憚之今以蕭恵開為憲司兾當稱職但一往眼額巳自殊有所震並宋書追贈劉秀之詔秀之歴寧蠻校尉雍州刺史大明八年卒上甚痛惜下詔秀之識局明逺才應通暢誠著蕃朝績宣累嶽往嵗臣逆交構首義萬里及職司端尹贊戎兩宫嘉謀徽譽實彰朝野漢南法繁民嗛屬佇良牧故暫輟心膂外𢎞風規出未踰期徳被西服詳考古烈旅觀終始淳心忠㮣無以尚兹方式亮皇猷入衛根本奄至薨逝震慟于朕心生榮之典未窮寵數哀終之禮宜盡崇飾兼履謙守約封社弗廣興言悼往益増痛恨可贈侍中司空持節都督刺史校尉如故顧寳先辭郎詔寳先大明中為尚書水部郎父琛雖為左丞荀萬秋所劾至是猶在職寳先自陳不拜世祖詔敕違糾慢憲司之職若理有不公自當更有釐正而自頃劾無輕重輒至私絶此風難長主者嚴為其科寳先葢依附世准不足問周朗徙邊詔朗積忤㫖為廬陵内史丁母艱每哭必慟其餘多不依常節大明四年上使有司奏其居䘮無禮請加收治詔徙寧州於道殺之朗悖禮利口宜令剪戮微物不足亂典刑特鏁付邊郡鄧琬擢給事黄門侍郎詔琬父𦙍之初為世祖征虜長史歴光禄勲琬二弟並以從臧質反敗誅琬時為南海太守在逺又有破蕭簡功得免復為丹陽丞大明七年上幸歴陽追思蕃舊下詔故光禄勲前征虜長史鄧𦙍之體局沉隠累任著績朕昔當藩重首先佐務心力款盡弗忘於懷往嵗息璩凶悖自取誅翦㳂恩及琬特免釁戮今可擢為給事黄門侍郎以旌𦙍之宿誠蕭恵開更授御史中丞詔恵開入為侍中詔更授恵開前在憲司奉法直繩不阿權戚朕甚嘉之可更授御史中丞贈卜天與詔天與元嘉末為廣威將軍領左細仗元凶入弑事變倉卒天與執刀持弓射賊劭于東堂幾中逆徒擊之倒地見殺世祖即位下詔日者逆豎犯蹕釁變卒起廣威將軍闗中侯卜天與提戈赴難挺身奮節斬殪凶黨而旋受虐刃勇冠當時義侔古烈興言追悼傷痛於心宜加甄贈以旌忠節可贈龍驤將軍益州刺史謚曰壯侯贈卜天生詔天與弟天生世祖時為龍驤將軍攻廣陵塞塹先登苦戰移日詔賜天生始受戎任甫造冦壘而投輪越塹率果先騰驍壯之氣嘉歎無巳可且賜布千匹以厲衆校徴王素朱百年詔世祖即位欲捜揚隠退乃下詔濟世成務咸達隠微軌俗興讓必表清節朕昧旦求善思惇薄風琅邪王素㑹稽朱百年並㢘約貞逺與物無競自足臯畝志在不移宜加褒引以光難進並可太子舍人髙句驪王髙璉進爵詔大明七年使持節散騎常侍督平營二州諸軍事征東大將軍髙句驪王樂浪公璉世事忠義作藩海外誠係本朝志翦殘險通譯沙表克宣王猷宜加褒進以旌純節可車騎大將軍開府儀同三司持節常侍都督王公如故倭王世子興授爵詔倭王濟之子興遣使貢獻大明六年詔授倭王世子興奕世載忠作藩外海稟化寧境恭修貢職新嗣邊業宜授爵號可安東將軍倭國王前廢帝名子業小字法師孝武帝長子淫暴無道湘東王彧弑之在位二年即位詔孝武大明八年閏五月崩太子即位六月詔朕以眇身夙紹洪業敬御天威欽對靈命仰遵凝緒日鑒前圖實可以拱黙守成詒風長世而寳位告始萬㝢改屬惟徳弗明昧於大道思宣睿範引兹簡恤可具詢執事詳訪民隠凡曲令宻文繁而作治闗市僦税事施一時而姦吏舞文妄興威福加以氣緯舛𤣥偏頗滋甚宜其寛徭輕憲以救民切御府諸署事不須廣雕文篆刻無施於今悉宜并省以酬氓願藩王貿貨一皆禁斷外便具條以聞舉才詔景和元年永光元年八月改元昔凝神佇逸磻溪讚道湛慮思才傅巖毗化朕位御三極風澄萬㝢資鈇電斷正夘斯戮思所以仰宣遺烈俯𢎞景祚每結夢庖鼎瞻言板築有劬日昃無忘昧旦可甄訪諸國招聘閭部其有孝性忠節幽居遯棲信誠義行㢘正表俗文敏博識幹事治民務加旌舉隨才引擢庶官克順彞倫咸叙主者精加詳括稱朕意焉江夏王義恭録尚書事詔總録之典著自前代孝建始年雖暫并省而因革有宜理存濟務朕煢獨在躬未涉政道百揆庶務允歸尊徳太宰江夏王義恭新除中書監太尉地居宗重受遺阿衡實深慿倚用康庶績可録尚書事本官監太宰王如故侍中驃騎大將軍南兖州刺史巴東郡開國公新除尚書令元景同禀顧誓翼輔皇家贊業宣風繄公是賴可即本號開府儀同三司領兵置佐一依舊准領丹陽尹侍中領公如故手詔晉安王子勛子勛孝武第三子子勛加使持節時廢帝任凶多所誅害前撫軍諮議叅軍何邁少好武頗招集才勇之士邁先尚太祖女新蔡公主帝詐云主薨殺宫人代之而納主于後宫深忌邁邁謀因帝出行為變迎立子勛事泄帝誅邁使八座奏子勛與邁通謀又手詔子勛送藥賜死子勛起兵以廢立為名太宗定亂子勛號車騎將軍何邁殺我立汝汝自計孰若孝武耶可自為其所並宋書同前後魏書聞汝與何邁謀共廢我汝自量體氣何如孝武尋當遣使送藥與汝封譚金等詔景和元年誅羣公金等並為之用帝下詔屯騎校尉南清河太守譚金彊弩將軍童太壹車騎中參兵軍沈攸之誠略沈梁忠幹勇鷙消蕩氛翳首制鯨凶宜裂河山以酬勲義金可封平都縣男太壹宜陽縣男攸之東興縣男食邑各三百戸封袁顗徐爰詔顗仕孝武時盛稱太子好學有日新之美及踐位深感之景和元年遷為吏部尚書又下詔宗社多故釁因冢司景命未淪神祚再乂自非忠謀密契豈伊剋殄侍中祭酒領前軍將軍新除吏部尚書顗游撃將軍領著作郎兼尚書左丞徐爰誠心内款參聞嘉策匡贊之効實監朕懷宜甄茅社以奬義㮣顗可封新隆縣子爰可封吳平縣子食邑各五百戸敕巢尚之戴法興㑹稽山隂人世祖時為中書通事舍人意任隆密凡遷選誅賞皆與法興尚書參懐廢帝即位法興遷越騎校尉執權日久威行内外然頗以直言忤上於家賜死敕尚之吾纂承洪基君臨萬國推心勲舊著於遐邇不謂戴法興恃遇負恩専作威福冒憲黷貨號令自由積釁累愆遂至於此卿等忠勤任事吾乃具悉但道路之言異同糾紛非惟人情駭愕亦𤣥象違度委付之㫖良失本懷吾今自親覽萬機留心庶事卿等宜竭誠盡力以副所期宋書宋文紀巻三
