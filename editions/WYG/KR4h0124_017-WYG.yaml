body:
  text: 宋文紀巻十七眀梅鼎祚編孫冲之歴巴東建平二郡太守從子勛起兵加輔國將軍與晉安王子勛書子勛字孝徳孝武帝第三子即偽位于尋陽前廢帝狂悖鄧琬為晋安王子勛長史尋陽内史勸子勛舉兵未發而太宗先定亂自立進子勛位號琬不從遣冲之等下據赭圻冲之于道與子勛書加冲之左衛將軍以陶亮為右衛將軍統諸州兵俱下郢州兵進大敗沈攸之諸軍至尋陽誅子勛同逆皆夷􅌍舟檝已辦器械亦整三軍踊躍人争効命便欲沿流挂颿直取白下願速遣陶亮衆軍兼行相接分據新亭南洲則一麾定矣宋書薛安都河東汾隂人歴左將軍揚州刺史奉太宗唘書安都為徐州刺史太宗即位進號安北將軍安都不受舉兵同晋安王子勛反子勛平定安都遣别駕從事史畢衆愛下邳太守王煥等奉唘書詣太宗歸欵臣庸𨽻荒萌偷生上國過蒙世祖孝武皇帝過常之恩犬馬有心實感恩遇是以晋安始唱投誠孤往不期生榮實存死報今天命大歸羣迷改屬輒率領所部束骸待誅違拒之罪伏聽湯鑊宋書王景文名彧以字行太保𢎞之族歴中書監太子太傅賜死與王道隆書道隆吳興烏程人為太宗所委信厯右軍將軍桂陽王兵至見殺景文為江州刺史徴為尚書左僕射領吏部時謂在江州不能潔已與上幸臣王道隆書吾雖寡於行已庶不負心既愧殊效誓不上欺眀主竊聞有為其貝錦者云營生乃至巨萬素無此能一旦忽致異術必非平理惟乞平心精檢若此言不虚便宜肆諸市朝以正風俗脫其妄作當賜思㒺昧之由吾踰忝轉深足以致謗念此驚懼何能自測區區所懐不願望風容貸吾自了不作偷猶如不作賊故以密白想為申唘宋書求解揚州表景文徴為尚書左僕射領吏部揚州刺史復進中書監領太子太傅時太子及皇子並小上稍為身後訃頗疑忌將帥諸大臣景文又外戚貴盛恒懼禍及乃自陳求解揚州太宗詔報臣凡猥下劣方圓無算特逢聖私頻叨不次乗非其任理宜覆折雖加恭謹無補横至夙夜燋戰無地容處六月中得臣外甥女殷恒妻蔡疏欲令其兒唘聞乞禄求臣署入云凡外人通唘先經臣署于時驚怖即欲封疏上呈更思此家落漠庶非通謗且廣聽察幸無復所聞比日忽得兖州都送迎西曹解季遜板云是臣屬既不識此人即問郗顒方知虚託此十七日晚得征南参軍事謝儼口信云臣使人畧奪其婢臣遣李武之問儼元由答云使人謬誤誤之與實雖所不知聞此之日唯有憂駭臣之所知便有此三變臣所不覺尤不可思若守爵􅄆軰寜當招此誠由闇拙非復可防自竊州任倐已七月無徳而禄其殃將至且傅職清峻亢禮儲極以臣凡走豈可暫安荷恩懼罪不敢執固焦魂褫氣憂廹失常况臣髪醜人羣病絶力効穢朝點列顧無與等獨息易駭慙懼難持伏願薄回矜愍全臣身計大夫之俸足以自周久懐欣羨未敢干請仰希慈宥照臣欵誠眀帝手詔譬王景文去五月中吾病始差未堪勞役使卿等㸔選牒署竟請敕施行此非密事外間不容都不聞然傳事好訛由來常患殷恒妻匹婦耳閨閤之内傳聞事復作一两倍落漠兼謂卿是親故希卿署不必云選事獨闗卿也恒妻雖是傳聞之僻大都非可駭異且舉元薦凱咸由疇諮可謂唐堯不眀下干其政耶悠悠好詐貴人及在事者屬卿偶不悉耳多是其周旋門生軰作其屬託貴人及在事者永無由知非徒止于京師乃至州郡縣中或有詐作書疏灼然有文迹者諸舎人右丞軰及親近驅使人慮有作其名載禁物求停檢校彊賣猥物與官仍求交直或屬人求乞州郡資禮希蠲呼召及敵發船車竝唘班下在所有即駐録但卿貴人不容有此唘由來有是何故獨驚之居貴要但問心若為耳大眀之世巢徐二載位不過執㦸權亢人主顔師伯白衣僕射横行尚書中令袁粲作僕射領選而人往往不知有粲粲遷為令居之不疑今既省録令便居昔之録任置省事及榦童並依録格粲作令來亦不異為僕射人情向粲淡淡然亦復不改常以此居貴位要任當有致憂競理不卿今雖作揚州太子傅位雖貴而不闗朝政可安不懼差於粲也想卿虚心受榮而不為累貴髙有危殆之懼卑賤有溝壑之憂張單雙灾木鴈两失有心于避禍不如無心于任運夫千仭之木既摧於斧斤一寸之草亦瘁於踐蹋髙崕之修榦與深谷之淺條存亡之要巨細一揆耳晋畢萬七戰皆獲死于牖下蜀相費褘從容坐談斃于刺客故甘心于履危未必逢禍縱意於處安不必全福但貴者自惜故每憂其身賤者自輕故易忘其已然為教者每誡貴不誡賤言其貴滿好自恃也凡名位貴達人以在懐泰則觸人改容否則行路嗟愕至如賤者否泰不足以動人存亡不足以絓數死于溝瀆死于途路者天地之間亦復何限人不以係意耳以此而推貴何必難處賤何必易安但人生也自應卑慎為道行已用心務思謹惜若乃吉凶大期正應委之理運遭隨叅差莫不由命也既非聖人不能見吉凶之先正是依稀於聖言可行而為之耳得吉者是其命吉遇不吉者是其命凶以近事論之景和之世晋平庶人從夀陽歸亂朝人皆為之戰慄而乃遇中興之運袁顗圖避禍于襄陽當時皆羨之謂為陵霄駕鳯遂與義嘉同滅駱宰見幼主語人云越王長頸鳥喙可與共憂不可與共樂范蠡去而全身文種留而遇禍今主上口頸頗有越王之狀我在尚書中久不去必危遂求南江小縣諸都令史住京師者皆遭中興之慶人人蒙爵級宰值義嘉染罪金木纒身性命㡬絶卿耳眼所聞見安危在運何可預圖耶並宋書貴居貴要南史作人居要聖作理劉勔字伯猷彭城人厯守尚書右僕射中領軍以戰死具條賈元友所上書對勔泰始中為征虜將軍豫州刺史屢破魏衆于汝陽許昌時淮西人賈元友上書太宗勸北攻懸瓠可收陳郡南頓汝南新蔡四郡之地上以其所陳示勔使具條答勔對納之元友議遂寢元友稱魏主幼弱奸偽競起内外規亂天亡有期臣以為獯醜侵縱乗藉王境盤據州郡百姓殘亡去冬衆軍失耕今春連城圍逼國家復境之略實有不遑滅敵未及元友又云有七千餘家穀米豐積可供二萬人數年資儲臣又以為二萬人嵗食米四十八萬斛五年合湏米二百四十萬斛既理不容有恐事難稱言元友又云敵于懸瓠開驛保敵已先據若不足恃此不湏闕俱是攻城便應先圖懸瓠何更越先取郾以受腹背之灾且七千餘家豐積而敵猶當逺運為粮是威不制民民非異計元友又云敵欲水陸運粮以救軍命可襲之機在于今日臣又以為開立驛道據守堅城觀其形候不似蹙弱可乗之機恐為難驗元友又云四郡民人遭敵二十七年之毒皆欲雪讐報恥伏待朝威臣又以為垣式寳等受國重恩今猶驅略車營翻還就賊盖是戀本之情深非報怨之宜何可輕試元友又云請敕荆雍两州遣二千精兵從義陽依西山北下直據郾城臣又以為郾城是賊驛路要戍且經蠻接嶮數百里中裹粮潛進方出平地攻賊堅城自古名將未有能以此濟者假其尅㨗不知足南抗懸瓠北捍長社與不且賊擁據數城水陸通便而今使官以二千斷其資運于是為難元友又云敵圍逼汝隂逰魂二嵗為張景逺所挫不敢渡淮臣又以為景逺兵力寡弱不能自固逺遣救援方得少剋今定是為賊所畏不景逺前所摧傷裁至數百敵歩騎四萬猶不敢前而今必勸國家以輕兵逺討指掌可克言理相背莫復過此元友又云龍山雉水魯奴王景直等並受朝爵馬歩萬餘進討之宜唯湏敕命臣以為魯奴與敵交闗彌厯年世去嵗送誠朝廷誓欲立功自蒙榮爵便即逃遁殊類姦猾豈易闇欺兼王景直是一亡命部曲不過數十人既不可言又未足恃萬餘之言似不近實元友又云四郡恨忿此非類車營連結廢田二載生業已盡賊無所資粮儲已罄斷其運道最是要略臣又以斷運湏兵兵應資食而當此過縣瓠二百里中使兵食兼足何處求辦臣竊尋元嘉已來傖荒逺人多干國議負儋歸闕皆勸討魏魯爽誕說實挫國威徒失兵力虚費金寳凡此之徒毎規近說從來信納皆貽後悔界上之人唯視彊弱王師至境必壺漿候途裁見退軍便抄截蜂起首領回師何嘗不為河畔所弊王琨琅琊臨沂人宋右光禄大夫入齊終侍中上言從孫佟襲封表琨泰始元年遷度支尚書加光禄大夫從兄華孫長襲封為新建侯嗜酒多諐失琨上表臣門姓不休從孫長是故右衛將軍華息少資常猥猶冀晚進頃更昏酣業身無檢故衛將軍華忠肅奉國善及世祀而長負舋承封將傾基緒嗣小息佟閑立保退不乖素風如蒙拯立則存亡荷榮私禄更構南齊書謝超宗靈運孫仕宋義興太守入齊厯征北諮議叅軍坐怨恣徙越州賜死䇿秀才議泰始三年都令史駱宰議䇿秀才考格五問並得為上四三為中二為下一不合與第超宗為尚書殿中郎議詔從宰片辭折獄寸言挫衆魯史褒貶孔論興替皆無俟繁而後秉裁夫表事之淵析理之㑹豈必委牘方切治道非患對不盡問患以恒文弗竒必使一通峻正寜劣五通而常與其俱竒必使一亦宜採南齊書孫夐江夏王女服議泰始四年江夏王義恭第十五女卒年十九未笄禮官議從成人服諸王服大功左丞孫夐重奏右丞江謐又奏詔可禮記女子十五而笄鄭云年應許嫁者也其未許嫁者則二十而笄射慈云十九猶為殤禮官違越經典於禮無據博士太常以下結免贖論謐坐杖督五十奪勞百日江謐字令和濟陽考城人仕宋吏部郎入齊為左民尚書掌吏部又奏孫夐夐又結免贖論詔可夐先不研辨混同謬議准以事例亦宜及咎南齊書垣崇祖字敬逺下邳人宋兗州刺史入齊歴五兵尚書領驍騎將軍乞假名號唘崇祖為胊山成主拒魏因欲恢復淮北唘眀帝以為輔國將軍北琅邪蘭陵二郡太守淮北士民力屈于魏南向之心日夜以冀崇祖父伯並為淮北州郡門族布在北邊百姓所信一朝嘯咤事功可立第名位尚輕不足威衆乞假名號以示逺近幸甚幸甚南齊書虞通之㑹稽餘姚人善言易為眀帝近臣入齊至歩兵校尉眀堂頌肅肅眀堂惟國之光儀天矩地崇姬潤黄縣殷颺輝服夏擅芳無斁伊典有煥斯章緜緜教樞翳翳化紀聲沉五都風晦千祀我皇蒸哉追孝創軌縟憲垂統光圖麗史宗祀既崇享配帷馨六樂薦和四圭流眀殷殷華海鑒盥孚誠慶輝旁燭休光下盈檀珪字伯玉髙平金鄉人祖韶以桓𤣥功封邑丘縣侯從征廣固討盧循合門從義特見寵授與王僧䖍書僧䖍見齊僧䖍元徽中為吏部尚書珪罷沅南令僧䖍以為征北板行叅軍訴僧䖍求禄不得與僧䖍書僧䖍答書未允珪乂與僧䖍書乃用為安城郡丞五常之始文武為先文則經緯天地武則撥亂定國僕一門雖謝文通乃忝武達羣從姑叔三媾帝室祖兄二世糜軀奉國而致子姪餓死草壤去冬今春頻荷二敕既無中人屢見蹉奪經渉五朔踰歴四晦書牘十二接覲六七遂不荷潤反更曝鰓九流繩平自不宜獨苦一物蟬腹龜腸為日已久飢虎能嚇人遽與肉餓麟不噬誰為落毛去冬乞豫章丞為馬超所爭今春蒙敕南昌縣為史偃所奪二子勲䕃人才有何見勝若以貧富相奪則分受不如身雖孤微百世國士姻媾位宦亦不後物尚書同堂姊為江夏王妃檀珪同堂姑為南譙王妃尚書婦是江夏王女檀珪祖姑嬪長沙景王尚書伯為江州檀珪祖亦為江州尚書從兄出身為後軍叅軍檀珪父釋褐亦為中軍叅軍僕於尚書人地本懸至于婚宦不肯殊絶今通塞雖異猶叅氣類尚書何事乃爾見苦泰始之初八表同逆一門二世粉骨衛主殊勛異績已不能甄常階舊途復見侵抑王僧䖍答書征北板比嵗處遇小優殷主簿從此府入崇禮何儀曹即代殷亦不見訴為苦足下積屈一朝超升政自小難泰始初勤苦十年自未見其賞而頓就求稱自何可遂吾與足下素無怨憾何以相侵苦直是意有佐佑耳南史佐佑作左右又與王僧䖍書昔荀公達漢之功臣晋武帝方爵其𤣥孫夏侯惇魏氏勛佐金徳初融亦始就甄顯方賞其孫封樹近族羊叔子以晋㤗始中建䇿伐吳至咸寜末方加褒寵封其兄子卞望之以咸和初殞身國難至興寜末方崇禮秩官其子孫蜀郡主簿田混黄初末死故君之難咸康中方擢其子孫似不以世代逺而被棄年世疎而見遺檀珪百罹六極造化罕比五䘮停露百口轉命存亡披廹本希小禄無意階榮自古以來有沐食侯近代有王官府佐非沐食之職叅軍非王官之謂質非匏瓜實羞空懸殷何二生或是府主情味或是朝廷意㫖豈與悠悠之人同口而語使僕就此職尚書能以郎見轉不若使日得五升禄則不恥執鞭並南齊書丘巨源蘭陵人人齊厯餘杭令以事見殺與尚書令袁粲書巨源宋眀帝時自南臺御史為王景文鎮軍叅軍寜䘮還家元徽初桂陽王休範在尋陽遣迎之巨源因齊太祖使留京師桂陽事起使于中書省撰符檄事平除奉朝請巨源望有封賞乃與粲書竟不被申及沈攸之事起為尚書符荆州又望賞異自此意常不滿民信理推心闇於量事庶謂丹誠感達賞報孱期豈虞寂寥忽焉三稔議者必云筆記賤伎非殺活所待開勸小說非否判所寄然則先聲後實軍國舊章七徳九功將名當世仰觀天緯則右將而左相俯察人序則西武而東文固非胥祝之倫伍巫匠之流匹矣去昔竒兵變起呼吸雖凶渠即剿而人情更迷茅恬開城千齡出叛當此之時心膐億兆奉迎新亭者士庶填路投名朱雀者愚智空閨人惑而民不惑人畏而民不畏其一可論也臨機新亭獨能抽刃斬賊者惟有張敬兒而中書省獨能奮筆弗顧者惟有丘巨源文武相方誠有優劣就其死亡以決成敗當崩天之敵抗不測之禍請問海内此膽何如其二可論也又爾時顛沛普喚文士黄門中書靡不畢集摛翰振藻非為乏人朝廷洪筆何故假手凡賤若以此賊强盛勝負難測羣賢怯不染毫者則民宜以勇獲賞若云羽檄之難必湏筆傑群賢推能見委者則民宜以才賜列其三可論也竊見桂陽賊賞不赦之條凡二十五人而李恒鍾爽同在此例戰敗後出罪並釋然而吳邁逺族誅之罸則操筆大禍而操戈無害論以賞科則武人超越而文人埋沒其四可論也且邁逺置辭無乃侵慢民作符檄肆言詈辱放筆出手即就虀粉若使桂陽得志民若不轅裂軍門則應腰斬都市嬰孩脯膾伊可熟念其五可論也往年戎旅萬有餘甲十分之中九分冗𨽻可謂衆矣攀龍附鱗翻焉雲翔至若民狂夫可謂寡矣徒闗敕㫖空然泥沈詎其荷瞂塵末皆是白起操牘事始必非魯連耶民傎國筭迅足馳烽斾之機帝擇逸翰赴罻羅之㑹既能陵敵不殿爭先無負宜其微賜存在少沾飲齕遂乃棄之溝間如蜉如蟻擲之言外如土如灰絓𨽻帖戰無拳無勇竝隨資峻級矣凡豫臺内不文不武已坐拱清階矣撫骸如此瞻例如彼既非草木何能弭聲南齊書為尚書符荆州討沈攸之南齊書丘巨源傳云沈攸之事太祖使巨源為尚書符荆州其文載栁世隆傳而沈約宋書沈攸之傳江淹集又並載為尚書符與此辭有同異計必巨源與淹同時各撰或用淹文故載宋書耳今以齊書者屬巨源宋書者屬附淹两存之紀與集亦小異沈攸之出自隴畝寂寥累世故司空沈公以從父宗廕愛之若子羽翼吹嘘得昇官次景和昏悖猜畏柱臣而攸之凶忍趣利樂禍請銜詔㫖躬行反噬又攸之與譚金童太壹等暴寵狂朝並為心膐同功共體世號三侯當時親眤情過管鮑仰遭革運凶黨懼戮攸之反善圖全用得自免既殺從父又虐良朋雖吕布販君酈寄賣友方之斯人未足為酷泰始開闢網漏呑舟略其凶險取其搏噬故階亂獲全因禍興福攸之禀性空淺躁而無謀濃湖土崩本非已力彭城下邳望旗宵遁再棄王師久應肆法值先帝宥其迴溪之恥冀有封崤之㨗故得幸㑹推遷頻煩顯授内端戎禁外綏萬里聖去鼎湖逺頒顧命託寄崇深義感金石而攸之始奉國諱喜形于顔普天同哀已以為慶累登蕃岳自郢遷荆晋熙王以皇弟代鎮地尊望重攸之斷割候迎肆意陵略料擇士馬簡算器械權撥精鋭並取自隨郢城所留十不遺一専恣鹵奪㒺顧國典踐荆已來恒用姦數既懐異志興造無端乃􅕚廹羣蠻騷擾山谷揚聲討伐盡戸上丁蟻聚郭邑伺國衰盛從來積年求不解甲遂四野百縣路無男人耕田載租皆驅女弱自古酷虐未聞于此昔嵗桂陽内奰宗廟阽危攸之任官上流兵彊地廣勤王之舉寔宜悉行裁遣羸弱不滿三千至郢州禀受節度欲令判否之日委罪晋熙招誘劍客羈絆行侣竄叛入境輒加擁護逋亡出界必遣窮追視吏若讐遇民如草峻太半之賦暴参夷之刑鞭箠國士全用魏法一人逃亡闔宗捕逮皇朝赦令初不遵奉曠蕩之澤長隔彼州人懐怨望十室而九今乃舉兵内侮姦回外熾斯寔惡熟罪成之辰决癰潰疽之日幕府過荷朝寄義百常憤董御元戎龔行天罰今遣新除使持節郢州司州之義陽諸軍事平西將軍郢州刺史聞喜縣開國侯黄回員外􅄆騎常侍輔國將軍驍騎將軍重安縣開國子軍主王敬則屯騎校尉長夀縣開國男軍主王宜與屯騎校尉陳承叔右軍將軍葛陽縣開國男彭文之驃騎行叅軍振武將軍邵宰精甲二萬衝其首斾又遣􅄆騎常侍㳺擊將軍臨湘縣開國男吕安國持節寜朔將軍越州刺史孫曇瓘屯騎校尉寧朔將軍崔慧景寧朔將軍左軍將軍新亭侯任侯伯龍驤將軍虎賁中郎將尹略屯騎尉南城令曹虎頭輔國將軍驍騎將軍蕭諱新除寜朔將軍㳺擊將軍下邳縣開國子垣崇祖等舳艫二萬駱驛繼邁又遣屯騎校尉茍元賔撫軍叅軍郭文考撫軍中兵叅軍程隐儁奉朝請諸襲光等輕艓一萬截其津要驍騎將軍周盤龍後將軍成買輔國將軍王敕勤屯騎校尉王洪範等鐵騎五千歩道繼進先據陸路斷其走伏持節督雍梁二州郢州之竟陵司州之隨郡諸軍事征虜將軍寜蠻校尉雍州刺史襄陽縣開國侯新除鎮軍將軍張敬兒志節慷慨巻甲樊鄧水歩俱馳破其巢窟持節督司州諸軍事征虜將軍司州刺史領義陽太守范陽縣侯姚道和義烈梗概投䘧方隅風馳電掩襲其輜重萬里建旍四方飛斾莫不總率衆師雲翔雷動人神同憤逺邇并心今皇上聖眀將相仁愛約法三章寛刑緩賦年登嵗阜家給人足上有恵民之澤下無樂亂之心攸之不識天時妄圖大逆舉無名之師驅讐怨之衆是以朝野審其易取含識判其成禽彼土士民罹毒日久今復相逼廹投赴鋒刃交戰之日蘭艾難分去就在機望思先曉無使一人迷疑而九族就禍也𢎞宥之典有如皎日何昌㝢字儼望廬江􅈞人入齊歴侍中吏部尚書領驍騎將軍與驃騎大將軍蕭道成書昌㝢先為建平王景素府主簿以夙素見重母老求禄出為湘東太守為齊太祖蕭道成驃騎功曹昌㝢在郡景素被誅至是唘道成又與禇淵書淵答之道成嘉其義轉為記室伏尋故建平王因心自逺忠孝基性徽和之譽早布國言勝素之情夙洽民聽世祖綢繆太宗眷異朝中貴人野外賤士雖聞見有殊誰不悉斯事者元徽之間政闗羣小構扇異端共令傾覆慇懃之非古人所悼况蒼梧將季能無衒惑一年之中藉者再三有必巔之危無暫立之安行路寒心往來跼蹐而王夷慮坦然委之天命惟謙惟敬専誠奉國閨無執㦸之衛門闕衣介之夫此五尺童子所見不假闊曲言也一淪疑似身名頓滅寃結淵泉酷貫穹昊時經隆替嵗改三元曠蕩之恵亟申被枉之澤未流俱沐温光獨酸霜露眀公鋪天地之施散雲雨之潤物無巨細咸被慶渥若今日不蒙照滌則為萬代寃魂昌㝢非敢慕慷慨之士激揚當世寔義切于心痛入骨髓瀝腸紓憤仰希神照辨眀枉直亮王素行使還名帝籍歸靈舊塋死而不泯豈忘徳於黄壚分軀碎首不足上謝與司空禇淵書天下之可哀者有數而埋寃於黄泉者為甚焉何者百年之夀同於朝露揮忽去留寜足道哉政欲闔棺之日不隕令名竹帛傳芳烈鐘石紀清英是以昔賢甘心于死所者也若懐忠抱義而負枉冥冥之下時主未之矜卿相不為言良史濡翰將被以惡名豈不痛哉豈不痛哉竊尋故建平王地屬親賢徳居宗望道心惟冲睿性天峻􅄆情風雲不以塵務嬰衿眀發懐古惟以琴書娱志言忠孝行惇慎二公之所深鍳也前者阮楊連黨構此紛紜雖被眀於朝貴愈結怨于羣醜覘察繼蹤疑防重著小人在朝詩史所歎清識飲涕王每永言終日氣淚交横既推信以期物故日去其備衛朱門蕭條示存典刑而已求解徐州以避北門要任苦乞㑹稽貪處東甌閑務此並彰于事迹與公道味相求期心有素方共經營家國劬勞王室何圖時不我與契闊屯昏忠誠弗亮罹此百殃嵗朔亟流已經四載皇命惟新人霑天澤而幽然深酷未蒙照眀封殯卑雜窮魂莫寄昭穆不序松栢無行事傷行路痛結幽顯吾等叩心泣血實有望於聖時公以徳佐世欲物得其所豈可令建平王枉直不分耶田叔不言梁事袁絲諌止淮南以两國舋禍尚回帝意豈非親親之義寜從敦厚而令疑似未辨為世大戮若使王心跡得申亦示海内理寃枉眀是非存亡國繼絶世周漢之通典有國之所急也昔叔向之理恃祁大夫而獲亮戾太子之寃資車丞相而見察幽靈有知豈不眷眷于眀顧碎首抽脇自謂不殞禇淵答書追風古人良以嘉歎但事既昭晦理有逆從建平初阻元徽未悖専欲委咎阮楊彌所致疑于時正亦謬叅此機若審如髙論其愧特深並南齊書沈攸之字仲達吳興武康人慶之從父厯荆州刺史郢城兵敗自經死與武陵王贊牋贊字仲敷眀帝第九子自郢州徙荆州攸之為荆州刺史順帝即位進攸之號車騎大將軍開府儀同三司齎廢帝刳斮之具以示攸之攸之便有異志齊王蕭道成輔政遣軍西討攸之聞齊王世子據盆口震懾不敢下因攻郢城時武陵王贊為郢州刺史行事栁世隆隨宜距應屢摧破之攸之與贊牋江陵一總八州地居形勝鎮撫之重宜以上歸本欲仰移節盖改臨荆部所以未具上聞者欲待至止面自咨申不圖重闗擊柝覲接莫由若使匡朝之誠終蔽于聖察襲逺之舉近擁于郢都則無以謝烈士之心何用塞義夫之志便不犯闗陵漢期一接奉若夫斬蛟䧟石之卒裂骼巻鐵之將煙騰飇迅容或驚動左右苟不獲已敢不先布下情又與武陵王牋下官位重分陜富兼金穴子弟勝衣爵命已及親黨辨菽抽序便加耳倦絃歌口厭粱肉布衣若此復欲何求豈不知俛眉茍姿保養餘齒何為不計百口甘冒危難誠感厯朝之遇欲報之于皇室爾昧理之徒謂下官懐無厭之願既貫誠於白日不復眀心于殿下若使天必䘮道忠節不立政復闔門碎滅百死無恨但髙祖王業艱難太祖劬勞日昃卜世不盡七百之期宗社已成他人之有家國之事未審于聖心何如並宋書與齊太祖蕭道成書初攸之與齊太祖于景和世同直殿省申以歡好以長女妻攸之子元和及為荆州刺史聚歛兵力髙道慶自江陵還都道攸之反狀太祖既弑蒼梧王立順帝以張敬兒督雍梁二州郢司二郡軍事雍州刺史部伍泊沔口敬兒陽厚結攸之信饋不絶是時太祖位司空簒形已成攸之舉兵遣使報敬兒敬兒斬之攸之下當襲江陵遺太祖書太祖答之吾聞魚相忘於江湖人相忘于道術彼我可謂通之矣大眀之中謬奉聖主忝同侍衛情存契濶義著㫁金乃分帛而衣等粮而食值景和昏暴心爛形燋若斯之苦寜可言盡吾自分碎首於閣下足下亦懼滅族于舎人爾時磐石之心既固義無貳計䠞廹時難相引求全天道矜善此理不空結姻之始寔闗于厚及眀帝龍飛諸人皆為鬼矣吾與足下得䝉大造親過夙眷遇若代臣録其心迹復忝驅使臨崩之日吾豫在遺託加榮授寵㤙深位髙雖復情謝古人粗識忠節誓心仰報期之必死此誠志竟未申遂先帝登遐微願永奪自爾已來與足下言面殆絶非唯分張形迹自然至此脱往一告未嘗不對紙流涕豈願相誚于今哉茍有所懐不容不白初得賢子諱疏云得家信聞足下有廢立之事安國寜民此功巍巍非吾等常人所能信也俄奉皇太后假令云足下潛構深略獨斷懐抱一何能壯但冠雖弊不可承足盖共尊髙故耳足下交結左右親行殺逆以免身患卿當謂龍逢比干癡人耳凡廢立大事不可廣謀但袁禇遺寄劉又國之近戚數臣地籍寔為膏腴人位並居時望若此不與議復誰可得共披心胸者哉昏眀改易自古有之豈獨大宋中屯耶前代盛典煥盈篇史請為足下言之羣公共議宜唘太后奉令而行當以王禮出第足下乃可不通大理要聽君子之言豈可㒺滅天理一何若茲孝經云資于事父以事君縱為宗社大計不爾寜不識有君親之意耶乃復慮以家為啗以爵賞小人無狀遂行弑害吾雖寡識竊從古比豈有為臣而有近日之事耶使一旦荼毒身首分離生自可恨死者何罪且有登齋之賞此科出于何文凡在臣𨽻誰不惋駭華夷扣心行路泣血乃至不殯使流蟲在戸自古以來此例有㡬衛國微小故有𢎞演不圖我宋獨無其人撫膺惆悵不能自已足下與向之殺者何異人情易反還成嗟悲為子君者無乃難乎蹊田之譬豈復有異管仲有言君善未嘗不諫足下諫諍不聞甘崔杼之罪何惡逆之苦昔太甲還位伊不自疑昌邑之過不可稱數霍光荷託尚共議於朝班然後廢之猶有湯沐之施論者不以劫主為名桓温之心未忘于簒海西失道人倫頓盡廢之以公猶禮處之當温彊盛誰能相抗尚畏懼于形跡四海不惬未嘗有樂推之者伊尹霍光名髙于臣節桓氏亦得免于脇奪凡是諸事布于書筞若此易曉豈待指掌卿常言比跡夷叔如何一旦行過桀跖耶聖眀唘運蒼生重造普天率土誰不歌忭實是披心罄節奉公忘私之日而卿大收宫妓刼奪天蔵器械金寳必充私室移易朝舊布置私黨被甲入殿内外宫閣管籥悉闗家人吾不知子孟孔眀遺訓如此王謝陶庾行此舉止且朱方帝郷非親不授足下非國戚也一旦専縱自樹云是兒守臺城父居東府一家两録何以異此知卿防固重複猜畏萬端言以禦逺實為防内若徳允物望夷貊猶可推心共處如其失理乖道金城湯池無所用也文長以戈㦸自衛何解滅亡吳起有云義禮不修舟中之人皆讐也足下既無伍員之病茍懐貪惏而有賊宋之心吾寜捐申包之節耶聞求忠臣者必出孝子之門卿忠孝于斯盡矣今竊天府金帛以行奸恵盗國權爵以結人情且授非其理合我則賞此事已復不可恒用用之既訖恐非忠筞且受者不感識者不知不能遏奸折謀誠節慨惋隔硋數千無因自對不能知復何情顔當與足下叙平生舊欵吾聞前哲絶交不出惡言但此自陳名節於胸心因告别于千載放筆増歎公私澘淚想不深怪往言然天下耳目豈伊可誣抑亦當自知投杖無疆為必先及南史攸之表檄文疏皆其記室南陽宋儼之辭蕭道成答沈攸之書周顒傳太祖輔政引接顒顒善尺牘沈攸之送絶交書太祖口授令顒裁答辱足下誚書交道不終為耻已足欲下便來何故多㒺君子吾結髪入仕豈期逺大盖感子路之言每不擇官而宦逮文帝之世初被聖眀鑒賞及孝武之朝復蒙英主顧眄因此感激未能自反及與足下歛䘧定交欵著分好何嘗不勸慕古人國士之心務重前良忠貞之節至于契闊杯酒殷勤擕袖薦女成姻志相然諾義信之篤誰與間之又乃景和陵虐事切憂畏眀帝正位運同休顯唘臆論心安危豈貳元徽之季聽髙道慶邪言欲相討伐發威施敕已行外内于時臣子鉗口道路以目吾以分交義重患難宜均犯陵白刃以相任保悖主手敕今封送相示豈不畏威念周旋之義耳推此隂恵何愧懐抱不云足下猥含禍詖前遣王思文所牒朝事盖情等家國共詳衷否虗心小大必以先輸問張雍州遷代之日將欲誰擬本是逆論來事非欲代張乃封此示張激使見怒若張惑一言果興怨恨事負雅素君子所不可為况張之奉國忠亮有本情之見與意契不貳耶又張雍州唘事稱彼中蠻動兼民遭水患敕令足下思經拯之計吾亦有白論國如家布情而往每思虚達事之相接恒必猜離反謂無故遣信此乃覘察平諒之襟動則相阻傷負心期自誰作故先時足下遣信尋盟敦舊厲以篤終吾止附還白申罄情本契然逺要方固金石今日舉錯定是誰恧久言耶元徽末徳埶亡禋祀足下備聞無待亟述太后惟憂式遵前誥興毁之略事屬鄙躬黜昏樹眀實惟前則寜宗静國何愧前修廢立有章足下所允冠弊之譏將以何語封為郡王寜為失禮景和無名方之不愈乎龍逢自匹夫之美伊霍則社稷之臣同異相乗非吾所受也登齋有賞夀寂已蒙之于前同謀獲功眀皇亦行之于昔此則接踵成事誰敢異之謂其大收宫女刼奪天蔵器械金寳必充私室必若虗設市虎亦可不翅此言若以此詐民天下豈患無眼心茍無瑕非所耿介甲杖之授事既舊典豈見有任鎮邦家勛經定主而可得出入輕單不資寵衛斯之患慮豈直身憂祗奉此恩職惟事理朱方之牧公卿僉意吾亦謂微勛之次無忝一州且魏晋舊事帝郷蕃職何嘗豫州必曹司州必馬折膠受柱在體非愧袁粲據石頭足下無不可吾之守東府來告便謂非動容見疾嚬笑入戾乃如是乎袁粲劉秉受遇深重家國既安不思撫鎮遂與足下表裏潛規據城之夜豈顧社稷幸天未長亂宗廟有靈即與禇衛軍協謀義㫁以時殄滅想足下表裏聞之悵然孤沮小兒忝侍中代來之澤遇直上臺便呼一家两録發不擇言良以太甚吾之方寸古列共言乃以陶庾往賢大見譏責足下自省詎得以此見貽耶比蹤夷叔論吾則可行過桀跖無乃近誣哉謂吾不朝此則良誨朝之與否想更問之足下受先帝之恩施擁戎西州鼎湖之日率土載奔而宴安中流酣飲自若即懐狼望陵侮皇朝晋熙殿下以皇弟代鎮而斷割候迎罔蔑宗子驅略士馬悉以西上郢中所遺堇餘劣弱昔徵茅不入猶動義師况荆州物産雍㟭交梁之㑹自足下為牧薦獻何品良馬勁卒彼中不無良皮美罽商賂所聚前後貢奉多少何如惟聞大官時納飲食耳桂陽之難坐觀成敗自以雍容漢南西伯可擬頼原即天世非望亦消又招集逋亡斷遏行侣治舟試艦恒以朝廷為旗的秣馬按劒常願天下有風塵為人臣者固若是耶至乃不遵制書敕下如空國恩莫行命令擁隔詔除郡縣輒自板代罷官去職禁還京師凶人出境無不千里尋躡而反募臺將來必厚加給賞太妃遣使市馬齎寳往蜀足下悉皆斷折以為私財此皆逺邇共聞暴於視聽主上叡眀當璧寓縣同慶絶域奉贄萬國通書而盤桓百日始有單騎事存送往于此可徴不朝如此誰應受誚反以見呵非所反側今乃勒兵以闚象舘長㦸以指魏闕不亦為忠臣孝子之所痛心疾首耶賢子元琰獲免虎口及凌波西邁吾所發遣猶推素懐不畏嗤嗤足下尚復滅君臣之紀况吾布衣之交乎遂事不諫既往難咎今六師西向助足下憂之並南齊書言邪言一作流助一作為袁粲字景倩陳郡陽夏人太尉淑兄子初名愍孫厯位中書監為齊髙帝所害妙徳先生傳粲清慗有風操自遇甚厚常著妙徳先生傳續􅄞康髙士傳以自况有妙徳先生陳國人也氣志淵虚姿神清映性孝履順栖冲業簡有舜之遺風先生幼夙多疾性疎嬾無所營尚然九流百氏之言雕龍談天之藝皆汎識其大歸而不以成名家貧嘗仕非其好也混其聲迹晦其心用故深交或迕俗察罔識所處席門常掩三徑裁通雖揚子寂漠嚴叟沈冥不是過也修道遂志終無得而稱焉又嘗謂周旋人曰昔有一國國中一水號曰狂泉國人飲此水無不狂唯國君穿井而汲獨得無恙國人既竝狂反謂國主之不狂為狂于是聚謀共執國主療其狂疾火艾針藥莫不畢具國主不任其苦于是到泉所酌水飲之飲畢便狂君臣大小其狂若一衆乃歡然我既不狂難以獨立比亦欲試飲此水臨終唘粲領司徒加侍中順帝即位遷中書監齊髙帝方革命粲不欲事二姓密有異圖與劉秉等將謀矯太后令攻髙帝于朝堂事敗粲還坐列燭自照仍求筆作唘為軍主戴僧静所殺臣義奉大宋䇿名两畢今便歸魂墳壠永就山丘南史宋文紀巻十七
