body:
  text: 宋文紀巻十二眀梅鼎祚編范泰字伯倫順陽山隂人晋豫章太守寗之子仕晋度支尚書兼司空入宋厯左光禄大夫為宋公祭嵩山文劉裕敬薦中嶽之靈惟嶽作鎮中畿擬天比峻降祉發輝宣和隂陽道達幽微既曰輔順亦疾厥違霜露所均萬人是依不以虚薄志掃不庭仰紓國恥俯拯黎甿望嶺懐仁踐境延情金璧之贈愧懼交盈思樂時雍終慿威靈舊都既清三秦期廓豈惟人謀亦仰冥略逝將言旋自雍徂洛何以寄懐一巵清酌珪璧云乎深誠攸託建國學表髙祖受命眀年議建國學以泰領國子祭酒上表時學竟不立臣聞風化興于哲王教訓表於至世至說莫先講習甚樂必寄朋來古人成童入學易子而教尋師無逺負粮忘艱安親光國莫不由此若能出不由戸則斯道莫從是以眀詔爰發已成渙汗學制既下逺近遵承臣之愚懐少有未達今惟新告始盛業初基天下改觀有志景慕而置生之制取少停多開不來之端非一塗而已臣以家推國則知所聚不多恐不足以宣大宋之風𢎞濟濟之美臣論合選之家雖制所未達父兄欲其入學理合開通雖小違晨昏所以大𢎞孝道不知春秋則所陷或大故趙盾忠而書弑許止孝而得辠以斯為戒可不懼哉十五志學誠有其文若年降無㡬而深有志尚者何必限以一格而不許其進邪揚烏豫𤣥實在弱齡五十學易乃無大過昔中朝助教亦用二品頴川陳載已辟太保掾而國子取為助教即太尉淮之弟所貴在於得才無繫于定品教學不眀奬厲不著今有職閒而學優者可以本官領之門地二品宜以朝請領助教既可以甄其名品斯亦敦學之一偶其二品才堪自依舊從事㑹今生到有期而學校未立覆簣實望其速回轍已淹其遲事有以賖而宜急者殆此之謂古人重寸隂而賤尺璧其道然也諫市銅造錢奏時言事者多以錢貨減少國用不足欲悉市民銅更造五銖錢流聞將禁私銅以充官銅民雖失器終於獲直國用不足其利實多臣愚意異不寜寢默臣聞治國若烹小鮮拯敝莫若務本百姓不足君孰與足未有民貧而國富本不足而末有餘者也故囊漏貯中識者不吝反裘負薪存毛寔難王者不言有無諸侯不言多少食禄之家不與百姓争利故㧞葵所以眀治織蒲謂之不仁是以貴賤有章職分無爽今之所憂在農民尚寡倉廪未充轉運無已資食者衆家無私積難以禦荒耳夫貨存貿易不在多少昔日之貴今日之賤彼此共之其揆一也但令官民均通則無患不足若使必資貨廣以收國用者則龜貝之屬自古所行尋銅之為器在用也博矣鍾律所通者逺機衡所揆者大夏鼎負圖寔冠衆瑞晋鐸呈象亦唘休徴器有要用則貴賤同資物有適宜則家國共急今毁必資之器而為無施之錢于貨則功不補勞在用則君民俱困較之以實損多益少陛下勞謙終日無倦庶務以身率物勤素成風而頌聲不作板渭不至者良由基根未固意在逺略伏願思可久之道賖欲速之情𢎞山海之納擇芻牧之説則嘉謀日陳聖慮可廣其亡存心然後苞桑可繫愚誠一至用忘寢食賖南史作探極諫少帝封事泰景平初加特進眀年解國子祭酒少帝在位多諸愆失上封事極諫雖不能納亦不加譴伏聞陛下時在後園頗習武備鼓鞞在宫聲聞於外黷武掖庭之内諠譁省闥之間不聞將帥之臣統御之主非徒不足以威四夷秪生逺近之怪近者東寇紛擾皆欲伺國瑕隙今之吳㑹寜過二漢闗河根本既揺于何不有如水旱成灾役夫不息無寇而戒為費漸多河南非復國有羯夷難以理期此臣所以用忘寢食而干非其位者也陛下踐阼委政宰臣實同髙宗諒闇之美而更親狎小人不免近習懼非社稷至計經世之道王言如絲其出如綸下觀而化疾于影響伏願陛下思𢎞古道式遵遺訓從理無滯任賢勿疑如此則天下歸徳宗社惟永詩云一人有慶兆民頼之天髙聽卑無幽不顯興衰在人成敗易曉未有政治在于上而人亂于下者也臣蒙先朝過遇陛下殊私實欲盡心竭誠少報萬分而惛耄已及百疾互生便為永違聖顔無復自盡之路貪及視息陳其狂瞽陛下若能哀其所請留心覽察則臣夕隕于地無恨九泉賀元正并陳旱灾表徐羡之等弑少帝及廬陵王義真而立文帝泰元嘉二年上表遂輕舟逰東陽行止不闗朝廷有司劾奏太祖不問也元正改律品物惟新陛下藉日新以畜徳仰乾元以履祚吉祥集室百福來庭頃旱魃為虐亢陽愆度通川燥流異井同竭老弱不堪逺汲貧寡單於負水租輸既重賦税無降百姓怨咨臣年過七十未見此旱隂陽并隔則和氣不交豈惟凶荒必生疾疫其為憂虞不可備序雩禜之典以誠㑹事巫祝常祈罕能有感上天之譴不可不察漢東海枉殺孝婦亢旱三年及祭其墓澍雨立降嵗以有年是以衛人伐邢師興而雨伏願陛下式遵逺猷思隆髙構推忠恕之愛矜寃枉之獄逰心下民之瘼厝思幽冥之紀令謗木竪闕諫鼓鳴朝察芻牧之言摠統御之要如此則苞桑可繫危機無兆斯而灾害不消未之有也故夏禹引百姓之罪殷湯甘萬方之過太戊資桑榖以進徳宋景藉熒惑以脩善斯皆因敗以轉成往事之昭晰也循末俗者難為風就正路者易為雅臣疾患日篤夕不謀朝㑹及嵗慶得一聞達微誠少亮無恨泉壤永違聖顔拜表悲哽復請贈廬陵王表時太祖雖當陽親覽羡之等猶秉重權復上表諸子禁之不奏伏承廬陵王已復封爵猶未加贈陛下孝慈天至友于過隆伏揆聖心已自有在但司契以不唱為髙冕旒以因寄成用臣雖言不足採誠不亮時但猥蒙先朝忘醜之眷復沾廬陵矜顧之末息晏委質有兼常欵契闊戎陣顛狽艱危厚徳無報授令路絶此老臣兼不能自已者也朽謝越局無所逃刑旱蝗上表泰元嘉三年進侍中左光禄大夫國子祭酒其年秋旱蝗上表陛下昧旦丕顯求民之瘼眀㫁庶獄無倦政事理出羣心澤謡民口百姓翕然皆自以為遇其時也灾變雖小要有以致之守宰之失臣所不能䆒上天之譴臣所不敢誣有蝗之處縣官多課民捕之無益于枯苗有傷於殺害臣聞桑榖時亡無假斤斧楚昭仁愛不禜自瘳卓茂去無知之蟲宋均囚有異之虎蝗生有由非所宜殺石不能言星不自隕春秋之㫖所宜詳察禮婦人有三從之義而無自専之道周書父子兄弟罪不相及女人被宥由來上矣謝晦婦女猶在尚方始貴後賤物情之所甚苦匹婦一室亦能有所感激臣于謝氏不容有情蒙國重恩寢處思報伏度聖心已當有在禮春秋教詩無一而闕也臣近侍坐聞立學當在入年陛下經略粗建意存民食入年則農功興農功興則田里闢入秋治庠序入冬集逺生二途並行事不相害夫事多以淹稽為戒不逺為患任臣學官竟無微績徒墜天施無情自處臣之區區不望目覩盛化竊慕子囊城郢之心庶免荀偃不瞑之恨臣比陳愚見便是都無可採徒煩天聽愧怍反側旱灾疾疫又上表頃亢旱厯時疾疫未已方之常灾實為過差古以為王澤不流之徵陛下昧旦臨朝無懈治道躬自菲薄勞心民庶以理而言不應致此意以為上天之於賢君正自殷勤無已陛下同規禹湯引百姓之過言動于心道敷自逺桑榖生朝而殞熒惑犯心而退非唯消灾弭患乃所以大唘聖眀靈雨立降百姓改瞻應感之來有同影響陛下近當仰推天意俯察人謀升平之化尚存舊典顧思與不思行與不行耳大宋雖揖讓受終未積有虞之道先帝登遐之日便是道消之初至乃嗣王被殺哲藩嬰禍九服徘徊有心䘮氣佐命託孤之臣俄為戎首天下蕩蕩王道巳淪自非神英撥亂反正則宗社非復宋有革命之與随時其義尤大是以古今異用循方必壅大道隐扵小成欲速或未必達深根固蒂之術未洽於愚心是用猖狂妄作而不能緘默者也臣既頑且鄙不達治宜加之以篤疾重之以惛耄言或非言而復不能無言陛下録其一毫之誠則臣不知厝身之所並宋書吳季子札賛延州髙逺棄國師誠優逰大邑觀風上京仁懐邦壤道暢聖眀鑒徹昔代樂察未形嬴博逺死解劍在生夫子戾止爰詔作銘張長公贊長公秉心獨逸世表量物難同審已彌了情雖髙邃跡無抗矯靡當夷恵孰識多少髙鳯贊遐哉𤣥古邈矣皇羲自兹已降顯黙参差智為世駭才為物竒跡出無泯潛躍俱馳曖曖若人孰測其為戢曜丘壑採真重崖冲情莫亮汙跡示疵輕俗無際肆志莫羈鸞鳥詩序昔罽賔王結罝峻卯之山獲一鸞鳥王甚愛之欲其鳴而不致也乃飾以金樊饗以珍羞對之愈戚三年不鳴其夫人曰嘗聞鳥見其類而後鳴何不懸鏡以映之王從其言鸞覩形悲鳴哀響冲霄一奮而絶嗟乎兹禽何情之深昔鍾子破琴于伯牙匠石韜斤于郢人盖悲妙賞之不存慨神質于當年耳矧乃一舉而殞其身者哉悲夫王敬𢎞名裕之同髙祖諱故稱字晋司州刺史胡之孫仕吳興太守入宋厯侍中特進薦王𢎞之郭希林奏𢎞之晋末為烏程令以病歸髙祖命為員外􅄆騎常侍不就從兄敬𢎞為吏部尚書奏即徴不起薦𢎞之及希林徴並不起聖眀司契載徳惟新垂鑒仄微表揚隐介丘語仰風荒遐傾首前員外散騎常侍琅邪王𢎞之恬漠丘園放心居逸前衛將軍参軍武昌郭希林素履純潔嗣徽前武並擊壤聖朝未蒙表飾宜加旌聘賁于丘園以彰止遜之美以祛動求之累臣愚謂𢎞之可太子庶子希林可著作郎又陳太祖即位敬𢎞為左僕射又陳薦𢎞之元嘉四年徴為通直散騎常侍又不就𢎞之髙行表于初筮苦節彰於暮年内外晏然當修太平之化宜招空谷以敦冲退之美上言丁役奏大明中王敬𢎞上言舊制人年十二半役十六全役當以十三以上能自營私及公故以充役考之見事猶未或盡體有彊弱不皆稱耳循吏恤隐可無甚患庸愚守宰必有勤劇况值苛政豈可稱言至今逃竄求免胎孕不育乃避罪憲寔亦由此今皇化惟新四方無事役名之宜應存消息十五至十六且為半丁十七為全丁杜氏通典辭徵太子少傅表元嘉六年敬𢎞遷尚書令固讓還東及徴詣京師上表不許終以不拜伏見詔書以臣為太子少傅承命震惶喜懼交悸臣抱疾東荒志絶榮觀不悟聖恩猥復加寵東宫之重四海瞻望非臣薄徳所可居之今内外英秀應選者多且板築之下豈無髙逸而近私愚朽汚辱清朝嗚呼微臣永非復太之一物矣所以牽曵闕下者實瞻望聖顔貪繫表之㫖臣如此而歸夕死無恨又詣京師上表臣比自唘聞謂誠心已達天鑒𤣥邈未蒙在宥不敢宴處牽曵載馳臣聞君子行道忘其為身三復斯言若可庶勉顧惜惛耄志與願違禮年七十老而傳家家道猶然况于在國伏願陛下矜臣西夕愍臣一至特廻聖恩賜反其所則天道下濟愚心盡矣又辭左光禄大夫開府表十六年又詣京師上表薨于餘杭臣躬耕南澧不求聞達先帝㧞臣于蠻荆之域賜以國士之遇陛下嗣徽特蒙眷齒由是感激委質聖朝雖懐犬馬之誠遂無塵露之益年向九十生理殆盡永絶天光淪沒丘壑謹冒奉表傷心久之與子恢之書恢之被召為祕書郎敬𢎞為求奉朝請與恢之書太祖嘉而許之秘書有限故有競朝請無限故無競吾欲使汝處于不競之地宋書之南齊書王秀之傳云秀之祖裕性貞正徐羡傅亮當朝裕不與來往及致仕隠呉興與子瓉之書曰吾欲使汝處不競之地瓉之厯官至五兵尚書未嘗詣一朝貴江湛謂何偃曰王瓉之便是朝隠秀之乃瓉之子按宋書云恢之弟瓉之其説互異南史王裕之傳裕之與子恢之書彼祕書有限云云至其孫秀之傳敬𢎞與秀之父瓉之書深朂以静退然不載書語似兩存也按杜氏通典宋齊秘書郎尤為美職其例十日便遷敬𢎞與恢之書云秘書日有限則似以日數言也王淮之字元曽琅邪臨沂人晋尚書令彪之曽孫仕晋尚書中兵郎宋臺建除御史中丞歴領吏部尚書䘮禮奏淮之眀禮傳贍文辭永初二年為黄門郎奏從之鄭𤣥注禮三年之䘮二十七月而吉古之學者多謂得禮之宜晋初用王肅議祥禫共月故二十五月而除遂以為制江左以來唯晉朝施用縉紳之士多遵𤣥義夫先王制禮以大順羣心䘮也寜戚著自前訓今大宋開泰品物遂理愚謂宜同即物情以𤣥義為制朝野一禮則家無殊俗唯南史作准王韶之字休泰琅邪臨沂人廙曽孫歴吳興太守駮贖罪唘韶之晋恭帝時遷黄門侍郎領著作宋髙祖受禪加驍騎將軍本郡中正西省職解復掌朱書有司奏東冶士朱道民禽三叛士依例放遣韶之唘諫詔可尚書金部奏事如右斯誠檢忘一時權制懼非經國𢎞本之令典臣尋舊制以罪補士凡有十餘條雖同異不問而輕重實殊至于詐列父母死誣罔父母淫亂破義反逆此四條寔窮亂抵逆人理必盡雖復殊刑過制猶不足以塞莫大之罪既獲全首領大造已隆寜可復遂拔徒𨽻緩帶當年自同編戸列齒齊民臣懼此制永行所虧實大方今聖化惟新崇本棄末一切之令宜加詳改愚謂此四條不合加贖罪之恩宋書駮員外􅄆騎侍郎王寔之請假事伏尋舊制群臣家有情事聽併急六十日太元中改制年賜假百日又居在千里外聽併請來年限合為二百日此盖一時之令非經通之㫖㑹稽雖塗盈千里未足為難百日歸休於事自足若私理不同便應自表陳解豈宜名班朝列而久淹私門臣等参議謂不合開許或家在河洛及嶺沔漢者道阻且長猶宜别有條品請付尚書詳為其制潘綜吳逵察孝㢘符綜逵並吳興烏程人綜與父驃共避賊父老不能走賊因斫驃綜抱父被斫頭面四創悶絶良久並得免㢘補遂昌長還家逵經飢饉傭𦵏父母及功親十三棺期年成七墓禮辟不就太守王韶之臨郡發日前被符及行設祖道贈以四言詩孝㢘之選必審其人雖四科難該文質寡備必能孝義邁俗拔萃著聞者便足以顯應眀敡允將符㫖烏程潘綜守死孝道全親濟難烏程吳逵義行純至列墳成行咸精誠内淳休聲外著可並察孝㢘并列上州臺陳其行跡殷景仁陳郡長平人晋末仕劉毅後軍参軍入宋厯中書令揚州刺史固讓侍中表景仁髙祖時遷太子中庶子少帝即位入補侍中累表辭讓詔為改除臣志幹短弱歴著出處值皇塗隆泰身荷恩榮階牒推遷日月頻積失在饕餮患不自量而奉聞今授固守愚心者竊惟殊次之寵必歸器望喉脣之任非才莫居三省諸躬無以克荷豈可茍順甘榮不知進退上虧朝舉下貽身咎求之公私未見其可顧涯審分誠難庶㡬踰方越序易以誡懼所以俯仰周偟無地寜處若恵澤廣流蘭艾同潤回改前㫖賜以降階雖寔不敏敢忘循命臣忤違之愆既已屢積寜當徒尚浮采塵黷天聽丹情悾欵仰希照察少帝詔報景仁退挹之懐有不可改除黄門侍郎以申君子之請推恩蘇氏議文帝所生章太后早已上奉太后所生蘇氏甚謹蘇氏卒詔欲遵二漢推恩之典景仁議從之漢氏推恩加爵于時承秦之弊儒術蔑如懼非盛眀所宜軌蹈晋監二代朝政之所因君舉必書哲王之所慎體至公者懸爵賞于無私奉天統者每屈情以申制所以作孚萬國貽則後昆南史傅隆字伯祚北地靈州人亮族兄義熙初起家建威参軍入宋厯光禄大夫告老徙黄初妻趙議隆元嘉初轉司徒左長史時曾稽剡縣民黄初妻趙打息載妻王死亡遇赦王有父母及息男稱息女葉依法徙趙二千里外隆議從之原夫禮律之興盖本之自然求之情理非從天堕非從地出也父子至親分形同氣稱之於載即載之於趙雖云三世為體猶一未有能分之者也稱雖創巨痛深固無讐祖之義故古人不以父命辭王父命也若稱可以殺趙趙當何以處載將父子孫祖互相殘戮懼非先王眀法咎繇立法之本㫖也向使石厚之子日磾之孫砥鋒挺鍔不與二祖同戴天日則石碏秺侯何得純臣於國孝義於家流名百代以為美談者哉舊令云殺人父母徙之二千里外不施父子孫祖眀矣趙當避王朞功千里外耳令亦云凡流徙者同籍親近欲相隨者聽之此又大通情體因親以教愛者也趙既流移載為人子何得不從載從而稱不行豈名教所許如此稱趙竟不可分趙雖内媿終身稱當沉痛沒齒孫祖之義自不得永絶事理固然也諸王樂舞人數議元嘉十三年司徒彭城王義康于束府正㑹依舊給伎總章工馮大列相承給諸王伎十四種其舞伎三十六人太常傅隆議令詳正事不施行未詳此人數所由唯杜預注左傳佾舞云諸侯六六三十六人常以為非夫舞者所以節八音者也八音克諧然後成樂故必以八八為例自天子至士降殺以两兩者減其二列爾預以為一列又減二人至士止餘四人豈復成樂按服䖍注傳云天子八八諸侯六八大夫四八士二八其義甚允今諸王不復舞佾其摠章舞伎即古之女樂也殿庭八八諸王則應六八理例坦然又春秋鄭伯納晋悼公女樂二八晋以一八賜魏絳此樂以八人為列之證也若如議者唯天子八則鄭應納晋二六晋應賜絳一六也自天子至士文物典章尊卑差級莫不以兩未有諸侯既降二列又列輒減二人近降太半非唯八音不具于兩義亦乖杜氏之謬可見矣國典事大宜令詳正禮論表隆博學多通獨精三禮元嘉十四年以新撰禮論付隆使下意隆時轉太常上表臣以下愚不渉師訓孤陋閭閻面墻靡識謬蒙詢逮愧懼流汗原夫禮者三千之本人倫之至道故用之家國君臣以之親用之㛰冠少長以之仁愛夫妻以之義順用之郷人友朋以之三益賔主以之敬讓所謂極乎天播乎地窮髙逺測深厚莫尚于禮也其樂之聲易之八象詩之風雅書之典誥春秋之微婉勸懲無不本乎禮而後立也其源逺流廣其體大而義精非夫叡哲大賢孰能眀乎此哉况遭暴秦焚亡百不存一漢興始徴召故老捜集殘文其體例紕繆首尾脱落難可詳論幸髙堂生頗識舊議諸儒各為章句之説既眀不獨達所見不同或師資相傳共枝别幹故聞人二戴俱事后蒼俄已分異盧植鄭𤣥偕學馬融人各名家又後之學者未逮曩時而問難星繁充斥兼兩摛文列錦煥爛可觀然而五服之本或差哀敬之制舛雜國典未一于四海家法参駁于縉紳誠宜考詳逺慮以定皇代之盛禮者也伏惟陛下欽眀𤣥聖同規唐虞疇咨四岳興言三禮而伯夷未登微臣竊位所以大懼負乗形神交惡者無忘夙夜矣而復猥充博采之數與聞爰發之求寔無以仰酬聖㫖萬分之一不敢廢嘿謹率管穴所見五十二事上呈蚩鄙茫浪伏用竦赧何叔度廬江灊人晋末仕尚書入宋厯金紫光禄大夫吳興太守王睦告子王延祖議義熙五年武康縣民王延祖為刧父睦以告官新制凡劫身斬刑家人棄市睦既自告于法有礙時叔度為尚書議設法止姦本于情理非一人為劫闔門應刑所以罪及同産欲開其相告以出為惡之身睦父子之至容可悉共逃亡而割其天屬還相縛送螫毒在手解腕求全于情可愍理亦宜宥使凶人不容于家逃刑無所乃大絶根源也睦既糾送則餘人無應復告並全之為惡南史作造惡何尚之字彦徳叔度子厯尚書令領太子詹事諫文帝行幸表尚之元嘉二十三年為尚書右僕射時上行幸還多侵夕尚之諫優詔納之萬乗宜重尊不可輕此聖心所鑒豈假臣唘輿駕北出還多冒夜羣情傾側寔有未寜清道而動帝王成則古今深誡安不忘危若值汲黯辛毘必將犯顔切諌但臣等碌碌每存順嘿耳伏願少採愚誠思垂省察不以人廢適可慰四海之望大錢當两議元嘉二十四年江夏王義恭建議以一大錢當两以防四銖盗鑄翦鑿尚之議謂不宜太祖用中領軍沈演之議遂以一錢當两行之經時公私非便乃罷伏鑒眀命欲改錢制不勞採鑄其利自倍寔救弊之𢎞筭増貨之良術求之管淺猶有未譬夫泉貝之興以估貨為本事存交易豈假數多數少則弊輕數多則物重多少雖異濟用不殊况復以一當两徒崇虗價者耶凡創制改法宜從民情未有違衆矯物而可乆也泉布廢興驟異前代赤仄白金俄而罷息六貨憒亂民泣于市良由事不畫一難用遵行自非急病權時宜守久長之業煩政曲雜致逺常泥且貨偏則民病故先王立井田以一之使富不淫侈貧不過匱雖兹法久廢不可頓施要宜而近粗相放擬若今制遂行富人貲貨自倍貧者彌増其困懼非所以欲均之意又錢之形或大小多品直云大錢則未知其格若止于四銖五銖則文皆古篆既非下走所識加或漫滅尤難分眀公私交亂爭訟必起此最是其深疑者也命㫖兼慮翦鑿日多以致消盡鄙意復謂殆無此嫌民巧雖密要有踪跡且用錢貨銅事可尋檢直由屬所怠縱糾察不精致使立制以來發覺者寡今雖有懸金之名竟無酬與之實若申眀舊科禽獲即報畏法希賞不日自定矣愚者之議智者擇焉猥参訪逮敢不輸盡從南史作順久長作長世貲貨作之資沈演之一錢當两議龜貝行于上古泉刀興自有周皆所以阜財通利實國富民者也厯代雖逺資用彌便但鑠錢久廢兼䘮亂累仍縻散漂滅何可勝計晋遷江南疆境未廓或土習其風錢不普用其數本少為患尚輕今王略開廣聲教遐暨金鏹所布爰逮荒服昔所不及悉已流行之矣用彌曠而貨愈狹加復競竊翦鑿消毁滋繁刑禁雖重奸弊方密遂使嵗月増貴貧室日䖏暋作肆力之氓徒勤不足以贍誠由貨貴物賤常調未革弗思釐改為弊轉深斯實親教之良時通變之嘉㑹愚謂若以大錢當兩則國傳難朽之寳家贏一倍之利不俟加憲巧源自絶施一令而衆美兼無興造之費莫盛于兹矣密陳庾炳之得失奏炳之遷吏部尚書頗通貨賄請急還家吏部令史錢泰能彈琵琶主客令史周伯齊善歌出炳之宅諮事因留停宿尚書舊制令史諮事不得宿停外雖有八座命亦不許為有司所奏上于炳之素厚將恕之召問尚書右僕射何尚之尚之具陳炳之得失又密奏夫為國為家何嘗不謹用前典今茍欲通一人慮非哲王御世之長術炳之所行非曖昧而已臣所聞既非一旦又往往眼見事如丘山彰彰若此遂縱而不糾不知復何以為治晋武不為眀主斷鬲令事遂能奮發華廙見待不輕廢錮累年後起止作城門校尉耳若言炳之有誠于國未知的是何事政當云與殷景仁不失其舊與劉湛亦復不踈且景仁當時事意豈復可蔑朝士兩邊相推亦復何限縱有微誠復何足掩其惡今賈充勛烈晋之重臣雖事業不勝不聞有大惡諸臣進說便逺出之陛下聖叡反更遲遲于此炳之身上之舋既自籍籍交結朋黨構扇是非寔足亂俗傷風諸惡紛紜過於范曅所少賊一事耳伏願深加三思試以諸聲傳普訪諸可顧問者羣下見陛下顧遇既重恐不敢苦相侵傷顧問之日宜布嫌責之㫖若不如此亦當不辯有所得失臣惷既有所啓要欲盡其心如無可納伏願宥其觸忤之罪為明主南史作曰明主令事作令史何不掩作何足掩不勝作不稱大惡作大罪南史作庾仲文用其字又陳時炳之自理不諳臺制令史並言停外非嫌太祖以小事不足傷大臣尚之又陳炳之呼二令史出宿令史諮都令史駱宰宰云不通吏部曹亦咸知不可令史共向炳之說不得停之意炳之了不聽納之非惟不解直是茍相留耳由外悉知此而誣于信受羣情豈了陛下不假為之辭雖是令史出乃逺虧朝典又不得謂之小事謝晦望實非今者之疇一事錯誤免侍中官王詢時賢小失桓𦙍春蒐之謬皆白衣領職况公犯憲制者耶不審可有同王桓白衣例不于任使無損兼可得以為肅戒孔萬祀居左丞之局不念相當語駱宰云炳之貴要異他尚書身政可得無言耳又曰不癡不聾難作阿家翁敢作此言亦為異也更陳太祖猶優㳺使尚之更陳尚之備言其愆尚書舊有増置幹二十人以元凱丞郎幹之假疾病炳之常取十人私使詢處幹闕不得時補近得王師猶不遣還臣令人語之先取人使意常未安今既有手力不宜復留得臣此信方復遣耳大都為人好率懐行事有諸紛紜不悉可曉臣思張遼之言闗羽雖兄弟曹公父子豈得不言觀今人臣憂國寔寡臣復結舌日月之眀或有所蔽然不知臣者豈不謂臣有爭競之迹追以悵悵臣與炳之周旋俱被恩接不宜復生厚薄太尉昨與臣言說炳之有諸不可非唯一條逺近相崇畏震動四海凡短人辦得致此更復可嘉虞秀之門生事之累味珍肴未嘗有乏其外别貢豈可具詳炳之門中不問大小誅求張幼績幼績轉無以堪命炳之先與劉徳願殊惡徳願自持琵琶甚精麗遺之便復欵然市令盛馥進數百口材助營宅恐人知作虚買劵劉道錫驟有所輸傾南俸之半劉雍自謂得其力助事之如父夏中送甘蔗若新發于州國吏運載樵荻無輟于道諸見人有物鮮或不求聞劉遵考有材便乞材見好燭盤便復乞之選用不平不可一二太尉又云炳之都無共事之體凡所選舉悉是其意政令太尉知耳論虞秀之作黄門太尉不政荅和故得停太尉近與炳之䟽欲用徳願兒作州西曹炳之乃唘用為主簿即語徳願徳願謝太尉前後漏泄賣恩亦復何極縱不加罪故宜出之士庶忿疾之非直項羽楚歌而已也自從裴劉刑罰以來諸將陳力百倍今日事實好惡可問若赫然發憤顯眀法憲陛下便可閑卧紫闥無復一事也又答太祖欲出炳之為丹陽又以問尚之尚之答臣既乏賈生應對之才又謝汲公犯顔之直至于侍坐仰酬每不能盡昨出伏復深思祗有愚滯今之事跡異口同音便是彰著政未測得物之數耳可為蹈罪負恩無所復少且居官失和未有此比陛下遲遲舊恩未忍窮法為𢎞之大莫復過此方復有尹京赫赫之授恐悉心奉國之人于此而息貪狼恣意者嵗月滋甚非但虧點王化乃治亂所由如臣所聞天下論議炳之常塵累日月未見一豪増輝今曲阿在水南恩寵無異而協首郡之榮乃更成其形勢便是老王雅也古人云無賞罰雖堯舜不能為治也陛下豈可坐損皇家之重迷一凡人事若復在可否之間亦不敢茍陳冗管今之枉直眀白灼然而叡王令主反更不悟令賈誼劉向重生豈不慷慨流涕於聖世耶臣昔唘范曄當時亦懼犯觸之尤茍是愚懐所挹政自不能舒達所謂雖九死而不悔者也謂炳之且外出若能修改在職著稱還亦不難而可得少眀國典粗酬四海之誚今愆舋如山榮任不損炳之若復有彰大之罪誰復敢以聞述且自非殊勛異績亦何足塞今日之尤歴觀古今未有衆過藉藉受貨數百萬更得髙官厚禄如今者也臣每念聖化中有此事未嘗不痛心疾首設令臣等數人縱横狼籍復如此不審當復云何䖏之近唘賈充逺鎮今亦何足分外出恐是筞之良者臣知陛下不能採臣言故是臣不能盡已之愚至耳今䝉恩榮者不少臣何為獨懇懇於斯寔是尊主樂治之意伏願試更垂察又太祖乃可有司之奏免炳之官臣見劉伯寵大慷慨炳之所行云有人送張幼緒幼緒語人吾雖得一縣負三十萬錢庾冲逺乃當送至新林見縛束猶未得解手荀万秋嘗詣炳之值一客姓夏侯主人問有好牛不云無問有好馬不又云無政有佳驢耳炳之便答甚是所欲客出門遂與相聞索之劉道錫云是炳之所舉就道錫索嫁女具及祠器乃當百萬數猶謂不然選令史章龍向臣說亦歎其受納之過言實得嫁女具銅鑪四人舉乃勝細葛斗帳等物不可稱數在尚書中令奴酤酃酒利其百十亦是立臺閣所無不審少簡聖聽不恐仰傷日月之眀臣竊為之歎息伯寵南史作伯龍竺超民陸展兄弟從誅奏世祖初尚之領尚書令南郡王義宣及車騎將軍臧質反義宣司馬竺超民臧質長史陸展兄弟並應從誅尚之上言由此得免刑罰得失治亂所由聖賢留心不可不慎竺超民為賊既遁走一夫可禽若反覆昧利即當取之非唯免愆亦可要不義之賞而超民曽無此意微足觀過知仁且為官保全城府謹守庫藏端坐待縛今戮及兄弟與向始末無論者復成何異陸展盡去質復灼然便同之巨逆于事為重臣豫蒙顧待自殊凡𨽻茍有所懐不敢自默初學記門類載尚之奏云王有九旗柝羽為門謂之旌門猶以車為門謂之轅門分置郢州所居議時欲分荆州置郢州議其所居江夏王義恭以為宜在巴陵尚之議居夏口上從其議夏口在荆江之中正對沔口通接梁攻寔為津要由來舊鎮根基不易今分取江夏武陵天門竟陵隨五郡為一州鎮在夏口既有見城浦大容舫竟陵出道取荆州雖水路與去江夏不異諸郡至夏口皆從流並為利便湘州所領十一郡其巴陵邊帶長江去夏口密邇既分湘中乃更成大亦可割巴陵屬新州於事為允梁攻南史作雍梁與顔延之書江左中丞雖亦一時英髦然膏粱名士猶不樂延之為御史中丞尚之與書絳騶清路白簡深劾取之仲容或有虧耶杜氏通典與中書令王球書球字倩玉瑯琊臨沂人歴尚書僕射顔延之為永嘉太守得罪屏居球以名公子遣務事外與延之雅相愛好每振其罄匱後起為始興王濬後軍諮議参軍御史中丞遷國子祭酒司徒左長史尚之素與狎書與球延之有後命教府無復光輝南史何偃字仲𢎞司空尚之中子歴吏部尚書北伐議元嘉二十九年太祖欲更北伐訪之羣臣偃時行義陽國事上議内幹胡法宗宣詔逮問北伐伏計賊審有殘禍犬羊易亂殱殄非難誠如天㫖今雖廟筭無遺而士未精習縁鎮戍充實者寡邊民流散多未附業控引所資取給根本虧根本以殉邊患宜動必萬尅無虞往嵗挫傷續以内釁侮亡取亂誠為沛然然淮泗數州寔亦彫耗流傭未歸創痍未起且攻守不等客主形異薄之則勢艱圍之則曠日進退之間奸虞互起竊謂當今之弊易衂方來之寇不深宜含垢蔵疾以齊天道臨軒儀議孝建二年十一月有司奏侍中祭酒何偃議求詳議曺郎中徐爰参議宜如省所上以為永准􅇉可自今臨軒乗輿法服燾華盖登殿宜依廟齊以夾御侍中常侍夾扶上殿及應為王公興又夾扶畢還本位常滿樽銘藝文類聚貞眀麗象昃食中望唯茲竒器神絶莫尚斟酌賦受不踰其量鳬鷖之詩豈伊異况北堂書鈔偃與謝尚書云珍玉名釧因物寄情尚字恐誤王徽琅邪臨沂人歴廷尉為交州刺史與何偃書尺牘作王微與偃書誤偃叔父悠之為義興太守侍中嘗與徽相善悠之卒徽與偃書吾與義興直恨相知之晚每惟君子知我若夫嘉我小善矜余不能惟賢叔耳宋書王微字景𤣥瑯琊臨沂人追贈秘書監與江湛書微善屬文能書畫兼解音律醫筮隂陽術數歴轉始興王濬後軍功曺記室叅軍太子中舎人父憂去官微素無宦情屢除並固辭吏部尚書江湛舉微為吏部郎微與湛書告絶棲遲環堵苔草沒階弟心病亂度非但蹇蹩而已此䖏朝野所共知騶㑹忽扣蓽門閭里咸以為祥恠君多識前世之載天值何其易傾弟受海内駭笑不過如燕石禿鶖耶未知君何以自解于良史耶今雖王道鴻鬯或有激朗于天表必欲探援潛寳傾海求珠自可卜肆巫祠之間馬棧牛口之下賞劇孟于博徒抜卜式于芻牧亦有西戎孤臣東都戒士上窮範馳之御下盡詭遇之能兼鱗雜􅊞者必不乏于世矣且廬於承眀署乎金馬皆眀察之官又賢於管庫之未何為刼勒通家疾病人塵穢難甚之選將以靖國不亦益嚻乎書云任官維賢才而君擢士先疹廢芃芃棫樸似不如此且弟曠違兄姊迄將十載姊時歸來終不任輿曵入閣兄守金城永不堪扶抱就路若不憊疾非性僻而何比君曰表裏無假長因飛耳也常謂生遭太公將即華士之戮幸遇管叔必蒙僻儒之養光武以馮衍才浮其實故棄而不齒諸葛孔眀云來敏亂郡過于孔文舉况無古人之才槩敢干周漢之常刑彼二三英賢足為曉治與否恐君逢此時或亦不免髙閣乃復假名不知已者豈欲自比衛賜耶君欲髙斆山公而以仲容見處徒以搥提禮學本不叅選鄙夫瞻彼固不任下走未知新沓何如州陵耳而作不師古坐亂官政誣飾蚯蚓冀招神龍如復託以真素者又不宜居華留名有害風俗君亦不至期人如此若交以為人賜舉未以已勞則商販之事又連所不忍聞也豈謂不肖易擢貪者可誘凡此數者君必居一焉雖假天口于齊駢籍鬼說于周季公孫碎毛髪之文莊生縱漭瀁之極終不能舉其契為之辭矣子將眀魂必靈咍于萬里汝頴餘彦將拂衣而不朝浮華一開風俗或從此而爽鬼谷以揣情為最難何君忖度之輕謬今有此書非敢叨擬中散誠不能顧影負心純盗虚聲所以綿絡累紙本不營尚書虎爪板也成童便往來居舎晨省復經周旋加有諸甥亦何得頓絶慶弔然生平之意自于此都盡君平公云生我名者殺我身天爵且猶滅名安用吏部郎哉其舉可陋其事不經非獨縉紳者不道僕妾皆將笑之忽忽不樂自知夀不得長且使千載知弟不詐諼耳與從弟僧綽書尺牘作王微與弟綽又列梁人並誤微既為始興王濬府吏濬數相存慰微奉答牋書輒飾以詞采微文古甚頗抑揚袁淑見之謂為訴屈微因此又與從弟僧綽書吾雖無人鍳要是早知弟每共宴語前言何嘗不以止足為貴且持盈畏滿自是家門舊風何為一旦落漠至此當局苦迷將不然耶詎容都不先聞或可不知耳衣冠胄𦙍如吾者甚多才能固不足道唯不傾側溢詐士頗以此容之至扵規矩紉行難可詳料疹疾日滋縱恣益甚人道所貴廢不復修幸值聖眀兼容置之教外且舊恩所及每蒙寛假吾亦自揆疾疹重侵難復支振民生安樂之事心死久矣所以解日偷存盡于大布糲粟半夕安寢便以自度血氣盈虚冀復稍道長以大散為和羮弟為不見之邪疾廢居然且事一已上不足敗俗傷化下不至毁辱家門泊爾尸居無方待化凡此二三皆是事寔吾與弟書不得家中相欺也州陵此舉為無所因反覆思之了不能解豈見吾近者諸牋耶良可恠笑吾少學作文又晚節如小進使君公欲民不偷每加存飾詶對尊貴不厭敬恭且文詞不怨思抑揚則流淡無味文好古貴能連類可悲一往視之如似多意當見居非求志清論所排便是通辭訴屈耶爾者真可謂真素寡矣其數且見客小防自來盈門亦不煩獨舉吉也此軰乃云語勢所至非其要也弟無懐居今地萬物初不以相非然魯器齊虚寔宜書紳今三署六府之人誰表裡此内儻疑弟豫有力于素論何如哉則吾長阨不死終誤盛壯也江不過彊吹拂吾云是巖穴人巖穴人情所髙吾得當此則雞鶩變作鳯凰何為干飾㢘隅秩秩見于面目所惜者大耳諸舎闔門皆蒙時私此既未易陳道故常因含聲不言至兄弟尤為叨竊臨海頻煩二郡謙亦越進清階吾髙枕家巷遂至中書郎此足以闔棺矣又前年優㫖自弟所宣雖夏后撫辜人周宣及鰥寡不足過也語皆循檢校迹不為虚飾也作人不阿䛕無縁頭髪見白稍學謟詐且吾何以為足不能行自不得出户頭不耐風故不可扶曵家本貧餒至于惡衣蔬食設使盗跖居此亦不能兩展其足妄意珍蔵也正令選官設作此舉於吾亦無劔㦸之傷所以懃懃畏人之多言也管子晋賢乃闗人主之輕重此何容易哉州陵亦自言視眀聽聰而返區區飾吾何辨致而下英俊夫竒士必龍居深蔵與蛙蝦為伍于勛其猶難之林宗軰不足識也似不肯睠睠奉牋記雕琢獻文章居家近市廛親戚滿城府吾猶自知袁陽源軰當平此不飾詐之與直獨兩不闗吾心又何所耿介弟自宜以解塞羣賢矣兼悉怒此言自爾家任兄故能也日日望弟來屬病終不起何意向與江書粗布胸心無人可寫比面乃具與弟書便覺成本以當半日相見吾既惡勞不得多語樞機幸非所長相見亦不勝讀此書也親屬欲見自可示無急付手袁淑字陽源而史臣曰燕太子吐一言田先生吞舌死安邑令戒屠者閔仲叔去而之沛良由内懐耿介峻節不可輕于袁淑笑謔之間而王微弔詞連牘斯盖好名之士欲以身為珪璋皦皦然使塵垢之累不能加也報何偃書偃字仲𢎞尚之子歴吏部尚書時論者或云微之見舉偃亦豫其議偃慮為微所咎與書自陳微報之卿昔稱吾于義興吾嘗謂之見知然復自恠鄙野不参風流未有一介熟悉于事何用獨識之也近日何見綽送卿書雖知如戯知卿固不能相哀茍相哀之未知何相期之可論卿少陶𤣥風淹雅修暢自是正始中人吾真庸性人耳自然志操不倍王樂小兒時尤麤笨無好常從博士讀小小章句竟無可得口喫不能劇讀遂絶意于尋求至二十左右方復就觀小說往來者見床頭有數秩書便言學問試就檢當何有哉乃復持此擬議人耶尚獨愧笑揚子之褎贍猶恥辭賦為君子若吾篆刻菲亦甚矣卿諸人亦當尤以此見議或謂言深博作一叚意氣鄙薄人世初不敢然是以每見世人文賦書論無所是非不解處即日借問此其本心也至于生平好服上藥起年十二時病虗耳所撰服食方中粗言之矣自此始信攝養有徴故門冬昌术随時参進寒温相補欲以扶護危羸見冀白首家貧乏役至于春秋令節輒自將兩三門生入草采之吾實倦㳺醫部頗曉和藥尤信本草欲其必行是以躬親意在取精世人便言希仙好異矯慕不覊不同家頗有罵之者又性知畫繢盖亦鳴鵠識夜之機盤紆糾紛或記心目故兼山水之愛一往跡求皆仿像也不好詣人能忘榮以避權右宜自密應對舉止因巻慚自保不能勉其所短耳由來有此數條二三諸賢因復架累致之髙塵詠之清壑瓦礫有資不敢輕厠金銀也而頃年嬰疾沈淪無已區區之情愒于生存自恐難復而先命猥加魂氣褰􅒒常人不得作常自處疾苦正亦卧思已熟謂有記自論既仰天光不天庶類兼望諸賢共相哀體而卿首唱誕言布之翰墨萬石之慎或未然耶好畫之累豈其如此綽大駭歎便是闔朝見病者吾本儜人加疹意惛一旦聞此便惶怖矣五六日來復苦心痛引喉狀如匈中悉腫甚自憂力作此答無復條貫貴布所懐落漠不舉卿既不可解立欲便别且當笑微告弟僧謙靈書僧謙有才譽為太子舎人卒後四旬而微終僧謙遇疾微躬自處治而服藥失度遂卒微深自咎恨發病不復自治以書告靈弟年十五始居宿於外不為察慧之譽獨沈浮好書聆琴聞操輒有過目之能討測文典斟酌傳記寒暑未交便卓然可述吾長病或有小間輙稱引前載不異舊學自爾日就月將著名邦黨方隆夙志嗣美前賢何圖一旦㝠然長往酷痛煩寃心如焚裂尋念平生裁十年中耳然非公事無不相對一字之書必共詠讀一句之文無不研賞濁酒忘愁圖籍相慰吾所以窮而不憂實頼此耳奈何罪酷煢然獨坐憶往年散發極目流涕吾不舎日夜又恒慮吾羸病豈圖奄忽先歸冥冥反覆萬慮無復一期音顔髣髴觸事厯然弟今何在令吾悲窮昔仕京師分張六旬耳其中三過誤云今日何意不來鍾念懸心無物能譬方欲共營林澤以送餘年念茲有何罪戾見此夭酷沒于吾手觸事痛恨吾素好醫術不使弟子得全又尋思不精致有枉過念此一條特復痛酷痛酷奈何吾罪柰何弟為志奉親孝事兄順雖僮僕無所叱咄可謂君子不失色于人不失口于人冲和淹通内有皂白舉動尺寸吾每咨之常云兄文骨氣可推英麗以自許又兄為人矯介欲過宜每中和道此猶在耳萬世不復一見柰何惟十紙手迹封坼儼然至于思戀不可懐及聞吾病肝心寸絶謂當以幅巾薄𦵏之事累汝奈何反相殯送弟由來意謂婦人雖無子不宜踐二庭此風若行便可家有孝婦仲長昌言亦其大要劉新婦以刑傷自誓必留供養殷太妃感柏舟之節不奪其志僕射篤順范夫知禮求得左率第五兒廬位有主此必何益冥然之痛為是存者意耳吾窮疾之人平生意志弟實知之端坐向忩有何慰適正頼弟耳過中未來已自愒望今云何得立自省惛毒無復人理比煩寃困憊不能作刻石文若靈響有識不得吾文豈不為恨儻意慮不遂謝能思之如狂不知所告訴眀書此數紙無復詞理略道阡陌萬不寫一阿謙何圖至此誰復視我誰復憂我他日寳者三光割嗜好以祈年今也惟速化耳吾豈復支冥冥中竟復云何弟懐隋和之寳未及光諸文章欲収作一集不知忽忽當辦此不今已成服吾臨靈取常共飲桮杓自釀酒寜有仿像不寃痛寃痛並宋書茯苓贊皓苓下居披芬上薈中狀雞鳬具容龜蔡神侔少司保延幼艾終志不移柔紅可佩禹餘粮贊疏波瀝浸徒謂範常沈靈秘用神哉無方阡疇不恵稼穡非芳眀徳禹功信在餘粮桃飴贊阿鹿續氣胡膠屬絃未若桃飴越地通天液首化玉酡貎定仙人知暍日胡不䕃年黄連贊黄連苦味左右相因斷凉滌暑闡命輕身縉雲昔御飛蹕上旻不行而至吾聞其人叙畫微善屬文能書畫王智深宋紀王微别傳微作叙畫一篇其畧曰辱顔光禄書以圖畫非止藝行成當與易象同體而工篆𨽻者自以書巧為髙欲其並辯藻繪覈其攸同夫言繪畫者竟求容勢而已且古人之作畫也非以案城域辯方州標鎮阜劃漫流本乎形者融靈而動變者心也靈亡所見故所託不動目有所極故所見不周於是乎以一管之筆擬太虚之體以判軀之狀畫寸眸之眀曲以為嵩髙趣以為方丈以叐之畫齊乎太華枉之點表夫隆準眉額頰輔若晏笑兮孤巖欝秀若吐雲兮横變縱化故動生焉前矩後方出焉然後宫觀舟車器以類聚犬馬禽魚物以狀分此畫之致也望秋雲神飛揚臨春風思浩蕩雖有金石之樂珪璋之琛豈能髣髴之哉披圖按牒效異山海緑林揚風白水激澗嗚呼豈獨運諸指掌亦以眀神降之此畫之情也宋文紀巻十二
