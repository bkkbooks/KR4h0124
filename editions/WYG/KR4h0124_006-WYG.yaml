body:
  text: 宋文紀巻六明梅鼎祚編元凶劭字休逺文帝長子弑逆伏誅即偽位書劭弑文帝并殺尚書僕射徐湛之又殺吏部尚書江湛即偽位為書初使蕭斌作詔斌辭以不文乃使侍中王僧綽為之徐湛之江湛弑逆無状吾勒兵入殿已無所及號惋崩衂肝心破裂今罪人斯得元凶克殄可大赦天下改元嘉三十年為太初元年文武並賜位二等諸科一依丁夘臧敦等復本位書元凶弑立以質為丹陽尹質時為雍州刺史馳告南郡王義宣又遣告世祖率衆五千馳下討逆質諸子在都邑聞質舉義並逃亡劭欲相慰悅乃下書厚給賜之臧敦等無因自駭急便竄逸迷昧過甚良可怪歎質國戚勲臣忠誠篤亮方當顯位賛翼京輦而子弟波迸傷其乃懐可遣宣譬令還咸復本位始興王濬字休明文帝第二子預逆伏誅吴興開漕事奏濬為揚州刺史元嘉二十二年上言從之功竟不立所統吴興郡衿帯重山地多汙澤泉流歸集疏决遲壅時雨未過已至漂沒或方春輟耕或開秋沈稼田家徒苦防遏無方彼邦奥區地沃民阜一嵗稱稔則穰被京城時或水潦則數郡為災頃年以來儉多豐寡雖賑賚周給傾耗國儲公私之弊方在未已州民姚嶠比通便宜以為二吴晉陵義興四郡同注太湖而松江滬瀆壅噎不利故處處涌溢浸漬成災欲從武康紵溪開漕谷湖直出海口一百餘里穿渠浛必無閡滯自去踐行量度二十許載去十一年大水已詣前刺史臣義康欲陳此計即遣主簿盛曇泰隨嶠周行互生疑難議遂寝息既事闗大利宜加研盡登遣議曹從事史虞長孫與吴興太守孔山士同共履行准望地勢格評髙下其川原由厯莫不踐校圖畫形便詳加笇考如所校量决謂可立尋四郡同患非獨吴興若此浛獲通列邦䝉益不有暫勞無由永晏然興創事大圖始當難今欲且開小漕觀試流勢輒差烏程武康東遷三縣近民即時營作若宜更増廣尋更列言昔鄭國敵将史起畢忠一開其説萬世為利嶠之所建雖則芻蕘如或非妄庶幾可立與沈璞疏始興王濬為揚州刺史璞為主簿嘗為舊宫賦久而未畢濬與璞疏璞因事陳答辭義可觀濬重下教又與主簿顧邁孔道存書卿常有速藻舊宫何其淹耶想行就耳又教卿沈思淹日向聊相敦還白斐然遂兼紙翰昔曹植有言下筆成章良謂逸才贍藻誇其辭說以今况之方知其信執省躊躇三復不已吾逺慙楚元門盈申白之賓近愧梁孝庭列枚馬之客欣恧交至諒惟深矣薄因末牘以代一面與主簿顧邁孔道存書沈璞淹思踰嵗卿研慮數旬瓌麗之美信同在昔向聊問之而還答累翰辭藻豔逸致慰良多既欣股肱備此髦楚還慙予躬無徳而稱復裁少字宣志於璞聊因尺紙使卿等具知厥心並宋書又與沈璞書璞為盱眙太守臧質共破魏人臧質以璞城主使自上露板璞性謙厚推功于質質露板亦不及焉太祖嘉璞功効遣中使深相褒美濬及王僧達並與璞書魏人狂凶自送近服偽將即斃酋長傷殘實天威所喪卿諸人忠勇之効也吾式遏無素致境蕪民瘠負乘之愧允當其責近乞退謝愆不蒙垂許故以報卿答元凶劭書文帝太子劭與弟濬並多過失慮上知使女巫嚴道育上天陳請欲令過不上聞劭等敬事號曰天師遂為巫蠱以玉人為上形像埋於含章殿前劭姊東陽主應閣婢王鸚鵡及其養子陳天興黄門慶國等並預其事劭以天興補隊主東陽主薨劭慮言語難密與濬謀嫁鸚鵡與濬府佐沈懐逺為妾因臨賀公主啓上上遣人詰讓劭懼馳書告濬濬答書凡劭濬相與書疏皆為名號謂上為彼人或以為其人以江夏王義恭為佞人東陽主第在西掖門外故云南第王即鸚鵡姓躬上啓聞者令道育上天白天神也懐逺慮鸚鵡與天興私通請劭殺之慶國具以其事白上上驚惋即遣收鸚鵡封籍其家得劭濬書數百紙皆咒咀巫蠱之言得所埋像于宫内道育變服為尼逃匿東宫濬徃京口又載以自隨及濬自京口入朝遣還京為行留處分至京數日而事發上使左右朱法瑜密責讓濬辭甚哀切并賜書濬當鎮江陵復載道育徃東宫欲将西上事洩須檢覈廢劭賜濬死濬報劭因謀弑逆世祖討並誅之奉令伏深惶怖啓此事多日今始來問當是有感發之者未測源由耳計臨賀故當不應翻覆言語自生寒熱也此姥由来挾兩端難可孤保正爾自問臨賀冀得審實也其若見問當作依違答之天興先署先人府仕不審監上當無此簿領耳急宜犍之殿下巳見王未宜依此具令嚴自躬上啓聞彼人若為不已正可保其餘命或是大慶之漸文帝賜始興王濬書類附鸚鵡事想汝巳聞汝亦何至迷惑乃爾且沈懷逺何人其詎能為汝隠此耶故使法瑜口宣投筆惋慨與元凶劭書當元凶劭弑逆召濬問状濬勸殺荀赤松等已及劭将敗勸劭入海輦珍寳繒帛下船乃復與劭書人情離散故行計不果所云尼即嚴道育船故未至今晩期當於此下物令畢願速敕謝賜出船艦尼巳入臺願與之明日决也臣猶謂車駕應出此不爾無以鎮物情又與世祖書初世祖爲武陵王入討元凶傳檄京邑劭使濬又與世祖書烏羊者南平王鑠法師者世祖之世子小名聞弟忽起狂檄阻兵反噬縉紳憤歎義夫激怒古來陵上内侮誰不夷滅弟洞覽墳籍豈不斯具今主上天縱英聖靈武宏發自登宸極威澤兼宣人懷甘死之志物競含生之節弟䝉眷遇著自少長東宫之懽其來如昨而信惑奸邪忘兹恩友此之不義人鬼同疾今水步諸軍悉巳備辦上親御六師太保又秉鉞臨統吾與烏羊相尋即道所以淹霆緩電者猶冀弟迷而知返耳故畧示懷言不盡意主上聖恩每厚法師今在殿内住想弟欲知消息故及並宋書南平王鑠字休𤣥文帝第四子歴侍中司空初爲元凶所任孝武帝毒殺之答魏若庫辰樹蘭移書時疆場之民多相侵盗宋元嘉二十五年魏豫州刺史北并侯若庫辰樹蘭移書豫州宋豫州刺史南平王鑠鑠答之知以邊氓擾動多有叛逆欲杜絶姦宄兩息民患又欲迭送奔亡禁其來徃申告嘉貺實獲厥心但知和好以來矢言每缺侵軼之弊屢違義舉任情背叛專肆暴畧豈惟竊犯王黎乃害及行使頃誅討蠻髦事止畿服或有狐奔鼠竄逃首北境而輒便苞納待之若舊資其糧仗縱爲㓂賊徃歳擅興戎旅禍加孩耄罔顧善鄰之約不惟疆域之限來示所云彼並行之雖豐辭盈觀即事違實興嫌長亂實彼之由反以爲言將違躬厚之義疆場之民有自來矣且相期有素本不介懷若於本欲消姧弭暴永存匪石宜先謹封守斥遣諸亡驚蹄逸鏃不妄入境則邊城之下外戸不閉王制嚴明豈當獨負來信若王命奔越侵盗彼民斯固刑之所取無勞逺及自荷閫外思闡皇猷每申飭守宰務敦義讓徃誠未布能不愧怍當重約示以副至懷並宋書竟陵王誕字休文文帝第六子奉孝武帝表世祖入討元凶誕時爲㑹州刺史并勢舉兵有奔牛之㨗及南郡王義宣反處分平定皆誕力也上頗相疑憚出爲南兗州刺史誕既見猜亦潛爲之備道路常云誕反建平三年有建康民陳文紹䓁之告上乃使有司奏貶爲侯遣令之國以義興太守桓闇爲兗州刺使襲誕至廣陵爲誕所殺遂遣車騎大將軍沈慶之討之誕奉表投之城外拒戰城䧟見害徃年元凶禍逆陛下入討臣背凶赴順可謂常節及丞相構難臧魯恊從朝野怳惚感懷憂懼陛下欲百官羽儀星馳推奉臣前後固執方賜允俞社稷獲全是誰之力陛下接遇慇懃累加榮寵驃騎揚州旬月移授恩秩頻加復賜徐兗仰屈皇儲逺相餞送臣一遇之感感此何㤀庶希偕老永相娯慰豈謂陛下信用讒言遂令無名小人來相掩襲不任枉酷即加誅剪鼠雀貪生仰違詔敕令親勒部曲鎮扞徐兗先經何福同生皇家今有何愆便成秦越陵鋒奮戈萬没豈顧盪定以期冀在旦夕右軍宣蘭爰及武昌皆以無罪並遇枉酷臣有何過復致於此陛下宫帷之醜豈可三緘臨紙悲塞不知所言陳文紹告竟陵王誕擅殺書私門有幸亡大姑元嘉中䝉入臺六宫薄命早亡先朝賜贈美人又聽大姑二女出入問訊父饒司空誕取爲府史恒使入山圖畵道路勤劇備至不敢有辭不復聽歸消息斷絶姑二女去年冒啟歸訴䝉陛下聖恩賜敕解饒吏名誕見符至大怒喚饒入交問汝欲死耶訴臺求解饒即答官比不聽通家信消息斷絶若是姊爲啟聞所不知誕因問饒汝那得入臺饒被問依實啟答旣出誕主衣莊慶畫師王强語饒汝今年敗汝姊誤汝官云小人輩敢持臺家逼我饒因叛走歸誕卽遣王强將數人逐突入家内縛録將還廣陵至京口客舎乃陊死井中託云饒懼辠自殺抱痛懷寃冒死歸訴劉成告竟陵王誕謀反書息道龍昔伏事誕親見姦狀又見誕在石頭城内修乗輿法物習倡警蹕道龍私獨憂懼向伴侣言之語頗漏泄誕使大吏令監内執道龍道龍逸走誕怒鞭殺監又捕殺道龍陳談之訴枉書弟詠之昔䝉誕采録隨從歴鎮大駕南下爲誕奉送牋書經陟危險時得上聞聖明登阼恩澤周普回改小人使命㣲勤賜署臺位詠之恒見誕與左右小人莊慶傅元祀潛圖姦逆言詞醜悖每云天下方是我家有汝等不憂不富貴又常䟽陛下年紀姓諱徃巫鄭師憐家祝詛詠之旣聞此語又不見其事恐一旦事發横罹其罪密以告建康右尉黄宣達并有啟聞希以自免元祀弟知詠之與宣達來徃自謙言語漏泄即具以告誕誕大怒令左右飲詠之酒逼使大醉因言詠之乗酒罵詈遂被害自顧寃枉事有可哀有司奏貶竟陵王誕臣聞神極尊明大儀所以貞觀皇天峻邈𤣥化所以幽宣故能經緯甿俗大庇黔首庶道被八紘不遺疏賤之賞威格天區豈漏親貴之罰此不刋之鴻則古今之恒訓謹按元嘉之末天綱崩褫人神哀憤含生喪氣司空竟陵王誕義兼臣子任居藩維進不能泣血提戈忘身殉節退不能閉闗拒險焚符斬使遂至拜受偽爵欣承滎寵沉淪姦逆肆于昏放以妻故司空臣湛之女誅亡遺類单舟遄遣披猖千里事哀行路賊忍無親莫此為甚故山隂傅僧祐誠亮國朝義均休戚重門峻衞不能拒折簡之使巖險千里不能庇匹夫之身乃更助虐馮凶抽兵勒刃遂使頓仆牢穽死不旋踵妻子播流庭筵莫立見之者流涕聞之者含歎及神鋒首路欃槍東指風巻四嶽電掃三江誕猶持疑兩端隂規進退陛下頻遣書檄告譬殷勤方改姦圖末乃奉順分遣弱旅永塞符文宴安所莅身不越境悖禮忘情不顧物議彎弧躍馬務是畋游致奔牛有崩碎之陳新亭無獨克之術假威義鋭乞命皇旅竟有何勞而論功伐既䄏祲廓清大明升曜幽顯宅心逺邇雲集誕忽星行之悲違開泰之慶遲回顧望淹踰旬朔逆黨陳叔兒等泉寳巨億資貨不貲誕收籍所得不歸天府辭稱天軍實入私室又太官東傳舊有獻御喪亂既平猶加斷遏􅈿羞庶品回充私贍于號諱之辰遽甘滋之品當惟新之始絶苞苴之貢忠孝兩忘敬愛俱盡乃徴引巫史潜考圖緯自謂體應符相富貴可期悖意醜言不可勝載遂復遥諷朝廷占求官爵侮􅌸宗室詆毁公卿不義不眤人道将盡荷任神州方懐姦慝每闚向宸御妄生規幸多樹淫祀顯肆䄏詛遂在石頭潜修法物傳警稱蹕擬則天行皆巳駭暴觀聴彰布朝野昔内難甫寧􅈿瑋散佚有御刀利刃擅價諸夏天府禁器厯代所􅈿誕密加購賞頓藏私室賊義宣初平餘黨逃命誕含縱罔忌私竊招納名工納巧悉匿私第又引義宣故将裘興為巳腹心事既彰露猶執欺罔公文面啓矯稱舊𨽻加以營于制館僣擬天居引石徴材専擅興發驅迫士族役同輿皂殫木土之姿窮吞并之勢故會稽宣長公主受遇二祖禮級尊崇臣湛之亡身狥國追榮典軍誕以廣托宅宇地妨蓺植輒逼遺孤頓相驅徙遂令神主宵遷改卜委巷宗戚含傷行路淹涕又縁谿兩道積代通衢誕拓宇開垣擅斷其一致使徑途擁隔川陸阻礙神怒民怨毒徧幽顯故丞相臨川武烈王臣道規名徳茂親勳光常䇿異禮殊榮受自先㫖者嗣王臣義慶受任西夏靈寢暫移先帝親枉鑾輿拜辭路左恩冠終古事絶常班誕又以廟居宅前固請毁換詔㫖不許怨懟彌地有靦面目豺狼為性規牧江都希廣兵力天徳尚𢎞甫申所請仍謂應住東府宜為中台貪冒無厭人莫與比雖聖慈全救每垂容納而虐戾不悛姦詖彌甚受命還鎮猜怨愈深忠規正諫必加鴆毒諂瀆膚躁是與比周又矯稱符敕設榜開募事發辭寢委罪自下及録事徐靈夀以常署受坐将就囚執舀韓近恭中䕶軍遣吏夏嗣伯密相囑請求寛桎梏且王僧達臨刑之啓事髙闍即戮之辭皆稱潜驛徃來遥相要契醜聲穢問宣諸遐邇含識能言孰不憤歎又獲吴郡民劉成豫章民陳談之建康民陳文紹等並如訴狀則姦情猜志嵗月増積昔周徳初升公旦有流言之舋魯道方泰季子斷逵泉之誅近則淮厲覆車於前義康襲軌於後變發柴竒禍成范謝亦皆以義奪親情為憲屈况乃上悖天經下誣政道結舋于无妄之辰希幸于文明之日皇穹所不覆厚土所不容夫無禮之誡臣子所宜服膺干紀之刑有國所應慎守臣等參議宜下有司絶誕屬籍削爵土收付廷尉法獄治罪諸所連坐别下考論伏願逺尋宗周之重近監興亡之由割恩棄私俯順羣議則卜世靈根于兹克固鴻勲盛烈永永無窮陛下如復隠忍未垂三思則覆皇基於七百擠生民於塗炭此臣等所以夙夜危懼不敢避鈇鉞之誅者也建平王宏字休度文帝第七子厯尚書令中書監應讜言條議宏為尚書左僕射明曉政事時普責百官讜言宏上議臣聞建國之道咸殊興王之政不一至於開諫致寧防口取禍固前王同軌後王共則秦殷之敗語戮刺亡周漢之盛謗升箴顯陛下以至徳神臨垂精思治進儒禮而崇寛敎哀獄法而黜嚴刑表忠行而舉貞節辟處士而求賢異修廢宫而出滯賞撤天膳而重農食禁貴遊而弛𣙜酤通山澤而易闗梁固巳海内仰道天下知徳今復開不諱之塗奨直辭之路四海希風普天幸甚舉蒙採問敢不悉心謹條鄙見置陳如左辭理違謬伏用震讋夫用兵之道自古所慎頃干戈未戢戰備宜修而卒不素練兵非夙習且戎衛之職多非其才或以資厚素加或以禄薄帯帖或寵由權門恩自私假既無将領虚尸榮禄至于邉城舉燧羽驛交馳而望其擐甲推鋒立功閫外譬縁木求魚不可得矣常謂臨難命師皆出倉卒驅烏合之衆𨽻造次之主貌疎情乖有若秦越豈能使其同力㧞危濟難故奔北相望覆敗繼有今欲改選将校皆得其人分臺見将各以配給領䕶二軍為其摠統令撫養士卒使恩信先加農隙校獵以習其事三令五申以齊其心使動止應規進退中律然後蓄鋭觀釁因時而動摧敵䧟堅折衝于外孫子曰視卒如赤子故可與之共死所以張弮効争先之心吮癰致必盡之命豈不由恩著者士輕其生令明者卒畢其力考心迹事如或有在妄陳膚知追懼乖謬郊廟宜備設樂議孝建二年有司奏前殿中曹郎荀萬秋議郊廟樂於是使内外博議竟陵王誕等五十一人並同萬秋議左僕射建平王宏丹陽尹顔竣議各不同衆並依宏議荀萬秋議按禮祭天地有樂者為降神也故易曰雷出地奮豫先王以作樂崇徳殷薦之上帝以配祖考周官曰作樂於圜丘之上天神皆降作樂於方澤之中地祇皆出又曰乃奏黄鍾歌大吕舞雲門以祀天神乃奏大簇歌應鍾舞咸池以祀地祇由斯而言以樂祭天地其來尚矣今郊享闕樂竊以為疑祭統曰夫祭有三重焉獻屬莫重于祼聲莫重於升歌舞莫重于武宿夜此周道也至於秦奏五行魏舞咸熈皆以用享爰逮晉氏泰始之初傅𤣥作晉郊廟歌詩三十二篇元康中荀蕃受詔成父朂業金石四縣用之郊廟是則相承郊廟有樂之證也今廟祠登歌雖奏而象舞未陳懼闕備禮夫聖王經世異代同風雖損益或殊降殺迭運未嘗不執古御今同規合矩方兹休明在辰文物大備禮儀遺逸罔不具舉而況出祇降神輟樂於郊祭昭徳舞功有闕於廟享謂郊廟宜設備樂建平王宏議聖王之徳雖同創制之禮或異樂不相沿禮無因襲自寳命開基皇符在運業冨前王風振通古朝儀國章並循先代自後晉東遷日不暇給雖大典略備遺闕尚多至于樂號廟禮未該徃正今帝徳再昌大孝御㝢宜討定禮本以昭來葉尋舜樂稱韶漢改文始周樂大武秦革五行眷夫祖有功而宗有徳故漢髙祖廟樂稱武徳太宗廟樂曰昭徳魏制武始舞武廟制咸煕舞文廟則祖宗之廟别有樂名晉氏之樂正徳大豫及宋不更名直為前後二舞依據昔代義舛事乖今宜釐改權稱以凱容為韶舞宣烈為武舞祖宗廟樂摠以徳為名若廟非不毁則樂無别稱猶漢髙文武咸有嘉號恵景二主樂無餘名章皇太后廟依諸儒議唯奏文樂何休杜預范寗注初獻六羽並不言佾者佾則干在其中明婦人無武事也郊祀之樂無復别名仍同宗廟而已尋諸漢志永至等樂各有義况宜仍舊不改宋及東晉太祝惟送神而不迎神近議者或云廟以居神恒如在也不應有迎送之事意以為並乖其哀立廟居靈四時致享以申孝思之情奉神升降無常何必恒安所處故祭義云樂以迎來哀以送徃鄭注云迎来而樂樂親之来送徃而哀哀親之返其享否不可知也尚書有神天又詩云神保遹歸注曰歸於天地也此並云神有去來則有送迎明矣即周肆夏之名備迎送之樂古以尸象神故儀禮祝有迎尸送尸近代雖無尸豈可闕迎送之禮又傅𤣥有迎神送神歌辭明江左不迎非舊典也丹陽尹顔竣議徳業殊稱則干羽異容時無沿制故物有損益至於禮失道諐稱習忘反中興釐運視聴所革先代繆章宜見刋正郊之有樂盖生周易周官厯代著議莫不援准夫掃地而祭器用陶匏唯質與誠以章天徳文物之備理固不然周官曰國有故則旅上帝及四望又曰四圭有邸以祀天旅上帝兩圭有邸以祀地旅四望四望非地則知上帝非天孝經云郊祀后稷以配天宗祀文王于明堂以配上帝則豫之作樂非郊天地大司樂職奏黄鍾歌大吕舞雲門以祀天神鄭注天神五帝及日月星辰也王者以夏正月祀其所受命之帝于南郊則二至之祀又非天地考之衆經郊祀有樂未見明證宗廟之禮事炳載籍爰自漢元迄乎有晉雖時或更制大抵相因為不襲名號而巳今樂曲淪滅知音世希改作之事臣聞其語正徳大豫禮容具存宜殊其徽號飾而用之以正徳為宣化之舞大豫為興和之舞庶足以光表世烈悅被後昆前漢祖宗廟處各異主名既革舞號亦殊今七廟合食庭殿共所舞蹈之容不得廟有别制後漢東平王蒼已議之矣又王肅韓祇以王者徳廣無外六代四夷之舞金石絲竹之樂宜備奏宗廟愚謂蒼肅祇議合於典禮適於當今建平王宏又議竣據周禮孝經天與上帝連文重出故謂上帝非天則易之作樂非謂祭天也按易稱先王以作樂崇徳殷薦之上帝以配祖考尚書云肆類于上帝春秋傳曰告昊天上帝凡上帝之言無非天也天尊不可以一稱故或謂昊天或謂上帝或謂昊天上帝不得以天有數稱便謂上帝非天徐邈推周禮國有故則旅上帝以知禮天旅上帝同是祭天言禮天者謂常祀也旅上帝者有故而祭也孝經稱嚴父莫大于配天故云郊祀后稷以配天宗祀文王于明堂以配上帝既天為議則上帝猶天益明也不欲使二天之同故變上帝爾周禮祀天之言再見故鄭注以前天神為五帝後冬至所祭為昊天竣又云二至之祀又非天地未知天地竟應以何時致享記云掃地而祭器用陶匏者明所用質素無害以樂降神萬秋謂郊宜有樂事有典據竣又云東平王蒼以為前漢諸祖别廟是以祖宗之廟可得各有舞樂至於祫祭始祖之廟則専用始祖之舞故謂後漢諸祖共廟同庭雖有祖宗不宜入别舞此誠一家之意而未統適時之變也後漢從儉故諸祖共廟猶以異室存别室之禮晉氏以來登歌頌美諸室繼作至于祖宗樂舞何獨不可迭奏茍所詠者殊雖復共庭亦非嫌也魏三祖各有舞樂豈復是異廟耶大駕屬車議孝建元年有司奏尚書令建平王宏參議詔可有司奏案漢胡廣蔡邕並云古者諸侯貳車九乘秦滅六國兼其車服故王者大駕屬車八十一乘尚書御史乘之最後一車懸豹尾法駕則三十六乘檢晉江左逮至於今乘輿出行副車相承五乘建平王宏參議八十一乘義兼九國三十六乘無所准並不出經典自邕廣傳説又是從官所乘非帝者副車正數江左五乘儉不中禮案周官云上公九命貳車九乘侯伯七命車七乘子男五命車五乘然則帝王十二乘湘東太妃周忌議孝建元年湘東國刺稱國太妃去三十年閏六月二十八日薨未詳周忌當在六月為在七月勒禮官議正博士丘邁之議左僕射建安王宏謂宜以七月為祥忌丘邁之議案吴商議閏月亡者應以本正之月為忌謂正閏論雖各有所執商議為允宜以今六月為忌建平王宏議邁之議不可准據案晉世及皇代以來閏月亡者宜閏之後月祥宜以來七月為祥忌王偃喪服議孝建三年三月有司奏勒禮官處正重加硏詳以宏議為准詔可有司奏故散騎常侍右光禄大夫開府儀同三司義陽王師王偃喪逝至尊為服緦三月成服仍即公除至三月竟未詳當除服與不又皇后依朝制服心䘮行䘮三十日公除至祖葬日臨䘮當着何服又舊事皇后心䘮服終除之日更還着未公除時服然後就除未詳今皇后除心制日當依舊更服為但釋心制中所着布素而已勒禮官處正太學博士王應之議通典王膺之尊卑殊制輕重有級五服雖同降厭則異禮天子止降旁親外舅緦麻本在服例但衰絰不可以臨朝享故有公除之議雖釋衰襲冕尚有緦月之制愚謂至尊服三月既竟猶宜除釋又議吉凶異容情禮相稱皇后一月之限雖過二功之服巳釋哀䘮所極莫深于尸柩親見之重不可以無服案周禮為兄弟既除䘮以及其葬也反服其服輕䘮雖除猶畜衰以臨葬舉輕明重則其理可知也愚謂王光禄祖葬之日皇后宜反齊衰又議䘮禮即逺變除漸輕情與日殺服隨時改權禮既行服制巳變豈容終除之日而更重服乎案晉太始三年武帝以朞除之月欲反重服拜陵頻詔勤勤思申棘心於時朝議譬執亦遂不果愚謂皇后終除之日不宜還着重服直當釋除布素而已太常丞朱膺之議凡云公除非全除之稱今朝臣私服亦有公除猶自窮其本制膺之云晉武拜陵不遂反服此時是權制既除衰麻不可以重制耳與公除不同愚謂皇后除心制日宜如舊反服未公除時服以申創巨之情國子博士蘓瑋生議案三日成服即除及皇后行䘮三十日禮無其文若並謂之公除則可粗相依准凡諸公除之設盖以王制奪禮葬及祥除皆宜反服未有服之於前不除於後雖有齊斬重制猶為功緦除喪夫公除暫奪豈可遂以即吉耶愚謂至尊三月服竟故應依禮除釋皇后臨祖及一周祥除並宜反服齊衰尚書令建平王宏議至尊緦制終止舉哀而已不湏釋服餘同朱膺之議前祠部郎中周景逺議權事變體五服俱革緦麻輕制不容獨異謂至尊既已公除至三月竟不復有除釋之義義陽王昶字休道文帝第九子歴徐州刺史前廢帝時畏誅奔魏請改葬竟陵王誕表前廢帝即位昶為征北将軍徐州刺史道經廣陵上表詔聴禮葬竊聞淮南中霧眷求遺緒楚英流殛愛存丘墓並難結兩臣義開二主法雖事斷禮或情申伏見故賊劉誕稱戈犯節自貽逆命膏斧嬰戮在憲巳彰但尋屬忝皇枝位叨列辟一以罪終魂骸莫赦生均宗籍死同匹豎旅窆委雜封樹不修今嵗月逾邁愆流亹徃踐境興懐感事傷目陛下繼明升運咸與惟新大徳方臨哀矜未及夫欒布哭市義犯雷霆田叔鉗赭志於夷戮况在天倫何獨無感伏願稽若前准降申丹志乞薄改褊祔微表窀穸則朽骨知榮窮泉識荷臨紙哽慟辭不自宣前廢帝詔報征北表如此省已慨然誕及妻女並可以庶人禮葬并置守衛建安王休仁文帝第十二子厯司徒尚書令揚州刺史為明帝所害陳貴妃禮敬議明帝泰始二年有司奏皇太子所生陳貴妃禮秩既同儲宫未詳宫臣及朝臣並有敬否妃主在内相見又應何儀博士王慶緒議百僚内外禮敬貴妃應與皇太子同其東朝臣𨽻理歸臣節太常丞虞愿等同慶緒建安王休仁議參詳休仁議為允詔可禮云妾既不得體君班秩視子為序母以子貴經著明文内外致敬貴妃誠如慶緒議天子姬嬪不容通音介於外雖義可致䖍不應有牋表皇太子車服議泰始四年尚書令建安王休仁㕘議詔可天子之子與士齒讓逹于辟雍無生而貴者也既命而尊禮同上公周制五等車服相涉公降王者一等而已王以金輅賜同姓諸侯象及革木以賜異姓侯伯在朝卿士亦凖斯禮按如此制則東宫應乘金輅自晉元過江禮儀疏舛王公以下車服卑雜唯有東宫禮秩崇異上次辰極下絶侯王而皇太子乘石山安車義不見經事無所出禮所謂金玉輅者正以金玉飾輅諸末耳左右前後同以漆畫秦改周輅制為金根通以金薄周匝四面漢魏二晉因循莫改逮于大明始偹五輅金玉二制並類金根造次瞻覩殆無差别若錫之東儲於禮嫌重非所以崇峻陛級表示等威且春秋之義降下以兩臣子之義宜從謙約謂東宫車服宜降天子二等驂駕四馬乘象輅降龍碧旂九葉進不斥尊退不逼下沿古酌時於禮為衷巴陵王休若文帝第十九子厯江州刺史為明帝所害移東土檄孔顗前廢帝時為尋陽王子房右軍長史行會稽郡事及太宗即位召為太子詹事顗以時都下罄竭逺近叛離起事必克遂擁子房發兵吴郡吴興晉陵一時響應上遣休若董統東討諸軍移檄東土覬等兵敗被殺盖聞釁集有兆禍至無門倚伏之來實惟人致故囂述貪亂終殄宗祀昌憲構氛旋潤斧鉞斯則昭彰記牒炯戒今古者也自國步時艱三綱道盡神歇靈繹璿業綴旒皇上仁雄集瑞英叡應厯鳳儀熛昇龍煇電舉盪穢紫樞不俟鳴條之誓凝政中㝢不肆漂杵之威是以墜維再造虧天重構幽明裁紀標配斯光而羣凶恣虐協扇童孺蕞爾東垂復淪醜迹邪回從慝蜂動蟻附聖圖霆發神威四臨羽馹所届義旅雲屬攙鉞所麾逆徒氷泮勝負之效皎然巳顯司徒建安王英猷冠世董率元戎驃騎山陽王風畧夙昭撫厲中陳或振霜江蠡或騰焱荆河金甲燭天庭囂聲震海浦前将軍吴興太守張永東南標秀協贊戎機建威将軍沈懐明鎮東中兵參軍劉亮武衞将軍夀寂之霜銳五千熊騰虎步龍驤将軍王穆之龍驤将軍頓生鉄騎連羣風驅電邁右軍将軍齊王射聲校尉姚道和樓艦千艘覆川盖汜左軍垣恭祖步兵校尉杜右文冗從僕射全景文員外散騎侍郎孫超之並率虎旅駱驛雲赴殿中将軍杜敬真殿中将軍陸攸之建武将軍吴喜甲楯一萬分趣義興予猥承人乏總司戎統聳劔東馳申憤海曲歕氣則白日盡晦刷馬則清江倒流以此伐叛何勍不勦以此柔服何順不懐愍彼羣迷弗辨堯桀螳黽微命擬雷霆之衝巳枯之葉當霜飈之隊尺竪所為寒心匹婦所為歎息夫因禍提慶資敗為成前監不忘後事明筮若能相率歸順投兵効欵則福鍾當年祉覃來裔孰知身轘宗屠鬼餧魂泣者哉詳鏡安危自求多福晉平王休祐文帝第十三子歴驃騎將軍南徐州刺史明帝拉殺之與殷琰書琰陳郡長平人歴少府加給事中晉安王子勛反以琰督豫司二州豫州刺史琰家累在京邑義欲奉順前右軍叅軍杜叔寳等並勸琰同逆琰素無部曲門義不過數人無以自立受制于叔寳等太宗知琰事不獲巳猶欲羈縻之以琰兄前中書郎瑗為司徒右長史子邈為山陽王休祐驃騎叅軍太宗遣輔國將軍劉勔等西討休祐出鎮歴陽為諸軍總統勔進軍小峴時休祐與琰書上又遣王道隆齎詔宥琰罪勔又與琰書并以琰兄瑗子邈書與之琰本無反心事由力屈前後屢遣送誠牋而衆心持疑莫能相一故歸順之計每多愆塞嬰城愈固君本文弱素無武幹是遠近所悉且名器清顯不應復有分外希覬近者之事當是刼于凶豎不能守節今大軍長驅巳造城下勢孤援絶禍敗交至顧昔情款猶有惻然聖上垂天地之仁開不世之澤好生惡殺遐邇所聞顧琛王曇生等皆軍敗迸走披草乞活尚䝉恩恕晏處私門今神鋒所臨前無横陳况竆城弱衆殘傷之餘而欲自固乎若開門歸順自可不失富貴將佐小大竝保榮爵何故茍困士民自求韲膾身膏斧鑊妻息并盡老兄垂白東市受刑耶幸自思之信言不爽有如皎日宋書劉勔與殷琰書類附昔景和凶悖行絶人倫昏虐險穢諫諍杜塞遂殘毁陵廟芟刈百僚縱毒窮凶靡有紀極于時人神回遑莫能自保中内士庶咸願一匡予職在直衞目所備覩主上神機天發指麾克定横流塗炭一朝太平扶危拯急實冠終古而四方持疑成此乖逆資斧所臨每從偃簡足下以衣冠華胄信槩夙昭附戾從違猶見容養賢兄長史階升清列賢子㕘軍亦塞國網間者進軍宛唐計由劉順退衆閉城當時未了過蒙朝恩謬充将帥蚤承風素情有依然今皇威逺申三方蹙弱勝敗之勢皎然可覽王御史昨至主上敕驃騎教賢兄賢子書今悉遣送百代以來未有𢎞恩曲宥乃至於此且朝廷方宣示大義惟新王道何容摽虚辭於士女失國信于一州以足下明識淵見想必不俟終日如其孤背亭毒弗忌屠䧟者便當窮兵肆武究法極刑将恐貴門無復祭祀之主墳壟無埽灑之望進謝忠臣退慙孝子名實兩喪沒有餘責扶力畧白幸加研覽初琰長史龎道隆司馬劉順皆勸琰同子勛及子勛進兵順與栁倫皇甫道烈龎天生等東據宛唐與勔相持守四月劉勔又與殷琰書子勛以龎孟蚪為司州刺史率精兵五千救義陽并解夀陽之圍勔遣吕安國進軍破孟蚪于蓼潭義軍主陳肫又破之于汝水孟蚪走向義陽義陽已為王𤣥謨子曇善起義所據乃逃于蠻中八月皇甫道烈栁倫等二十一人聞孟蚪敗並開門出降勔因又與琰書琰将降先送休祐内入出城然後開門時琰有疾以板輿與諸将帥面縳請罪勔並撫宥無所殺戮栁倫來奔具相申述方承足下迹纒穢亂心秉忠誠惘然窮愁不親戎政去冬開天之始愚迷者多如足下流比進非社稷宗臣退無顧命寄託朝廷既不偏相嫌責足下亦復無所獨愧程天祚已舉城歸順龎孟蚪又繼迹奔亡劉胡困於錢溪袁顗欲戰不得椎理揆勢亦安能乆且南方初起連州十六擁徒百萬仲春以來無戰不北摧䧟殄滅十無一二南憑袁顗弱卒北恃足下孤城以兹定業恐萬無一理方今國網踈畧示舉宏維比日相白想亦已具矣且倫等皆是足下腹心牙爪所以㩦手相捨非有怨恨也了知事不可濟禍害巳及故耳夫擁數千烏合抗天下之兵傾覆之状豈不易曉假令六蔽之人猶當不為其事况復足下少祖名教疾歿世無稱者耶所以復有此白者實惜華州重鎮鞠為茂草兼傷貴門一日屠滅足下若能封府庫開四門宣語文武示以禍福先遣咫尺之書表逹誠欵然後素車白馬來詣轅門若令足下髪膚不全兒姪彫耗者皇天后土實聞此言至辭不華寧復多白並宋書遣子勛即偽位於尋陽豫州刺史劉胡率衆來屯鵲尾又遣安北将軍袁顗摠統衆軍臺軍屯據前谿斷顗等糧援胡遣将攻之大敗焚營遁走顗亦南奔桂陽王休範文帝第十八子與袁粲禇淵劉秉書粲淵見後書秉字彦節宋宗室厯尚令與粲同害休範謹澀無才能為驃騎大将軍江州刺史及太宗晏駕主幼時艱休範自謂宗戚莫二應居宰輔事既不至怨憤彌結朝廷知其有異志密相防禦議以休範居尋陽上流以皇弟晉熈王爕為郢州刺史配以資力出鎮夏口慮為休範所撥留自太洑去不過尋陽休範大怒遂舉兵反發自尋陽與袁粲等書至新林朝廷震動蕭道成次新亭屯騎校尉黄回偽降宣道成意㫖回與越騎校尉張敬兒直前斬休範首夫治政任賢宜親踈相輔得其經緯則結䋲可及失其規矩則危亡可期漢承戰國之餘傷周室衰殄立磐石之宗而致七國之亂魏革漢典創於前失遂使諸王絶朝聘之禮是以根疎葉枯政移異族今宗室衰㣲自昔未有泰寧之世足以為譬孤子忝枝皇族預闗興毁雖欲忘言其可得乎髙祖武皇帝升叡三光滌紛四表太祖文皇帝欽明冠古資乾承厯秉鉞西服鳴鑾東京捜賢選能納竒賞異孝武皇帝岐嶷天縱先機雷發陵波静亂宏業中興儲嗣不腆遂貽禍難于時建安王以家難頻遘宜立長主明皇帝恢朗淵懿仁潤含逺奉戴南面允合天人而太尉以年長居卑怨心形色栁欣慰等規行不軌事跡披猖驃騎以忤顔失㫖應對不順在蕃刻削怨結人鬼先帝明於號令豈枉法為親二王之釁實自由巳但司徒巴陵王勞謙為國中流事難有不世之勲奉時如天事兄猶父非惟令友信為國器唐叔之忠而受管蔡之罪親戚哀憤行路嗟嘆王地藉光潔徳厭民望並無寸罪受斃讒邪先帝穆于友于留心親戚去昔事平之後面受詔誨禮則君臣樂則兄弟升級賜賞動不移年撫慰孜孜恒如不足豈容一旦鬩墻致此禍害良有由也先帝寝疾彌年體疲膳少雖神照無虧而慮有失徳補闕拾遺責在左右于時出入卧内唯有運長道隆羣細無状因疾遘禍見上不和知無瘳拯慮晏駕之日長王作輔奪其寵柄不得自専是以内假帝㫖外託朝議䛕辭詭貌萬類千端升進姦回屠斥賢哲外矯天則内誣人鬼是以星紀違常羲望失度昔魏顆擇命春秋美之秦穆殉良詩有明刺臣子之節得失必書不及匡諫猶以為罪交間蒼蠅驅扇禍戮爵以貨重才由貧輕先帝舊人無罪黜落薦致鄉親徧布朝省諂䛕親狎者飛榮玉除静立貞粹者柴門生草事先闗巳雖非必行若不諮詢雖是必抑海内逺近人誰不知未解執事不加斧鉞遂致先帝有殺弟之名醜聲遺于君父格以古義豈得為忠先帝崩殂若無天地理痛常情便應赴泣但兄弟枉酷巳䧟讒細孤子巳下復觸姦機是以望陵墳而摧裂想鑾旂而抽慟雖復才微寄寵而地屬負荷顧命之辰曽不見及分崩之際詔出兩豎天誘其衷得居乎外若受制羣邪則玉石同碎矣以宇宙之基一旦受制卑瑣劉氏家國使小人處分終古以来未有斯酷昔石顯曹節方今為優而望之仲舉由以致弊至於遭逢醜慝豈有古今者乎諸賢胄籍冠冕世厯忠貞位非恩樹勲豈寵結憂國勤王社稷之鎮豈可含縱讒凶坐觀傾覆自惟宋室未殞得以推移者正内賴諸賢防勒姦軌外有孤子跨據中流而人非金石何能支久走一虧落則本根莫庇當今主上冲幼宜明典章征虜之鎮不見慰省逆旅徃來尚有顧眄骨肉何讎逼使離隔禽獸之心横生疑貳經由此者每加約截同惡相求有若市賈以孤子知其情状恒恐以此乘之鉗勒州郡過見防禦近遣西南二使統内宣傳不容恐懼即遣啓并有别書若以孤子有過便應鳴鼔見伐如其不爾宜令各有所歸與殺不辜憲有常辟三公之使無罪而斬鄙雖不肖天子之季父卑小主者敢不如是乎孤子承奉今上如事先朝夙宵恭敬散心雲日晦望表驛相從江衢有何虧違頓至於此既巳甘心其可再乎如徃來所說以孤子納士為尤此輩懼其身罪豈為國計在昔四豪列國公子猶博引廣納門客三千况孤子位居鼎司捍衞畿甸且今與昔異咸所知也魏人陵掠江淮侵逼主上年穉宗室衰微邪僣用命親賢結舌疆場嬰塗炭之苦征夫有勤役之勞瓜時不代齊猶致禍况長淮戍卒厯年怨思不務拓逺強邉而先事國君親戚以此求心何事非亂又以繕治盆壘復致嚻聲自晉宋之灾積貯百萬孤子到鎮曽不數千里且修城池整郭邑為治常理復何足致嫌耶若以中流清蕩則任農夫不應實力彊兵作鎮姑熟俱妨㓂害豈得獨嫌於此昔成王之明而為流言致惑若使金縢不聞則周公無以自保樂毅歸趙不忍謀燕况孤子禮則君臣恩猶父子者乎所以枕戈泣血祗以兄弟之讎爾觀其不逞之意豈可限量設使遂其虐志諸君欲安坐得乎唇亡齒寒理不難見桂蠧必除人邪必翦枉突徙薪何勞多力望便執録二豎以謝寃魂則先帝不失順悌之名宋世無枉筆之史此州地居形要路枕九江控弦跨馬越闗而至重氣輕死排藪競出練甲照水總戈成林劋此纎𨽻何患不克但千鈞之弩不為鼷鼠發機欲使薰蕕内辨晉陽外息爾功有所歸不亦可乎便當投命有司謝罪天闕同奉温凊齊心庶事伊霍之任非君而誰周召之職頗以自許左提右挈無媿古人昔平勃剛斷産禄蚤誅張温趦趄文臺扼腕事之樞機得失俄頃徃車今轍庶無惑焉近持此意申之沈攸其憤難不解諸王致此既知禍原銳然奮發蓄兵厲卒以俟同舉張興世發都日受制凶黨揚颿直逝遂不見遇孤子近遣信申述姦禍方大惆惋追恨前迷比者信使每申勤款王奐佐郢兵權在握厥督屠狂朝野嗟痛猶父之怨寧可與之比肩孤子此舉増其忼慨義之所勸其應猶響諸君或未得此意故先告懐徙倚一隅遲及委問孤子哀疾尫毁窮盡無日庶規史鰌死不忘本臨紙荒哽言不詮第宋書農任農夫臨淮人朝廷慮休範東下以夫為輔師将軍淮南太守戍姑孰江淹敕為朝賢荅休範書昔媯道鼎昌干羽未能戢姬徳昭宣長旌猶巻舒焚衣毁冕有自來矣皇宋靈武誕命缺道鬱終三后連光四聖沓軌或經天緯地構紫靈之符調風偃海隆黄旗之祚莫不頌滿金石聲彯宇宙者也暨我太宗明皇帝惟岳降聖重耀函夏延禮璧臺訪道衢室平陽之后巻迹慙靈空同之君斂功謝徳是以綵雲祥風之瑞布濩區中梯山踐火之俗款徼請吏跨商軼夏洗周滌漢道徳優衍猶不封禪遐靈在天餘恵無泯主上文明金相穆然玉色履璧之禎獲珪之應著在紀嵗仁浸汙河恵愛秋草想亦君之所聞也重以先帝靈畧潜通英轡逺馭受話言必忠貞方肅之臣奉風聲必䖍恭匪懈之士明時琴瑟鼎鉉之盛且被於寧世而忽覿来書以惋以慨君為齊梁楚越之士鼎貴一時金玉滿堂文馬千駟爵授湯沐冠盖於道惟名尊崇誰與為雄而出言效尤吐音入戾舉旗類社志竊神禁稱兵斂衆遂窺外闗今朝無闕政頓構凌上之節室無嬖豎坐生莫大之釁鴟梟赭衣號稱徒黨主萃淵藪寧滋之甚不臧不軌不忠不義未有若斯者也宗枝之釁逺則吴楚見禽於一壁磐石之孽近則江荆面縛於小将此成敗蘭艾之鑒又亦君之所知也聞彼虹飲鼠舞之異早見物徵河北隴右之謡巳露童詠所謂妖由人作孽不可逃然桓侯之患良助寒心今羽林黄頭駱驛爭引熊渠佽飛首尾電發伏波樓船掩江蔽汜渡遼甲卒充野布隰加以先天葢世之略蕩海拔山之威任輔沛陳羽林鷁鵃露動龍驤精騎風驅然後六師雲起九軍星連蜺旌外江虹艗中水金甲映平陸鐵馬炤長原蹴南嶽而永慨瞰九𣲖而懐恐伐罪弔民復驗于兹甫刑三千惟此為大僕才等不羈志瀝丹欵故奏禍福行矣悵然袁禇劉蕭等疏袁粲禇淵劉秉蕭道成下明時上有脱句任輔沛以下至風驅以缺誤江文通集西陽王子尚字孝師孝武帝第二子初封西陽王改封豫章為明帝所害山湖禁科奏子尚大明初為揚州刺史上言有司檢壬辰詔書占山護澤彊盗律論贓一丈以上皆棄市尚書左丞羊希以其禁嚴刻立制五條從之山湖之禁雖有舊科民俗相因替而不奉熂山封水保為家利自頃以來頽弛日甚冨彊者兼嶺而占貧弱者薪蘓無託至漁採之地亦又如兹斯寔害治之深蔽為政所宜去絶損益舊條更申恒制民杜氏通典作人尚書左丞羊希議希𤣥保兄子為廣州刺史見害壬辰之制其禁嚴刻事既難遵理與時弛而占山封水漸染復滋更相因仍便成先業一朝頓去易致嗟怨今更刋革立制五條凡是山澤先常熂爈種養竹木雜果為林及陂湖江海漁梁鰌鮆場常加功修作者聴不追奪官品第一第二聴占山三頃第三第四品二頃五十畆第五第六品二頃第七第八品一頃五十畆第九品及百姓一頃皆依定格條上貲薄若先巳占山不得更占先占闕少依限占足若非前條舊業一不得禁有犯者水土一尺以上竝計贓依常盗律論停除咸康二年壬辰之科嗟怨通典作怨嗟先常作先恒養竹木雜果為林作種竹木薪果為林常加作恒加晉安王子勛字孝徳孝武帝第三子厯江州刺史明帝初舉兵敗誅傳京邑檄子勛出鎮江州鄧琬為鎮軍長史尋陽内史行江州事前廢帝狂悖遣使齎藥将賜子勛死琬與録事㕘軍陶亮等决計舉兵使記室㕘軍茍道林為檄文會太宗弑廢帝自立進子勛車騎将軍開府儀同三司琬等拒命進道傳檄京師奉子勛即位尋陽兵敗並見殺等子勛起兵㕘軍事顧昭之沈伯玉茍道林㕘管書記初檄出道林此未詳孰撰陽六數艱雲雷相襲髙皇受厯時乘雲轡頓于促路文祖定祥係昭睿化翦於中年二凶縱禍三綱理滅宗王俛首姑息逆朝枕戈無聞偷榮有秩孝武皇帝釋位泣血糾義入討投袂戎首親戮鯨鯢九服還輝兩儀更造而窮旻不恵棄離萬國皇運重替嗣王荒滛孤以不才任居藩長大懼宗稷殱覆待日故招徒楚郢飛檄京甸志遵前典黜幽陟明庶七廟復安海昬有紹豈圗宋未悔禍弑亂奄臻遂矯害明茂簒竊天寳反道效尤蔑我皇徳干我昭穆寡我兄弟恣鴟鴞之心蹈倫穎之志覆移鼎祚誣罔天人藐孤同氣猶有十三聖靈何辜而當乏響昔隆周弛御晉鄭是依盛漢中陵居章抗節支苖輕屬猶或忘軀况孤忝惟人子情地兼切號感一隅心與事痛是用飲血袵金誓復宗祀今遣輔國将軍諮議領中直兵孫冲之龍驤将軍陳紹宗率螭虎之士組甲二萬㳂流電發逕取白下龍驤将軍領中直兵薛常寳建威将軍領中直兵沈懐寳長㦸萬刃羽騎千羣逕出南州直造朱雀寧朔将軍諮議領中直兵陶亮龍驤将軍焦度摠中黄之旅梟雄三萬風捲江介雲臨石頭建威将軍張冽龍驤将軍何休明提育獲之徒勁悍之卒邪趨金陵北指閶闔龍驤将軍張係伯龍驤将軍陳慶勒輕鋭五千強弩一萬飛鋒班凟齊會西明冠軍将軍尋陽内史鄧琬提湘雍之兵勇敢四萬授律摠戎飈集京邑征虜将軍領府司馬張悅蒼兕千艘水軍五萬大董羣校絡繹繼道冠軍将軍豫章内史劉衍寧朔将軍武昌太守劉弼寧朔将軍西陽太守謝雅建威将軍領中直軍晉熈太守閻湛之皆掃境勝兵薦誠請効後将軍郢州刺史安陸王子綏懐徳纒慕鞠旅先晨冠軍将軍湘州刺史邵陵王子元席颿凌波整衆遄至前将軍荆州刺史臨海王子頊練甲陜西獻徒萬數輔國将軍冠軍長史長沙内史何恵文見㧞先皇誠深投袂冠軍将軍雍州刺史袁顗不謀同契雷發漢南建武将軍順陽太守劉道憲懐忠抱慨不逺三千梁益青徐兗豫吴㑹皆密介歸誠誓為表裏孤親摠烝徒十有餘萬白羽咽川霜鋒照野金聲振谷鳴鼙聒天凡諸将帥皆忠無匿情智無遺計果幹剛鷙譎略多竒水陸長驅數道並進發舟踰險背水争先以此衆戰孰能斯禦推此義鋭滄海可陻諸君或荷寵前朝感恩舊日或奕世貞淳見危授命而逼迫㓂手效節莫由今大軍密邇形援已接見幾而作豈俟終日便宜轉禍趨福因變立功夫旦奭與三監並時金霍與上官共主邪正粈雜何世無之但績亮則名播姦騁則道消耳紀季入齊陳平歸漢身尊譽逺明誓是裒成乾全規殷鑒匪逺若玩咎惟休告舍罔悟則誅及五族有殄無遺軍科爵賞有如皦日巫山既燎芝艾共烟幸遵良塗無守毁轍檄到宣告咸使聞知尚書討晉安王子勛符夫晦明遞運崇替相㳂帝宋之基懋業維永聖祖重光氤氲上業狂昏承祀國維以紊毒流九縣釁穢三靈縉紳戮辱黔庶塗炭人神同憤朝野泣血聖上明睿在躬膺符握曜眷懐家國夙夜劬勞懼社稷湮蕪彞倫左衽天威雷發氛沴氷消殄凶譙門不俟鳴條之旅殱虐牧野無勞孟津之鉞華夷即晏晷緯還光鏗鏘聞于管絃趨翔被于冠冕同軌仰化異域懐風劉子勛昏世稱兵義同翦惡明朝不戢同識邪正窺窬畿甸逼遏兩江陵上無君暴於遐邇王赫斯怒興言討違命被上将治兵薄伐今遣寧朔将軍尋陽内史沈攸之輕鋭七千飛舟先邁龍驤将軍劉靈遺羽林虎旅連鋒繼造假節督南討前鋒諸軍事冠軍将軍兗州刺史殷孝祖驅濟河勁卒電擊雷動使持節車騎将軍江州刺史曲江縣開國侯王𤣥謨烝徒五萬董統前師使持節侍中司徒揚州刺史建安王休仁擁神州之衆摠督羣帥龍驤将軍劉勔寧朔将軍劉懐珍歩騎五千直指大雷寧朔将軍栁倫司州刺史龎孟虬淮潁突騎邪趨西陽使持節驃騎大将軍豫州刺史山陽王休祐摠勒步師連騎百萬河舟代馬遄騖江濆越棘吴鉤交曜畿服笳鼓動坤維金甲震雲漢犄角相望水陸俱發冠軍将軍武念率雍司之鋭巳據樊沔徐州刺史申令孫提彭宋剽勇陵塗焱奮皇上當親馭六師降臨江服旌斾掩雲舳艫咽海昔吴楚連衡燕淮勁悍塵擾區内聲沸秦中霧散埃滅豈非先鑒而嬰彼孤城以待該天之網迫此烏合以抗絡㝢之師雲羅四掩霜鋒交集猶勁飈之拂細草烈火之掃寒原燋卷之形昭然已著朝廷惻愍我僚吏哀矜我士民並亦何辜拘誤迷黨故加宣示令得自新如其淪惑不改抵冒王威同焚既至雖悔奚補奉詔以四王幼弱不幸罹難兵交之日不得妄加侵犯若有逼損誅翦無貸左右主帥嚴相衛奉詿誤之罪一無所問尋陽王子房字孝良孝武帝第六子厯會稽太守貶為松滋侯尋殺之與吴喜書太宗初四方反叛尋陽王子房舉兵以應晉安王庾業劉延孫等並從時喜為殿中御史請得精兵三百致死於東太宗即假建武将軍簡羽林勇士配之喜既至永世得庾業劉延熈書送子房檄又與喜書喜答之東兵敗延孫投水死業被殺知統戎旅巳次近路卿所在著名今日何為立忠於彼邪想便倒戈共受河山之賞吴喜報庾業劉延熈書喜吴興臨安人厯淮陵太守假冠軍将軍賜死守業新野人為右軍司馬義興太延熈延孫弟臨海義興太守前驅之人忽獲來翰披尋狂惑良深悵駭聖主以神武撥亂徳盛勲髙羣逆交扇滅在晷刻君等勲義之烈世荷國恩事愧鳴鴞不懐食椹今練勒所部星言進邁相見在近不復多陳並宋書喜按前書乃尋陽王子房與喜此則報業等永世所得書也尺牘作答尋陽王誤臨川長公主諱英媛文帝第六女請還王氏表東陽太守王藻尚主主以妬讒藻于廢帝下獄死與王氏離婚太宗頗疾諸主多妬主上表許之妾遭隨竒薄絶於王氏私庭囂戾致此分異今孤疾㷀然假息朝夕情寄所鍾唯在一子契濶塗炭特兼憐愍否泰榮枯繫以為命寔願申其門釁還為母子推遷僶俛未及自聞先朝慈愛鑑妾丹衷若賜使息徹歸第定省仰揆天㫖或有可尋今事迫誠切不顧典憲敢縁恩燾觸冒披聞特乞還身王族守養弱嗣雖死之日實甘於生彭城王義康女玉秀等乞還父䘮奏義康坐范曄等謀立徙付安成都元嘉二十八年賜死葬安成大明四年玉秀等露版辭乞詔聴并加資給父凶滅無状孤負天明存荷優養沒䝉加禮明罰羽山未足敕法烏鳥微心昧死上訴乞反𦵏舊塋糜骨鄉壤並宋書宋文紀巻六
