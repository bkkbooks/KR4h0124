body:
  text: 宋文紀巻十一明梅鼎祚編顔延之字延年琅邪臨沂人厯金紫光祿大夫領湘東王師與謝靈運俱以辭采齊名江左稱顔謝焉請立渾天儀表張衡創物蔡邕造論戎夏相襲世重其術臣昔奉使入闗值大軍旋斾渾儀在路肆觀竒秘絶代異寳旋及王府考諸前志誠應夙聞尚書璇璣玉衡以齊七政崔瑗所謂數術窮天地制作侔造化經志所云圗憲所本故體度不渝精測尚矣則七晷運變無匪康時九代貞觀不絶司厯臣夙懐末意懼干非任今忝惟職統敢昧死以聞武帝為相國有上渾儀表延之此表亦上晉帝也拜永嘉太守辭東宫表抗志絶操芼陸謝蒭代食賔土何獨匪民又為齊景王世子臨會稽郡表此郡歌風蹈雅既髣髴於淹中春誦夏絃實依稀於河上頃者以来稍有訛替可推擇明經式寄儒職使琢玉成器無爽昔談鑄金待價有符舊説上文帝自陳表延之為荀赤松奏劾詔特復為秘書監光祿勲太常性既褊急兼有酒過肆意直言然居身清約不營財利元嘉二十九年上表自陳不許明年致事臣聞行百里者半於九十言其末路之難也愚心常謂為虚方今乃知其信臣延之人薄寵厚宿塵國言而雪効無從榮牒增廣厯盡身彫日叨官次雖容載有塗而妨穢滋積早欲啓請餘筭屏蔽醜老但時制行及歸慕無賒是以㥏冒愆非簡息干黷耗歇難支質用有限自去夏侵暑入此秋變頭齒昡疼根痼漸劇手足冷痺左脾尤甚素不能食頃向減半本猶賴服比倦悸晚年疾所催顧景引日臣班叨首卿位尸封典肅祗朝校尚恧匪任而陵廟衆事有以疾怠宫府覲慰轉闕躬親息㚟庸㣲過宰近邑回澤爰降實加將監乞解所職隨就藥養伏願聖慈特垂矜許禀恩明世負報㝠暮仰企端闈上戀㒺極上孝武帝謝子竣封建城侯表伏見䇿書降錫息竣開國建城縣侯爵踰三等户越兼千生邀洪禮身茂盛世闔宗革聽盡室改觀誠慙末品誤參其泰臣聞子之能仕父敎之忠忠敎善信臣實負其前誥能仕志政竣固暗於明試徒以數遇㑹昌消憂啓聖幸與靈祚福徳共從義勳分賞執珪登朝析金受邑慶重慮愆恩往懼積非臣耄蔽所任圗報豈峻庸薄所能奉服弔張茂度書茂度名裕以字行吴郡吴人厯㑹稽太守張敷字景𦙍吴郡人髙祖以為世子中軍㕘軍後遷黄門侍郎始興王濬後軍長史司徒左長史未拜父邵為吴興太守亡報以疾篤敷往奔省自安都至吴興凡十餘日不進水漿𦵏畢毁瘠成疾世父茂度每止譬之輒更哀慟未朞而卒延之書弔茂度賢弟子少履貞規長懐理要清風素氣得之天然言面以来便申忘年之好比雖艱隔成阻而情問無暌薄暮之人冀其方見慰説豈謂中年奄為長往聞問悼心有兼怛痛足下門敎敦至兼實家寳一旦喪失何可為懐宋書與王曇生書王𢎞之卒延之欲為作誄書與𢎞之子曇生誄竟不就曇生好文義以謙和稱吏部尚書君家髙世之節有識歸重豫染毫翰所應載述况僕託慕末風竊以叙徳為事但恨短筆不足書美宋書與王㣲書圗畫非止藝行成當與易象同體而工篆隸者自以書巧為髙王㣲叙畫師南齊謝赫古畫品云史道碩與王㣲並荀衛王得其意史得其似為孝武帝贈袁淑詔淑為太子左衛率元凶劭弑逆其夜在省不從見殺世祖即位以顔延之為詔夫輕道重義亟聞其敎世敝國危希遇其人自非達義之至識正之深者孰能抗身衛主遺身固節者哉故太子左衛率淑文辯優洽秉尚貞慤當要逼之切意色不撓厲辭道逆氣震凶黨虐刃交至取斃不移古之懐忠隕難未云出其右者興言嗟悼無廢乎心宜在加禮永旌宋有臣焉可贈侍中太尉謚曰忠憲公又詔淑及徐湛之江湛卜天與四家長給廩祿袁淑以身殉義忠烈邈古遺孤在疚特所矜懐可厚加賜䘏以慰存亡武帝諡議以為聖哲同風功美殊稱蓋出乎道者無方故刑于物者不一伏惟道塞人神信通期運愛敬所禀因心則逺英粹之照正性自天體苞潛躍慮周巻舒龍徳在隂雖艱貞而不悶因時而惕故有来以必亨在晉之季皇途薦阻欃槍干紀璇璣失馭天鑒靈武民屬聖明不假十室之資不藉百乗之賦首義馳風一鼓静亂滌除泰階消殞薄蝕斯亮登庸之基經綸之始者也内難雖攝外圗未輯河華海岱負固相望荆濮燕亳侯服交侵眷言帝畿思康王路戎不再駕遺氓即序斥候之所未羈亭徼之所不譯莫不飾誠請罪欵塞来賔故能洒掃中嶽致廟九山神道㑹昌寳命既集損之而益後身愈先既而儀刑帝載揖讓天厯改玉乎文祖班瑞于神宗貫革寢機文武搢笏故辰居兩楹坐一八表國訓成均之學家沾撫辜之仁大美配天必終之以儉徳道固萬葉猶申之以話言允所謂教思無窮樹之長世取髙上代顧邈前王矣宋文皇帝元皇后哀䇿文皇后諱齊媯陳郡人左光祿大夫湛之庶女適太祖生太子劭諡曰元惟元嘉十七年七月二十六日大行皇后崩于顯陽殿粤九月二十七日將遷瘞于長寜陵禮也龍輁纚綍容翟結驂皇塗昭列神路幽嚴皇帝親臨祖饋躬瞻宵載飾遺儀於組旒淪徂音乎珩珮悲黼筵之移御痛翬褕之重晦降輿客位撤奠殯階乃命史臣累徳述懐其辭曰倫昭儷升有物有憑圎精初爍方祇始凝昭哉世族祥發慶膺秘儀景胄圗光玉繩昌暉在隂柔明將進率禮蹈和稱詩納順爰自待年金聲夙振亦既有行素章增絢象服是加言觀維則俾我王風始基嬪徳惠問川流芳猷淵塞方江泳漢載謡南國伊昔不造鴻化中㣲用集寳命仰陟天機釋位公宫登曜紫闈欽若皇姑允迪前徽孝達寜親敬行宗祀進思才淑􅅖綜圗史發音在詠動容成紀壼政穆宣房樂韶理坤則順成星軒潤飾徳之所届惟深必測下節震騰上清脁側有来斯雍無思不極謂道輔仁司化莫晰象物方臻眡祲告沴太和既融収華委世蘭殿長隂椒塗弛衛嗚呼哀哉戒凉在律杪秋即穸霜夜流唱曉月升魄八神警引五輅遷跡噭噭儲嗣哀哀列辟灑零玉墀雨泗丹掖撫存悼亡感今懐昔嗚呼哀哉南背國門北首山園僕人按節服馬顧轅遥酸紫葢眇泣素軒滅綵清都夷體夀原邑野淪藹戎夏悲讙采芳可述往駕弗援嗚呼哀哉陽給事誄并序城永初三年魏主嗣自率衆攻滑臺東北崩壊王景度出奔司馬陽瓉堅守不降為魏所殺少帝追贈給事中尚書令傅亮議瓉家在彭城宜即以入臺絹一百匹粟三百斛賜給延之為之誄惟永初三年十一月十一日宋故寜逺司馬濮陽太守彭城陽君卒嗚呼哀哉瓉少禀志節資性忠果奉上以誠率下有方朝嘉其能故授以邉事永初之末佐守滑臺值國禍薦臻王略中否魏人間釁劘剥司兗幽并騎弩屯逼鞏洛列營縁戍相望屠潰瓉奮其猛鋭志不違難立乎將卒之間以緝華裔之衆罷困相保堅守四旬上下力屈受陷勍冦士師奔擾棄軍争免而瓉誓命沈城佻身飛鏃兵盡器竭斃於旗下非夫貞壯之氣勇烈之志豈能臨敵引義以死狥節者哉景平之元朝廷聞而傷之有詔曰故寜逺司馬濮陽太守陽瓉滑臺之逼厲誠固守投命狥節在危無撓古之烈士無以加之可贈給事中振䘏遺孤以慰存亡追寵既彰人知慕節河汴之間有義風矣逮元嘉廓祚聖神紀物光昭茂緒旌録舊勲茍有槩於貞孝者實事感於仁明末臣䝉固側聞至訓敢詢諸前典而為之誄其辭曰貞不常祜義有必甄處父勤君怨在登賢苫夷致果題子行間忠壯之烈宜自爾先舊勲雖廢邑氏遂傳惟邑及氏自温徂陽狐續既降晉族弗昌之子之生立績宋皇拳猛沈毅温敏肅良如彼竹栢負雪懐霜如彼騑駟配服驂衡邉兵喪律王略未恢函陜堙阻瀍洛蒿萊朔馬東騖北風南埃路無歸轊野有委骸帝圗斯艱簡兵授才寔命陽子佐師危臺憬彼危臺在滑之坰周衛是交鄭翟是争昔惟華國今實邉亭慿巘結闗負河縈城金柝夜擊和門晝扃料敵厭難時惟陽生凉冬氣勁塞外草衰逷矣天驕乗障犯威鳴驥横厲霜鏑髙翬軼我河縣俘我洛畿攅鋒成林投鞍為圍翳翳窮壘嗷嗷羣悲師老變形地孤援濶卒無半菽馬實拑秣守未焚衝攻已濡褐烈烈陽子在困彌達勉慰痍傷拊巡饑渴力雖可窮氣不可奪義立邊疆身終鋒栝嗚呼哀哉賁父隕節魯人是志汧督效貞晉策攸記皇上嘉悼思存寵異于以贈之言登給事䟽爵紀庸恤孤表嗣嗟爾義士没有餘喜嗚呼哀哉陶徵士誄并序延之為始安郡道經尋陽常飲淵眀舎及淵明卒延之為誄夫璿玉致美不為池隍之寳桂椒信芳而非園林之實豈期深而好逺哉盖云殊性而已故無足而至者物之藉也隨踵而立者人之薄也若乃巢髙之抗行夷皓之峻節故已父老堯禹錙銖周漢而緜世浸逺光靈不屬至使青華隠沒芳流歇絶不其惜乎雖今之作者人自為量而道路同塵輟塗殊軌者多矣豈所以昭末景泛餘波有晉徵士尋陽陶淵明南岳之幽居者也弱不好㺯長實素心學非稱師文取指達在衆不失其寡處言愈見其默少而貧病居無僕妾井臼弗任藜菽不給母老子幼就養勤匱逺惟田生致親之議追悟毛子捧檄之懐初辭州府三命後為彭澤令道不偶物棄官從好遂乃解體世紛結志區外定跡深棲於是乎逺灌畦鬻蔬為供魚菽之祭織絇緯蕭以充糧粒之費心好異書性樂酒徳簡棄煩促就成省曠殆所謂國爵屏貴家人忘貧者歟有詔徴著作郎稱疾不到春秋若干元嘉四年月日卒于尋陽縣之某里近識悲悼逺士傷情冥默福應嗚呼淑貞夫實以誄華名由諡髙茍允徳義貴賤何筭焉若其寛樂令終之美好廉克巳之操有合諡典無愆前志故詢諸友好宜諡曰靖節徵士其詞曰物尚孤生人固介立豈伊時遘曷云世及嗟乎若士望古遥集韜此洪族蔑彼名級睦親之行至自非敦然諾之信重於布言廉深簡潔貞夷粹温和而能峻博而不繁依世尚同詭時則異有一於此兩非默置豈若夫子因心違亊畏榮好古薄身厚志世霸虚禮州壤推風孝惟義養道必懐邦人之秉彛不隘不恭爵同下士祿等上農度量難鈞進退可限長卿去官稚賔自免子之悟之何悟之辨賦詩歸来髙蹈獨善亦既超曠無適非心汲流舊巘葺宇家林晨烟暮靄春煦秋隂陳書輟卷置酒絃琴居備勤儉躬兼貧病人否其憂子然其命隠約就閒遷延辭聘非直也明是惟道性糾纒斡流冥漠報施孰云與仁實疑明智謂天蓋髙胡諐斯義履信曷憑思順何寘年在中身疢維痁疾視如歸臨凶若吉藥劑弗嘗禱祠非恤傃幽吿終懐和長畢嗚呼哀哉敬述靖節式尊遺占存不願豐没無求贍省訃却賻輕哀薄歛遭壤以穿旋𦵏而窆嗚呼哀哉深心追往逺情逐化自爾介居及我多暇伊好之洽接閻鄰舎宵盤晝憩非舟非駕念昔宴私舉觴相誨獨正者危至方則閡哲人卷舒布在前載取鑒不逺吾規子佩爾實愀然中言而發違衆速尤迕風先蹷身才非實榮聲有歇叡音永矣誰箴余闕嗚呼哀哉仁焉而終智焉而斃黔婁既沒展禽亦逝其在先生同塵往世旌此靖節如彼康惠嗚呼哀哉祭屈原文延之少帝初為正員郎兼中書尋徙貟外常忤徐羨之等出為始安太守道經汨潭為湘州刺史張邵弔屈原文以致其意維有宋五年月日湘州刺史吴郡張邵恭承帝命建旟舊楚訪懐沙之淵得捐珮之浦弭節羅潭艤舟汨渚乃遣戸曹掾某敬祭故楚三閭大夫屈君之靈蘭薰而摧玉貞則折物忌堅芳人諱眀潔曰若先生逢辰之缺温風迨時飛霜急節嬴芉遘紛昭懐不端謀折儀尚貞蔑椒蘭身絶郢闕跡徧湘干比物荃蓀連類龍鸞聲溢金石志華日月如彼樹芬實穎實發望汨心欷瞻羅思越藉用可塵昭忠難闕為張湘州祭虞帝文惟哲化神繼天作聖藏器漁陶致身愛敬是以二妃嬪徳九子觀命在麓不迷御衡以正唐歴既終虞道乃光咨堯授禹素俎采堂百齡厭世萬里陟方敬詢故老欽咨聖君職奉西湘䖍屬南雲神之聽之匪酒伊葷祖祭弟文闔棺窮野啓殯中荒靈影夙滅筵寢虚張人往運来自秋徂陽蕃蘭落色宿草滋長孰云不痛辭家去鄊爾之于役爰適兹邑上秋告来方春佇立如何不弔吉違凶集六親憧心姻朋浩泣我雖載奔伊何云及永懐在昔追亡悼存惟兄及弟瞻母望昆生無榮嬿没望歸魂令龜吉兆祖櫬東旋靈轅次路嚴舟在川廓然何及痛矣終天三月三日曲水詩序文帝元嘉十一年三月丙申褉飲於樂逰苑且祖道江夏王義恭衡陽王義季有詔㑹者咸作詩詔顔延之作序夫方䇿既載皇王之迹已殊鐘石畢陳舞詠之情不一雖淵流遂往詳略異聞然其宅天衷立民極莫不崇尚其道神明其位拓世貽統固萬葉而為量者也有宋函夏帝圗𢎞逺髙祖以聖武定鼎規同造物皇上以叡文承歴景屬宸居隆周之卜既永宗漢之兆在焉正體毓徳於少陽王宰宣哲于元輔晷緯昭應山瀆效靈五方雜遝四隩来暨選賢建戚則擇之於茂典施命發號必酌之於故實大予協樂上庠肆敎章程明宻品式周備國容眡令而動軍政象物而具箴闕記言校文講藝之官采遺於内輶車朱軒懐荒振逺之使諭徳于外赬莖素毳并柯共穗之瑞史不絶書棧山航海踰沙軼漠之貢府無虚月列燧千城通驛萬里穹居之君内首禀朔卉服之酋回面受吏是以異人慕響俊民間出警蹕清夷表裏恱穆將徙縣中宇張樂岱郊增類帝之宫飭禮神之館塗歌邑誦以望屬車之塵者久矣日躔胃維月軌青陸皇祇發生之始后王布和之辰思對上靈之心以惠庶萌之願加以二王于邁出餞戒告有詔掌故爰命司歴獻洛飲之禮具上已之儀南除輦道北清禁林左闗巖隥右梁潮源略亭臯跨芝廛苑太液懐曾山松石峻垝蔥翠隂煙游泳之所攅萃翔驟之所往還於是離宫設衛别殿周徼旌門洞立延帷接枑閱水環階引池分席春官聫亊蒼靈奉塗然後升秘駕𦙍緹騎揺玉鑾發流吹天動神移淵旋雲被以降于行所禮也既而帝暉臨幄百司定列鳳蓋俄軫虹旗委斾肴蓛芬藉觴醳泛浮妍歌妙舞之容銜組樹羽之器三奏四上之調六莖九成之曲競氣繁聲合變争節龍文飾轡青翰侍御華裔殷至觀聽騖集揚袂風山舉袖隂澤靚裝藻野袨服縟川故以殷賑外區煥衍都㑹者矣上膺萬夀下禔百福帀筵稟和闔堂依徳情盤景遽歡洽日斜金駕摠駟聖儀載佇悵釣臺之未臨慨酆宫之不縣方且排鳳闕以髙游開爵園而廣宴並命在位展詩發志則夫誦美有章陳信無愧者歟赭白馬賦序驥不稱力馬以龍名豈不以國尚威容軍􅤻趫迅而已實有騰光吐圗疇徳瑞聖之符焉是以語崇其靈世榮其至我髙祖之造宋也五方率職四隩入貢秘寳盈於玉府文駟列乎華廏乃有乗輿赭白特禀逸異之姿妙簡帝心用錫聖皁服御順志馳驟合度齒歴雖衰而藝美不忒襲養兼年恩隠周渥嵗老氣殫斃于内棧少盡其力有惻上仁乃詔陪侍奉述中㫖末臣庸蔽敢同獻賦白鸚鵡賦序余具職崇賢預觀神秘有白鸚鵡焉被素履𤣥性温言達九譯絶區作玩天府同事多士咸竒思賦大筮箴余因讀易偶意蓍龜友人有請决逰宦務志卦有咎占故作大筮箴以悟焉先王設筮大人盡慮卦遭同人變而之豫先號後笑初暌末遇時至運来當在三五功畢官成幾乎衍數慶在坤宫災在坎路不出庭户獨立無懼違此而動投足失歩無惰爾儀靈骨有知無曰余逆神筴不豫南人司箴敢告馳騖家傳銘曠彼琅邪實唯海宇誰其来遷時聞逺祖青州隠秀爰始奠居内辭鼎府外秉邦閭建節中平分竹黄初刑清齊右政偃營區葛嶧明懿平陽聰理式薦公庭或登宰士列美霸朝雙風千里華萼之茂於昭不巳新喻侯茅齋贊輦草作壯采茅昭儉哲人素節貴而能貶羈結茨危瞰臨涯隒蜀葵贊井維降精㟭絡升靈物㣲氣麗卉草之英渝艶衆葩冠冕羣英類麻能直方葵不傾碧芙蓉頌澤芝芳艶擅竒水屬練氣紅荷比符縹玉擢麗滄池飛映雲屋實紀仙方名書靈躅赤槿頌日御北至夏徳南宣玊蒸榮心氣動上𤣥華繅間物受色朱天是謂珍樹含艶丹間七繹北岳孤生剗迹埋名身間事盡道畜山扃東國進士謬與遷焉其居也依隠嵁隂結架清深岩屋橋構隥道相臨寒榮隴首繑飲江潯客曰周以岩廓匝以綵房木寫雲氣土秘羣芳既旋天而倒井又斲貟而鏤方松丘箭渚藥苑香林梁澗道以髙濟棧岩墱而上尋客曰若夫丹山之奥金門之秘地首岷銅川上汶泗裁石成音調金為器故列真玩其㣲鳴辭人賦其清懿若乃梓漆簡聲麗容呈才陳舞態開吹臺獵悲風遡秋埃既而昵賔獻夀中人奉膳有悄者顔弗怡髙殿視華鼓之繁桴聽邉笳之嘶囀飛朱鷺以首引逮𤣥雲而終變然後簮珥揺暉莊服流湎抗妍歌以跕躧揚輕袖而翳面雜紛披於巾拂遞間闗乎槃扇範連珠蓋聞匹夫履順則天地不違一物投誠則神明可交亊有㣲而逾著理有闇而必昭是以魯陽傾首離光為之反舍有鳥拂波河伯為之不潮天馬狀降靈驥子九方是選白􅀈朱文綠虵紫燕水軼驚鳬陸越飛箭遇山為風值雲成電庭誥延之元嘉中罷永嘉郡屏居里巷不豫人間者七載為庭誥之文沈約刪其繁辭存其正著于宋書本傳庭誥者施於閨庭之内謂不逺也吾年居秋方慮先草木故遽以未聞誥爾在庭若立履之方規鑒之明已列通人之規不復續論今所載咸其素畜本乎生靈而致之心用夫選言務一不尚煩宻而至於備議者蓋以網諸情非古語云得鳥者羅之一目而一目之羅無時得鳥矣此其積意之方道者識之公情者徳之私公通可以使神明加嚮私塞不能令妻子移心是以昔之善為士者必捐情反道合公屏私尋尺之身而以天地為心數紀之夀常以金石為量觀夫古先垂戒長老餘論雖用細制毎以不朽見銘繕築末迹咸以可久承志况樹徳立義収族長家而不思經逺乎曰身行不足遺之後人欲求子孝必先慈將責弟悌務為友雖孝不待慈而慈固植孝悌非期友而友亦立悌夫和之不備或應以不和猶信不足焉必有不信儻知恩意相生情理相出可使家有參柴人皆由損夫内居徳本外夷民譽言髙一世處之逾嘿器重一時體之滋冲不以所能干衆不以所長議物淵泰入道與天為人者士之上也若不能遺聲欲人出已知柄在虚求不可校得敬慕謙通畏避矜踞思廣監擇從其逺猷文理精出而言稱未達論問宣茂而不以居身此其亞也若乃聞實之為貴以辯畫所克見聲之取榮謂争奪可獲言不出於戸牖自以為道義久立才未信於僕妾而曰我有以過人於是感茍銳之志馳傾觖之望豈悟已挂有識之裁入修家之誡乎記所云千人所指無病自死者也行近於此者吾不願聞之矣凡有知能預有文論不練之庶士校之羣言通才所歸前流所與焉得以成名乎若呻吟於牆室之内喧嚻於黨輩之間竊議以迷寡聞妲語以敵要説是短筭所出而非長見所上適值尊明臨座稠覽博論而言不入於髙聽人見棄於衆視則慌若迷塗失偶黶如深夜撤燭銜聲茹氣腆嘿而歸豈識向之夸慢祗足以成今之沮喪邪此固少壯之廢爾其戒之夫以怨誹為心者未有達無心救得喪多見誚耳此蓋臧獲之為豈識量之為事哉是以徳聲令氣愈上毎髙忿言懟譏毎下愈發有尚於君子者寜可不務勉耶雖曰恒人情不能素盡故當以逺理勝之么笇除之豈可不務自異而取陷庸品乎富厚貧薄事之懸也以富厚之身親貧薄之人非可以一時處然昔有守之無怨安之不悶者蓋有理存焉夫既有富厚必有貧薄豈其證然時乃天道若人厚富是理無貧薄然乎必不然也若謂富厚在我則宜貧薄在人可乎又不可矣道在不然義在不可而横意去就謬生希幸以為未達至分蠶温農飽民生之本躬稼難就上以僕役為資當施其情願庀其衣食定其當治遞其優劇出之休饗後之捶責雖有勸恤之勤而無霑曝之苦務前公稅以逺吏讓無急傍費以息流議量時發歛視嵗穰儉省膳以奉已損散以及人此用天之善御生之得也率下多方見情為上立長多術晦明為懿雖及僕妾情見則事通雖在畎畝明晦則功博若奪其常然役其煩務使威烈雷霆猶不禁其欲雖棄其大用窮其細瑕或明灼日月將不勝甚耶故曰孱焉則差的焉則闇是以禮道尚優法意從刻優則人自為厚刻則物相為薄耕收誠鄙此用不忒所謂野陋而不以居心也含生之氓同祖一氣等級相傾遂成差品遂使業習移其天識世服没其性靈至夫願欲情嗜宜無間殊或役人而養給然是非大意不可侮也隅奥有竈齊侯蔑寒犬馬有秩管燕輕饑若能服温厚而知穿弊之苦明周之徳厭滋㫖而識寡嗛之急仁恕之功豈與夫比肌膚於草石方手足於飛走者同其意用哉罰慎其濫惠戒其偏罰濫則無以為罰惠偏則不如無惠雖爾眇末猶扁庸保之上事思反已動類念物則其情得而人心塞矣抃博蒲塞㑹衆之事諧調哂謔適坐之方然失敬致侮皆此之由方其尅瞻彌喪端嚴况遭非鄙慮將醜折豈若拒其容而簡其事静其氣而逺其意使言必諍懕賓友清耳笑不傾撫左右悦目非鄙無因而生侵侮何從而入此亦持徳之管籥爾其謹哉嫌惑疑心誠亦難分豈唯厚貌蔽智之明深情怯剛之斷而巳哉必使猜怨愚賢則嚬笑入戾期變犬馬則步顧成妖况動容竊斧束装濫金又何足論是以前王作典明慎議獄而僣濫易意朱公論璧光澤相如而倍薄異價此言雖大可以戒小㳺道雖廣交義為長徳在可久失在輕絶久由相敬絶由相狎愛之勿勞當扶其正性忠而勿誨必藏其枉情輔以藝業㑹以文辭使親不可䙝疎不可間每存大徳無挟小怨率此往也足以相終酒酌之設可樂而不可嗜嗜而非病者希病而遂眚者幾旣眚既病將蔑其正若存其正性紓其妄發其唯善成乎聲樂之㑹可簡而不可違違而不背者鮮矣背而非弊者反矣既弊既背將受其殿必能通其礙而節其流意可為和中矣善施者唯發自人心乃出天則與不待積取無謀實並散千金誠不可能贍人之急雖乏必先使施如王丹愛如杜林亦可與言交矣浮華怪飭滅質之具竒服麗食棄素之方動人勸慕傾人顧盻可以逺識奪難用近欲從若覩其淫怪知生之無心為見竒麗能致諸非務則不抑自貴不禁自止夫數相者必有之徴既聞之術人又驗之吾身理可得而論也人者兆氣二徳禀體五常二徳有竒偶五常有勝殺及其為人寜無叶沴亦猶生有好醜死有夭夀人皆知其懸天至於丁年乖遇中身迂合者豈可易地哉是以君子道命愈難識道愈堅古人恥以身為溪壑者屏欲之謂也欲者性之煩濁氣之蒿蒸故其為害則薰心智耗真情傷人和犯天性雖生必有之而生之徳猶火含烟而妨火桂懐蠧而殘桂然則火勝則烟滅蠧壯則桂折故性明者欲簡嗜繁者氣惛去明即惛難以主一目其以中外羣聖建言所黜儒道衆智發論是除然有之者不患深故藥之者恒苦術淺所以毁道多而義寡頓盡誠難毎指可易能易毎指亦明之末廉嗜之情不同故畏慕之情或異從事於人者無一人我之心不以已之所善謀人為有明矣不以人之所務失我能有守矣已所謂然而彼定不然奕棊之蔽悦彼之可而忘我不可學嚬之蔽將求去蔽者念通怍介而巳流言謗議有道所不免况在闕薄難用筭防接應之方言必出巳或信不素積嫌間所襲或性不和物尤怨所聚有一于此何處逃毁茍能反悔在我而無責於人必有達鑒昭其情逺識迹其事日省吾躬月料吾志寛默以居潔静以期神道必在何恤人言喭曰富則盛貧則病矣貧之病也不惟形色粗黶或亦神心沮廢豈但交友疎棄必有家人誚讓非廉深識逺者何能不移其植故欲蠲憂患莫若懐古懐古之志當自同古人見通則憂淺意逺則怨浮昔琴歌於編蓬之中者用此道也夫信不逆彰義必出隠交賴相盡明有相照一面見㫖則情固丘岳一言中志則意入淵泉以此事上水火可蹈以此託友金石可弊豈待充其榮實乃將議報厚之筐篚然後圗終如或與立茂思無忽祿利者受之易易則人之所榮蠶穡者就之艱艱則物之所鄙艱易既有勤倦之情榮鄙又間向背之意此二塗所為反也以勞定國以功施人則役徒屬而擅豐麗自理於民自事其生則督妻子而趨耕織必使陵侮不作懸企不萌所謂賢鄙處宜華野同泰人以有惜為質非假嚴刑有恒為徳不慕厚貴有惜者以理𦵏有恒者與物終世有位去則情盡斯無惜矣又有務謝則心移斯不恒矣又非徒若此而巳或見人休事則懃蘄結納及聞否論則處彰離貳附㑹以從風隠竊以成釁朝吐面譽暮行背毁昔同稽款今猶叛戾斯為甚矣又非唯若此而巳或慿人惠訓藉人成立與人餘論依人揚聲曲存禀仰甘赴塵軌衰没畏逺忌聞影迹又䝉之毁之無度心短彼能私樹巳拙自崇恒輩罔顧髙識有人至此實蠧大倫毎思防避無通閭伍覩驚異之事或無涉傳遭卒迫之變反思安順若異從已發將尸􅉪人迫而又迕愈使失度能夷異如裴楷處逼如裴遐可稱深士乎喜怒者有性所不能無常起於褊量而止於𢎞識然喜過則不重怒過則不威能以恬漠為體寛愉為器者美矣大喜蕩心㣲抑則定甚怒煩性小忍即歇動無愆容舉無失度則物將自懸人將自止習之所變亦大矣豈惟蒸性染身乃將移智易慮故曰與善人居如入芝蘭之室久而不聞其芬與之化矣與不善人居如入鮑魚之肆久而不知其臭與之變矣是以古人慎所與處唯夫金真玉粹者乃能盡而不汚爾故曰丹可滅而不能使無赤石可毁而不能使無堅茍無丹石之性必慎浸染之由能以懐道為人必存從理之心道可懐而理可從則不議貧議所樂爾或云貧何由樂此未求道意道者瞻富貴同貧賤理固得而我自䘮之未為通議茍議不喪夫何不樂或曰温飽之貴所以榮生饑寒在躬空曰從道取諸其身將非篤論此又通理所用凡生之具豈簡定實或以膏腴夭性有以菽藿登年中散云所足與不由外是以稱體而食貧嵗愈嗛量腹而炊豐家餘飡非粒實息耗意有盈虚爾况心得復劣身獲仁富明白入素氣志如神雖十旬九飯不能含饑業席三屬不能為寒豈不信然且以巳為度者無以自通彼量渾四游而斡五緯天道𢎞也振河海而載山川地道厚也一情紀而合流貫人靈茂也昔之通乎此數者不為剖判之行必廣其風度無挟私殊博其交道唯懐曲異故望塵請友則義士輕身一遇拜親則仁人投分此倫序通允禮俗平一上獲其用下得其和世務雖移前休未逺人之適主吾將反本三人至生蹔有之識幼壯驟過衰耗騖及其間天鬱既難勝言假獲存遂又云無幾柔麗之身亟委土木剛清之才遽為丘壤回遑顧慕雖數紀之中爾以此持榮曾不可留以此服道亦何能平進退我生逰觀所達得貴為人將在含理含理之貴惟神與交幸有心靈義無自惡偶信天徳逝不上慙欲使人沈来化志符往悊勿謂是賒日鑿斯宻著通此意吾將忘老如固不然其誰與歸值懐所撰略布衆脩若備舉情見顧未書一贍身之經别在田家節政奉終之紀自著燕居畢義又太平御覽引顔延之庭誥觀書貴要觀要貴博博而知要萬流可一詠歌之詩要其連類含章比物集句采風謡以達民詩為之祖褒貶之書取其正言晦義輔制衰王㣲辭豈㫖貽意盛聖春秋為上易首體備能事之淵馬陸得其象數而失其情理荀王舉其正宗而略其象數四家之見雖各有所志總而論之情理出於㣲明氣數生於形分然則荀王得之於心馬陸取之於物其無惡迄可知矣夫象窮數則太極者人心極而神功彰若荀王之言易可謂極人心之數者也又荀爽云詩者古之歌章然則雅頌之樂篇全矣是以後之詩者率以歌為名及秦勒望岳漢祀郊宫辭著前史者文變之髙制也雖雅聲未至𢎞麗難追矣逮李陵衆作總雜不類是假托非盡陵制至其善篇有足悲者摰虞文論足稱優洽栢梁以来繼作非一纂所至七言而巳九言不見者將由聲度罔誕不協金石至於五言流靡則劉楨張華四言側宻則張衡王粲若夫陳思王可謂兼之矣又此段御覽在舉無失度下欲求子孝必先為慈將欲弟悌務念為友雖孝不待慈而友亦立悌夫和之不備或應以不和猶信不足焉必有不信倘知恩意相生情理相出可使家有參柴人皆由損枚叔有言欲人勿聞莫若勿為禦寒莫若重裘止謗莫若自修論語云内省不疚何憂懼耶荀赤松劾顔延之奏延子起遷國子祭酒司徒左長史坐啓買人田不肯還直赤松為尚書左丞上奏詔特復為祕書監光祿勲太常求田問舍前賢所鄙延之唯利是視輕冒陳聞依傍詔恩拒捍餘直垂及周年猶不畢了昧利茍得無所顧忌延之昔坐事屏斥復䝉抽進而曾不悛革怨誹無巳交逰闒茸沈迷麴糵横興譏謗詆毁朝士仰竊過榮增憤薄之性私恃顧盻成彊梁之心外示寡求内懐奔競干祿期遷不知極巳預讌班觴肆罵上席山海含容毎存遵養愛兼雕蟲未忍遐棄而驕放不節日月彌著臣聞聲聞過情孟軻所恥况聲非外求聞由已出雖心智薄劣而髙自比擬客氣虚張曾無愧畏豈可復弼亮五教增曜台階請以延之訟田不實妄干天聴以彊凌弱免所居官宋書著罵南史作詈作甚宋文紀巻十一
